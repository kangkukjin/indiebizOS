# 최소 설치파일 (seed) 빌드 — installer/seed.py 를 OS별 단일 실행파일로 패키징.
#
# build.yml(전체 Electron 앱 번들)과 별개의 *최소* 경로다: 씨앗은 stdlib-only
# 에이전트라 PyInstaller --onefile 로 수 MB짜리 바이너리가 나온다. 사용자는
# 파이썬조차 없어도 바이너리 하나 + 자기 AI 키로 설치를 시작한다
# (frozen 모드: ROOT=INDIEBIZ_DIR 또는 ~/indiebizOS, 리포는 에이전트가 clone).
#
# 저장: 매 빌드를 artifact 로 + main 푸시마다 롤링 릴리스 `seed-latest` 갱신
# (고정 다운로드 URL: releases/download/seed-latest/<파일명>).
name: Build Seed Installers

on:
  push:
    branches: [main]
    paths:
      - 'installer/**'
      - 'install.sh'
      - 'install.ps1'
      - '.github/workflows/build-seed.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest        # Apple Silicon
            target: indiebiz-seed-macos-arm64
          - os: macos-15-intel      # Intel Mac (macos-13 은퇴 후 GitHub 공식 인텔 러너)
            target: indiebiz-seed-macos-x86_64
          - os: ubuntu-latest
            target: indiebiz-seed-linux-x86_64
          - os: windows-latest
            target: indiebiz-seed-windows-x86_64
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install PyInstaller
        # certifi: frozen 파이썬은 빌드 머신의 CA 경로를 물고 나와 사용자 머신에서
        # CERTIFICATE_VERIFY_FAILED 가 남(실사례: 인텔 맥) → CA 번들을 바이너리에 동봉.
        run: pip install pyinstaller certifi

      - name: Build single-file binary
        shell: bash
        run: |
          # --add-data 구분자: POSIX=':' / Windows=';'
          SEP=':'
          if [ "$RUNNER_OS" = "Windows" ]; then SEP=';'; fi
          pyinstaller --onefile --console \
            --name "${{ matrix.target }}" \
            --add-data "installer/bootstrap.md${SEP}." \
            --hidden-import certifi \
            installer/seed.py
          ls -la dist/

      - name: Smoke test (banner + provider inference + frozen ROOT)
        shell: bash
        run: |
          python - <<'EOF'
          import glob, os, subprocess, sys
          binary = glob.glob("dist/*")[0]
          env = dict(os.environ,
                     INDIEBIZ_API_KEY="sk-ant-dummy-key-for-smoke",
                     INDIEBIZ_DIR=os.path.join(os.getcwd(), "smoke-install-dir"),
                     INDIEBIZ_YES="1",   # 무인: 모델 프롬프트 스킵(기본값 사용)
                     NO_COLOR="1")
          p = subprocess.run([binary], env=env, capture_output=True,
                             text=True, timeout=180)
          out = p.stdout + p.stderr
          print(out[:3000])
          # 더미 키라 첫 API 호출은 당연히 실패(비0 종료) — 검증 대상은 기동 경로다:
          assert "installer agent" in out, "banner missing"
          assert "anthropic" in out, "provider inference from key prefix failed"
          assert "repo not present yet" in out, "frozen-mode ROOT/clone path missing"
          assert os.path.isdir(env["INDIEBIZ_DIR"]), "install dir was not created"
          print("SMOKE OK")
          EOF

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: ${{ matrix.target }}
          path: dist/*

  release:
    # main 푸시(또는 수동 실행)마다 롤링 릴리스 seed-latest 에 3-OS 바이너리를 갱신.
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Download all artifacts
        uses: actions/download-artifact@v5
        with:
          path: dist
          merge-multiple: true

      - name: Add click-to-run launcher
        # 일반 사용자용 더블클릭 설치기(.command) — 정적 파일이라 그대로 릴리스에 동봉.
        run: cp installer/install-mac.command dist/

      - name: List files
        run: ls -la dist/

      - name: Update rolling release (seed-latest)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: seed-latest
          name: 'IndieBiz OS 최소 설치파일 (seed)'
          body: |
            내려받아 실행하고 자기 AI API 키(Anthropic/OpenAI/Google)만 넣으면,
            씨앗 에이전트가 이 리포를 받아 하드웨어에 맞춰 IndieBiz OS를 설치합니다.

            ## 🍎 macOS — 가장 쉬운 방법 (더블클릭)
            터미널을 몰라도 됩니다.
            1. **`install-mac.command`** 파일을 내려받으세요.
            2. **더블클릭**하세요. (처음 한 번은 "알 수 없는 개발자" 경고가 뜨는데,
               파일을 **우클릭 → 열기 → 열기**를 누르면 됩니다.)
            3. **AI API 키 입력창**이 뜨면 키를 붙여넣고, **모델 선택창**은 그대로 두거나
               원하는 모델로 바꾼 뒤 계속을 누르세요. 나머지는 자동입니다.

            Apple Silicon/인텔은 자동 판별합니다. 설치가 끝나면 실행 방법이 안내됩니다.

            <details><summary>맥 고급 사용자 / 터미널 직접 실행</summary>

            ```bash
            ARCH=$(uname -m); curl -L -o indiebiz-seed "https://github.com/kangkukjin/indiebizOS/releases/download/seed-latest/indiebiz-seed-macos-${ARCH}"
            chmod +x indiebiz-seed && ./indiebiz-seed
            ```
            `arm64`=Apple Silicon, `x86_64`=인텔. 브라우저로 바이너리를 직접 받았다면
            `xattr -d com.apple.quarantine <파일>` 로 Gatekeeper 격리를 풀면 됩니다.
            </details>

            ### Linux (x86_64)
            ```bash
            curl -L -o indiebiz-seed https://github.com/kangkukjin/indiebizOS/releases/download/seed-latest/indiebiz-seed-linux-x86_64
            chmod +x indiebiz-seed && ./indiebiz-seed
            ```

            ### Windows (x86_64)
            `indiebiz-seed-windows-x86_64.exe` — SmartScreen이 "알 수 없는 게시자"
            경고를 띄우면 "추가 정보 → 실행"으로 진행하세요 (서명 미적용 탓이며,
            소스는 이 리포의 `installer/seed.py` 그대로입니다).

            설치 위치는 기본 `~/indiebizOS` (환경변수 `INDIEBIZ_DIR`로 변경).
            파이썬/git이 이미 있다면 한 줄 설치(`install.sh`/`install.ps1`)도 동일하게 동작합니다.
            이 릴리스는 main 브랜치의 installer 변경마다 자동 갱신됩니다 (rolling).
          files: dist/*
          prerelease: false
          make_latest: false
