        postprocess:
          type: compress
      weather:
        description: '날씨 조회 (Open-Meteo 무료). [sense:weather]{city: "수원"} 또는 {lat:
          37.26, lon: 127.03}. 도시명(한/영) 직접 사용 가능'
        group: places
        target_description: 도시명 또는 좌표
        router: handler
        tool: get_weather
        implementation: Open-Meteo 무료 API로 날씨 조회 (API키 불필요)
      restaurant:
        description: 맛집/음식점 공식 검색 (카카오+네이버 API). 가게 이름·주소·전화·평점 등 공식 DB 기반. 주민 후기/커뮤니티
