  limbs:
    actions:
      snapshot:
        description: Playwright 접근성 트리 스냅샷. 요소마다 ref ID 부여 — 이후 click/type 등이 ref로 대상 지정.
        group: browser
        target_description: '(파라미터 없음 — 현재 페이지의 ref 트리 반환)'
        router: handler
        tool: browser_snapshot
        implementation: Playwright 접근성 트리 스냅샷으로 DOM 요소 ref 매핑
      click:
        description: 브라우저 요소 클릭 (op 분기). single/double/right.
        group: browser
        target_description: 'ref ID 또는 selector로 대상 지정. double은 표 셀 편집·파일 열기, right는 컨텍스트 메뉴.'
        target_key: op
        router: handler
        tool: browser_click_op
        ops:
          default: single
          values:
            single: 좌클릭 (기본)
            double: 더블클릭 — 표 셀 편집·파일 열기
            right: 우클릭 — 컨텍스트 메뉴
        implementation: Playwright locator.click/dblclick/contextual_click op 분기 (ref 기반)
        keywords:
        - 클릭
        - 더블클릭
        - 우클릭
        - 컨텍스트메뉴
      type:
        description: 입력 필드(input/textarea)에 텍스트 입력. ref로 대상 지정.
        group: browser
        target_description: ref ID. text 파라미터로 입력 내용 전달.
        router: handler
        tool: browser_type
        implementation: Playwright locator로 입력 필드에 텍스트 입력
        target_key: ref
      screenshot:
        description: Playwright 페이지 스크린샷 PNG 저장. 시각 검증·기록용.
        group: browser
        target_description: '(파라미터 없음). path 옵션으로 저장 경로, full_page로 전체 영역 캡처.'
        router: handler
        tool: browser_screenshot
        implementation: Playwright page.screenshot()으로 PNG 캡처
      scroll:
        description: Playwright 페이지 스크롤 (up/down). 무한 스크롤 페이지 로딩이나 화면 이동에 사용.
        group: browser
        target_description: '(파라미터 없음). direction (up/down), pixels로 양 지정.'
        router: handler
        tool: browser_scroll
        implementation: Playwright mouse.wheel()로 페이지 스크롤
      evaluate:
        description: 페이지에서 JavaScript 표현식 실행. DOM 직접 조작·계산용.
        group: browser
        target_description: JavaScript 표현식 (page.evaluate 인자).
        router: handler
        tool: browser_evaluate
        implementation: Playwright page.evaluate()로 JavaScript 실행
        target_key: expression
      wait:
        description: Playwright 조건 충족까지 대기 (selector 등장·URL 변경·텍스트 표시). AJAX 페이지에 필수.
        group: browser
        target_description: selector/url/text 중 하나로 대기 조건 지정. timeout 옵션 가능.
