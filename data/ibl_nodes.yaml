        target_description: 검색어 (강남 파스타 등). x(경도)/y(위도)/radius로 좌표 주변 검색 가능.
        router: handler
        tool: search_restaurants
        implementation: Kakao + Naver Local API 듀얼 검색. 반환 combined[]에 상호명·주소·전화·카테고리·url(카카오는
          place.map.kakao.com=평점/리뷰 페이지). 별점 숫자 자체는 API에 없음.
        target_key: query
      navigate_route:
        description: 카카오 내비 자동차 길찾기. 거리·시간·톨비 반환. 지도 표시는 map.
        target_description: 목적지 (장소명 또는 '경도,위도'). origin 옵션으로 출발지 지정.
        group: places
        router: handler
        tool: kakao_navigation
        implementation: Kakao Map API로 자동차 경로 탐색 (거리/시간/톨비)
        target_key: destination
        keywords:
        - 길찾기
        - 내비
        - 경로
        - 네비게이션
      reverse_geocode:
        description: GPS 좌표를 행정구역 주소로 변환 (카카오 API, 위도+경도 → 시/도/구/동)
        group: places
        target_description: 위도(lat)와 경도(lng) 두 파라미터. 결과는 시/도/구/동까지 분해.
        router: handler
        tool: reverse_geocode
        implementation: Kakao Map API로 GPS 좌표→주소 변환
      travel:
        description: 여행 정보 검색 (Amadeus, op 분기) — 항공권·호텔·관광지. 도시명·상대날짜 내부 해소.
        group: travel
        target_description: 'flight — to(도착도시) 필수, from(기본 서울)·date(기본 +7일, "내일"/"다음주 금요일" 등 자연어)·adults 옵션. hotel — city 필수. poi — city 또는 lat/lng. 도시명은 IATA/좌표 자동 해소.'
        router: handler
        tool: amadeus_travel_search
        target_key: op
        ops:
          default: flight
          values:
            flight: 항공권 검색 (from→to·date). 도시명→IATA·상대날짜 자동 해소
            hotel: 도시 호텔 목록 (city→도시코드 자동)
            poi: 관광지 검색 (city→좌표 자동, 또는 lat/lng 직접)
        implementation: Amadeus API(OAuth2). op→endpoint 매핑 + 도시명/날짜 내부 해소 (endpoint+params 직접 지정도 가능)
        postprocess:
          type: compress
      search_local:
        description: 지역 커뮤니티(네이버 카페) 검색. 동네 주민들의 후기·추천·정보 수집용. 가게/음식점 공식 검색은 sense:restaurant(카카오+네이버
          API) 사용.
        group: research
        target_description: 검색어
        router: handler
        tool: local_search
        implementation: Naver Cafe API로 지역 커뮤니티 글 검색 (주민 후기, 추천, 지역 정보). 공식 가게 DB
          검색이 아닌 커뮤니티 의견 수집.
        target_key: query
      local_query:
        description: 축적된 지역 정보 DB 조회 (정기 수집된 가게·커뮤니티 데이터). 실시간 검색은 search_local.
        group: places
        target_description: 검색어 (FTS5 전문검색, 한국어 토큰화 지원).
        router: handler
        tool: local_db_query
        implementation: SQLite FTS(전문검색)로 축적된 지역 정보 DB 조회
        target_key: query
      cctv:
        description: CCTV/웹캠 조회 (op 분기). search(키워드 통합검색)/nearby(좌표 근처, lat·lng
          필수). 출력은 항상 lat/lng·playable 포함, stream_tags 동봉 시 채팅창 재생. 자세히 read_guide(query="cctv").
        group: media
        keywords:
        - cctv
        - 교통
        - 실시간
        - 카메라
        - 보여줘
        - 봐줘
        - traffic
        - camera
        - 영상
        - 근처
        - 주변
        target_description: search — query 키워드(전주·해운대·경부 등). nearby/webcam — lat·lng 필수,
          radius_km(km) 옵션. webcam은 해외 경치 웹캠(Windy).
        target_key: op
        router: handler
        tool: cctv_query
        ops:
          default: search
          values:
            search: 키워드로 전국 CCTV+해외 웹캠 통합 검색 (기본)
            nearby: 좌표 근처 CCTV (lat·lng 필수, radius_km km)
            webcam: 좌표 근처 해외 경치 웹캠 (Windy 직행, 교통 CCTV 건너뜀)
        implementation: cctv_search/nearby/webcam op 분기 (카카오 우선 → TOPIS/UTIC/ITS →
          Windy 폴백; webcam은 Windy 직행).
      commercial:
        description: 상권 분석 (소상공인진흥공단). 업종별 점포 수/밀집도, 좌표 또는 행정동 기반. 창업 입지 분석용.
        group: real_estate
        target_description: 업종 코드 또는 키워드. 좌표(lat/lng) 또는 행정동 코드(district)로 영역 지정.
        router: handler
        tool: search_commercial_district
        implementation: 소상공인진흥공단 상권정보 공개 API로 업종별 점포 밀집도/분포 분석
      search_ddg:
        description: 웹 검색 (DuckDuckGo). 영어/글로벌 쿼리에 적합. 한국어 검색은 search_naver 우선. 뉴스는
          search_news, 유튜브는 search_youtube, 논문은 search_openalex를 각각 사용.
        group: research
        target_description: 검색어 (영어 권장). region/safesearch 옵션 가능.
        router: handler
        tool: ddgs_search
        implementation: DuckDuckGo ddgs 라이브러리로 웹 검색. 쿼리 언어 자동 감지(영어→글로벌, 한국어→한국).
        target_key: query
        postprocess:
          type: compress
      crawl:
        description: 웹페이지 원문 읽기 (URL 필요). 검색 스니펫으로 부족할 때 상세 내용 확인용.
        group: research
        target_description: 읽을 페이지 URL (http/https). 검색 결과의 link 필드 그대로 전달 가능.
        router: handler
        tool: crawl_website
        implementation: 1차 requests+BeautifulSoup 정적 크롤링, 콘텐츠 부족 시 Chrome MCP(실제 브라우저)로
          자동 폴백. JS 렌더링 사이트도 처리 가능.
        target_key: url
        postprocess:
          type: compress
      search_news:
        description: 뉴스만 검색 (Google News). 신문 생성, 뉴스 모니터링 등 뉴스 전용 작업에 사용.
        group: research
        target_description: 뉴스 검색어. 언어 자동 감지 — 한국어는 한국 뉴스, 영어는 글로벌 뉴스.
        router: handler
        tool: google_news_search
        implementation: Google News RSS 피드를 feedparser로 파싱. 쿼리 언어 자동 감지.
        target_key: query
        postprocess:
          type: compress
          prompt: 같은 사건/주제를 다룬 기사는 하나로 병합하라. 불필요한 메타데이터를 제거하라. URL은 대표 1개만 보존하라.
      collect:
        description: 웹 데이터 수집 시스템 (op 분기). 크롤링·사이트 프로필·축적 데이터 검색. 실시간 웹 검색은 search_ddg.
        target_description: |
          op로 분기 (기본 run).
          - run: source(프로필 ID 또는 URL) 크롤링. URL이면 selectors/max_items, 없으면 등록된 프로필 목록.
          - sites: 수집 사이트 프로필 CRUD. action(list 기본/register/delete) + site_id + guide_code.
          - query: 축적 데이터 검색. action(search 기본/stats/recent/detail/delete) + query/site_id/item_id/limit.
        target_key: op
        group: places
        router: handler
        tool: collect_op
        ops:
          default: run
          values:
            run: 사이트/URL 크롤링 (구조화 수집)
            sites: 수집 사이트 프로필 관리 (CRUD)
            query: 축적된 수집 데이터 검색 (로컬 DB)
        implementation: web-collector 패키지 op 분기. run=backend web_collector 크롤 위임, sites=manage_sites, query=collector_db.
        keywords:
        - 수집
        - 크롤링
        - 사이트프로필
        - 축적데이터
      realty:
        description: 부동산 실거래가 조회 (op 분기, 국토부). query(실거래가)/codes(법정동 코드). region 이름만 넣으면 코드 자동 변환 — codes는 보통 불필요.
        group: real_estate
        target_description: |
          op로 분기 (기본 query).
          - query: region=지역 이름(예 "강남구", 읍·면·동 "오송"도 상위 시군구로 자동변환) 또는 region_code=법정동 5자리. type=apt(아파트)/house(단독다가구)/villa(연립다세대). deal=trade/rent. dong=법정동으로 좁히기. start_month/end_month 기간.
          - codes: city=시/도명(서울·경기 등) → 법정동 지역코드 목록. (region 자동변환이 있어 보통 불필요한 보조.)
        target_key: op
        router: handler
        tool: realty_op
        ops:
          default: query
          values:
            query: 실거래가 조회 (apt/house/villa × trade/rent, region 자동해소)
            codes: 법정동 지역코드 조회 (보조)
        implementation: query=type×deal 조합 국토부 6종 API(region resolve_region_code 자동해소, 최근 3개월 기본). codes=get_region_codes.
        keywords:
        - 부동산
        - 실거래가
        - 매매
        - 전세
        - 월세
        - 아파트
        - 주택
      video:
        description: 유튜브 동영상 조회 (op 분기). 메타·자막·요약. 검색은 search_youtube, 재생은 limbs:music.
        target_description: |
          op로 분기 (기본 info). url 또는 video_id 필수.
          - info: 메타데이터(제목·조회수·채널).
          - transcript: 자막/스크립트 추출. language 옵션.
          - languages: 사용 가능한 자막 언어 목록.
          - summarize: 자막 추출 + AI 요약 + HTML 보고서 + 브라우저 열기. summary_length 옵션.
        target_key: op
        group: media
        router: handler
        tool: video_op
        ops:
          default: info
          values:
            info: 동영상 메타데이터 (제목·조회수·채널)
            transcript: 자막/스크립트 추출
            languages: 사용 가능한 자막 언어 목록
            summarize: 자막+AI요약+HTML 보고서 생성
        implementation: youtube 패키지 op 분기. info=get_youtube_info, transcript=get_youtube_transcript, languages=list_available_transcripts, summarize=summarize_youtube.
        keywords:
        - youtube
        - 유튜브
        - 동영상
        - 자막
        - 영상요약
      search_youtube:
        description: 유튜브 검색 (재생하지 않고 결과 목록만 반환 — video_id, title, url 포함)
        group: media
        keywords:
        - youtube
        - 유튜브
        - 영상검색
        - 동영상검색
        - video search
        target_description: 검색어
        router: handler
        tool: search_youtube
        implementation: yt-dlp ytsearch로 유튜브 검색 결과 목록 추출
        target_key: query
      radio:
        description: 라디오 방송국 검색·탐색 (op 분기). search(전세계)/korean(한국 방송사). 재생은 limbs:radio.
        target_description: |
          op로 분기 (기본 search).
          - search: name(방송국 이름)·tag·country·language·limit 등. Radio Browser 전세계.
          - korean: broadcaster(KBS/MBC/SBS/TBS/CBS/EBS, 비우면 전체) 한국 방송사 채널.
