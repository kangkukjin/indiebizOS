meta:
  constraint: ONLY the nodes listed below exist. No other node names are valid.
  usage:
  - section: 'IBL 코드 문법: [node:action]{params}'
    examples:
    - '[self:time]  # 현재 시간'
    - '[self:discover]{query: "주가"}  # 모르면 discover'
    - '[limbs:os_open]{path: "/path/to/file.html"}  # 파일 열기'
    - '[limbs:os_open]{path: "https://example.com"}  # URL 열기'
    - '[sense:price]{symbol: "005930"}  # 삼성전자 주가'
    - '[sense:price]{symbol: "AAPL"}  # 미국 주가'
    - '[sense:search_ddg]{query: "AI news"}  # 웹 검색 (DuckDuckGo)'
    - '[sense:news]{query: "삼성전자"}  # 종목 뉴스'
    - '[sense:kr_investor]{symbol: "STK", start_date: "2026-02-01"}  # 투자자 매매동향'
    - '[limbs:play]{query: "슬픈 피아노곡"}  # 음악 재생'
    - '[sense:search_radio]{query: "KBS"}  # 라디오 검색'
    - '[engines:line]{title: "Stock Price"}  # 차트 생성'
    - '[engines:slide]{title: "발표자료", pages: 5}  # 슬라이드 생성'
    note: execute_ibl의 code 파라미터에 IBL 코드를 전달. 모든 값은 {params} 안에 named parameter로.
      (target) 문법은 폐지됨.
  - section: Common mistakes — NEVER do these
    examples:
    - 'WRONG: [self:workflow]  # workflow는 액션이 아님'
    - 'WRONG: [self:get]{type: "time"}  # get은 액션이 아님. [self:time]을 써야 함'
    - 'RIGHT: [sense:search_ddg]{query: "AAPL"}  # 웹 검색 (DuckDuckGo)'
    - 'WRONG: [sense:price]("AAPL")  # (target) 문법은 폐지됨! {params}를 사용할 것'
    - 'RIGHT: [self:time]  # 직접 액션명 사용'
    - 'RIGHT: [sense:price]{symbol: "AAPL"}  # 모든 값은 named parameter'
    note: 항상 구체적 액션명을 사용하라. (target) 문법은 에러 발생함.
  - section: 'params — 모든 값은 {key: val} 형태의 named parameter'
    examples:
    - 'RIGHT: [sense:kr_investor]{symbol: "STK", start_date: "2026-02-01"}'
    - 'RIGHT: [sense:kr_investor]{symbol: "STK", start_date: "2026-02-01", end_date:
      "2026-02-28"}'
    - 'WRONG: [sense:kr_investor]("STK") {"start_date": "2026-02-01"}  # (target)
      문법 폐지됨!'
    - 'RIGHT: [sense:price]{symbol: "005930"}  # 파라미터가 하나여도 named'
    note: '모든 값은 {key: val} 안에 작성. (target) 문법은 폐지되어 에러 발생함.'
  - section: Pipeline — 다중 스텝은 >>, & 연산자 사용
    examples:
    - '[sense:search_ddg]{query: "AI"} >> [self:file]{path: "result.md"}  # 순차: step1
      결과가 step2에 자동 전달'
    - '[engines:slide]{title: "보고서"} >> [limbs:os_open]  # 슬라이드 생성 후 열기'
    - '[sense:price]{symbol: "AAPL"} & [sense:price]{symbol: "MSFT"}  # 병렬 실행'
    - '[self:time] & [sense:price]{symbol: "005930"} & [sense:news]{query: "한국 증시"}  #
      병렬 3개'
    - '[sense:price]{symbol: "AAPL"} ?? [sense:kr_price]{symbol: "AAPL"}  # 폴백: 실패시
      대안'
    - 'WRONG: [engines:slide]{title: "AI"} >> [limbs:os_open]{path: $prev.file}  #
      $prev 문법 없음!'
    note: '>> 사용 시 이전 step의 결과가 다음 step에 자동 전달됨. $prev, $result 같은 변수 참조 문법은 없다.'
  pipeline:
  - op: '>>'
    name: Sequential
    example: '[sense:search_ddg]{query: "AI"} >> [self:file]{path: "result.md"}'
  - op: '&'
    name: Parallel
    example: '[sense:price]{symbol: "AAPL"} & [sense:price]{symbol: "MSFT"}'
  - op: ??
    name: Fallback
    example: '[sense:price]{symbol: "AAPL"} ?? [sense:kr_price]{symbol: "AAPL"}'
  principles:
  - 'IBL 코드를 execute_ibl의 code 파라미터로 전달. 예: execute_ibl(code=''[sense:price]{symbol:
    "AAPL"}'')'
  - 구체적 액션명을 직접 지정 (time, price, play 등). 일반 동사(get, run 등)는 액션명이 아니므로 쓰지 말 것.
  - '[self:discover]{query: "키워드"} — 어떤 액션을 쓸지 모를 때 사용.'
  - '모든 값은 {key: val} 형태의 named parameter. (target) 문법은 폐지됨 — 사용 시 에러 발생.'
  - '전문 데이터 액션이 있으면 파일 직접 탐색([self:list]+[self:read])보다 반드시 우선 사용. 예: 건강기록→[self:health_query],
    메모리→[self:recall]'
  - 'CRITICAL: 절대로 IBL 코드([node:action]{...})를 텍스트 응답에 포함하지 말 것. IBL은 반드시 execute_ibl
    도구의 code 파라미터로만 실행. 사용자에게는 자연어로 응답.'
  - 작업을 계획만 하고 끝내지 말 것. 계획했으면 반드시 execute_ibl로 실행까지 완료할 것.
nodes:
  sense:
    actions:
      price:
        description: '현재 시세 빠른 조회 (한국: 005930, 미국: AAPL, ETF: SPY, 원자재: GC=F). 간단
          시세 확인용. 기간별 이력은 kr_price(한국) 또는 us_price(미국) 사용.'
        group: finance
        target_description: 종목 코드/티커 (자동으로 시장 판별)
        router: handler
        tool: yf_stock_price
        implementation: Yahoo Finance yfinance로 현재/최근 시세 빠른 조회. 기간 이력 조회는 kr_price/us_price
          사용.
        target_key: symbol
      stock_info:
        description: 종목 메타 정보 — 시가총액, 52주 최고/최저, PER, 배당 등. 시세는 price, 재무는 kr_financial.
        target_description: 종목 코드/티커 (한국 6자리, 미국 알파벳).
        group: finance
        router: handler
        tool: yf_stock_info
        implementation: Yahoo Finance yfinance로 종목 메타데이터 조회
        target_key: symbol
        keywords:
        - 종목
        - 주식정보
        - 시가총액
      search_stock:
        description: 회사명·키워드로 종목 심볼 검색. 종목 코드를 모를 때 첫 단계.
        group: finance
        target_description: 회사명 또는 키워드 (예 '삼성전자', 'apple').
        router: handler
        tool: yf_search_stock
        implementation: Yahoo Finance yfinance 심볼 검색
        target_key: query
      kr_company:
        description: '한국 기업 정보 (DART: 대표자, 업종, 주소, IR)'
        group: finance
        target_description: 기업명 또는 DART 코드
        router: handler
        tool: kr_company_info
        implementation: DART(금융감독원) 공개 API로 기업 기본정보 조회 (API키 필요)
        target_key: corp_name
      us_company:
        description: '미국 기업 프로필 (FMP: CEO, 시총, 섹터, 설명)'
        group: finance
        target_description: 티커 (AAPL, MSFT 등)
        router: handler
        tool: us_company_profile
        implementation: FMP(Financial Modeling Prep) API로 미국 기업 프로필 조회 (API키 필요)
        target_key: symbol
      kr_financial:
        description: '한국 재무제표 (DART: 재무상태표, 손익계산서, 현금흐름표)'
        group: finance
        target_description: 기업명 또는 DART 코드
        router: handler
        tool: kr_financial_statements
        implementation: DART API로 한국 기업 재무제표 XML 파싱
        target_key: corp_name
      us_financial:
        description: '미국 재무제표 (FMP: income, balance, cashflow)'
        group: finance
        target_description: 티커 (AAPL 등)
        router: handler
        tool: us_financial_statements
        implementation: FMP API로 미국 기업 재무제표 JSON 조회
        target_key: symbol
      kr_disclosure:
        description: '한국 공시 검색 (DART: 정기공시, 대량보유, 거래소공시)'
        group: finance
        target_description: 기업명 또는 DART 코드
        router: handler
        tool: kr_disclosures
        implementation: DART API로 한국 공시 검색 및 XML 파싱
        target_key: corp_name
      us_filing:
        description: 미국 SEC 공시 검색 (10-K, 10-Q, 8-K, DEF 14A)
        group: finance
        target_description: 티커
        router: handler
        tool: us_sec_filings
        implementation: SEC Edgar 공개 API로 미국 공시 문서 검색
        target_key: symbol
      news:
        description: 특정 종목 관련 뉴스 (Finnhub). 일반 뉴스는 search_news, 종목명 키워드는 company_news.
        target_description: 종목 티커 (AAPL, MSFT 등). 한국 종목은 6자리 코드.
        group: finance
        router: handler
        tool: company_news
        implementation: Finnhub 무료 API로 영문 종목 뉴스 조회
        target_key: symbol
        keywords:
        - 뉴스
        - 종목뉴스
        - 기업뉴스
        - Finnhub
      earnings:
        description: '실적 발표 일정 (Finnhub: EPS/매출 예상 vs 실적)'
        group: finance
        target_description: 티커 (선택, 비우면 전체 시장)
        router: handler
        tool: earnings_calendar
        implementation: Finnhub API로 EPS/매출 실적 일정 조회
        target_key: symbol
      crypto:
        description: '암호화폐 시세 (CoinGecko: BTC, ETH, XRP 등 USD/KRW)'
        group: finance
        target_description: 코인 심볼 (BTC, ETH, SOL 등)
        router: handler
        tool: crypto_price
        implementation: CoinGecko 무료 API로 암호화폐 시세 조회 (requests HTTP)
        target_key: coin_id
      kr_price:
        description: 한국 주가 기간별 이력 (KRX). start_date/end_date로 기간 지정 가능. 현재 시세만 필요하면
          price 사용.
        group: finance
        target_description: 종목 코드 또는 기업명
        router: handler
        tool: kr_stock_price
        implementation: KRX(한국거래소) API + FinanceDataReader로 한국 주가 시계열 이력 조회. 기간 지정
          가능.
        target_key: symbol
      us_price:
        description: 미국 주가 기간별 이력 (FMP). start_date/end_date로 기간 지정 가능. 현재 시세만 필요하면
          price 사용.
        group: finance
        target_description: 티커
        router: handler
        tool: us_stock_price
        implementation: FMP API로 미국 주가 시계열 이력 조회. 기간 지정 가능.
        target_key: symbol
      kr_investor:
        description: 한국 시장 투자자별 매매동향 (외국인/기관/개인 순매수, 코스피/코스닥)
        group: finance
        target_description: 시장 구분 (STK=코스피, KSQ=코스닥, ALL=전체)
        router: handler
        tool: kr_market_investor_trading
        implementation: KRX API로 투자자별 매매동향 XML 파싱
        target_key: market
      kr_stock_investor:
        description: 개별종목 투자자별 매매동향 (외국인/기관/개인 순매수)
        group: finance
        target_description: 종목 코드 또는 기업명
        router: handler
        tool: kr_stock_investor_trading
        implementation: KRX API로 개별종목 투자자별 매매동향 조회
        target_key: symbol
      performance:
        description: 공연 검색 (KOPIS - 연극, 뮤지컬, 음악회 등)
        group: culture
        target_description: 검색 키워드
        router: handler
        tool: kopis_quick_search
        implementation: KOPIS(한국공연예술센터) 공개 API로 공연 검색 (XML 파싱)
        target_key: keyword
      venue:
        description: 한국 문화시설(공연장·전시장) 검색. 공연 일정은 performance, 전시는 exhibit.
        group: culture
        target_description: 공연장 이름 또는 키워드 (예 '예술의전당'). KOPIS DB의 한국 시설.
        router: handler
        tool: kopis_search_facilities
        implementation: KOPIS API로 공연장/시설 검색
        target_key: keyword
      book:
        description: 한국 도서 검색 (도서관정보나루). 국내 도서관 소장/대출 정보 포함. 글로벌 도서는 sense:search_books(Google
          Books) 사용.
        group: culture
        target_description: 검색어 (제목/저자/출판사)
        router: handler
        tool: library_quick_search
        implementation: 도서관정보나루 공개 API로 한국 도서 검색 (소장 도서관, 대출 통계 포함)
        target_key: keyword
      book_detail:
        description: 한국 도서 상세 정보 (대출 통계 포함). 검색은 book, ISBN 직접 조회는 book_by_isbn.
        group: culture
        target_description: 도서 ISBN13 (book 검색 결과의 isbn13 필드).
        router: handler
        tool: library_get_book_detail
        implementation: 도서관정보나루 API로 도서 상세 + 대출 통계 조회
        target_key: isbn13
      exhibit:
        description: 전시·문화행사 검색 (KCISA). 박물관·미술관 행사 위주, 공연은 performance.
        group: culture
        target_description: 검색어 또는 키워드 (예 '국립중앙박물관', '미디어아트').
        router: handler
        tool: kcisa_quick_search
        implementation: 한국문화정보원(KCISA) API로 전시/문화행사 검색
        target_key: keyword
      genres:
        description: KOPIS 공연 장르 코드 목록. performance 검색 시 장르 필터링용.
        group: culture
        target_description: '(파라미터 없음 — 전체 장르 코드 반환)'
        router: handler
        tool: kopis_get_genres
        implementation: KOPIS API로 장르 코드 목록 조회
      performance_regions:
        description: KOPIS 공연 지역 코드 목록. performance 검색 시 지역 필터링용.
        group: culture
        target_description: '(파라미터 없음 — 전체 지역 코드 반환)'
        router: handler
        tool: kopis_get_regions
        implementation: KOPIS API로 지역 코드 목록 조회
      book_by_isbn:
        description: ISBN으로 도서 조회 (10자리/13자리). 한국 도서관정보나루 기준, 상세는 book_detail.
        group: culture
        target_description: 도서 ISBN (10자리 또는 13자리, 하이픈 무관).
        router: handler
        tool: library_get_book_by_isbn
        implementation: 도서관정보나루 API로 ISBN 기반 도서 조회
        target_key: isbn
      kdc:
        description: KDC(한국십진분류) 주제분류 코드 목록. 도서관 도서 분류 기준.
        group: culture
        target_description: '(파라미터 없음 — 전체 KDC 코드 반환)'
        router: handler
        tool: library_get_kdc
        implementation: 도서관정보나루 API로 KDC 분류코드 조회
      recommended_books:
        description: 특정 도서 기반 추천도서 — 마니아·다독자 패턴 추천. 도서관정보나루 데이터.
        group: culture
        target_description: 기준 도서의 ISBN13.
        router: handler
        tool: library_get_recommended_books
        implementation: 도서관정보나루 API로 추천도서 조회
        target_key: isbn13
      library_regions:
        description: 한국 도서관정보나루 지역 코드 목록. 도서관 위치별 데이터 필터링용.
        group: culture
        target_description: '(파라미터 없음 — 전체 지역 코드 반환)'
        router: handler
        tool: library_get_regions
        implementation: 도서관정보나루 API로 지역코드 목록 조회
      search_openalex:
        description: 범용 학술 논문 검색 (OpenAlex). 분야 무관 논문 검색의 기본 선택. 웹 검색(sense:search_ddg)과
          별도로, 논문만 집중적으로 많이 가져올 때 사용.
        group: research
        target_description: 검색 쿼리
        router: handler
        tool: search_openalex
        implementation: OpenAlex 무료 API로 학술 논문 메타데이터 검색 (제목/초록/인용수/OA 필터). 통합검색보다
          결과가 많고 필터 옵션 풍부.
        target_key: query
      search_arxiv:
        description: AI/CS/물리/수학 프리프린트 검색 (arXiv). 최신 미출판 연구, PDF 다운로드 가능. 정식 출판 논문은
          search_openalex 사용.
        group: research
        target_description: 검색 쿼리
        router: handler
        tool: search_arxiv
        implementation: arxiv-py 라이브러리로 프리프린트 논문 검색. download_arxiv로 PDF 다운로드 가능.
        target_key: query
      download_arxiv:
        description: arXiv 논문 PDF 다운로드. 검색은 search_arxiv.
        group: research
        target_description: 'arXiv 논문 ID (예 2301.07041).'
        router: handler
        tool: download_arxiv_pdf
        implementation: arXiv 서버에서 논문 PDF 직접 다운로드
        target_key: arxiv_id
      search_semantic:
        description: AI/ML 논문 심층 검색 (Semantic Scholar). 인용 그래프·관련 논문 추적 가능. arXiv보다
          정식 출판 논문 포함, AI 분야 논문 간 관계 탐색에 적합.
        group: research
        target_description: 검색 쿼리
        router: handler
        tool: search_semantic_scholar
        implementation: Semantic Scholar API로 AI/CS 논문 검색 (인용 그래프, 관련 논문 추적 포함)
        target_key: query
      search_scholar:
        description: Google Scholar 학술 검색. 커버리지 가장 넓음 (모든 분야, 비영어 논문 포함). 단, 비공식 크롤링이라
          불안정할 수 있음. 다른 소스에서 못 찾을 때 보조적으로 사용.
        group: research
        target_description: 검색 쿼리
        router: handler
        tool: search_google_scholar
        implementation: scholarly 라이브러리로 Google Scholar 비공식 크롤링. 불안정할 수 있어 다른 학술검색의
          보조 수단으로 사용.
        target_key: query
      search_pubmed:
        description: 생의학/의학 논문 전용 (PubMed). 의학·약학·생명과학 주제에만 사용. 다른 분야는 search_openalex
          사용.
        group: research
        target_description: 검색 쿼리
        router: handler
        tool: search_pubmed
        implementation: PubMed 공개 API로 생의학 논문 검색 (feedparser). 의학/생명과학 분야 전용.
        target_key: query
      download_pubmed:
        description: PubMed Central 논문 PDF 다운로드. 검색은 search_pubmed.
        group: research
        target_description: 'PMC ID (예 PMC1234567).'
        router: handler
        tool: download_pubmed_pdf
        implementation: PubMed Central에서 오픈액세스 논문 PDF 다운로드
        target_key: pmcid
      pew_research:
        description: Pew Research 최신 여론조사/리서치 보고서 목록. 미국 사회·정치·기술 트렌드 조사. 파라미터 없이
          호출하면 최신 리서치 목록 반환.
        group: research
        target_description: '(파라미터 없음 — 최신 리서치 목록 반환). topic 옵션으로 주제 필터링 가능.'
        router: handler
        tool: fetch_pew_research
        implementation: Pew Research RSS 피드 파싱 (feedparser). 입력 파라미터 없이 최신 리서치 목록
          반환.
      search_guardian:
        description: Guardian 신문 아카이브 검색. 영국·국제 기사 위주, 영어 검색.
        group: research
        target_description: 검색어 또는 키워드 (영어).
        router: handler
        tool: search_guardian
        implementation: Guardian Open Platform API로 뉴스 아카이브 검색 (API키 필요)
        target_key: query
        postprocess:
          type: compress
          prompt: 같은 사건/주제를 다룬 기사는 하나로 병합하라. 불필요한 메타데이터를 제거하라. URL은 대표 1개만 보존하라.
      world_bank:
        description: 세계은행 경제·사회 지표 시계열. 국가별 GDP·인구·교육 등 장기 비교 분석용.
        group: world
        target_description: '지표 코드 (예 NY.GDP.MKTP.CD=GDP, SP.POP.TOTL=인구). country로 국가 지정.'
        router: handler
        tool: fetch_world_bank_data
        implementation: 세계은행 공개 API로 국가별 경제/사회 지표 시계열 조회
        target_key: indicator
      search_books:
        description: 글로벌 도서 검색 (Google Books). 해외 도서·원서 포함. 한국 도서관 소장/대출 정보는 sense:book(도서관정보나루)
          사용.
        group: culture
        target_description: 검색 쿼리
        router: handler
        tool: search_books
        implementation: Google Books API로 글로벌 도서 검색 (영어/다국어). 한국 도서는 sense:book 사용.
        target_key: query
      search_shopping:
        description: 상품 검색 및 가격 비교 (네이버+다나와+중고나라+번개장터)
        group: research
        target_description: 상품명
        router: handler
        tool: search_shopping
        implementation: Naver Shopping API + Playwright로 다나와/중고마켓 비공식 스크래핑 병렬 실행
        target_key: query
        postprocess:
          type: compress
      weather:
        description: '날씨 조회 (Open-Meteo 무료). [sense:weather]{city: "수원"} 또는 {lat:
          37.26, lon: 127.03}. 도시명(한/영) 직접 사용 가능'
        group: places
        target_description: 도시명 또는 좌표
        router: handler
        tool: get_weather
        implementation: Open-Meteo 무료 API로 날씨 조회 (API키 불필요)
      restaurant:
        description: 맛집/음식점 공식 검색 (카카오+네이버 API). 가게 이름·주소·전화·평점 등 공식 DB 기반. 주민 후기/커뮤니티
          의견은 sense:search_local 사용.
        group: places
        target_description: 검색어 (강남 파스타 등)
        router: handler
        tool: search_restaurants
        implementation: Kakao Local API + Naver Local API 듀얼 검색으로 맛집 공식 정보 집계 (상호명,
          주소, 평점)
        target_key: query
      navigate_route:
        description: 카카오 내비 자동차 길찾기. 거리·시간·톨비 반환. 지도 표시는 map.
        target_description: 목적지 (장소명 또는 '경도,위도'). origin 옵션으로 출발지 지정.
        group: places
        router: handler
        tool: kakao_navigation
        implementation: Kakao Map API로 자동차 경로 탐색 (거리/시간/톨비)
        target_key: destination
        keywords:
        - 길찾기
        - 내비
        - 경로
        - 네비게이션
      reverse_geocode:
        description: GPS 좌표를 행정구역 주소로 변환 (카카오 API, 위도+경도 → 시/도/구/동)
        group: places
        target_description: 위도(lat)와 경도(lng) 두 파라미터. 결과는 시/도/구/동까지 분해.
        router: handler
        tool: reverse_geocode
        implementation: Kakao Map API로 GPS 좌표→주소 변환
      travel:
        description: 여행 정보 검색 (Amadeus) — 항공·호텔·관광지. 글로벌 데이터.
        group: culture
        target_description: endpoint로 종류 선택 (flight-offers/hotel-list/points-of-interest 등). 추가 파라미터는 endpoint별로 다름.
        router: handler
        tool: amadeus_travel_search
        implementation: Amadeus API(OAuth2)로 항공/호텔/관광지 검색
        target_key: endpoint
        postprocess:
          type: compress
      search_local:
        description: 지역 커뮤니티(네이버 카페) 검색. 동네 주민들의 후기·추천·정보 수집용. 가게/음식점 공식 검색은 sense:restaurant(카카오+네이버
          API) 사용.
        group: research
        target_description: 검색어
        router: handler
        tool: local_search
        implementation: Naver Cafe API로 지역 커뮤니티 글 검색 (주민 후기, 추천, 지역 정보). 공식 가게 DB
          검색이 아닌 커뮤니티 의견 수집.
        target_key: query
      webcam:
        description: 해외 웹캠 전용 검색 (Windy). 해외 도시/관광지 실시간 모습. 한국 CCTV 포함 통합 검색은 cctv_search
          사용.
        group: media
        target_description: 검색어 (도시·지역·관광지명, 영어 권장).
        keywords:
        - webcam
        - 웹캠
        - 해외
        - windy
        router: handler
        tool: search_webcam
        implementation: Windy Webcams API로 전세계 웹캠 검색. 한국 교통 CCTV는 포함 안 됨 → cctv_search
          사용.
      webcam_nearby:
        description: 좌표 근처 해외 웹캠 찾기 (Windy). 한국 CCTV 포함은 nearby.
        group: media
        target_description: 위도(lat)와 경도(lng) 두 파라미터 필수.
        keywords:
        - webcam
        - 웹캠
        - 근처
        router: handler
        tool: get_nearby_webcam
        implementation: Windy Webcams API로 좌표 근처 웹캠 검색
      cctv_capture:
        description: CCTV/웹캠 현재 화면 캡처 (이미지 저장, AI 분석용)
        group: media
        keywords:
        - cctv
        - 캡처
        - 스크린샷
        - capture
        - 찍어
        target_description: 영상/이미지 URL
        router: handler
        tool: capture_cctv
        implementation: ffmpeg로 CCTV/웹캠 스트림에서 단일 프레임 캡처 후 PNG 저장
        target_key: url
      cctv_sources:
        description: 등록된 CCTV·웹캠 소스 목록과 연결 상태 확인. ITS·Windy 점검용.
        target_description: '(파라미터 없음 — 소스 목록과 상태 반환)'
        group: media
        router: handler
        tool: list_cctv_sources
        implementation: 등록된 CCTV/웹캠 소스 목록 조회 (로컬 설정 파일)
        keywords:
        - CCTV
        - 소스
        - 상태
      local_query:
        description: 축적된 지역 정보 DB 조회 (정기 수집된 가게·커뮤니티 데이터). 실시간 검색은 search_local.
        group: places
        target_description: 검색어 (FTS5 전문검색, 한국어 토큰화 지원).
        router: handler
        tool: local_db_query
        implementation: SQLite FTS(전문검색)로 축적된 지역 정보 DB 조회
        target_key: query
      cctv_search:
        description: 국내 CCTV + 해외 웹캠 통합 검색 (ITS+Windy). 한국 교통/도시 CCTV와 해외 웹캠을 동시 검색.
          결과의 stream_tags를 응답에 포함하면 채팅창에서 스트리밍 재생. 해외만 보려면 webcam 사용.
        group: media
        keywords:
        - cctv
        - 교통
        - 실시간
        - 카메라
        - 보여줘
        - 봐줘
        - traffic
        - camera
        - 영상
        target_description: 검색 키워드 (전주, 해운대, 제주, 경부 등)
        router: handler
        tool: search_cctv
        implementation: 국토부 ITS API(한국 CCTV) + Windy API(해외 웹캠) 통합 검색. 해외 전용은 webcam
          액션 사용.
        target_key: query
      cctv_by_name:
        description: 한국 교통 CCTV를 이름으로 검색 (ITS 국가교통정보센터). 좌표 기반은 nearby.
        target_description: CCTV 이름 또는 키워드 (예 '강남대로', '한남대교').
        group: media
        router: handler
        tool: get_cctv_by_name
        implementation: ITS API에서 CCTV 이름/키워드로 직접 검색
        target_key: keyword
        keywords:
        - cctv
        - 이름검색
      api_ninjas:
        description: API Ninjas 범용 데이터 조회 (날씨, 환율, 영양, 명언 등 다양한 endpoint)
        target_description: 'endpoint로 종류 선택 (weather/exchange/nutrition/quotes 등 40+가지). 추가 파라미터는 endpoint별로 다름.'
        group: research
        router: handler
        tool: get_api_ninjas_data
        implementation: API Ninjas REST API (40+ endpoint, API 키 기반)
        keywords:
        - ninjas
        - 날씨
        - 환율
        - 영양
        - 명언
      commercial:
        description: 상권 분석 (소상공인진흥공단). 업종별 점포 수/밀집도, 좌표 또는 행정동 기반. 창업 입지 분석용.
        group: real_estate
        target_description: 업종 코드 또는 키워드. 좌표(lat/lng) 또는 행정동 코드(district)로 영역 지정.
        router: handler
        tool: search_commercial_district
        implementation: 소상공인진흥공단 상권정보 공개 API로 업종별 점포 밀집도/분포 분석
      search_ddg:
        description: 웹 검색 (DuckDuckGo). 영어/글로벌 쿼리에 적합. 한국어 검색은 search_naver 우선. 뉴스는
          search_news, 유튜브는 search_youtube, 논문은 search_openalex를 각각 사용.
        group: research
        target_description: 검색어 (영어 권장). region/safesearch 옵션 가능.
        router: handler
        tool: ddgs_search
        implementation: DuckDuckGo ddgs 라이브러리로 웹 검색. 쿼리 언어 자동 감지(영어→글로벌, 한국어→한국).
        target_key: query
        postprocess:
          type: compress
      crawl:
        description: 웹페이지 원문 읽기 (URL 필요). 검색 스니펫으로 부족할 때 상세 내용 확인용.
        group: research
        target_description: 읽을 페이지 URL (http/https). 검색 결과의 link 필드 그대로 전달 가능.
        router: handler
        tool: crawl_website
        implementation: 1차 requests+BeautifulSoup 정적 크롤링, 콘텐츠 부족 시 Chrome MCP(실제 브라우저)로
          자동 폴백. JS 렌더링 사이트도 처리 가능.
        target_key: url
        postprocess:
          type: compress
      search_news:
        description: 뉴스만 검색 (Google News). 신문 생성, 뉴스 모니터링 등 뉴스 전용 작업에 사용.
        group: research
        target_description: 뉴스 검색어. 언어 자동 감지 — 한국어는 한국 뉴스, 영어는 글로벌 뉴스.
        router: handler
        tool: google_news_search
        implementation: Google News RSS 피드를 feedparser로 파싱. 쿼리 언어 자동 감지.
        target_key: query
        postprocess:
          type: compress
          prompt: 같은 사건/주제를 다룬 기사는 하나로 병합하라. 불필요한 메타데이터를 제거하라. URL은 대표 1개만 보존하라.
      collect:
        description: 사이트 프로필 기반 구조화 데이터 수집 (Playwright 크롤링). 사이트 관리는 collect_sites.
        target_description: 수집할 사이트 ID 또는 URL. collect_sites로 등록된 프로필 사용.
        group: places
        router: web_collector
        implementation: Playwright 크롤링 + 사이트 프로필 기반 구조화 데이터 수집
        keywords:
        - 수집
        - 크롤링
        - 구조화
      collect_sites:
        description: 정기 수집 사이트 프로필 관리 (등록/조회/삭제). 사이트별 크롤링 가이드를 등록하여 반복 수집 설정.
        group: places
        target_description: 사이트 ID
        router: handler
        tool: wc_sites
        implementation: 사이트 수집 프로필 JSON 관리 (등록/조회/삭제). 크롤링 가이드 코드 포함.
        target_key: site_id
      collect_save:
        description: 크롤링 결과를 DB에 저장. 수집 사이트에서 가져온 데이터를 구조화하여 축적.
        group: places
        target_description: 사이트 ID
        router: handler
        tool: wc_save
        implementation: Playwright 크롤링 결과를 SQLite DB에 구조화 저장 (사이트별 분류)
        target_key: site_id
      collect_query:
        description: 축적된 수집 데이터 검색. 정기 수집으로 쌓인 웹 데이터에서 키워드 검색. 실시간 웹 검색은 sense:search_ddg
          사용.
        group: places
        target_description: 검색어
        router: handler
        tool: wc_query
        implementation: SQLite FTS(전문검색)로 축적된 웹 수집 데이터 검색. 실시간 웹 검색이 아닌 로컬 DB 검색.
        target_key: query
      apt_trade:
        description: 아파트 매매 실거래가 조회. 국토부 실거래가 공개 시스템 기준.
        group: real_estate
        target_description: '지역 코드 5자리 (예 11680=강남). district_codes로 조회. start_date/end_date로 기간 지정.'
        router: handler
        tool: apt_trade_price
        implementation: 국토부 아파트 실거래가 공개 API로 매매 데이터 XML 파싱
        target_key: region_code
      apt_rent:
        description: 아파트 전월세 실거래가 조회. 국토부 실거래가 공개 시스템 기준.
        group: real_estate
        target_description: 지역 코드 5자리 (district_codes로 조회). 거래 기간 지정 가능.
        router: handler
        tool: apt_rent_price
        implementation: 국토부 아파트 전월세 공개 API로 임대 데이터 XML 파싱
        target_key: region_code
      house_trade:
        description: 단독/다세대 주택 매매 실거래가. 국토부 실거래가 공개 시스템 기준.
        group: real_estate
        target_description: 지역 코드 5자리 (district_codes로 조회).
        router: handler
        tool: house_trade_price
        implementation: 국토부 주택 실거래가 공개 API로 매매 데이터 XML 파싱
        target_key: region_code
      house_rent:
        description: 단독/다세대 주택 전월세 실거래가. 국토부 실거래가 공개 시스템 기준.
        group: real_estate
        target_description: 지역 코드 5자리 (district_codes로 조회).
