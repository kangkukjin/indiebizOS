# GENERATED — DO NOT EDIT
# Source : data/ibl_nodes_src/{meta,sense,self,limbs,others,engines}.yaml
# Rebuild: python3 scripts/build_ibl_nodes.py
# Check  : python3 scripts/build_ibl_nodes.py --check

meta:
  constraint: ONLY the nodes listed below exist. No other node names are valid.
  usage:
  - section: 'IBL 코드 문법: [node:action]{params}'
    examples:
    - '[self:time]  # 현재 시간'
    - '[self:discover]{query: "주가"}  # 모르면 discover'
    - '[limbs:os_open]{path: "/path/to/file.html"}  # 파일 열기'
    - '[limbs:os_open]{path: "https://example.com"}  # URL 열기'
    - '[sense:stock]{op: "quote", ticker: "005930"}  # 삼성전자 주가'
    - '[sense:stock]{op: "quote", ticker: "AAPL"}  # 미국 주가'
    - '[sense:search_ddg]{query: "AI news"}  # 웹 검색 (DuckDuckGo)'
    - '[sense:stock]{op: "news", ticker: "AAPL"}  # 종목 뉴스'
    - '[sense:stock]{op: "investors", market: "STK", start_date: "2026-02-01"}  # 투자자 매매동향(코스피)'
    - '[limbs:music]{op: "play", query: "슬픈 피아노곡"}  # 음악 재생'
    - '[sense:radio]{op: "search", name: "KBS"}  # 라디오 검색'
    - '[engines:chart]{title: "Stock Price", chart_type: "line"}  # 차트 생성 (chart_type: line/bar/pie/scatter/heatmap/candlestick/multi)'
    - '[engines:slide_shadcn]{slides: [{layout: "hero", title: "발표자료"}]}  # 슬라이드 생성'
    note: execute_ibl의 code 파라미터에 IBL 코드를 전달. 모든 값은 {params} 안에 named parameter로.
      (target) 문법은 폐지됨.
  - section: Common mistakes — NEVER do these
    examples:
    - 'WRONG: [self:workflow]  # workflow는 액션이 아님'
    - 'WRONG: [self:get]{type: "time"}  # get은 액션이 아님. [self:time]을 써야 함'
    - 'RIGHT: [sense:search_ddg]{query: "AAPL"}  # 웹 검색 (DuckDuckGo)'
    - 'WRONG: [sense:stock]("AAPL")  # (target) 문법은 폐지됨! {params}를 사용할 것'
    - 'RIGHT: [self:time]  # 직접 액션명 사용'
    - 'RIGHT: [sense:stock]{op: "quote", ticker: "AAPL"}  # 모든 값은 named parameter'
    note: 항상 구체적 액션명을 사용하라. (target) 문법은 에러 발생함.
  - section: 'params — 모든 값은 {key: val} 형태의 named parameter'
    examples:
    - 'RIGHT: [sense:stock]{op: "investors", market: "STK", start_date: "2026-02-01"}'
    - 'RIGHT: [sense:stock]{op: "investors", market: "STK", start_date: "2026-02-01", end_date:
      "2026-02-28"}'
    - 'WRONG: [sense:stock]("STK") {"start_date": "2026-02-01"}  # (target)
      문법 폐지됨!'
    - 'RIGHT: [sense:stock]{op: "quote", ticker: "005930"}  # 파라미터가 하나여도 named'
    note: '모든 값은 {key: val} 안에 작성. (target) 문법은 폐지되어 에러 발생함.'
  - section: Pipeline — 다중 스텝은 >>, & 연산자 사용
    examples:
    - '[sense:search_ddg]{query: "AI"} >> [self:file]{path: "result.md"}  # 순차: step1
      결과가 step2에 자동 전달'
    - '[engines:slide_shadcn]{slides: [{layout: "hero", title: "보고서"}]} >> [limbs:os_open]  # 슬라이드 생성 후 열기'
    - '[sense:stock]{op: "quote", ticker: "AAPL"} & [sense:stock]{op: "quote", ticker: "MSFT"}  # 병렬 실행'
    - '[self:time] & [sense:stock]{op: "quote", ticker: "005930"} & [sense:stock]{op: "news", ticker: "AAPL"}  #
      병렬 3개'
    - '[sense:stock]{op: "quote", ticker: "AAPL"} ?? [sense:stock]{op: "price", ticker: "AAPL"}  # 폴백: 실패시
      대안'
    - 'WRONG: [engines:slide_shadcn]{slides: [{layout: "hero", title: "AI"}]} >> [limbs:os_open]{path: $prev.file}  #
      $prev 문법 없음!'
    note: '>> 사용 시 이전 step의 결과가 다음 step에 자동 전달됨. $prev, $result 같은 변수 참조 문법은 없다.'
  pipeline:
  - op: '>>'
    name: Sequential
    example: '[sense:search_ddg]{query: "AI"} >> [self:file]{path: "result.md"}'
  - op: '&'
    name: Parallel
    example: '[sense:stock]{op: "quote", ticker: "AAPL"} & [sense:stock]{op: "quote", ticker: "MSFT"}'
  - op: ??
    name: Fallback
    example: '[sense:stock]{op: "quote", ticker: "AAPL"} ?? [sense:stock]{op: "price", ticker: "AAPL"}'
  principles:
  - 'IBL 코드를 execute_ibl의 code 파라미터로 전달. 예: execute_ibl(code=''[sense:stock]{op: "quote", ticker:
    "AAPL"}'')'
  - 구체적 액션명을 직접 지정 (time, stock, play 등). 일반 동사(get, run 등)는 액션명이 아니므로 쓰지 말 것.
  - '[self:discover]{query: "키워드"} — 어떤 액션을 쓸지 모를 때 사용.'
  - '모든 값은 {key: val} 형태의 named parameter. (target) 문법은 폐지됨 — 사용 시 에러 발생.'
  - '전문 데이터 액션이 있으면 파일 직접 탐색([self:list]+[self:read])보다 반드시 우선 사용. 예: 건강기록→[self:health]{op: "query"},
    메모리→[self:recall]'
  - 'CRITICAL: 절대로 IBL 코드([node:action]{...})를 텍스트 응답에 포함하지 말 것. IBL은 반드시 execute_ibl
    도구의 code 파라미터로만 실행. 사용자에게는 자연어로 응답.'
  - 작업을 계획만 하고 끝내지 말 것. 계획했으면 반드시 execute_ibl로 실행까지 완료할 것.
nodes:
  sense:
    actions:
      stock:
        description: 주식 시세·거래 데이터 조회 (op 분기). 기업 펀더멘털은 company, 암호화폐는 crypto.
        group: finance
        target_description: 'ticker=종목코드/티커 또는 회사명·ETF명(예 "삼성전자"·"TIGER 200", 내부에서 코드로 자동 해소).
          search는 query=회사명. investors는 ticker 있으면 개별종목·없으면 전체시장(market=STK/KSQ/ALL).
          market="kr"/"us"로 시장 강제 지정 가능. "현재가/얼마/시세"=price(기본), "차트/추이/이력"=history.
          history/news/earnings는 기간 지정 — period(상대기간 1mo/3mo/6mo/1y/ytd, 미지정 시 자동계산) 또는 start_date·end_date(명시 우선).'
        target_key: op
        router: handler
        tool: stock_op
        ops:
          default: price
          values:
            price: 현재가·현재 시세 (기본, "얼마"·"주가" — Yahoo)
            history: 기간별 주가 이력·차트용 (period 또는 날짜, 시장 자동판별)
            info: 종목 메타 — 시총·52주·PER·배당
            search: 회사명으로 심볼 검색 (query)
            investors: 투자자별 매매동향 (한국 전용)
            news: 종목 관련 뉴스 (Finnhub→Yahoo)
            earnings: 실적발표 일정 (예상 vs 실적)
        implementation: market 자동판별(6자리/한글=kr, 그외=us) 후 op 분기. price(현재가)/info/search=yfinance,
          history(이력)=krx|fmp, investors=krx, news=finnhub→yfinance, earnings=finnhub. (2026-06-04 개명 quote→price, price→history)
        keywords:
        - 주가
        - 주식
        - 시세
        - 종목
        - 매매동향
      company:
        description: 기업 펀더멘털 조회 (op 분기) — 기업정보·재무·공시. 주가·시세는 stock.
        group: finance
        target_description: 'ticker=기업명 또는 코드 (삼성전자/005930=한국 DART, AAPL=미국 FMP·SEC 자동판별).
          market="kr"/"us"로 강제 지정 가능. financials는 year(한국)·statement_type·period 옵션, disclosures는
          count·기간·유형 옵션.'
        target_key: op
        router: handler
        tool: company_op
        ops:
          default: profile
          values:
            profile: 기업 기본정보 (대표·업종·시총·섹터)
            financials: 재무제표 (손익·재무상태·현금흐름)
            disclosures: 공시 검색 (한국 DART / 미국 SEC)
        implementation: market 자동판별 후 분기. profile=kr_company_info|us_company_profile,
          financials=kr_financial_statements|us_financial_statements, disclosures=kr_disclosures|us_sec_filings.
        keywords:
        - 기업정보
        - 재무제표
        - 공시
        - DART
        - SEC
      crypto:
        description: '암호화폐 시세 (CoinGecko: BTC, ETH, XRP 등 USD/KRW)'
        group: finance
        target_description: 코인 심볼 (BTC, ETH, SOL 등)
        router: handler
        tool: crypto_price
        implementation: CoinGecko 무료 API로 암호화폐 시세 조회 (requests HTTP)
        target_key: coin_id
      performance:
        description: 공연·공연장 조회 (op 분기, KOPIS). 전시는 exhibit, 도서는 book.
        group: culture
        target_description: 'search — query(공연명/키워드)·genre·region·status·days 옵션. venue — query(공연장명, 예 ''예술의전당'')·region. genres/regions — 파라미터 없음(필터 코드 목록).'
        target_key: op
        router: handler
        tool: performance_op
        ops:
          default: search
          values:
            search: 공연 검색 (연극·뮤지컬·음악회, 기본)
            venue: 공연장·문화시설 검색
            genres: 장르 코드 목록 (검색 필터용)
            regions: 지역 코드 목록 (검색 필터용)
        implementation: KOPIS(한국공연예술센터) API op 분기. search=search_by_keyword, venue=get_facilities, genres=get_genre_list, regions=get_region_list.
        keywords:
        - 공연
        - 연극
        - 뮤지컬
        - 공연장
      book:
        description: 한국 도서 조회 (op 분기, 도서관정보나루). 고전 원문은 classic, 글로벌 도서는 search_books.
        group: culture
        target_description: 'search(기본) — title=제목전용/author=저자전용/publisher=출판사전용/keyword=광역/isbn=ISBN조회(+detail=true면 대출통계). "제목이 X인 책"은 title:"X". recommended — isbn13(기준도서)·rec_type(mania 기본/reader). codes — code_type=kdc(주제분류) 또는 region(도서관 지역).'
        target_key: op
        router: handler
        tool: book_op
        ops:
          default: search
          values:
            search: 도서 검색·조회 (필드분기·ISBN·대출통계, 기본)
            recommended: 추천도서 (마니아·다독자 패턴)
            codes: 분류 코드 목록 (kdc/지역)
        implementation: 도서관정보나루 API op 분기. search=library_book 필드분기(search_books/quick_search/get_book_by_isbn/get_book_detail), recommended=get_recommended_books, codes=get_kdc_list|get_region_list(code_type).
