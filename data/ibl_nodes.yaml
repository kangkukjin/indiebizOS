        - 오늘뉴스
        - 경제
        - 동향
        - 주요뉴스
        - 뉴스
        - 추이
        - 트렌드
        - 변화
        - 뉴스흐름
        - 재수집
        - 갱신
      self_check:
        description: 전수 자가점검 실행 — 부작용 없는 모든 IBL 액션을 테스트하여 시스템 건강 상태 확인
        target_description: '(파라미터 없음 — 전수 자가점검 실행). 결과는 world_pulse.db에 기록.'
