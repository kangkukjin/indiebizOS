        target_key: op
        router: system
        func: world_op
        ops:
          default: snapshot
          values:
            snapshot: 오늘의 세계 상태 스냅샷 (경제·주요뉴스·기술동향·날씨)
            trend: 최근 N일 추이 (days 옵션, 기본 7)
            refresh: 강제 재수집 (외부 API 부하, 빈번 호출 금지)
        implementation: _route_system이 op로 분기 — snapshot=world_pulse / trend=world_trend / refresh=world_refresh, execute_world_pulse에 위임.
        keywords:
