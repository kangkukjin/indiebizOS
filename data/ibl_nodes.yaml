        target_description: 업종 코드 또는 키워드. 좌표(lat/lng) 또는 행정동 코드(district)로 영역 지정.
        router: handler
        tool: search_commercial_district
        implementation: 소상공인진흥공단 상권정보 공개 API로 업종별 점포 밀집도/분포 분석
      search_ddg:
        description: 웹 검색 (DuckDuckGo). 영어/글로벌 쿼리에 적합. 한국어 검색은 search_naver 우선. 뉴스는
