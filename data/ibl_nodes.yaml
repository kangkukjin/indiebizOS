        description: 슬라이드 spec의 일부 필드만 직접 patch + PNG 재렌더 (AI 호출 없음, PowerPoint식 편집).
        group: lecture
        target_description: 강의 ID, idx, patch 객체 (변경할 필드만). layout 키는 거부.
        keywords:
        - 슬라이드 필드 편집
        - 단어만 바꾸기
        - 일부 수정
        - spec patch
        router: handler
        tool: slide_patch_spec
        implementation: 현재 spec 로드 → patch 키-값 shallow update → slide_shadcn 재렌더.
          layout 키는 거부 (필요 필드 달라져 spec 깨질 위험). None은 필드 삭제.
        target_key: lecture_id
        scope: workspace
      slide_rerender:
        description: 슬라이드 spec 변경 없이 PNG만 재렌더. design_system 바꾼 뒤 같은 내용을 새 톤으로 다시
          그릴 때. AI 호출 없음.
        group: lecture
        target_description: 강의 ID와 idx (생략 시 전체 슬라이드 재렌더).
        keywords:
        - 슬라이드 재렌더
        - 같은 내용 다시 그려
        - 디자인만 적용
        - 톤만 바꿔
        router: handler
        tool: slide_rerender
        implementation: spec_file 로드 → 현재 design_system으로 slide_shadcn 호출 → deck.slides[sid].updated_at
          갱신. AI 호출 없음.
        target_key: lecture_id
        scope: workspace
      deck_export:
        description: 강의 데크를 PDF 또는 PPTX 파일로 내보내기. slide_order 순서대로 PNG를 합본.
        group: lecture
        target_description: 강의 ID. format 옵션 (pdf/pptx, 기본 pdf).
        keywords:
        - 강의 내보내기
        - PDF 내보내기
        - PPTX 내보내기
        - 슬라이드 합본
        router: handler
        tool: deck_export
        implementation: PIL 다중 페이지 PDF (의존성 없음) 또는 python-pptx 16:9 슬라이드. 저장 위치 outputs/lectures/{lecture_id}/exports/.
        target_key: lecture_id
        scope: workspace
    description: '내부: 개인 정보 및 시스템 관리 — 파일, 메모리, 건강, 사진, 설정, 워크플로우, 이벤트, 시스템 유틸리티'
    tags:
    - 파일
    - 메모리
    - 기억
    - 건강
    - 사진
    - 블로그
    - 스케줄
    - 워크플로우
    - 이벤트
    - 할일
    - 알림
    - 저장소
    - 수집
    guides:
    - blog/blog_guide.md
    - memory/memory_guide.md
