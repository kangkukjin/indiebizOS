        router: handler
        tool: radio_search_op
        ops:
          default: search
          values:
            search: 전세계 인터넷 라디오 검색 (Radio Browser)
            korean: 한국 주요 방송사 채널 (KBS/MBC/SBS 등)
        implementation: radio 패키지 op 분기. search=search_radio, korean=get_korean_radio.
        keywords:
        - 라디오
        - 인터넷라디오
        - 한국라디오
        - KBS
        - MBC
        - SBS
      world:
        description: 세계 상태 감각 (op 분기). 경제·뉴스·기술·날씨 스냅샷 조회/추이/재수집.
        target_description: |
          op로 분기 (기본 snapshot).
          - snapshot: 오늘의 세계 상태(경제 지표·주요 뉴스·기술 동향·날씨). 파라미터 없음.
          - trend: 최근 N일 추이 (경제 변화·뉴스 흐름). days 옵션(기본 7).
          - refresh: 강제 재수집(오늘 데이터 덮어씀). 외부 API 부하라 빈번 호출 금지. 파라미터 없음.
