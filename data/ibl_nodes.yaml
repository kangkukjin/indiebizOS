        router: system
        func: self_check
        implementation: 전체 IBL 액션 중 안전한 액션을 전수 실행, 결과를 world_pulse.db에 기록, 패턴 분석
        keywords:
        - 자가점검
        - 전수점검
        - 면역
        - 건강체크
        - 셀프체크
        - self-check
      devdocs:
        description: 소프트웨어 라이브러리/프레임워크 공식 문서 (op 분기, Context7). 코드 작성 시 API 참조용. 논문은 paper.
        target_description: |
          op로 분기 (기본 resolve).
          - resolve: library_name(예 'react','fastapi') → Context7 ID. search 전 첫 단계.
          - search: query(알고 싶은 내용) + library_id(resolve 결과).
        target_key: op
        group: research
        router: handler
        tool: devdocs_op
        ops:
          default: resolve
          values:
            resolve: 라이브러리 이름 → Context7 ID (첫 단계)
            search: 공식 문서 검색 (library_id + query)
        implementation: context7 패키지 op 분기. resolve=resolve_library, search=search_library_docs.
        postprocess:
          type: compress
        keywords:
        - 라이브러리문서
        - API문서
        - context7
        - 공식문서
      search_naver:
        description: 네이버 검색 API. 한국어 콘텐츠(웹문서/뉴스/블로그/카페/지식인/책/백과 등)에서 DuckDuckGo/Google보다
          압도적으로 강함. type 파라미터로 도메인 선택 (기본 webkr). 뉴스 단독 검색은 type='news' 또는 search_news(Google
          News) 중 한국 출처 우선이면 이쪽.
        group: research
        target_description: 검색어. type 옵션으로 도메인 선택 (webkr/news/blog/cafe/kin/book/encyc/doc/shop, 기본 webkr).
        router: handler
        tool: naver_search
        implementation: 네이버 개발자센터 검색 API. 같은 NAVER_CLIENT_ID/SECRET 한 쌍으로 9개 도메인(webkr/news/blog/cafe/kin/book/encyc/doc/shop)
          모두 호출. 무료 일 25k 쿼리.
        target_key: query
        postprocess:
          type: compress
      startup:
        description: 정부 창업/중소기업 지원사업 공고 검색. 기본은 K-Startup(창업진흥원) + 중기부(MSS) 통합. source로 한쪽만 가능.
