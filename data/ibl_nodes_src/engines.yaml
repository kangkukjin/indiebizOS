      lecture_plan:
        description: '강의 슬라이드 파이프라인 1단계 — 메시지 큐레이션. 명제 outline을 검증·저장. 호출: [engines:lecture_plan]{outline:
          [{idx, role, title, device, visual, concrete}, ...], source: "책 메타", style:
          "notebooklm"} 또는 처음이면 [engines:lecture_plan]{init_skeleton: true}로 스켈레톤
          안내 받기. 가이드 read_guide(query="강의 슬라이드 원칙")'
        target_description: outline 배열 (각 슬라이드 명제) 또는 init_skeleton=true. source/style 옵션.
        group: media_produce
        router: handler
        tool: create_lecture_plan
        implementation: '단계 산출물 outline.json + outline.md 저장. 스키마 검증: role(cover/intro/thesis/closure_table/closure_diagram/quote/outro/reference),
          device(contrast/chain/equation/scale/hierarchy/none), notebooklm 스타일은 closure_table+closure_diagram
          슬라이드 존재 강제. 산출물 위치 lecture_<id>/outline.{json,md}. 이 단계가 통과해야 lecture_write
          가능.'
        achievement_criteria: 모든 슬라이드 제목이 단정문(라벨 X), 5종 수사 장치(contrast/chain/equation/scale/hierarchy)에
          매핑됨, 이중 회수(closure_table+closure_diagram) 존재, 핵심 명제 누락 없음, 각 슬라이드의 concrete
          필드에 수치·고유명사 ≥1.
        keywords:
        - 강의
        - 슬라이드 기획
        - outline
        - 명제
      lecture_write:
        description: '강의 슬라이드 파이프라인 2단계 — 각 슬라이드 콘텐츠 집필. outline.json을 입력으로 슬라이드별
          layout/title/labels/image_prompt 채움. 호출: [engines:lecture_write]{lecture_dir:
          "...", contents: [{idx, layout, title, labels, image_prompt, ...}], design_system:
          "sf_blueprint"}. only_indices로 부분 갱신 가능.'
        target_description: lecture_dir + contents 배열. design_system/only_indices 옵션.
        group: media_produce
        router: handler
        tool: create_lecture_write
        implementation: 'contents.json 저장. 스키마 검증: idx가 outline에 존재, illustration_*
          레이아웃은 image_prompt 필수, split_concept은 left_image_prompt+right_image_prompt
          필수. 부분 갱신은 only_indices=[idx,...]로.'
        achievement_criteria: image_prompt가 다이어그램형(씬 묘사 X)으로 작성됨, 영문 라벨 명시(EYE/MASS
          등), 한글 라벨 들어갈 빈 공간 명세 포함, 본문 단락을 라벨로 그대로 옮기지 않음, 각 명제를 시각화하는 라벨 배치가 outline의
          device와 정합.
        keywords:
        - 강의
        - 슬라이드 집필
        - contents
      lecture_illustrate:
        description: '강의 슬라이드 파이프라인 3단계 — 일러스트 생성. contents.json의 image_prompt들을 image_gemini로
          병렬 호출. 호출: [engines:lecture_illustrate]{lecture_dir: "...", style_preset:
          "sf_blueprint" (선택, 미지정시 design_system 사용), quality: "fast"/"pro", image_size:
          "1K"/"2K"/"4K"}. only_indices로 약한 일러스트만 재생성.'
        target_description: lecture_dir 필수. style_preset/quality/image_size/only_indices 옵션.
        group: media_produce
        router: handler
        tool: create_lecture_illustrate
        implementation: image_gemini를 슬라이드별로 호출, illustrations/manifest.json으로 매니페스트
          관리. split_concept은 좌·우 1:1 두 장 생성. 부분 재생성 only_indices 지원. 실패한 슬라이드는 manifest에
          기록 안 됨 — 다시 호출.
        achievement_criteria: 생성된 일러스트가 다이어그램형이고 한글 미포함, 디자인 시스템 톤 일관, 빈 공간이 정말 비어있음(라벨
          들어갈 자리), 각 일러스트가 contents.json의 image_prompt 의도와 정합. (VLM 평가는 image_critic
          액션 참조)
        keywords:
        - 강의
        - 일러스트 생성
        - illustrate
      lecture_compose:
        description: '강의 슬라이드 파이프라인 4단계 — 데크 합성. contents.json + illustrations/manifest.json
          → slide_shadcn 호출 → 최종 데크. 호출: [engines:lecture_compose]{lecture_dir: "..."}.
          only_indices로 부분 재합성.'
        target_description: lecture_dir 필수. only_indices로 부분 재합성 가능.
        group: media_produce
        router: handler
        tool: create_lecture_compose
        implementation: contents.json과 illustrations/manifest.json을 병합하여 slide_shadcn에
          전달. 최종 데크는 lecture_dir/deck/에 HTML+PNG로 저장. only_indices로 약한 슬라이드만 재합성 가능.
        achievement_criteria: 라벨이 일러스트의 핵심 객체를 가리지 않음, 1280×720 뷰포트 안에 모든 요소가 들어옴,
          한국어 폰트가 깨지지 않음, 라벨 좌표가 일러스트 빈 공간과 정합.
        keywords:
        - 강의
        - 슬라이드 데크
        - compose
      image_critic:
        description: 'Gemini Vision으로 일러스트가 의도와 정합하는지 평가. 호출: [engines:image_critic]{image_path:
          "/abs/...", intent: "이 일러스트가 표현해야 할 것 자연어 설명", style_preset: "sf_blueprint",
          checks: ["...추가 체크"]}. 반환: passed/score/issues/notes JSON. ILLUSTRATE 단계의
          자동 평가에 사용.'
        target_description: image_path (절대 경로) + intent (자연어 설명). style_preset/checks 옵션.
        group: media_produce
        router: handler
        tool: critique_gemini_image
        implementation: 'Gemini 3 Pro Vision으로 이미지를 평가. 기본 체크: (1) 다이어그램형인가, (2) 한글이
          들어갔는가, (3) 빈 공간이 의도된 위치에 있는가, (4) 주요 객체가 명확히 배치됐는가, (5) 디자인 시스템 톤 일관성. checks
          파라미터로 추가 체크 가능. 한글이 일러스트 안에 있으면 무조건 passed=false. 반환: 사람용 요약 + verdict_json
          (passed/score/issues/notes).'
        achievement_criteria: 평가 자체의 신뢰성 — JSON 파싱 성공, issues가 구체적 이유를 담음, 한글 검출 시
          무조건 passed=false.
        keywords:
        - 일러스트 평가
        - VLM
        - vision
        - critic
        - image evaluation
    description: '작업장: 콘텐츠 생성 및 변환 — 신문, 슬라이드, 영상, 차트, 음악, 웹사이트, 디자인'
