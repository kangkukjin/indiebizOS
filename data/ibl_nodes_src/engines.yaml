          - image{src(경로/URL), caption?} · table{columns, rows}(데이터 통화 그대로 재사용)
          - cards{columns(기본2), items:[{title, meta?, summary?, url?, link_label?}]}(링크 카드 그리드 — 뉴스·검색결과·북마크·상품목록)
          - quote{text, cite?} · code{text, lang?} · divider
          title(선택, 최상단 제목) · meta(선택, 제목 아래 부제/발행정보 한 줄) · theme(default 기본/newspaper 제호+카드그리드)
          · filename(선택) · format(html 기본/pdf/png/docx/pptx/typst — 같은 IR을 여러 emitter로).
          결과 산출물 경로(path·file) 반환. 단일 IR → 다중 emitter. typst=책 품질 조판 PDF(산문·보고서에 최적, HTML theme/cards 그리드는 무시). pptx는 문서 구조를 슬라이드로 투영(heading=새 슬라이드) — 시각 레이아웃 슬라이드가 필요하면 engines:slide를 쓸 것.
        group: media_produce
        router: handler
        tool: render_document
        implementation: 포맷 중립 문서 IR을 emitter로 렌더 — html(_doc_blocks_to_html)·pdf/png(Playwright 동일 HTML)·docx(_doc_blocks_to_docx, python-docx)·pptx(_doc_blocks_to_pptx, python-pptx 슬라이드 투영). table 블록은 데이터 통화({columns,rows}) 재사용. 단일 IR → 다중 emitter.
        target_key: blocks
        keywords:
        - 문서
        - 보고서
        - document
        - 리포트
        - 페이지
      filter:
        runs_on: anywhere
        description: '통화 변환자 — 목록/표에서 조건에 맞는 것만 남긴다(부분집합). >> 앞 액션의 records/table 통화를 받아 같은 통화로.'
        target_description: 'where(필터 조건): 문자열(전 필드 부분일치, 예 "전세") · {field, op, value}(op=eq/ne/lt/le/gt/ge/contains/in) · {열:값} 단축형 · 조건 배열(AND). >> 파이프로 앞 통화를 자동 수용. 도메인 무관 — 모든 검색·목록 생산자에 적용.'
        group: transform
        router: handler
        tool: data_filter
        implementation: data-ops handler.py — records|table 통화에서 where 미니 DSL로 부분집합. 비파괴(같은 통화 반환).
        target_key: where
        keywords:
        - 필터
        - 거르기
        - 조건
        - 만
        - filter
      sort:
        runs_on: anywhere
        description: '통화 변환자 — 목록/표를 기준 필드로 정렬(수치 인식). >> 앞 records/table 통화를 받아 같은 통화로.'
        target_description: 'by(정렬 기준 필드/열명, 필수) · desc(내림차순 bool, 기본 false). 숫자는 수치로, 아니면 문자열로 비교. 예: [...] >> [engines:sort]{by: price, desc: true}.'
        group: transform
        router: handler
        tool: data_sort
        implementation: data-ops handler.py — records|table을 by 키로 정렬(_sort_key 수치 우선). 비파괴.
        target_key: by
        keywords:
        - 정렬
        - 순
        - 정렬하기
        - sort
        - 순서
      take:
        runs_on: anywhere
        description: '통화 변환자 — 목록/표에서 상위 n개만(음수면 뒤에서 n). >> 앞 records/table 통화를 받아 같은 통화로.'
        target_description: 'n(취할 개수, 기본 10; 음수=뒤에서 n개). 보통 sort 뒤에 써 상위 N 추출: [...] >> [engines:sort]{by:..} >> [engines:take]{n:5}.'
        group: transform
        router: handler
        tool: data_take
        implementation: data-ops handler.py — records|table을 n으로 슬라이스. 비파괴.
        target_key: n
        keywords:
        - 상위
        - 개만
        - 처음
        - take
        - top
      select:
        runs_on: anywhere
        description: '통화 변환자 — 표에서 지정한 열만 남긴다(열 투영). records면 해당 필드만 추림. >> 앞 통화를 받아 같은 통화로.'
        target_description: 'columns(남길 열/필드 이름 배열, 필수). 예: [sense:...] >> [engines:select]{columns: ["연도","GDP"]}. 표가 넓을 때 차트/문서 전에 좁히기.'
        group: transform
        router: handler
        tool: data_select
        implementation: data-ops handler.py — table 열 투영(인덱스 매핑), records 필드 추림. 비파괴.
        target_key: columns
        keywords:
        - 열
        - 컬럼
        - 투영
        - select
        - 골라
      dedup:
        runs_on: anywhere
        description: '통화 변환자 — 목록/표에서 중복 제거(첫 항목 유지, 정규화 비교). >> 앞 records/table 통화를 받아 같은 통화로.'
        target_description: 'by(중복 판정 키 필드/열; 미지정 시 records=title, table=첫 열). 공백·대소문자 정규화 후 동등 비교. 여러 검색 합친 뒤 중복 제거에. (옛 newspaper 내부 dedup을 전 생산자 공용으로 끌어올림.)'
        group: transform
        router: handler
        tool: data_dedup
        implementation: data-ops handler.py — by 키 정규화 후 첫 항목만 유지. 비파괴.
        target_key: by
        keywords:
        - 중복제거
        - 중복
        - 유니크
        - dedup
        - 고유
      groupby:
        runs_on: anywhere
        description: '통화 변환자 — 표를 키 열로 그룹지어 집계(count/sum/avg/min/max). >> 앞 table 통화를 받아 집계 table로.'
        target_description: 'by(그룹 키 열, 필수) · agg({새열:[op,원본열]} 또는 {원본열:op}, op=count/sum/avg/min/max; 미지정 시 그룹별 count). 반환 table=[by열, 집계열들]. 예: [...] >> [engines:groupby]{by: 지역, agg: {평균가: [avg, 가격]}}.'
        group: transform
        router: handler
        tool: data_groupby
        implementation: data-ops handler.py — table을 by로 그룹핑 후 agg 명세대로 집계(입력 순서 보존). 표형 전용.
        target_key: by
        keywords:
        - 그룹
        - 집계
        - 묶어
        - groupby
        - 통계
      join:
        runs_on: anywhere
        description: '통화 변환자(이항) — 두 표를 공통 키 열로 inner join. 서로 다른 소스를 한 키로 묶어 분석. & 병렬 두 입력을 받음.'
        target_description: 'on(조인 키 열 이름, 양쪽 table에 모두 존재, 필수). 결과 열=좌측 전체+우측(키 제외). 예: [sense:stock]{op: history} & [sense:world_bank]{...} >> [engines:join]{on: "연도"}. 두 입력은 & 병렬로 공급.'
        group: transform
        router: handler
        tool: data_join
        implementation: data-ops handler.py — & 병렬 두 table을 on 키로 inner join(우측 인덱싱, 키 정규화 비교). 표형 전용.
        target_key: on
        keywords:
        - 조인
        - 결합
        - 합쳐
        - join
        - 연결
      union:
        runs_on: anywhere
        description: '통화 변환자(이항) — 두 표(또는 두 목록)를 행 결합. 같은 통화끼리. & 병렬 두 입력을 받음. 중복 제거는 뒤에 >> dedup.'
        target_description: '파라미터 없음. table은 열 이름으로 통합(순서 보존, 한쪽에만 있는 열은 None), records는 단순 concat. 예: [A] & [B] >> [engines:union]. records 합치며 중복까지 지우려면 engines:merge.'
        group: transform
        router: handler
        tool: data_union
        implementation: data-ops handler.py — & 병렬 두 입력 행 결합(table 열 통합/records concat). 같은 통화 종류만.
        target_key: ''
        keywords:
        - 행결합
        - 이어붙여
        - union
        - 합집합
        - 세로결합
      merge:
        runs_on: anywhere
        description: '통화 변환자(이항) — 두 목록(records)을 합친다. by 지정 시 그 키로 중복 제거. & 병렬 두 입력을 받음.'
        target_description: 'by(선택, 중복 제거 키 필드; 미지정 시 단순 concat). 여러 검색 결과를 한 목록으로 모을 때. 표형 결합은 engines:union. 예: [sense:search_news]{...} & [sense:search_ddg]{...} >> [engines:merge]{by: title}.'
        group: transform
        router: handler
        tool: data_merge
        implementation: data-ops handler.py — & 병렬 두 records concat(+ by 지정 시 정규화 중복 제거). 목록형 전용.
        target_key: by
        keywords:
        - 합치기
        - 모아
        - merge
        - 통합
        - 목록합치기
      web_site:
