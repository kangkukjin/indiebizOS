          - line: x/y 리스트, 다중 시리즈는 series 배열. 시계열에 적합.
          - bar: x(범주)·y(값) 리스트. horizontal/stacked 옵션. 시간축은 line.
          - pie: labels·values 리스트. hole 옵션으로 도넛.
          - scatter: x/y 좌표 리스트. trendline 옵션으로 추세선.
          - heatmap: z(매트릭스)·x_labels·y_labels.
          - candlestick: open/high/low/close/volume 시계열 + ma 옵션(이동평균).
          - multi: charts 배열에 개별 차트 정의(각각 chart_type+데이터). subplots 자동 배치.
