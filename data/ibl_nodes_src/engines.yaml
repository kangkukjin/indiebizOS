      slide_shadcn:
        runs_on: mac_only
        description: 'Shadcn UI 고품질 슬라이드. 슬라이드 IR(slides[])이 단일 진실 소스 → png/pdf/pptx로 emit. 자세한 layout/스타일은 read_guide(query="슬라이드").'
        target_description: |
          ★슬라이드 IR(슬라이드 전용 — 문서 IR과 별개, 텍스트 문서는 engines:document를 쓸 것): slides 배열, 각 슬라이드 = {layout, title, ...}(named layout 계약). + design_system/theme/output_dir/width/height. 인라인 배열만 (topic 미지원).
          마케팅 layout: hero/hero_image/features/stats/testimonial/pricing/cta/content_image/steps/custom
          강의 layout: lecture_body/metaphor_story/comparison_table/factbox/quote
          일러스트 통합 layout(NotebookLM 스타일): hero_illustration/illustration_anchor/split_concept/illustration_background/comparison_iconic
          design_system: default/vintage_book/academic_paper/tech_minimal/magazine_modern
          theme(색만): default/blue/green/purple/orange/dark
          format(png 기본=슬라이드별 이미지 디렉토리 / pdf=슬라이드당 1페이지 / pptx=슬라이드당 풀블리드 이미지): 같은 슬라이드 IR을 여러 emitter로. pdf·pptx는 렌더된 슬라이드를 그대로 보존(디자인 무손실).
        group: media_produce
        router: handler
        tool: create_shadcn_slides
        implementation: 'Shadcn UI React 기반 + Playwright PNG 캡처. tool_input: slides(배열,
          필수) + theme(선택) + design_system(선택) + output_dir(선택, 미지정 시 자동 생성된 shadcn_slides_<hex>/)
          + width/height(선택, 기본 1280x720). 마케팅 레이아웃: hero/hero_image/features/stats/testimonial/pricing/cta/content_image/steps/custom.
          강의 레이아웃: lecture_body(본문단락+불릿+인용+푸터), metaphor_story(스토리+결론), comparison_table(헤더/행
          순수 텍스트 표), factbox(보조정보), quote(풀스크린 인용). 통합형 일러스트 레이아웃(NotebookLM 스타일 —
          이미지와 텍스트가 한 화면으로 융합): hero_illustration(중앙 영웅 일러스트+상하 텍스트, 표지·장 도입), illustration_anchor(상단
          큰 일러스트+하단 텍스트(title/body/takeaway), 개념 설명), split_concept(좌우 대비, 양쪽 일러스트+캡션
          + conclusion 박스, left_image_path/right_image_path 절대경로 자동 base64 변환 또는 left_image_data/right_image_data
          + left_title/right_title + left_body/right_body + conclusion), illustration_background(전면
          배경 일러스트+오버레이 텍스트, 부 도입·임팩트, text_align="left"/"center" 옵션 — center는 라디얼
          스크림으로 가독성 보장), comparison_iconic(이모지/일러스트 헤더가 있는 시각적 비교 표 — label_header
          + columns:[{title,subtitle,icon,highlighted}] + rows:[{label, cells:[...]}];
          주의: row 필드명은 cells (values 아님 — Jinja dict 메서드 충돌)). image_path 절대경로는 자동
          base64 변환되어 image_data로 주입됨 (image_path/left_image_path/right_image_path/avatar_path
          모두 지원). theme(색만): default/blue/green/purple/orange/dark. design_system(색+폰트+텍스처+장식+일러스트
          통합 묶음): default(없음), vintage_book(베이지 종이+청적갈 잉크+한글 디스플레이+컴퍼스 마크, 책 강의·인문,
          일러스트 multiply 블렌드로 종이에 흡수), academic_paper(미색 종이+진남색+진홍 강조+Crimson 세리프,
          학술 논문·연구), tech_minimal(다크 남+시안 네온+Inter+JetBrains Mono+그리드, 테크 컨퍼런스·개발자),
          magazine_modern(흰+검+적색+Bebas/Playfair, 잡지·편집)'
        keywords:
        - 슬라이드
        - Shadcn
        - PNG
