  engines:
    actions:
      newspaper:
        description: '"신문 만들어줘"라고 요청할 때만 사용. 키워드별 뉴스를 수집해 공유 문서 IR(신문 테마)로 생산.
          >> [engines:document]로 렌더(html/pdf/docx). 보고서/분석/요약 요청에는 사용하지 말 것.'
        target_description: 'keywords 배열 (수집할 뉴스 주제) · title(선택, 신문 제호) · source(google 기본/guardian).
          반환: 문서 IR {title, meta, theme:"newspaper", blocks}(키워드별 heading + cards). 그대로 >> [engines:document]로 렌더.'
        group: media_produce
        router: handler
        tool: generate_newspaper
        implementation: Google News RSS / Guardian API 수집 → 키워드별 heading + cards 블록으로 결정적 문서 IR 생산(LLM 미개입, 기사·링크 무손실). 렌더는 engines:document(theme:newspaper)가 담당 — 단일 IR이 html/pdf/docx로.
        target_key: keywords
        keywords:
        - 신문
        - 신문만들기
        - 신문생성
        - 가디언
        - guardian
        - world news
        app:
          icon: 📰
          name: 신문
          order: 7
          note: 키워드별 최신 뉴스를 모아 신문 문서로 만들어 "띄우기"로 봅니다.
          inputs:
          - key: kw
            type: text
            default: 'AI, 경제, 부동산'
            placeholder: 뉴스 키워드 (쉼표 구분)
            required: true
          action: '[engines:newspaper]{keywords: "$kw"} >> [engines:document]{theme: "newspaper", format: "html"}'
          view:
          - type: list_action
            from: '.'
            icon: 📰
            title: '{title}'
            sub: '{message}'
            button:
              label: 🖥 띄우기
              action: '[limbs:os_open]{path: "{file}"}'
      html_video:
        runs_on: mac_only
        description: '완성된 HTML/CSS 씬을 MP4 영상으로 합성. scenes(HTML 배열) 또는 scene_dir(저장된 씬)로 호출. 주제→슬라이드 자동생성은 slide/lecture 사용. (가이드 html_video.md)'
        target_description: 'scenes(완전한 HTML 문서 배열, 각 {html, duration})을 직접 전달하거나 scene_dir(저장된 씬 디렉토리)을 지정. scene_dir이 있으면 렌더링 단계만 실행. narration_texts로 씬별 나레이션 추가.'
        group: media_produce
        router: handler
        tool: html_video
        implementation: scene_dir이 있으면 render 단계(저장된 HTML 씬 → Playwright + FFmpeg MP4)로, scenes가 있으면 풀 렌더(Playwright 프레임 캡처 → FFmpeg MP4 인코딩)로 분기. topic→씬 자동생성은 미구현(slide/lecture 파이프라인 사용).
        target_key: scenes
        keywords:
        - 영상
        - 동영상
        - MP4
        - 렌더링
        - HTML영상
      chart:
        runs_on: mac_only
        description: '통합 차트. chart_type: line/bar/pie/scatter/heatmap/candlestick/multi (기본 line).'
        target_description: |
          title (필수). chart_type으로 종류 분기 (기본 line).
          표준 테이블 통화도 수용: table={columns:[x,s1,s2...], rows:[[x,v1,v2...],...]} — 첫 열=x축, 나머지=시리즈. 데이터 소스 출력을 손질 없이 차트로(engines:spreadsheet와 같은 통화).
          - line: x/y 리스트, 다중 시리즈는 series 배열. 시계열에 적합.
          - bar: x(범주)·y(값) 리스트. horizontal/stacked 옵션. 시간축은 line.
          - pie: labels·values 리스트. hole 옵션으로 도넛.
          - scatter: x/y 좌표 리스트. trendline 옵션으로 추세선.
          - heatmap: z(매트릭스)·x_labels·y_labels.
          - candlestick: open/high/low/close/volume 시계열 + ma 옵션(이동평균).
          - multi: charts 배열에 개별 차트 정의(각각 chart_type+데이터). subplots 자동 배치.
        group: chart
        router: handler
        tool: chart
        implementation: chart_type 파라미터로 분기하여 Plotly 기반 차트 HTML 생성. 기본값 line. matplotlib 폴백 내장.
