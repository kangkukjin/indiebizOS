      web_component:
        returns: effect
        runs_on: mac_only
        description: '웹 UI 컴포넌트 (op 분기). catalog(카탈로그 조회)/fetch(외부 다운로드, 기본)/add(프로젝트 설치).'
        target_description: |
          op로 분기 (기본 fetch).
          - catalog: kind=components(button/card/dialog 등) 또는 sections(hero/features/cta 등). category 옵션.
          - fetch: component(이름 또는 URL, 필수) + style + project_path + output_format(code/file).
          - add: component(필수, 예 button/card) + project_path. shadcn/ui CLI로 설치.
        target_key: op
        group: web_builder
        router: handler
        tool: web_component_op
        ops:
          default: fetch
          values:
            catalog: 컴포넌트/섹션 카탈로그 조회 (kind)
            fetch: 외부 CDN/레지스트리에서 컴포넌트 다운로드 (기본)
            add: shadcn/ui CLI로 프로젝트에 컴포넌트 설치
        implementation: catalog=list_components|list_sections(kind), fetch=fetch_component, add=add_component.
        keywords:
        - 컴포넌트
        - 카탈로그
        - shadcn
        - UI
      image_critic:
        returns: effect
        runs_on: anywhere
        scope: workspace
        description: 'Gemini Vision으로 산출물(일러스트/차트/이미지 등)이 의도와 정합하는지 평가. 반환: passed/score/issues/notes.'
        target_description: 'image_path(절대 경로) + intent(자연어 설명) 필수. preset 옵션 — slide_illustration(기본: 다이어그램형/한글 미포함/빈 공간/객체 명확성, 한글 검출 시 passed=false) | general(임의 산출물 범용: intent 충족·시각 결함 없음). style_preset/checks(추가 체크 배열) 옵션.'
        group: media_produce
        router: handler
        tool: critique_gemini_image
        implementation: 'Gemini 3 Pro Vision으로 이미지를 평가. 기본 체크: (1) 다이어그램형인가, (2) 한글이
          들어갔는가, (3) 빈 공간이 의도된 위치에 있는가, (4) 주요 객체가 명확히 배치됐는가, (5) 디자인 시스템 톤 일관성. checks
          파라미터로 추가 체크 가능. 한글이 일러스트 안에 있으면 무조건 passed=false. 반환: 사람용 요약 + verdict_json
          (passed/score/issues/notes).'
        achievement_criteria: 평가 자체의 신뢰성 — JSON 파싱 성공, issues가 구체적 이유를 담음, 한글 검출 시
          무조건 passed=false.
        keywords:
        - 일러스트 평가
        - VLM
        - vision
        - critic
        - image evaluation
      image_read:
        returns: effect
        runs_on: anywhere
        scope: workspace
        description: 'Gemini Vision으로 이미지를 읽어 질문에 답한다(시각 QA·OCR·검증). 스크린샷 숫자/텍스트 읽기, 그림 내용 확인. 합격 채점 아님(그건 image_critic).'
        target_description: 'image_path(절대 경로 또는 data URI, path 로도 받음) 필수 + question(무엇을 읽거나 답할지, 생략 시 전체 묘사). query/intent/prompt 로도 받음.'
        group: media_produce
        router: handler
        tool: read_gemini_image
        implementation: 'Gemini 3 Pro Vision(폴백 2.5 Pro)으로 이미지를 읽어 자유서술 답변을 반환. temperature=0. critique_gemini_image(합격/점수 채점)와 달리 OCR·시각 QA·시각 검증 용도. 보이는 텍스트/숫자는 그대로 옮기고 불확실하면 추측 금지.'
        target_key: image_path
        achievement_criteria: 이미지에 실제로 보이는 내용을 정확히 옮김 — 텍스트/숫자를 환각 없이 읽고, 안 보이면 안 보인다고 답함.
        keywords:
        - 이미지 읽기
        - 스크린샷 읽기
        - OCR
        - 시각 QA
        - 그림 보기
        - vision read
        - image ocr
