        target_description: 'keywords 배열 (수집할 뉴스 주제) · title(선택, 신문 제호) · source(google 기본/guardian).
          반환: 문서 IR {title, meta, theme:"newspaper", blocks}(키워드별 heading + cards). 그대로 >> [table:document]로 렌더.'
        group: media_produce
        router: handler
        tool: generate_newspaper
        implementation: Google News RSS / Guardian API 수집 → 키워드별 heading + cards 블록으로 결정적 문서 IR 생산(LLM 미개입, 기사·링크 무손실). 렌더는 table:document(theme:newspaper)가 담당 — 단일 IR이 html/pdf/docx로.
        target_key: keywords
        keywords:
        - 신문
        - 신문만들기
        - 신문생성
        - 가디언
        - guardian
        - world news
