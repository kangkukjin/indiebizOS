  limbs:
    actions:
      browser:
        returns: effect
        runs_on: mac_only
        description: 브라우저(웹) 조작 — DOM ref 기반 (op 분기). Playwright/Chrome MCP. 화면 좌표 조작은 limbs:screen, 파일은 self.
        target_description: 'op로 동작 선택. 흐름 — navigate(이동)→snapshot(요소 ref 획득)→click/type. 복합 동작은 mode 2차 선택 — click(single|double|right), navigate(goto|back|forward), content(text|html), tab(list|new|switch|close), logs(console|network), cookies(save|load), iframe(list|switch|reset), chrome(connect|disconnect|status). 주요 파라미터 — ref(요소), text(입력), url(이동), expression(JS), query(자연어검색), path(저장).'
        group: browser
        target_key: op
        router: handler
        tool: browser_op
        ops:
          default: snapshot
          values:
            snapshot: 접근성 트리 스냅샷 — 요소에 ref 부여 (클릭/입력 전 필수)
            navigate: 페이지 이동 (mode goto|back|forward; goto는 url)
            click: 요소 클릭 (ref; mode single|double|right)
            type: 입력 필드에 텍스트 입력 (ref, text)
            press_key: 키보드 키 입력 (Enter/Tab/Escape 등)
            hover: 요소에 마우스 호버 (ref)
            drag: 드래그 앤 드롭 (source_ref→target_ref)
            select: select 박스 옵션 선택 (ref, value/label)
            check: 체크박스·라디오 토글 (ref)
            upload_file: 파일 input에 업로드 (ref, path)
            scroll: 페이지 스크롤 (up/down)
            wait: 조건 대기 (selector/url/text/networkidle)
            content: 페이지 콘텐츠 추출 (mode text|html)
            screenshot: 페이지 스크린샷 PNG 저장 (path, full_page)
            vision: 스크린샷 base64 반환 (AI 시각 인식용)
            evaluate: JavaScript 표현식 실행 (expression)
            pdf: 페이지를 PDF로 저장 (path)
            find: 자연어로 요소 검색 (query; Chrome MCP 전용)
            logs: 브라우저 로그 (mode console|network)
            dialog_info: Alert/Confirm/Prompt 팝업 정보
            resize: 뷰포트 크기 변경 (width/height)
            close: 브라우저 세션 종료
            tab: 탭 관리 (mode list|new|switch|close)
            iframe: iframe 관리 (mode list|switch|reset)
            cookies: 쿠키 저장·복원 (mode save|load)
            chrome: Chrome MCP 원격 제어 (mode connect|disconnect|status)
        keywords:
        - 브라우저
        - 웹 자동화
        - 클릭
        - 입력
        - 페이지
      screen:
        returns: effect
        runs_on: mac_only
        description: macOS 데스크톱 자동화 (op 분기). 화면독해(snapshot)/마우스/키보드/스크린샷. 브라우저는 limbs:browser.
        target_description: 'op별 파라미터 — snapshot: 없음(화면 독해 → 요소+ref+글자+좌표) / click: ref(요소, 좌표 없이 누름·권장) 또는 x,y / type: ref+text(입력칸 직접) 또는 text(현재 포커스) / mouse_move: x,y / key: key / drag: start_x,start_y,end_x,end_y / scroll: direction,amount / screenshot: x,y,width,height(옵션). 좌표는 1280x800 가상 기준. 흐름 — snapshot으로 읽고 → ref로 클릭(강건). OCR 글자는 ref 없어 x,y.'
        group: desktop
        target_key: op
        router: handler
        tool: computer_op
        ops:
          values:
            snapshot: 화면 독해 — UI 요소(역할/이름)+글자(OCR)+클릭좌표. 클릭 전 화면 파악 (브라우저 snapshot의 데스크톱 판)
            screenshot: 화면 캡처 이미지 (x,y,width,height 옵션)
            click: 마우스 클릭 (x,y)
            type: 텍스트 입력 (text)
            key: 키 입력 (key)
            mouse_move: 마우스 이동 (x,y)
            drag: 드래그 (start_x,start_y,end_x,end_y)
            scroll: 스크롤 (direction,amount)
            cursor_position: 현재 커서 좌표 반환
            screen_info: 화면 해상도 정보 반환
        implementation: pyautogui로 op 분기 (1280x800 가상 좌표 → 실제 해상도 자동 변환, Retina 대응)
        keywords:
        - 데스크톱
        - macOS
        - 클릭
        - 키보드
        - 스크린샷
        - 마우스
        - 드래그
        - 스크롤
        - 자동화
        - 화면독해
        - 화면읽기
        - 접근성
        - OCR
        - 화면분석
        - 버튼찾기
      android:
        returns: effect
        description: 안드로이드 폰 화면 조작 (op 분기) — snapshot으로 요소 읽고 ref/좌표로 탭. 집 PC=USB-ADB 연결 폰, 폰 자신=네이티브 접근성(자급). 데스크톱은 limbs:screen, 웹은 limbs:browser.
        target_description: '흐름 — snapshot(요소+라벨+좌표 읽기, 기본) → tap(query 라벨/id 일부 권장, 또는 x,y) → type(text). 입력 후 전송 등 동적 버튼은 반드시 snapshot 다시. 주요 파라미터 — query(탭할 요소 라벨), x/y(snapshot이 준 좌표), text(입력), key(back/home/recent), package_name(앱 실행, 예 com.kakao.talk), direction(swipe up/down/left/right). device_id 생략 시 첫 기기(PC 경로). 가이드 android.md 참조.'
        group: device
        target_key: op
        router: handler
        tool: android_op
        scope: system   # 폰 화면 조작 — 프로젝트 컨텍스트 불필요(sense:phone/here/listen/see 와 동형)
        runs_on: anywhere   # 집 PC=PC-ADB(ui_control), 폰 프로파일=네이티브 AccessibilityService(자급). 핸들러가 INDIEBIZ_PROFILE로 분기
        ops:
          default: snapshot
          values:
            snapshot: 화면 독해 — 누를 수 있는 요소를 라벨+좌표로 반환 (탭 전 필수)
            tap: 요소 탭 (query 라벨/id 일부 권장, 또는 x,y)
            type: 포커스된 입력창에 텍스트 입력 (폰 네이티브는 ACTION_SET_TEXT라 한글 IME 불필요)
            swipe: 스와이프·스크롤 (direction up/down/left/right 또는 x1,y1,x2,y2)
            key: 시스템 키 (back/home/recent 등. 폰 네이티브는 enter 미지원)
            long_press: 길게 누르기 (x,y)
            open_app: 앱 실행 (package_name)
        implementation: 집 PC=ADB(uiautomator dump+input, ui_control.py), 폰 자신=네이티브 AccessibilityService
          (PhoneAccessibilityService — getRootInActiveWindow 독해 + dispatchGesture 터치 + ACTION_SET_TEXT 입력).
          핸들러가 INDIEBIZ_PROFILE=phone 이면 네이티브로 분기. 폰은 1회 접근성 권한 활성 필요.
        keywords:
        - 안드로이드
        - 폰
        - 스마트폰
        - 카카오톡
        - 카톡
        - 앱조작
        - 화면조작
        - 터치
        - 탭
      phone:
        returns: effect
        description: 폰 네이티브 동작 (op 분기) — 알림/진동/토스트/복사/음성/앱실행. 동작 요청은 sense:phone 진단 없이 바로 실행 — 도달성은 sense:phone(푸시 피드) 신선도와 무관, 미도달이면 phone_unreachable 명시됨.
        group: device
        target_description: 'op=notify(기본): 알림 표시 — title/body. vibrate: 진동 — duration_ms(기본 400).
          toast: 화면 토스트 — text. clipboard: 클립보드 복사 — text. speak: TTS 음성 — text. open_app: 앱 실행 — package_name(예 com.kakao.talk).
          sms: 문자 작성창을 받는사람(to)·본문(text) 채워 열기 — 전송은 사용자 탭. call: 다이얼러를 번호(to) 채워 열기 — 통화는 사용자 탭.'
        target_key: op
        router: handler
        tool: phone_act
        scope: system
        runs_on: phone_only   # 폰 네이티브 effector(Chaquopy→Kotlin PhoneActions) — PC선 limbs:android(USB-ADB)
        ops:
          default: notify
          values:
            notify: 알림 표시 (title/body — "폰에 알림 띄워줘")
            vibrate: 진동 (duration_ms)
            toast: 화면에 토스트 메시지 (text)
            clipboard: 클립보드에 복사 (text)
            speak: TTS 음성 출력 (text)
            open_app: 앱 실행 (package_name)
            sms: 문자 작성창 열기 (to·text 채움, 전송은 사용자 탭 — 자율 발송 아님)
            call: 다이얼러 열기 (to 채움, 통화는 사용자 탭 — 즉시 발신 아님)
        implementation: Chaquopy Java 브리지로 Kotlin PhoneActions(@JvmStatic) 호출. android 패키지 phone_act 핸들러(scope:system).
        keywords:
        - 폰알림
        - 진동
        - 음성
        - 토스트
        - 클립보드복사
        - 앱실행
      os_open:
        returns: effect
        description: OS 기본 앱으로 열기 — URL은 기본 브라우저, 파일/폴더는 Finder/탐색기
        target_description: 열 대상의 경로 또는 URL. http/https는 브라우저, 파일은 Finder/탐색기.
