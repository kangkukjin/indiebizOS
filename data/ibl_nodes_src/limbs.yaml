  limbs:
    actions:
      os_open:
        returns: effect
        description: OS 기본 앱으로 열기 — URL은 기본 브라우저, 파일/폴더는 Finder/탐색기
        target_description: 열 대상의 경로 또는 URL. http/https는 브라우저, 파일은 Finder/탐색기.
        group: open
        target_key: path
        router: system
        func: output_open
        runs_on: mac_only   # 집 PC Finder/탐색기 GUI — 폰 무의미
        implementation: subprocess로 OS 기본 앱(Finder/브라우저) 실행
        keywords:
        - 열기
        - URL
        - 브라우저
      open_window:
        returns: effect
        description: Electron 런처의 6개 메인 작업창 열기 (project/system_ai/messenger/business/multichat/folder). 자세한 진입 시나리오는 가이드(open_window.md) 참조.
        target_description: 'app 종류: project | system_ai | messenger | business | multichat | folder. project 추가 — project_id, project_name(옵션), agent_name(옵션). multichat 추가 — room_id, room_name(옵션). folder 추가 — folder_id, folder_name(옵션). system_ai/messenger/business는 파라미터 없음. (indienet=messenger 레거시 별칭)'
        group: open
        target_key: app
        router: system
        func: launcher_command
        runs_on: mac_only   # Electron 데스크탑 런처 창 — 폰 무의미
        implementation: WebSocket으로 Electron Launcher에 open_<app>_window 명령 전송
        keywords:
        - 창
        - 윈도우
        - 런처
        - 앱열기
        - 프로젝트창
        - 시스템AI
        - 메신저
        - 인디넷
        - 비즈니스
        - 멀티채팅
        - 폴더
    description: '수족: 작업 도구 및 기기 제어 — 브라우저 자동화, 데스크톱, 미디어 재생(음악/라디오/유튜브), CCTV, URL/파일 열기, Cloudflare'
    tags:
    - 브라우저
    - 데스크톱
    - 재생
    - 음악
    - 라디오
    - 유튜브
    - 클릭
    - 입력
    - URL
    - 클라우드플레어
    guides:
    - browser_action.md
    - desktop.md
    - open_window.md
    - android.md
