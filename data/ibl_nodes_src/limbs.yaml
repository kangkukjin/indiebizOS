  limbs:
    actions:
      browser_snapshot:
        description: Playwright 접근성 트리 스냅샷. 요소마다 ref ID 부여 — 이후 click/type 등이 ref로 대상 지정.
        group: browser
        target_description: '(파라미터 없음 — 현재 페이지의 ref 트리 반환)'
        router: handler
        tool: browser_snapshot
        implementation: Playwright 접근성 트리 스냅샷으로 DOM 요소 ref 매핑
      click:
        description: Playwright 요소 클릭. browser_snapshot으로 얻은 ref ID로 대상 지정.
        group: browser
        target_description: 'ref ID (snapshot 결과의 e1, e2 등 식별자).'
        router: handler
        tool: browser_click
        implementation: Playwright locator로 요소 클릭 (ref ID 기반)
        target_key: ref
      type:
        description: 입력 필드(input/textarea)에 텍스트 입력. ref로 대상 지정.
        group: browser
        target_description: ref ID. text 파라미터로 입력 내용 전달.
        router: handler
        tool: browser_type
        implementation: Playwright locator로 입력 필드에 텍스트 입력
        target_key: ref
      screenshot:
        description: Playwright 페이지 스크린샷 PNG 저장. 시각 검증·기록용.
        group: browser
        target_description: '(파라미터 없음). path 옵션으로 저장 경로, full_page로 전체 영역 캡처.'
        router: handler
        tool: browser_screenshot
        implementation: Playwright page.screenshot()으로 PNG 캡처
      scroll:
        description: Playwright 페이지 스크롤 (up/down). 무한 스크롤 페이지 로딩이나 화면 이동에 사용.
        group: browser
        target_description: '(파라미터 없음). direction (up/down), pixels로 양 지정.'
        router: handler
        tool: browser_scroll
        implementation: Playwright mouse.wheel()로 페이지 스크롤
      evaluate:
        description: 페이지에서 JavaScript 표현식 실행. DOM 직접 조작·계산용.
        group: browser
        target_description: JavaScript 표현식 (page.evaluate 인자).
        router: handler
        tool: browser_evaluate
        implementation: Playwright page.evaluate()로 JavaScript 실행
        target_key: expression
      wait:
        description: Playwright 조건 충족까지 대기 (selector 등장·URL 변경·텍스트 표시). AJAX 페이지에 필수.
        group: browser
        target_description: selector/url/text 중 하나로 대기 조건 지정. timeout 옵션 가능.
        router: handler
        tool: browser_wait_for
        implementation: Playwright wait_for_selector/wait_for_url로 조건 대기
      press_key:
        description: Playwright 키보드 키 입력 (Enter/Tab/Escape 등). 단축키는 'Control+A' 형식.
        group: browser
        target_description: 키 이름 (Enter/Tab/Escape/ArrowDown 등 Playwright 표기).
        router: handler
        tool: browser_press_key
        implementation: Playwright keyboard.press()로 키 입력
        target_key: key
      tab_list:
        description: Playwright 세션의 열린 탭 목록 조회. tab_switch와 짝.
        group: browser_session
        target_description: '(파라미터 없음)'
        router: handler
        tool: browser_tab_list
        implementation: Playwright 브라우저 컨텍스트에서 열린 페이지 목록 조회
      tab_new:
        description: Playwright 새 탭 열기. 현재 세션에서 새 페이지 생성.
        group: browser_session
        target_description: '(파라미터 없음). url 옵션 시 새 탭에서 바로 페이지 로딩.'
        router: handler
        tool: browser_tab_new
        implementation: Playwright context.new_page()로 새 탭 생성
      tab_switch:
        description: Playwright 브라우저의 활성 탭 전환. 0-base 인덱스로 식별.
        group: browser_session
        target_description: 전환할 탭의 0부터 시작하는 인덱스. tab_list로 확인.
        router: handler
        tool: browser_tab_switch
        implementation: Playwright 페이지 배열에서 인덱스로 탭 전환
        target_key: tab_id
      pdf:
        description: 현재 페이지를 PDF로 저장 (Chromium 전용). 인쇄용 자료 보관.
        group: browser
        target_description: '(파라미터 없음). path 옵션으로 저장 경로 지정.'
        router: handler
        tool: browser_save_pdf
        implementation: Playwright page.pdf()로 PDF 저장 (Chromium only)
      back:
        description: Playwright 브라우저에서 이전 페이지로 이동. URL 입력 없이 히스토리 뒤로.
        group: browser
        target_description: '(파라미터 없음)'
        router: handler
        tool: browser_navigate_back
        implementation: Playwright page.go_back()으로 이전 페이지 이동
      forward:
        description: Playwright 브라우저에서 다음 페이지로 이동. back과 짝.
        group: browser
        target_description: '(파라미터 없음)'
        router: handler
        tool: browser_navigate_forward
        implementation: Playwright page.go_forward()로 다음 페이지 이동
      hover:
        description: 요소에 마우스 호버. 툴팁·드롭다운 활성화에 사용. snapshot의 ref로 대상 지정.
        group: browser
        target_description: ref ID (snapshot 결과의 식별자).
        router: handler
        tool: browser_hover
        implementation: Playwright locator.hover()로 마우스 호버
        target_key: ref
      drag:
        description: 한 요소를 다른 요소로 드래그 앤 드롭. 시작·끝 ref 두 개 필요.
        group: browser
        target_description: 시작 ref. target_ref 파라미터로 목적지 ref 지정.
        router: handler
        tool: browser_drag
        implementation: Playwright locator.drag_to()로 드래그 앤 드롭
      select:
        description: select 박스에서 옵션 선택. value 또는 label로 선택.
        group: browser
        target_description: ref ID. value 또는 label 파라미터로 선택할 옵션 지정.
        router: handler
        tool: browser_select_option
        implementation: Playwright select_option()으로 셀렉트 옵션 선택
        target_key: ref
      console:
        description: Playwright 브라우저 콘솔 로그 조회. 페이지 JS 오류·console.log 출력 확인.
        group: browser
        target_description: '(파라미터 없음 — 누적 로그 반환). level 옵션으로 필터링 가능.'
        router: handler
        tool: browser_console_logs
        implementation: Playwright page.on('console')로 콘솔 로그 수집
      cookies_save:
        description: Playwright 쿠키를 JSON으로 저장. 로그인 세션 유지용, cookies_load와 짝.
        group: browser_session
        target_description: 저장할 JSON 파일 경로 (생략 시 기본 경로).
        router: handler
        tool: browser_cookies_save
        implementation: Playwright context.cookies()로 쿠키 JSON 저장
      cookies_load:
        description: 저장된 쿠키 JSON을 Playwright에 복원. 재로그인 없이 세션 이어가기.
        group: browser_session
        target_description: 복원할 JSON 파일 경로 (생략 시 기본 경로).
        router: handler
        tool: browser_cookies_load
        implementation: Playwright context.add_cookies()로 쿠키 복원
      iframe_list:
        description: 현재 페이지의 iframe 목록 조회. iframe_switch에 사용할 인덱스 확인.
        group: browser_session
        target_description: '(파라미터 없음)'
        router: handler
        tool: browser_iframe_list
        implementation: Playwright page.frames()로 iframe 목록 조회
      iframe_switch:
        description: 특정 iframe으로 컨텍스트 전환. 이후 click/content 등은 그 frame 안에서 동작.
        group: browser_session
        target_description: iframe 인덱스 (iframe_list 결과의 위치).
        router: handler
        tool: browser_iframe_switch
        implementation: Playwright frame 인덱스로 iframe 전환
        target_key: index
      iframe_reset:
        description: iframe에서 메인 페이지로 복귀. 다음 액션은 다시 최상위 frame 대상.
        group: browser_session
        target_description: '(파라미터 없음)'
        router: handler
        tool: browser_iframe_reset
        implementation: Playwright page.main_frame()으로 메인 프레임 복귀
      tab_close:
        description: 현재 활성 탭 닫기. 마지막 탭이면 세션 유지.
        group: browser_session
        target_description: '(파라미터 없음 — 현재 탭 닫기)'
        router: handler
        tool: browser_tab_close
        implementation: Playwright page.close()로 현재 탭 닫기
      dblclick:
        description: Playwright 요소 더블클릭. 표 셀 편집·파일 열기 등에 사용.
        target_description: ref ID (snapshot 결과의 식별자).
        group: browser
        router: handler
        tool: browser_dblclick
        implementation: Playwright locator.dblclick()로 요소 더블클릭
        target_key: ref
      rightclick:
        description: Playwright 요소 우클릭 — 컨텍스트 메뉴 띄우기.
        target_description: ref ID (snapshot 결과의 식별자).
        group: browser
        router: handler
        tool: browser_rightclick
        implementation: Playwright locator.click(button='right')로 우클릭
        target_key: ref
      check:
        description: 체크박스·라디오 버튼 체크 또는 해제. 토글 동작.
        target_description: ref ID. checked 옵션으로 강제 상태 지정 가능.
        group: browser
        router: handler
        tool: browser_check
        implementation: Playwright locator.check()/uncheck()로 체크박스 토글
        target_key: ref
      upload_file:
        description: 파일 input에 로컬 파일 업로드. 파일 선택 다이얼로그 자동 처리.
        target_description: ref ID. file_path 파라미터로 업로드할 파일 경로.
        group: browser
        router: handler
        tool: browser_upload_file
        implementation: Playwright set_input_files()로 파일 업로드
        target_key: ref
      get_html:
        description: 현재 페이지의 전체 HTML 소스 추출. 구조 분석·파싱용. 텍스트만은 content.
        target_description: '(파라미터 없음 — 현재 페이지 HTML)'
        group: browser
        router: handler
        tool: browser_get_html
        implementation: Playwright page.content()로 HTML 소스 반환
      network_logs:
        description: Playwright 네트워크 요청 캡처 로그 조회. API 호출·리소스 로딩 분석.
        target_description: '(파라미터 없음). filter 옵션으로 URL/상태/타입 필터링 가능.'
        group: browser
        router: handler
        tool: browser_network_logs
        implementation: Playwright route/CDP로 네트워크 요청 캡처 및 조회
      dialog_info:
        description: Alert/Confirm/Prompt 팝업 정보 조회. 최근 팝업의 메시지·타입 반환.
        target_description: '(파라미터 없음)'
        group: browser
        router: handler
        tool: browser_dialog_info
        implementation: Playwright dialog 이벤트 리스너로 마지막 팝업 정보 반환
      resize:
        description: Playwright 브라우저 뷰포트 크기 변경. 반응형 테스트·캡처 크기 조정용.
        target_description: '(파라미터 없음). width/height로 크기 지정 (기본 1280x720).'
        group: browser
        router: handler
        tool: browser_resize
        implementation: Playwright page.set_viewport_size()로 뷰포트 조정
      vision:
        description: Playwright 스크린샷을 base64 이미지로 반환. 멀티모달 AI(Claude/Gemini Vision) 분석용.
        target_description: '(파라미터 없음 — 현재 페이지 base64 PNG 반환)'
        group: browser
        router: handler
        tool: browser_vision
        implementation: Playwright screenshot을 base64 인코딩하여 반환 (AI 시각 인식용)
      desktop_screenshot:
        description: macOS 화면 캡처 PNG (전체 또는 영역). Retina 자동 변환. 브라우저 캡처는 screenshot.
        target_description: '(파라미터 없음 — 전체 화면). x/y/width/height로 영역 지정 가능.'
        group: desktop
        router: handler
        tool: computer_screenshot
        implementation: pyautogui.screenshot()으로 macOS 화면 캡처 (Retina 자동 변환)
        keywords:
        - 스크린샷
        - macOS
        - 화면캡처
      desktop_click:
        description: macOS 절대 좌표에 마우스 클릭. left/right/middle 버튼, 더블클릭 지원.
        target_description: x,y 좌표. button (left/right/middle), double 옵션 가능.
        group: desktop
        router: handler
        tool: computer_click
        implementation: pyautogui.click()으로 좌표 기반 클릭 (Retina 좌표 변환)
        keywords:
        - 클릭
        - macOS
        - 좌표
      desktop_type:
        description: macOS 키보드로 텍스트 입력. 현재 포커스된 입력 필드에 타이핑.
        target_description: 입력할 텍스트. 한국어/유니코드 가능.
        group: desktop
        router: handler
        tool: computer_type
        implementation: pyautogui.write()로 텍스트 입력
        target_key: text
        keywords:
        - 텍스트입력
        - macOS
      desktop_key:
        description: macOS 키보드 키 또는 단축키 입력. 시스템 단축키 가능.
        target_description: 키 이름 또는 단축키 (예 'cmd+c', 'shift+tab', 'enter').
        group: desktop
        router: handler
        tool: computer_key
        implementation: pyautogui.hotkey()로 키보드 입력/단축키
        target_key: key
        keywords:
        - 키보드
        - macOS
        - 단축키
        - cmd
      mouse_move:
        description: macOS 마우스 커서를 절대 좌표로 이동. 클릭 없이 이동만.
        target_description: x,y 좌표. duration 옵션으로 이동 시간 지정 가능.
        group: desktop
        router: handler
        tool: computer_mouse_move
        implementation: pyautogui.moveTo()로 커서 이동
        keywords:
        - 마우스
        - 커서이동
      desktop_drag:
        description: macOS 마우스 드래그 (시작점→끝점 좌표). 파일·창 이동에 사용.
        target_description: 시작 좌표 (start_x, start_y)와 끝 좌표 (end_x, end_y).
        group: desktop
        router: handler
        tool: computer_drag
        implementation: pyautogui.moveTo() + drag로 드래그
        keywords:
        - 드래그
        - macOS
      desktop_scroll:
        description: macOS 마우스 스크롤 (up/down/left/right). 브라우저 외 일반 앱에도 적용.
        target_description: direction (up/down/left/right). amount로 스크롤 양 지정.
        group: desktop
        router: handler
        tool: computer_scroll
        implementation: pyautogui.scroll()로 스크롤
        keywords:
        - 스크롤
        - macOS
      cursor_position:
        description: macOS 마우스 커서의 현재 좌표 반환. desktop_click 좌표 확인용.
        target_description: '(파라미터 없음 — x,y 좌표 반환)'
        group: desktop
        router: handler
        tool: computer_cursor_position
        implementation: pyautogui.position()으로 현재 커서 좌표 반환
        keywords:
        - 커서위치
        - 마우스
      desktop_screen_info:
        description: macOS 화면 해상도·스케일 정보 반환. Retina 좌표 변환 기준.
        target_description: '(파라미터 없음 — 해상도/스케일 반환)'
        group: desktop
        router: handler
        tool: computer_screen_info
        implementation: pyautogui.size()로 화면 해상도/스케일 조회
        keywords:
        - 해상도
        - macOS
        - 화면
      os_open:
        description: OS 기본 앱으로 열기 — URL은 기본 브라우저, 파일/폴더는 Finder/탐색기
        target_description: 열 대상의 경로 또는 URL. http/https는 브라우저, 파일은 Finder/탐색기.
        group: open
        target_key: path
        router: system
        func: output_open
        implementation: subprocess로 OS 기본 앱(Finder/브라우저) 실행
        keywords:
        - 열기
        - URL
        - 브라우저
      play:
        description: 유튜브 음악/영상 재생 (검색+재생 복합. 검색만 원하면 search_youtube 사용)
        group: media
        target_description: 검색어 또는 유튜브 URL. 검색 후 큐에 추가하고 자동 재생 시작.
        keywords:
        - youtube
        - 유튜브
        - 음악
        - 노래
        - 재생
        - 틀어줘
        - play
        - music
        - 듣기
        router: handler
        tool: play_youtube
        implementation: yt-dlp로 유튜브 URL 추출 + mpv/ffplay로 스트리밍 재생
        target_key: query
      queue_add:
        description: 재생 큐에 곡 추가 (검색어로 유튜브 검색 후 큐 마지막에 추가).
        group: media
        target_description: 검색어 (곡 제목·가수 등) 또는 유튜브 URL.
        keywords:
        - 큐
        - 대기열
        - queue
        - 추가
        router: handler
        tool: add_to_queue
        implementation: 재생 큐 리스트에 유튜브 URL 추가 (인메모리)
        target_key: query
      skip:
        description: 현재 재생 중인 곡을 건너뛰고 큐의 다음 곡으로 이동.
        group: media
        target_description: '(파라미터 없음)'
        keywords:
        - 스킵
        - 다음곡
        - skip
        - next
        router: handler
        tool: skip_youtube
        implementation: mpv/ffplay 프로세스 종료 후 큐 다음 곡 재생
      queue:
        description: 현재 재생 큐의 상태와 곡 목록 조회. 큐 추가는 queue_add.
        group: media
        target_description: '(파라미터 없음)'
        router: handler
        tool: get_queue
        implementation: 인메모리 재생 큐 상태 반환
      stop:
        description: 재생 중지 + 큐 초기화. 일시정지 불가, 항상 완전 정지.
        group: media
        target_description: '(파라미터 없음)'
        keywords:
        - 정지
        - 멈춰
        - stop
        - 중지
        router: handler
        tool: stop_youtube
