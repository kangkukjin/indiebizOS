  others:
    actions:
      delegate:
        description: 에이전트에게 작업 위임 (mode 분기 · scope 분기). 기본 같은 프로젝트 비동기.
        target_description: 'agent_id (''에이전트'' 또는 ''프로젝트/에이전트''). message 필수. mode: async(기본,비동기 보고)/sync(응답 대기, 파이프라인용)/workflow(steps IBL 위임). scope: same(기본)/cross(타 프로젝트 자동 활성화, 시스템 AI 전용). mode=workflow 시 steps 필수.'
        group: delegation
        target_key: agent_id
        router: system
        func: delegate
        implementation: |
          mode/scope로 기존 4 함수를 통합 디스패치 — scope=cross → _execute_call_project_agent
          (시스템 AI만), scope=same일 때 mode=async → execute_call_agent, mode=sync →
          _agent_ask_sync (응답 텍스트 반환), mode=workflow → _delegate_workflow (steps 위임).
        keywords:
        - 위임
        - 에이전트
        - 동기
        - 파이프라인
        - 프로젝트위임
        - 다른프로젝트
      agents:
        description: 프로젝트·에이전트 조회. agent_id 없으면 전체 트리, 있으면 단건 상세.
        target_description: agent_id ('프로젝트/에이전트' 형식). 생략 시 전체 프로젝트별 에이전트 트리 반환 (위임 대상 확인용).
        group: delegation
        target_key: agent_id
        router: system
        func: agents
        implementation: |
          agent_id 없음 → _execute_list_project_agents (프로젝트별 트리), agent_id 있음 →
          _agent_info (node_registry에서 단건 상세).
        keywords:
        - 에이전트
        - 프로젝트목록
        - 에이전트목록
        - 에이전트정보
        - 상세
      messages:
        description: 한 이웃과 주고받은 메시지 채널 통합 이력 (Gmail/Nostr/Telegram 등).
        target_description: 이웃 ID (neighbors로 조회한 결과의 id 필드).
        group: channel
        target_key: neighbor_id
        router: driver
        driver: sqlite
        driver_node: contact
        implementation: SQLite DB에서 연락처/메시지 이력 쿼리
        keywords:
        - 메시지
        - 대화
        - 이력
      neighbors:
        description: 비즈니스 이웃 조회. neighbor_id/name 있으면 단건 상세, 없으면 목록.
        group: neighbor
        target_description: 'neighbor_id (단건 상세) 또는 name (정확 일치 단건 상세). 또는 search (부분 일치 검색), info_level (0-4 필터). 모두 생략 시 전체 목록.'
        router: handler
        tool: neighbors_op
        implementation: handler.py가 neighbor_id/name 유무로 분기 — 있으면 get_neighbor_detail (상세+연락처+최근 메시지), 없으면 get_neighbors (목록+검색·필터).
        target_key: search
        keywords:
        - 이웃
        - 연락처
        - 비즈니스
        - 상세
      channel_send:
        description: 메시지 발송 (Gmail/Nostr). 발신자는 자기 계정 자동 설정(없으면 차단).
        target_description: '채널 타입 (gmail/nostr). to=수신자 — 이웃 이름(주소록에서 자동 해소) 또는 이메일/npub 주소 직접 지정. subject/body로 내용 구성. 발신자는 호출 주체의 자기 계정(미설정 시 발신 차단).'
        group: channel
        target_key: channel_type
        router: channel_engine
        implementation: channel_engine 추상화 계층을 통해 메시지 발송. Gmail은 SMTP, Nostr은 릴레이
          publish. 에이전트 identity 기반 발신자 자동 설정
        keywords:
        - 메시지보내기
        - 발송
        - 텔레그램
        - 이메일
      channel_read:
        description: 채널 수신함 조회/검색 (Gmail/Nostr/Telegram). query 있으면 검색, 없으면 최근 수신.
        target_description: 채널 타입 (gmail/nostr/telegram). query 옵션으로 검색어 (Gmail은 Gmail 검색 문법). 검색 미사용 시 max_results로 건수 제한(기본 10).
        group: channel
        target_key: channel_type
        router: channel_engine
        implementation: channel_engine 입구가 query 유무로 자동 분기 — query 있으면 _channel_search, 없으면 _channel_read (Gmail IMAP, Nostr 릴레이 구독 등).
        keywords:
        - 메시지읽기
        - 수신
        - 메시지검색
    description: '타자: 외부 에이전트 및 사용자와의 소통 — 위임, 메시징, SMS, 이메일, 연락처, 협업'
    tags:
    - 위임
    - 에이전트
    - 메시지
    - 텔레그램
    - 이메일
    - 이웃
    - 비즈니스
    - 협업
    - 소통
