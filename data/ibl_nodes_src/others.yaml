  others:
    actions:
      delegate:
        aliases:
          steps: [pipeline]
        returns: effect
        description: 에이전트에게 작업 위임 (mode 분기 · scope 분기). 기본 같은 프로젝트 비동기.
        target_description: 'agent_id (''에이전트'' 또는 ''프로젝트/에이전트''). message 필수. mode: async(기본,비동기 보고)/sync(응답 대기, 파이프라인용)/workflow(steps IBL 위임). scope: same(기본)/cross(타 프로젝트 자동 활성화, 시스템 AI 전용)/system(자율주행 top-level 시스템 AI에 자연어 의도 fire-and-forget — 앱 "생성" 버튼용, agent_id 불필요). mode=workflow 시 steps 필수.'
        group: delegation
        target_key: agent_id
        router: system
        func: delegate
        implementation: |
          mode/scope로 기존 4 함수를 통합 디스패치 — scope=cross → _execute_call_project_agent
          (시스템 AI만), scope=same일 때 mode=async → execute_call_agent, mode=sync →
          _agent_ask_sync (응답 텍스트 반환), mode=workflow → _delegate_workflow (steps 위임).
        keywords:
        - 위임
        - 에이전트
        - 동기
        - 파이프라인
        - 프로젝트위임
        - 다른프로젝트
      ask:
        returns: items
        fixture: '[others:ask]{to: "폰-9f2b", message: "전면 카메라로 사진 한 장", dry_run: true}'
        description: 이웃 몸(다른 indiebizOS 기기)에 자연어로 부탁. 상대가 자기 사전으로 컴파일·실행해 결과(items 통화)를 돌려준다. 내 어휘에 없는 상대 능력(이웃 몸 명함의 냄새)은 이 액션으로 — 상대 액션 이름을 흉내내지 말 것.
        target_description: 'to=상대 몸 별칭(프레즌스 등록명, 예 "폰-9f2b"). 생략 시 유일한 이웃 몸 자동, 여럿이면 되물음. message=자연어 부탁(필수 — 상대 사전을 몰라도 됨). payload=동봉(선택, dict) — 클립보드 텍스트처럼 그대로 전달할 리터럴 데이터. message 에서 payload.<키> 로 지칭하면 상대가 원문 그대로 치환해 쓴다(LLM 이 베끼지 않음). dry_run=true면 상대가 컴파일만(실행 안 함). 반환=상대 실행 결과 + compiled_ibl(상대가 부탁을 어떻게 이해했는지).'
        group: delegation
        target_key: to
        router: system
        func: ask_body
        implementation: |
          body_ask.ask_peer — device_registry 라이브에서 to 별칭 해소(생략 시 유일 피어),
          몸별 인증(phone-class=X-Phone-Token, compute=런처 세션)으로 상대 /nodes/ask 에
          POST. 상대가 자기 사전으로 컴파일·실행(사전은 전선을 건너지 않는다 — 몸 독립
          소통 연구 docs/BODY_CARD_RESEARCH.md).
        keywords:
        - 부탁
        - 이웃몸
        - 폰에부탁
        - 몸간요청
        - 명함
        - 다른기기
      agents:
        returns: scalar
        fixture: '[others:agents]{}'
        description: 프로젝트·에이전트 조회. agent_id 없으면 전체 트리, 있으면 단건 상세.
        target_description: agent_id ('프로젝트/에이전트' 형식). 생략 시 전체 프로젝트별 에이전트 트리 반환 (위임 대상 확인용).
        group: delegation
        target_key: agent_id
        router: system
        func: agents
        implementation: |
          agent_id 없음 → _execute_list_project_agents (프로젝트별 트리), agent_id 있음 →
          _agent_info (node_registry에서 단건 상세).
        keywords:
        - 에이전트
        - 프로젝트목록
        - 에이전트목록
        - 에이전트정보
        - 상세
      channel_send:
        returns: effect
        description: 메시지 발송 (Gmail/Nostr). 수신자는 주소록/주인 확정 원천으로만 해소(임의 주소 금지). 발신자는 자기 계정 자동 설정(없으면 차단).
        target_description: '채널 타입 (gmail/nostr). to=수신자는 이웃 이름 또는 "나"(주인 본인, .env 확정 원천)로 넘겨라 — 시스템이 주소록에서 주소를 해소한다. raw 이메일/npub을 직접 넣으면 주소록에 등록된 경우만 발송되고, 미등록이면 needs_confirmation으로 막힌다(사용자에게 확인 후 주소록 등록 또는 confirmed:true 로 재실행). subject/body로 내용 구성. 발신자는 호출 주체의 자기 계정(미설정 시 발신 차단).'
        group: channel
        target_key: channel_type
        router: channel_engine
        implementation: channel_engine 추상화 계층을 통해 메시지 발송. Gmail은 SMTP, Nostr은 릴레이
          publish. 에이전트 identity 기반 발신자 자동 설정
        keywords:
        - 메시지보내기
        - 발송
        - 텔레그램
        - 이메일
      publish:
        returns: effect
        description: 내가 쓴 글(마크다운)을 Nostr 공개 장문(NIP-23, kind:30023)으로 발행하고 공유 링크(njump)를 돌려준다. 신문·리포트를 친구에게 링크 하나로. slug 재발행 = 같은 주소 갱신. 발행물은 사용자/앱이 조립한 것만 그대로(조작·PII 금지).
        target_description: title=글 제목. content=마크다운 본문(사용자/앱이 조립). slug=주소 식별자(생략 시 제목 기반, 같은 slug 재발행=갱신). summary=옵션 요약. 반환=njump 링크(url).
        group: channel
        target_key: title
        router: channel_engine
        implementation: channel_engine._publish_article → indienet.publish_article(kind:30023) 릴레이 fan-out + article_url(naddr) njump 링크 생성.
        keywords:
        - 발행
        - 공개글
        - 링크공유
      channel_read:
        returns: items
        fixture: '[others:channel_read]{channel_type: "gmail"}'
        description: 채널 수신함 원시 조회/검색 (Gmail/Nostr). query 있으면 검색, 없으면 최근 수신. nostr는 릴레이를 당겨 DM 캐시도 갱신(새로고침) — 이웃별 대화 뷰는 [others:messages]가 정본.
        target_description: 채널 타입 (gmail/nostr). query 옵션으로 검색어 (Gmail은 Gmail 검색 문법). 검색 미사용 시 max_results로 건수 제한(기본 10).
        group: channel
        target_key: channel_type
        router: channel_engine
        implementation: channel_engine 입구가 query 유무로 자동 분기 — query 있으면 _channel_search, 없으면 _channel_read (Gmail IMAP, Nostr 릴레이 구독 등).
        keywords:
        - 메시지읽기
        - 수신
        - 메시지검색
      feed:
        returns: items
        fixture: '[others:feed]{op: "read"}'
        description: 커뮤니티 피드 (IndieNet) — op:read(조회)/post(글 게시). Nostr 릴레이가 진실원.
        target_description: 'op:read(기본 — 활성 보드 글 조회. hashtag 옵션=특정 보드 / author 옵션=특정인(npub)의 글만 / following:true=팔로우한 사람 전체 타임라인 / with_boards:true=보드 목록(boards)·활성 보드명 동봉 — 게시판 화면용) / op:post(content 필수 — 활성 보드에 글 게시, hashtag 옵션=다른 보드).'
        group: channel
        target_key: op
        router: channel_engine
        ops:
          default: read
          values:
            read: 커뮤니티 피드 조회
            post: 커뮤니티에 글 게시
        implementation: channel_engine._community_feed — read=indienet.fetch_posts/fetch_board_posts, post=indienet.post_to_board. 발신 신원=시스템(indienet) 키.
        app:
          instrument: community
          icon: 🌐
          name: IndieNet
          order: 8
          # 시스템 표면 — 도메인 앱이 아니라 런처 직속(전용 창·런처 버튼). 데스크탑 앱 그리드에서 제외.
          # 원격/폰은 리모컨이라 계기 노출 유지.
          system: true
          # ★브라우저 은유 (2026-07-19, 게시판 단독 표면에서 재편): #태그=주소(태그를 아는
          #   사람들끼리 모이는 방 — 태그가 곧 입장 열쇠), 보드 저장=즐겨찾기(멱등 create).
          #   게시판 탭=주소창+말풍선 스레드(내/남 구분, 메신저와 동일 thread 뷰)+글쓰기 바.
          #   즐겨찾기 탭=저장된 태그 목록 → 선택하면 그 방의 스레드로. follow/nostr 어휘는
          #   표면에서만 은퇴(수동 모드에서 사용 가능).
          modes:
          - name: 게시판
            auto_run: true
            inputs:
            - key: tag
              type: text
              default: indienet
              placeholder: '#태그 주소 — 태그를 아는 사람들의 방'
            buttons:
            - label: ⭐ 즐겨찾기
              action: '[others:board]{op: "create", hashtag: "$tag"}'
              refresh: true
            action: '[others:feed]{op: "read", hashtag: "$tag"}'
            view:
            - type: thread
              from: items
              empty_from: message
              mine: is_mine
              text: '{content}'
              meta: '{author}'
              time: '{time}'
            compose:
              placeholder: 이 게시판에 글 쓰기…
              action: '[others:feed]{op: "post", content: "$text", hashtag: "$tag"}'
              button: 게시
          - name: 즐겨찾기
            auto_run: true
            action: '[others:board]{op: "list"}'
            view:
            - type: list_action
              from: items
              empty_from: message
              icon: '#'
              title: '{name}'
              sub: '#{hashtag}'
              button:
                label: 삭제
                action: '[others:board]{op: "delete", hashtag: "{hashtag}"}'
                refresh: true
              item_click:
                action: '[others:feed]{op: "read", hashtag: "{hashtag}"}'
                view:
                - type: thread
                  from: items
                  empty_from: message
                  mine: is_mine
                  text: '{content}'
                  meta: '{author}'
                  time: '{time}'
                compose:
                  placeholder: 이 게시판에 글 쓰기…
                  action: '[others:feed]{op: "post", content: "$text", hashtag: "{hashtag}"}'
                  button: 게시
        keywords:
        - 커뮤니티
        - 피드
        - 글쓰기
        - 인디넷
      nostr:
        returns: effect
        description: IndieNet/Nostr 계정 — op:profile(신원·릴레이 조회)/rename(표시이름)/relays(릴레이 조회·설정)/import_key(nsec 가져오기)/reset_identity(새 신원).
        target_description: 'op:profile(기본) / rename(name 필수) / relays(set 또는 restore_defaults 로 변경, 없으면 조회) / import_key(nsec 필수 — 기존 신원 대체) / reset_identity(새 키 생성 — 기존 신원 대체, 주의).'
        group: channel
        target_key: op
        router: channel_engine
        ops:
          default: profile
          values:
            profile: 내 Nostr 신원·릴레이 조회
            rename: 표시 이름 변경
            relays: 릴레이 목록 조회/설정
            import_key: nsec 가져오기 (기존 신원 대체)
            reset_identity: 새 신원 생성 (기존 신원 대체)
        implementation: channel_engine._nostr_identity — indienet.identity(set_display_name/import_nsec/reset_identity) + settings.relays.
        keywords:
        - 신원
        - 계정
        - 릴레이
        - 닉네임
      board:
        returns: items
        fixture: '[others:board]{op: "list"}'
        description: 커뮤니티 보드(게시판) 관리 (IndieNet) — op:list/create/switch/delete. 보드=해시태그가 주소인 방(태그를 아는 사람들끼리), 보드 목록=즐겨찾기.
        target_description: 'op:list(기본 — 즐겨찾기한 보드 목록) / op:create(hashtag 필수, name 옵션=태그 — 보드를 즐겨찾기에 저장. 이미 있으면 그대로 성공=멱등) / op:switch(hashtag — 활성 보드 전환, 생략 시 기본 #indienet. 전환하면 게시 기본값과 [others:feed] 기본 조회가 모두 그 보드를 따름) / op:delete(hashtag 필수 — 즐겨찾기에서 삭제. 기본 #indienet 불가, 글은 릴레이에 남아 재저장 시 복원).'
        group: channel
        target_key: op
        router: channel_engine
        ops:
          default: list
          values:
            list: 보드 목록 조회
            create: 새 보드 생성
            switch: 활성 보드 전환
            delete: 보드 삭제 (기본 #indienet 불가)
        implementation: channel_engine._community_board — indienet 의 get_boards/create_board/set_active_board/delete_board.
        keywords:
        - 보드
        - 게시판
        - 커뮤니티
      follow:
        returns: items
        fixture: '[others:follow]{op: "list"}'
        description: 팔로우 관리 (IndieNet) — op:list/add/remove. 로컬 저장. 팔로우한 사람 글은 [others:feed]{op:"read", following:true}, 특정인 글은 author 파라미터로.
        target_description: 'op:list(기본 — 팔로우 목록) / op:add(pubkey 필수 — npub 또는 hex, name 옵션) / op:remove(pubkey 필수 — 언팔로우).'
        group: channel
        target_key: op
        router: channel_engine
        ops:
          default: list
          values:
            list: 팔로우 목록 조회
            add: 팔로우 추가
            remove: 언팔로우
        implementation: channel_engine._community_follow — indienet 의 get_follows/add_follow/remove_follow. 로컬 settings.follows 저장(나중에 kind:3 발행으로 포터블화 가능).
        keywords:
        - 팔로우
        - 언팔로우
        - 구독
        - 저자
    description: '타자: 외부 에이전트 및 사용자와의 소통 — 위임, 메시징, SMS, 이메일, 연락처, 협업'
    # 인프라 노드 — 어떤 노드 선별에서도 항상 허용 (ibl_access가 always_on 플래그를 읽음)
    always_on: true
    tags:
    - 위임
    - 에이전트
    - 메시지
    - 텔레그램
    - 이메일
    - 이웃
    - 비즈니스
    - 협업
    - 소통
