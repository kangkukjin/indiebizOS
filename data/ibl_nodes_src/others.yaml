  others:
    actions:
      delegate:
        returns: effect
        description: 에이전트에게 작업 위임 (mode 분기 · scope 분기). 기본 같은 프로젝트 비동기.
        target_description: 'agent_id (''에이전트'' 또는 ''프로젝트/에이전트''). message 필수. mode: async(기본,비동기 보고)/sync(응답 대기, 파이프라인용)/workflow(steps IBL 위임). scope: same(기본)/cross(타 프로젝트 자동 활성화, 시스템 AI 전용). mode=workflow 시 steps 필수.'
        group: delegation
        target_key: agent_id
        router: system
        func: delegate
        implementation: |
          mode/scope로 기존 4 함수를 통합 디스패치 — scope=cross → _execute_call_project_agent
          (시스템 AI만), scope=same일 때 mode=async → execute_call_agent, mode=sync →
          _agent_ask_sync (응답 텍스트 반환), mode=workflow → _delegate_workflow (steps 위임).
        keywords:
        - 위임
        - 에이전트
        - 동기
        - 파이프라인
        - 프로젝트위임
        - 다른프로젝트
      agents:
        returns: scalar
        fixture: '[others:agents]{}'
        description: 프로젝트·에이전트 조회. agent_id 없으면 전체 트리, 있으면 단건 상세.
        target_description: agent_id ('프로젝트/에이전트' 형식). 생략 시 전체 프로젝트별 에이전트 트리 반환 (위임 대상 확인용).
        group: delegation
        target_key: agent_id
        router: system
        func: agents
        implementation: |
          agent_id 없음 → _execute_list_project_agents (프로젝트별 트리), agent_id 있음 →
          _agent_info (node_registry에서 단건 상세).
        keywords:
        - 에이전트
        - 프로젝트목록
        - 에이전트목록
        - 에이전트정보
        - 상세
      channel_send:
        returns: effect
        description: 메시지 발송 (Gmail/Nostr). 발신자는 자기 계정 자동 설정(없으면 차단).
        target_description: '채널 타입 (gmail/nostr). to=수신자 — 이웃 이름(주소록에서 자동 해소) 또는 이메일/npub 주소 직접 지정. subject/body로 내용 구성. 발신자는 호출 주체의 자기 계정(미설정 시 발신 차단).'
        group: channel
        target_key: channel_type
        router: channel_engine
        implementation: channel_engine 추상화 계층을 통해 메시지 발송. Gmail은 SMTP, Nostr은 릴레이
          publish. 에이전트 identity 기반 발신자 자동 설정
        keywords:
        - 메시지보내기
        - 발송
        - 텔레그램
        - 이메일
      channel_read:
        returns: items
        fixture: '[others:channel_read]{channel_type: "gmail"}'
        description: 채널 수신함 조회/검색 (Gmail/Nostr/Telegram). query 있으면 검색, 없으면 최근 수신.
        target_description: 채널 타입 (gmail/nostr/telegram). query 옵션으로 검색어 (Gmail은 Gmail 검색 문법). 검색 미사용 시 max_results로 건수 제한(기본 10).
        group: channel
        target_key: channel_type
        router: channel_engine
        implementation: channel_engine 입구가 query 유무로 자동 분기 — query 있으면 _channel_search, 없으면 _channel_read (Gmail IMAP, Nostr 릴레이 구독 등).
        keywords:
        - 메시지읽기
        - 수신
        - 메시지검색
      feed:
        returns: items
        fixture: '[others:feed]{op: "read"}'
        description: 커뮤니티 피드 (IndieNet) — op:read(조회)/post(글 게시). Nostr 릴레이가 진실원.
        target_description: 'op:read(기본 — 최근 글 조회, hashtag 옵션으로 특정 보드) / op:post(content 필수 — 커뮤니티에 글 게시).'
        group: channel
        target_key: op
        router: channel_engine
        ops:
          default: read
          values:
            read: 커뮤니티 피드 조회
            post: 커뮤니티에 글 게시
        implementation: channel_engine._community_feed — read=indienet.fetch_posts/fetch_board_posts, post=indienet.post_to_board. 발신 신원=시스템(indienet) 키.
        app:
          instrument: community
          icon: 🌐
          name: IndieNet
          order: 8
          modes:
          - name: 피드
            auto_run: true
            action: '[others:feed]{op: "read"}'
            view:
            - type: card_list
              from: items
              empty_from: message
              card:
                title: '{author}'
                lines:
                - '{content}'
                - '{time}'
            compose:
              placeholder: 커뮤니티에 글 쓰기…
              action: '[others:feed]{op: "post", content: "$text"}'
              button: 게시
          - name: 게시판
            auto_run: true
            inputs:
            - key: name
              type: text
              placeholder: 새 보드 이름
            - key: tag
              type: text
              placeholder: 해시태그(영문)
            buttons:
            - label: ＋ 보드 만들기
              action: '[others:board]{op: "create", name: "$name", hashtag: "$tag"}'
            action: '[others:board]{op: "list"}'
            view:
            - type: list_action
              from: items
              icon: '#'
              title: '{name}'
              sub: '#{hashtag}'
              button:
                label: 전환
                action: '[others:board]{op: "switch", hashtag: "{hashtag}"}'
          - name: 내 계정
            auto_run: true
            note: 표시 이름·릴레이만 여기서. nsec 가져오기/신원 초기화는 수동 모드에서 [others:nostr]{op:"import_key"/"reset_identity"}.
            inputs:
            - key: name
              type: text
              placeholder: 표시 이름 변경
            buttons:
            - label: 이름 저장
              action: '[others:nostr]{op: "rename", name: "$name"}'
            - label: 릴레이 기본값으로
              action: '[others:nostr]{op: "relays", restore_defaults: true}'
            action: '[others:nostr]{op: "profile"}'
            view:
            - type: kv
              rows:
              - k: 내 npub
                v: '{npub}'
              - k: 표시 이름
                v: '{display_name}'
              - k: 활성 보드
                v: '#{active_board}'
              - k: 생성일
                v: '{created_at}'
            - type: kv_list
              title: 릴레이
              from: relays
              k: '{url}'
              v: ''
        keywords:
        - 커뮤니티
        - 피드
        - 글쓰기
        - 인디넷
      nostr:
        returns: effect
        description: IndieNet/Nostr 계정 — op:profile(신원·릴레이 조회)/rename(표시이름)/relays(릴레이 조회·설정)/import_key(nsec 가져오기)/reset_identity(새 신원).
        target_description: 'op:profile(기본) / rename(name 필수) / relays(set 또는 restore_defaults 로 변경, 없으면 조회) / import_key(nsec 필수 — 기존 신원 대체) / reset_identity(새 키 생성 — 기존 신원 대체, 주의).'
        group: channel
        target_key: op
        router: channel_engine
        ops:
          default: profile
          values:
            profile: 내 Nostr 신원·릴레이 조회
            rename: 표시 이름 변경
            relays: 릴레이 목록 조회/설정
            import_key: nsec 가져오기 (기존 신원 대체)
            reset_identity: 새 신원 생성 (기존 신원 대체)
        implementation: channel_engine._nostr_identity — indienet.identity(set_display_name/import_nsec/reset_identity) + settings.relays.
        keywords:
        - 신원
        - 계정
        - 릴레이
        - 닉네임
      board:
        returns: items
        fixture: '[others:board]{op: "list"}'
        description: 커뮤니티 보드(게시판) 관리 (IndieNet) — op:list/create/switch.
        target_description: 'op:list(기본 — 보드 목록) / op:create(name+hashtag 필수 — 새 보드) / op:switch(hashtag — 활성 보드 전환, 생략 시 기본 #indienet).'
        group: channel
        target_key: op
        router: channel_engine
        ops:
          default: list
          values:
            list: 보드 목록 조회
            create: 새 보드 생성
            switch: 활성 보드 전환
        implementation: channel_engine._community_board — indienet 의 get_boards/create_board/set_active_board.
        keywords:
        - 보드
        - 게시판
        - 커뮤니티
    description: '타자: 외부 에이전트 및 사용자와의 소통 — 위임, 메시징, SMS, 이메일, 연락처, 협업'
    tags:
    - 위임
    - 에이전트
    - 메시지
    - 텔레그램
    - 이메일
    - 이웃
    - 비즈니스
    - 협업
    - 소통
