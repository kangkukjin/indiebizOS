  others:
    actions:
      delegate:
        description: 에이전트에게 작업 위임 (mode 분기 · scope 분기). 기본 같은 프로젝트 비동기.
        target_description: 'agent_id (''에이전트'' 또는 ''프로젝트/에이전트''). message 필수. mode: async(기본,비동기 보고)/sync(응답 대기, 파이프라인용)/workflow(steps IBL 위임). scope: same(기본)/cross(타 프로젝트 자동 활성화, 시스템 AI 전용). mode=workflow 시 steps 필수.'
        group: delegation
        target_key: agent_id
        router: system
        func: delegate
        implementation: |
          mode/scope로 기존 4 함수를 통합 디스패치 — scope=cross → _execute_call_project_agent
          (시스템 AI만), scope=same일 때 mode=async → execute_call_agent, mode=sync →
          _agent_ask_sync (응답 텍스트 반환), mode=workflow → _delegate_workflow (steps 위임).
        keywords:
        - 위임
        - 에이전트
        - 동기
        - 파이프라인
        - 프로젝트위임
        - 다른프로젝트
      agents:
        description: 프로젝트·에이전트 조회. agent_id 없으면 전체 트리, 있으면 단건 상세.
        target_description: agent_id ('프로젝트/에이전트' 형식). 생략 시 전체 프로젝트별 에이전트 트리 반환 (위임 대상 확인용).
        group: delegation
        target_key: agent_id
        router: system
        func: agents
        implementation: |
          agent_id 없음 → _execute_list_project_agents (프로젝트별 트리), agent_id 있음 →
          _agent_info (node_registry에서 단건 상세).
        keywords:
        - 에이전트
        - 프로젝트목록
        - 에이전트목록
        - 에이전트정보
        - 상세
      messages:
        description: 메신저 — 대화 목록(inbox) 또는 한 이웃과의 메시지 스레드(thread). 채널 통합(Gmail/Nostr).
        target_description: 'op:thread(기본, neighbor_id 필수 — 한 이웃과 주고받은 전체 메시지) / op:inbox(대화 목록 — 이웃별 최근 메시지·미응답, 파라미터 없음·최근순).'
        group: channel
        target_key: op
        router: handler
        tool: messages_op
        ops:
          default: thread
          values:
            thread: 한 이웃과 주고받은 메시지 스레드 (neighbor_id 필수)
            inbox: 대화 목록 (이웃별 최근 메시지·미응답, 최근순)
        implementation: handler.py messages_op — op:thread 는 business_manager.get_messages(neighbor_id) 를 시간 오름차순 반환(채팅 순서), op:inbox 는 neighbors⋈messages 조인으로 대화 목록 합성.
        app:
          instrument: messenger
          icon: 💬
          name: 메신저
          order: 7
          auto_run: true
          inputs:
          - key: q
            type: text
            placeholder: 이름 검색 · ＋추가
          filter:
            key: level
            items:
            - {label: 전체, value: '', default: true}
            - {label: L0, value: 0}
            - {label: L1, value: 1}
            - {label: L2, value: 2}
            - {label: L3, value: 3}
            - {label: L4, value: 4}
          buttons:
          - label: ＋ 이웃 추가
            action: '[others:neighbor]{op: "save", name: "$q"}'
          action: '[others:messages]{op: "inbox", level: "$level", search: "$q"}'
          view:
          - type: card_list
            from: conversations
            master_detail: true
            empty_from: message
            item_click:
              action: '[others:messages]{op: "thread", neighbor_id: "{id}", pubkey: "{pubkey}"}'
              tabs:
              - name: 대화
                view:
                - type: metric
                  big: '{name}'
                  sub: '{badge}{channel|opt:  ·  ,}'
                - type: thread
                  from: messages
                  text: '{content}'
                  mine: is_from_user
                  meta: '{contact_type}'
                  time: '{time}'
                  status: status
                compose:
                  placeholder: 메시지 입력…
                  channels:
                    from: contacts
                    type: contact_type
                    value: contact_value
                    sendable: [gmail, nostr]
                  action: '[others:channel_send]{channel_type: "$channel_type", to: "$to", body: "$text"}'
              - name: 이웃 정보
                view:
                - type: form
                  title: 이웃 정보
                  fields:
                  - {key: name, label: 이름, type: text, value: '{name}'}
                  - key: info_level
                    label: 정보 공개 수준
                    type: select
                    value: '{info_level}'
                    options:
                    - {value: 0, label: 'L0 · 최소'}
                    - {value: 1, label: L1}
                    - {value: 2, label: L2}
                    - {value: 3, label: L3}
                    - {value: 4, label: 'L4 · 전체'}
                  - key: rating
                    label: 평점
                    type: select
                    value: '{rating}'
                    options:
                    - {value: 0, label: '평점 없음'}
                    - {value: 1, label: ★1}
                    - {value: 2, label: ★2}
                    - {value: 3, label: ★3}
                    - {value: 4, label: ★4}
                    - {value: 5, label: ★5}
                  - {key: info_share, label: 정보 공유 동의, type: toggle, value: '{info_share}'}
                  - {key: additional_info, label: 메모, type: textarea, value: '{additional_info}'}
                  - {key: business_doc, label: 비즈니스 문서(공개), type: textarea, value: '{business_doc}'}
                  action: '[others:neighbor]{op: "save", id: "{neighbor_id}", name: "$name", info_level: "$info_level", rating: "$rating", info_share: "$info_share", additional_info: "$additional_info", business_doc: "$business_doc"}'
                  button: 저장
                  actions:
                  - label: ⭐ 즐겨찾기 토글
                    action: '[others:neighbor]{op: "favorite", id: "{neighbor_id}"}'
                  - label: 이웃 삭제
                    action: '[others:neighbor]{op: "delete", id: "{neighbor_id}"}'
                    style: danger
                    confirm: 이 이웃을 삭제할까요? 대화·연락처도 함께 사라집니다.
                    back: true
                - type: editable_list
                  from: contacts
                  title: 연락처
                  display: '{contact_type} · {contact_value}'
                  empty: 연락처 없음
                  delete_action: '[others:contact]{op: "delete", contact_id: "{id}"}'
                  add:
                    fields:
                    - key: contact_type
                      type: select
                      placeholder: 유형
                      options:
                      - {value: gmail, label: 이메일}
                      - {value: phone, label: 전화}
                      - {value: nostr, label: Nostr}
                      - {value: kakao, label: 카카오}
                      - {value: telegram, label: 텔레그램}
                      - {value: other, label: 기타}
                    - {key: contact_value, type: text, placeholder: 연락처 값}
                    action: '[others:contact]{op: "add", neighbor_id: "{neighbor_id}", contact_type: "$contact_type", contact_value: "$contact_value"}'
                    button: 추가
            card:
              title: '{favorite|opt:⭐ ,}{name}'
              lines:
              - '{preview}'
              - '{badge}{time|opt:  ·  ,}{channel|opt: · ,}'
        keywords:
        - 메시지
        - 대화
        - 이력
        - 메신저
        - 받은메시지
      neighbor:
        description: 이웃(비즈니스 파트너) 조회·관리 — op:list(기본)/detail/save/delete/favorite.
        target_description: 'op:list(search 부분일치·info_level 0-4 필터, 기본) / detail(neighbor_id 또는 name — 연락처·최근메시지 포함) / save(id 없으면 생성·name 필수, 있으면 수정 — name/info_level(0-4)/rating(0-5)/info_share/additional_info/business_doc) / delete(id 필수) / favorite(id 필수, 토글).'
        group: neighbor
        target_key: op
        router: handler
        tool: neighbor_op
        ops:
          default: list
          values:
            list: 이웃 목록 (search/info_level 필터)
            detail: 이웃 상세 (neighbor_id 또는 name, +연락처·최근메시지)
            save: 이웃 생성(id 없음)/수정(id 있음)
            delete: 이웃 삭제
            favorite: 즐겨찾기 토글
        implementation: business 패키지 neighbor_op — business_manager.get_neighbors/get_neighbor/create_neighbor/update_neighbor/delete_neighbor.
        keywords:
        - 이웃
        - 이웃조회
        - 이웃추가
        - 이웃수정
        - 즐겨찾기
      contact:
        description: 이웃 연락처 CRUD — op:add/update/delete. (email/phone/kakao/telegram/line/nostr/other)
        target_description: 'op:add(neighbor_id·contact_type·contact_value 필수) / update(contact_id 필수) / delete(contact_id 필수).'
        group: neighbor
        target_key: op
        router: handler
        tool: contact_op
        ops:
          default: add
          values:
            add: 연락처 추가
            update: 연락처 수정
            delete: 연락처 삭제
        implementation: business 패키지 contact_op — business_manager.add_contact/update_contact/delete_contact.
        keywords:
        - 연락처추가
        - 연락처수정
        - 연락처삭제
      channel_send:
        description: 메시지 발송 (Gmail/Nostr). 발신자는 자기 계정 자동 설정(없으면 차단).
        target_description: '채널 타입 (gmail/nostr). to=수신자 — 이웃 이름(주소록에서 자동 해소) 또는 이메일/npub 주소 직접 지정. subject/body로 내용 구성. 발신자는 호출 주체의 자기 계정(미설정 시 발신 차단).'
        group: channel
        target_key: channel_type
        router: channel_engine
        implementation: channel_engine 추상화 계층을 통해 메시지 발송. Gmail은 SMTP, Nostr은 릴레이
          publish. 에이전트 identity 기반 발신자 자동 설정
        keywords:
        - 메시지보내기
        - 발송
        - 텔레그램
        - 이메일
      channel_read:
        description: 채널 수신함 조회/검색 (Gmail/Nostr/Telegram). query 있으면 검색, 없으면 최근 수신.
        target_description: 채널 타입 (gmail/nostr/telegram). query 옵션으로 검색어 (Gmail은 Gmail 검색 문법). 검색 미사용 시 max_results로 건수 제한(기본 10).
        group: channel
        target_key: channel_type
        router: channel_engine
        implementation: channel_engine 입구가 query 유무로 자동 분기 — query 있으면 _channel_search, 없으면 _channel_read (Gmail IMAP, Nostr 릴레이 구독 등).
        keywords:
        - 메시지읽기
        - 수신
        - 메시지검색
      auto_response:
        description: 외부 메시지 자동응답 서비스 제어 — op:status(기본)/start/stop. on/off 는 영속(재시작 유지).
        group: channel
        target_description: 'op:status(가동 여부·켜짐설정·점검주기·처리수) / start(켜기, 영속) / stop(끄기, 영속). 자동응답은 이웃 정보공개수준별 근무지침·비즈니스문서를 맥락으로 AI가 응답 생성·발송.'
        target_key: op
        router: handler
        tool: auto_response_op
        ops:
          default: status
          values:
            status: 자동응답 가동 상태 조회
            start: 자동응답 켜기 (재시작에도 유지)
            stop: 자동응답 끄기 (재시작에도 유지)
        implementation: business 패키지 auto_response_op — backend auto_response.get_auto_response_service() 의 enable/disable/상태. 상태는 data/auto_response_state.json 에 영속, channel_poller 부팅 시 is_enabled 로 자동 시작 게이트.
        keywords:
        - 자동응답
        - 자동회신
        - 자동답장
        - auto reply
      feed:
        description: 커뮤니티 피드 (IndieNet) — op:read(조회)/post(글 게시). Nostr 릴레이가 진실원.
        target_description: 'op:read(기본 — 최근 글 조회, hashtag 옵션으로 특정 보드) / op:post(content 필수 — 커뮤니티에 글 게시).'
        group: channel
        target_key: op
        router: channel_engine
        ops:
          default: read
          values:
            read: 커뮤니티 피드 조회
            post: 커뮤니티에 글 게시
        implementation: channel_engine._community_feed — read=indienet.fetch_posts/fetch_board_posts, post=indienet.post_to_board. 발신 신원=시스템(indienet) 키.
        app:
          instrument: community
          icon: 🌐
          name: IndieNet
          order: 8
          modes:
          - name: 피드
            auto_run: true
            action: '[others:feed]{op: "read"}'
            view:
            - type: card_list
              from: posts
              empty_from: message
              card:
                title: '{author}'
                lines:
                - '{content}'
                - '{time}'
            compose:
              placeholder: 커뮤니티에 글 쓰기…
              action: '[others:feed]{op: "post", content: "$text"}'
              button: 게시
          - name: 게시판
            auto_run: true
            inputs:
            - key: name
              type: text
              placeholder: 새 보드 이름
            - key: tag
              type: text
              placeholder: 해시태그(영문)
            buttons:
            - label: ＋ 보드 만들기
              action: '[others:board]{op: "create", name: "$name", hashtag: "$tag"}'
            action: '[others:board]{op: "list"}'
            view:
            - type: list_action
              from: boards
              icon: '#'
              title: '{name}'
              sub: '#{hashtag}'
              button:
                label: 전환
                action: '[others:board]{op: "switch", hashtag: "{hashtag}"}'
          - name: 내 계정
            auto_run: true
            note: 표시 이름·릴레이만 여기서. nsec 가져오기/신원 초기화는 수동 모드에서 [others:nostr]{op:"import_key"/"reset_identity"}.
            inputs:
            - key: name
              type: text
              placeholder: 표시 이름 변경
            buttons:
            - label: 이름 저장
              action: '[others:nostr]{op: "rename", name: "$name"}'
            - label: 릴레이 기본값으로
              action: '[others:nostr]{op: "relays", restore_defaults: true}'
            action: '[others:nostr]{op: "profile"}'
            view:
            - type: kv
              rows:
              - k: 내 npub
                v: '{npub}'
              - k: 표시 이름
                v: '{display_name}'
              - k: 활성 보드
                v: '#{active_board}'
              - k: 생성일
                v: '{created_at}'
            - type: kv_list
              title: 릴레이
              from: relays
              k: '{url}'
              v: ''
        keywords:
        - 커뮤니티
        - 피드
        - 글쓰기
        - 인디넷
      nostr:
        description: IndieNet/Nostr 계정 — op:profile(신원·릴레이 조회)/rename(표시이름)/relays(릴레이 조회·설정)/import_key(nsec 가져오기)/reset_identity(새 신원).
        target_description: 'op:profile(기본) / rename(name 필수) / relays(set 또는 restore_defaults 로 변경, 없으면 조회) / import_key(nsec 필수 — 기존 신원 대체) / reset_identity(새 키 생성 — 기존 신원 대체, 주의).'
        group: channel
        target_key: op
        router: channel_engine
        ops:
          default: profile
          values:
            profile: 내 Nostr 신원·릴레이 조회
            rename: 표시 이름 변경
            relays: 릴레이 목록 조회/설정
            import_key: nsec 가져오기 (기존 신원 대체)
            reset_identity: 새 신원 생성 (기존 신원 대체)
        implementation: channel_engine._nostr_identity — indienet.identity(set_display_name/import_nsec/reset_identity) + settings.relays.
        keywords:
        - 신원
        - 계정
        - 릴레이
        - 닉네임
      board:
        description: 커뮤니티 보드(게시판) 관리 (IndieNet) — op:list/create/switch.
        target_description: 'op:list(기본 — 보드 목록) / op:create(name+hashtag 필수 — 새 보드) / op:switch(hashtag — 활성 보드 전환, 생략 시 기본 #indienet).'
        group: channel
        target_key: op
        router: channel_engine
        ops:
          default: list
          values:
            list: 보드 목록 조회
            create: 새 보드 생성
            switch: 활성 보드 전환
        implementation: channel_engine._community_board — indienet 의 get_boards/create_board/set_active_board.
        keywords:
        - 보드
        - 게시판
        - 커뮤니티
    description: '타자: 외부 에이전트 및 사용자와의 소통 — 위임, 메시징, SMS, 이메일, 연락처, 협업'
    tags:
    - 위임
    - 에이전트
    - 메시지
    - 텔레그램
    - 이메일
    - 이웃
    - 비즈니스
    - 협업
    - 소통
