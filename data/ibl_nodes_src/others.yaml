  others:
    actions:
      delegate:
        aliases:
          steps: [pipeline]
        returns: effect
        description: 에이전트에게 작업 위임 (mode 분기 · scope 분기). 기본 같은 프로젝트 비동기.
        target_description: 'agent_id (''에이전트'' 또는 ''프로젝트/에이전트''). message 필수. mode: async(기본,비동기 보고)/sync(응답 대기, 파이프라인용)/workflow(steps IBL 위임). scope: same(기본)/cross(타 프로젝트 자동 활성화, 시스템 AI 전용)/system(자율주행 top-level 시스템 AI에 자연어 의도 fire-and-forget — 앱 "생성" 버튼용, agent_id 불필요). mode=workflow 시 steps 필수.'
        group: delegation
        target_key: agent_id
        router: system
        func: delegate
        implementation: |
          mode/scope로 기존 4 함수를 통합 디스패치 — scope=cross → _execute_call_project_agent
          (시스템 AI만), scope=same일 때 mode=async → execute_call_agent, mode=sync →
          _agent_ask_sync (응답 텍스트 반환), mode=workflow → _delegate_workflow (steps 위임).
        keywords:
        - 위임
        - 에이전트
        - 동기
        - 파이프라인
        - 프로젝트위임
        - 다른프로젝트
      agents:
        returns: scalar
        fixture: '[others:agents]{}'
        description: 프로젝트·에이전트 조회. agent_id 없으면 전체 트리, 있으면 단건 상세.
        target_description: agent_id ('프로젝트/에이전트' 형식). 생략 시 전체 프로젝트별 에이전트 트리 반환 (위임 대상 확인용).
        group: delegation
        target_key: agent_id
        router: system
        func: agents
        implementation: |
          agent_id 없음 → _execute_list_project_agents (프로젝트별 트리), agent_id 있음 →
          _agent_info (node_registry에서 단건 상세).
        keywords:
        - 에이전트
        - 프로젝트목록
        - 에이전트목록
        - 에이전트정보
        - 상세
      channel_send:
        returns: effect
        description: 메시지 발송 (Gmail/Nostr). 수신자는 주소록/주인 확정 원천으로만 해소(임의 주소 금지). 발신자는 자기 계정 자동 설정(없으면 차단).
        target_description: '채널 타입 (gmail/nostr). to=수신자는 이웃 이름 또는 "나"(주인 본인, .env 확정 원천)로 넘겨라 — 시스템이 주소록에서 주소를 해소한다. raw 이메일/npub을 직접 넣으면 주소록에 등록된 경우만 발송되고, 미등록이면 needs_confirmation으로 막힌다(사용자에게 확인 후 주소록 등록 또는 confirmed:true 로 재실행). subject/body로 내용 구성. 발신자는 호출 주체의 자기 계정(미설정 시 발신 차단).'
        group: channel
        target_key: channel_type
        router: channel_engine
        implementation: channel_engine 추상화 계층을 통해 메시지 발송. Gmail은 SMTP, Nostr은 릴레이
          publish. 에이전트 identity 기반 발신자 자동 설정
        keywords:
        - 메시지보내기
        - 발송
        - 텔레그램
        - 이메일
      channel_read:
        returns: items
        fixture: '[others:channel_read]{channel_type: "gmail"}'
        description: 채널 수신함 원시 조회/검색 (Gmail/Nostr). query 있으면 검색, 없으면 최근 수신. nostr는 릴레이를 당겨 DM 캐시도 갱신(새로고침) — 이웃별 대화 뷰는 [others:messages]가 정본.
        target_description: 채널 타입 (gmail/nostr). query 옵션으로 검색어 (Gmail은 Gmail 검색 문법). 검색 미사용 시 max_results로 건수 제한(기본 10).
        group: channel
        target_key: channel_type
        router: channel_engine
        implementation: channel_engine 입구가 query 유무로 자동 분기 — query 있으면 _channel_search, 없으면 _channel_read (Gmail IMAP, Nostr 릴레이 구독 등).
        keywords:
        - 메시지읽기
        - 수신
        - 메시지검색
      feed:
        returns: items
        fixture: '[others:feed]{op: "read"}'
        description: 커뮤니티 피드 (IndieNet) — op:read(조회)/post(글 게시). Nostr 릴레이가 진실원.
        target_description: 'op:read(기본 — 활성 보드 글 조회. hashtag 옵션=특정 보드 / author 옵션=특정인(npub)의 글만 / following:true=팔로우한 사람 전체 타임라인 / with_boards:true=보드 목록(boards)·활성 보드명 동봉 — 게시판 화면용) / op:post(content 필수 — 활성 보드에 글 게시, hashtag 옵션=다른 보드).'
        group: channel
        target_key: op
        router: channel_engine
        ops:
          default: read
          values:
            read: 커뮤니티 피드 조회
            post: 커뮤니티에 글 게시
        implementation: channel_engine._community_feed — read=indienet.fetch_posts/fetch_board_posts, post=indienet.post_to_board. 발신 신원=시스템(indienet) 키.
        app:
          instrument: community
          icon: 🌐
          name: IndieNet
          order: 8
          modes:
          - name: 팔로잉
            auto_run: true
            action: '[others:feed]{op: "read", following: true}'
            view:
            - type: card_list
              from: items
              empty_from: message
              card:
                title: '{author}'
                lines:
                - '{content}'
                - '{time}'
              item_click:
                action: '[others:feed]{op: "read", author: "{author_full}"}'
                view:
                - type: list_action
                  from: author_row
                  icon: '@'
                  title: '{name}'
                  sub: '{status}'
                  button:
                    label: ＋ 팔로우
                    action: '[others:follow]{op: "add", pubkey: "{pubkey}", name: "{name}"}'
                    refresh: true
                  button2:
                    label: 이웃 등록
                    action: '[others:neighbor]{op: "save", name: "{name}", npub: "{pubkey}"}'
                    refresh: true
                - type: card_list
                  from: items
                  empty_from: message
                  card:
                    title: '{author}'
                    lines:
                    - '{content}'
                    - '{time}'
          - name: 팔로우 목록
            auto_run: true
            inputs:
            - key: npub
              type: text
              placeholder: 팔로우할 npub 붙여넣기
            buttons:
            - label: ＋ 팔로우
              action: '[others:follow]{op: "add", pubkey: "$npub"}'
              refresh: true
            action: '[others:follow]{op: "list"}'
            view:
            - type: list_action
              from: items
              empty_from: message
              icon: '@'
              title: '{name}{neighbor_mark}'
              sub: '{pubkey}'
              button:
                label: 이웃 등록
                action: '[others:neighbor]{op: "save", name: "{name}", npub: "{pubkey}"}'
                refresh: true
              button2:
                label: 언팔로우
                action: '[others:follow]{op: "remove", pubkey: "{pubkey}"}'
                refresh: true
              item_click:
                action: '[others:feed]{op: "read", author: "{pubkey}"}'
                view:
                - type: card_list
                  from: items
                  empty_from: message
                  card:
                    title: '{author}'
                    lines:
                    - '{content}'
                    - '{time}'
          - name: 게시판
            auto_run: true
            inputs:
            - key: name
              type: text
              placeholder: 새 보드 이름
            - key: tag
              type: text
              placeholder: 해시태그(영문)
            buttons:
            - label: ＋ 보드 만들기
              action: '[others:board]{op: "create", name: "$name", hashtag: "$tag"}'
              refresh: true
            action: '[others:feed]{op: "read", with_boards: true}'
            view:
            - type: card_list
              from: items
              empty_from: message
              card:
                title: '{author}'
                lines:
                - '{content}'
                - '{time}'
              item_click:
                action: '[others:feed]{op: "read", author: "{author_full}"}'
                view:
                - type: list_action
                  from: author_row
                  icon: '@'
                  title: '{name}'
                  sub: '{status}'
                  button:
                    label: ＋ 팔로우
                    action: '[others:follow]{op: "add", pubkey: "{pubkey}", name: "{name}"}'
                    refresh: true
                  button2:
                    label: 이웃 등록
                    action: '[others:neighbor]{op: "save", name: "{name}", npub: "{pubkey}"}'
                    refresh: true
                - type: card_list
                  from: items
                  empty_from: message
                  card:
                    title: '{author}'
                    lines:
                    - '{content}'
                    - '{time}'
            - type: list_action
              from: boards
              icon: '#'
              title: '{active_mark}{name}'
              sub: '#{hashtag}'
              button:
                label: 전환
                action: '[others:board]{op: "switch", hashtag: "{hashtag}"}'
                refresh: true
              button2:
                label: 삭제
                action: '[others:board]{op: "delete", hashtag: "{hashtag}"}'
                refresh: true
            compose:
              placeholder: 이 보드에 글 쓰기…
              action: '[others:feed]{op: "post", content: "$text"}'
              button: 게시
          - name: 설정
            auto_run: true
            note: 표시 이름·릴레이만 여기서. nsec 가져오기/신원 초기화는 수동 모드에서 [others:nostr]{op:"import_key"/"reset_identity"}.
            inputs:
            - key: name
              type: text
              placeholder: 표시 이름 변경
            buttons:
            - label: 이름 저장
              action: '[others:nostr]{op: "rename", name: "$name"}'
            - label: 릴레이 기본값으로
              action: '[others:nostr]{op: "relays", restore_defaults: true}'
            action: '[others:nostr]{op: "profile"}'
            view:
            - type: kv
              rows:
              - k: 내 npub
                v: '{npub}'
              - k: 표시 이름
                v: '{display_name}'
              - k: 활성 보드
                v: '#{active_board}'
              - k: 생성일
                v: '{created_at}'
            - type: kv_list
              title: 릴레이
              from: relays
              k: '{url}'
              v: ''
        keywords:
        - 커뮤니티
        - 피드
        - 글쓰기
        - 인디넷
      nostr:
        returns: effect
        description: IndieNet/Nostr 계정 — op:profile(신원·릴레이 조회)/rename(표시이름)/relays(릴레이 조회·설정)/import_key(nsec 가져오기)/reset_identity(새 신원).
        target_description: 'op:profile(기본) / rename(name 필수) / relays(set 또는 restore_defaults 로 변경, 없으면 조회) / import_key(nsec 필수 — 기존 신원 대체) / reset_identity(새 키 생성 — 기존 신원 대체, 주의).'
        group: channel
        target_key: op
        router: channel_engine
        ops:
          default: profile
          values:
            profile: 내 Nostr 신원·릴레이 조회
            rename: 표시 이름 변경
            relays: 릴레이 목록 조회/설정
            import_key: nsec 가져오기 (기존 신원 대체)
            reset_identity: 새 신원 생성 (기존 신원 대체)
        implementation: channel_engine._nostr_identity — indienet.identity(set_display_name/import_nsec/reset_identity) + settings.relays.
        keywords:
        - 신원
        - 계정
        - 릴레이
        - 닉네임
      board:
        returns: items
        fixture: '[others:board]{op: "list"}'
        description: 커뮤니티 보드(게시판) 관리 (IndieNet) — op:list/create/switch/delete.
        target_description: 'op:list(기본 — 보드 목록) / op:create(name+hashtag 필수 — 새 보드) / op:switch(hashtag — 활성 보드 전환, 생략 시 기본 #indienet. 전환하면 게시 기본값과 [others:feed] 기본 조회가 모두 그 보드를 따름) / op:delete(hashtag 필수 — 보드 삭제. 기본 #indienet 불가, 글은 릴레이에 남아 재생성 시 복원).'
        group: channel
        target_key: op
        router: channel_engine
        ops:
          default: list
          values:
            list: 보드 목록 조회
            create: 새 보드 생성
            switch: 활성 보드 전환
            delete: 보드 삭제 (기본 #indienet 불가)
        implementation: channel_engine._community_board — indienet 의 get_boards/create_board/set_active_board/delete_board.
        keywords:
        - 보드
        - 게시판
        - 커뮤니티
      follow:
        returns: items
        fixture: '[others:follow]{op: "list"}'
        description: 팔로우 관리 (IndieNet) — op:list/add/remove. 로컬 저장. 팔로우한 사람 글은 [others:feed]{op:"read", following:true}, 특정인 글은 author 파라미터로.
        target_description: 'op:list(기본 — 팔로우 목록) / op:add(pubkey 필수 — npub 또는 hex, name 옵션) / op:remove(pubkey 필수 — 언팔로우).'
        group: channel
        target_key: op
        router: channel_engine
        ops:
          default: list
          values:
            list: 팔로우 목록 조회
            add: 팔로우 추가
            remove: 언팔로우
        implementation: channel_engine._community_follow — indienet 의 get_follows/add_follow/remove_follow. 로컬 settings.follows 저장(나중에 kind:3 발행으로 포터블화 가능).
        keywords:
        - 팔로우
        - 언팔로우
        - 구독
        - 저자
    description: '타자: 외부 에이전트 및 사용자와의 소통 — 위임, 메시징, SMS, 이메일, 연락처, 협업'
    # 인프라 노드 — 어떤 노드 선별에서도 항상 허용 (ibl_access가 always_on 플래그를 읽음)
    always_on: true
    tags:
    - 위임
    - 에이전트
    - 메시지
    - 텔레그램
    - 이메일
    - 이웃
    - 비즈니스
    - 협업
    - 소통
