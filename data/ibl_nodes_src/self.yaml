        scope: workspace
      slide_create:
        description: 강의자의 자연어 요청을 받아 슬라이드 한 장을 생성. 시스템 AI 키·모델 빌린 가벼운 AI가 spec(JSON)
          생성 → slide_shadcn 렌더 → deck 등록.
        group: lecture
        target_description: 강의 ID와 자연어 요청 (request). focus_idx 옵션으로 위치 지정.
        keywords:
        - 슬라이드 만들기
        - 슬라이드 생성
        - 다음 슬라이드
        - 첫 슬라이드
        - 표지 슬라이드
        router: handler
        tool: slide_create
        implementation: 시스템 AI 설정 빌린 가벼운 provider 호출(채팅 히스토리 없이 self-contained 프롬프트).
          컨텍스트=강의 메타+재료 색인+데크 개요+누적 메모. 응답 JSON 파싱→[engines:slide_shadcn] 렌더→slides/{sid}.{json,png}
          저장→deck.slides[sid]+slide_order 갱신→memo_signals를 cumulative_memo에 자동 패치.
        target_key: lecture_id
        scope: workspace
      slide_edit:
        description: 특정 슬라이드 재생성(편집). focus 슬라이드의 현재 spec을 AI에 컨텍스트로 줘서 강의자 코멘트만 반영.
