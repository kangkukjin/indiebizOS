  self:
    actions:
      search_photos:
        description: 사진/동영상 검색 (파일명, 카메라 모델 등). 인덱스는 photo_scan 후 생성.
        target_description: 검색어 (파일명·카메라·키워드). filter 옵션 (date/camera/location).
        group: photo
        router: driver
        driver: sqlite
        driver_node: photo
        implementation: SQLite DB에서 사진/동영상 메타데이터 쿼리
        keywords:
        - 사진
        - 동영상
        - 사진검색
        - 미디어
      photo_detail:
        description: 사진·동영상 파일의 상세 메타 조회 (촬영일·카메라·GPS·해상도 등).
        target_description: 미디어 파일 ID 또는 절대 경로.
        group: photo
        router: driver
        driver: sqlite
        driver_node: photo
        implementation: SQLite DB에서 사진/동영상 메타데이터 쿼리
        keywords:
        - 사진
        - 상세
        - 메타데이터
      photo_stats:
        description: 스캔된 폴더의 통계 (사진/동영상 수, 용량, 카메라별)
        group: photo
        target_description: 폴더 경로
        router: handler
        tool: get_stats
        implementation: SQLite DB에서 전체 미디어 통계 집계
        target_key: path
      photo_scan:
        description: 폴더의 사진/동영상 메타데이터 수집 (인덱싱)
        group: photo
        target_description: 스캔할 폴더 경로
        router: handler
        tool: scan_photos
        implementation: PIL(Pillow)로 이미지 EXIF 메타데이터 추출 후 SQLite 인덱싱
        target_key: path
      blog_search:
        description: 블로그 검색 (하이브리드 — 시맨틱 벡터 70% + 키워드 BM25 30%)
        group: blog
        target_description: 검색 키워드 또는 자연어. limit 옵션으로 건수 제한 (기본 10).
        router: handler
        tool: search_blog_rag
        implementation: SQLite + 벡터 임베딩 하이브리드 검색. 제목·미리보기·점수 목록 반환 (로컬 블로그 DB)
        target_key: query
      blog_content:
        description: 블로그 글 전문 조회 (post_id 또는 제목으로)
        group: blog
        target_description: post_id 또는 글 제목 (제목은 부분 일치). 전체 본문·날짜·카테고리 반환.
        router: handler
        tool: get_post_content_rag
        implementation: 블로그 SQLite DB에서 포스트 전문·날짜·카테고리·링크 반환
        target_key: post_id
      blog_stats:
        description: 블로그 통계 — 전체 글 수, 카테고리별·기간별 분포, 활동 트렌드.
        group: blog
        target_description: '(파라미터 없음 — 전체 통계 반환)'
        router: handler
        tool: blog_stats
        implementation: 블로그 SQLite DB에서 통계 집계 쿼리
      blog_get_post:
        description: 블로그 글 ID로 전체 내용 조회 (정확한 ID 조회). 제목 검색은 blog_content.
        target_description: post_id (정확한 식별자, blog_search 결과의 id).
        group: blog
        router: handler
        tool: blog_get_post
        implementation: 블로그 SQLite DB에서 ID로 글 전문 조회
        target_key: post_id
      blog_semantic:
        description: 블로그 의미 검색 (키워드 무관, 의미적 유사성만으로). 하이브리드는 blog_search.
        target_description: 검색 쿼리 (자연어). limit 옵션으로 건수 제한.
        group: blog
        router: handler
        tool: search_blog_semantic
        implementation: 벡터 임베딩 기반 시맨틱 검색 (코사인 유사도)
        target_key: query
        keywords:
        - 블로그
        - 의미검색
        - 시맨틱
      kinsight:
        description: 블로그 인사이트 분석 (기본 15개, count로 개수 지정 가능)
        group: blog
        target_description: '(파라미터 없음 — 기본 15개 인사이트). count 옵션으로 개수 지정.'
        router: handler
        tool: kinsight
        implementation: 블로그 최신 포스트 수집 + AI 모델 호출로 인사이트 HTML 생성
        target_key: query
      recent:
        description: 최근 대화 메시지 조회 (현재 에이전트 기준 시간 역순).
        target_description: '(파라미터 없음). limit 옵션으로 건수 제한 (기본 10).'
        group: memory
        router: driver
        driver: sqlite
        driver_node: memory
        implementation: SQLite conversations.db에서 대화/에이전트 데이터 쿼리
        keywords:
        - 최근대화
        - 대화이력
        - 이전
      agents:
        description: 메모리 DB에 등록된 에이전트 목록 조회 (사용자·AI 구분).
        target_description: '(파라미터 없음 — 전체 에이전트 목록)'
        group: memory
        router: driver
        driver: sqlite
        driver_node: memory
        implementation: SQLite conversations.db에서 대화/에이전트 데이터 쿼리
        keywords:
        - 에이전트
        - 목록
        - 팀
      memory_save:
        description: 에이전트의 심층 메모리에 항목 저장 (장기 기억). 자동 키워드 추출·카테고리 분류.
        group: memory
        target_description: 저장 내용 (content). category/keywords 옵션.
        router: handler
        tool: memory_save
        implementation: SQLite DB에 메모리 항목 저장 (키워드 태깅)
        target_key: content
      memory_read:
        description: 메모리 항목의 전체 내용 조회 (search 결과의 preview는 잘림). ID로 조회.
        group: memory
        target_description: 메모리 항목 ID (memory_search 결과의 id).
        router: handler
        tool: memory_read
        implementation: SQLite DB에서 메모리 항목 조회
        target_key: memory_id
      memory_delete:
        description: 심층 메모리 항목 영구 삭제. ID로 지정. 복구 불가능.
        group: memory
        target_description: 삭제할 메모리 항목 ID (memory_search 결과의 id).
        router: handler
        tool: memory_delete
        implementation: SQLite DB에서 메모리 항목 삭제
        target_key: memory_id
      health_save:
        description: 건강 정보 저장 — 혈액검사 결과, 혈압, 혈당, 체중, 증상, 투약, 의료문서를 DB에 기록
        group: data
        target_description: 저장 타입 (혈압/혈당/체중/증상/투약/문서). data 파라미터로 측정값/내용 전달.
        router: handler
        tool: save_health_info
        implementation: SQLite DB에 건강 데이터 구조화 저장 (혈압/혈당/체중/투약 등)
        target_key: info_type
      health_query:
        description: 건강 기록 조회 — 혈액검사 결과, 혈압, 혈당, 체중, 증상, 약물 이력, 건강 요약, 키워드 검색
        group: data
        target_description: 조회 타입 (summary/search/측정기록/증상/투약/문서 또는 혈압/혈당/체중 카테고리). keyword 옵션.
        router: handler
        tool: get_health_context
        implementation: SQLite DB에서 건강 이력 조회 + AI 요약 생성
        target_key: query_type
      local_save:
        description: 가게 정보·커뮤니티 언급을 지역 DB에 저장 (sense:save와 같은 동작).
        target_description: 저장할 데이터 (JSON). type 옵션으로 store/mention 분류.
        group: system
        router: handler
        tool: local_db_save
        implementation: SQLite DB에 가게/지역 정보 구조화 저장
        keywords:
        - 가게
        - 지역
        - 커뮤니티
        - 저장
      discover:
        description: 키워드로 적합한 IBL 노드·액션 자동 탐색. 어떤 액션 쓸지 모를 때 첫 단계.
        target_description: 검색 키워드 (자연어). 결과 — 후보 액션 + 사용 예시.
        group: system
        target_key: query
        router: system
        func: discover
        implementation: IBL 액션 메타데이터 키워드 매칭으로 관련 액션 탐색
        keywords:
        - 탐색
        - 찾기
        - 도구검색
        - 액션
      time:
        description: 현재 시간 조회 (로컬 시스템 시계, KST). 날짜·요일·시:분:초 반환.
        group: system
        target_description: '(파라미터 없음). format 옵션으로 포맷 지정 가능.'
        router: handler
        tool: get_current_time
        implementation: Python datetime으로 현재 시간 조회 (로컬 시스템 시계)
      list_api:
        description: API 레지스트리에 등록된 외부 도구 목록 조회. call로 실행.
        target_description: '(파라미터 없음 — 전체 도구 목록)'
        group: system
        router: api_engine
        implementation: API 레지스트리에 등록된 외부 API 도구 동적 호출
        keywords:
        - API
        - 도구목록
      call:
        description: API 레지스트리에 등록된 외부 도구 호출. list_api로 후보 확인.
        target_description: 도구 이름. params 옵션으로 인자 전달.
        group: system
        router: api_engine
        implementation: API 레지스트리에 등록된 외부 API 도구 동적 호출
        keywords:
        - API
        - 실행
        - 호출
      manage_events:
        description: 이벤트·스케줄 통합 관리 (생성/조회/삭제). 캘린더 이벤트 인터페이스.
        target_description: action (create/list/delete). 추가 파라미터는 action별로 다름.
        group: schedule
        router: system
        func: manage_events
        implementation: event_engine으로 이벤트/스케줄 CRUD (SQLite 기반)
        keywords:
        - 일정
        - 스케줄관리
        - 예약관리
      show_calendar:
        description: 캘린더를 HTML로 생성하여 브라우저에서 표시
        target_description: '(파라미터 없음 — 현재 월 캘린더). month/year 옵션으로 특정 월 지정.'
        group: schedule
        router: system
        func: show_calendar
        implementation: calendar_manager.open_in_browser() — HTML 캘린더 생성 후 브라우저 자동
          열기
        keywords:
        - 캘린더
        - 달력
        - 일정보기
        - calendar
      list_switches:
        description: 등록된 모든 스위치 목록 조회 (활성/비활성·타입·이름).
        target_description: '(파라미터 없음 — 전체 스위치 목록)'
        group: schedule
        router: system
        func: list_switches
        implementation: switch_manager에서 등록된 스위치 목록 조회 (JSON 설정)
        keywords:
        - 스위치
        - 목록
      run_switch:
        description: 특정 스위치 즉시 실행 (예약 무시). 정상 실행은 트리거로.
        target_description: 실행할 스위치 ID (list_switches로 조회한 id).
        group: schedule
        router: system
        func: run_switch
        implementation: SwitchManager + SwitchRunner로 스위치 실행
        target_key: switch_id
        keywords:
        - 스위치실행
        - 스위치
      schedule:
        description: 스케줄 실행 (지연 실행, 특정 시간, 반복 등)
        target_description: 실행 시점 (delay/at/cron) + action. 한 번 실행 또는 반복 가능.
        group: schedule
        router: system
        func: schedule
        implementation: _execute_schedule — 지연(delay)/특정시간(at)/반복(repeat) 기반 작업 예약
          실행
        keywords:
        - 스케줄
        - 예약
        - 타이머
        - 지연실행
        - 반복
      list_goals:
        description: 현재 활성·대기 중인 목표 프로세스 목록 조회.
        target_description: '(파라미터 없음 — 전체 활성 목표 목록)'
        group: goal
        router: system
        func: list_goals
        implementation: conversation_db에서 활성/대기 중인 목표 프로세스 목록 조회
        keywords:
        - 목표
        - 목표목록
        - goal
        - 진행중
      goal_status:
        description: 특정 목표의 상세 상태 조회 (진행률·라운드 이력·누적 결과).
        target_description: 조회할 목표 ID (list_goals로 확인).
        group: goal
        router: system
        func: get_goal_status
        implementation: conversation_db에서 목표 상태, 라운드 이력, 누적 결과 조회
        keywords:
        - 목표상태
        - 진행상황
        - goal
      goal_kill:
        description: 진행 중인 목표 프로세스 강제 종료. 일시정지 아닌 완전 중단.
        target_description: 종료할 목표 ID.
        group: goal
        router: system
        func: kill_goal
        implementation: 활성 목표를 terminated 상태로 전환하고 스케줄 제거
        keywords:
        - 목표종료
        - 목표취소
        - 중단
        - kill
      log_attempt:
        description: 목표 실행 시도 기록 (전략 전환 및 라운드 메모리)
        target_description: 목표 ID와 시도 정보. strategy/result 파라미터.
        group: goal
        router: system
        func: log_attempt
        implementation: conversation_db에 시도 결과/카테고리/전략 기록, 연속 실패 추적
        keywords:
        - 시도기록
        - 전략
        - 라운드
      get_attempts:
        description: 특정 목표의 과거 실행 시도 이력 조회 (라운드별 전략·결과).
        target_description: 목표 ID. limit 옵션으로 건수 제한.
        group: goal
        router: system
        func: get_attempts
        implementation: conversation_db에서 시도 이력 조회, 실패 카테고리별 요약 포함
        keywords:
        - 시도이력
        - 시도목록
        - 전략이력
      notify_user:
        description: 사용자에게 알림 전송 (프론트엔드 + 텔레그램). 중요 이벤트 통지용.
        target_description: 알림 메시지. priority 옵션 (info/warn/error).
        group: system
        target_key: message
        router: system
        func: send_notification
        implementation: notification_manager를 통해 프론트엔드/텔레그램 알림 전송
        keywords:
        - 알림
        - 통지
        - 메시지
      run:
        description: 저장된 워크플로우 실행 (steps 순서대로). 즉시 실행은 run_pipeline.
        target_description: 실행할 워크플로우 ID. params 옵션으로 변수 전달.
        group: workflow
        target_key: workflow_id
        router: workflow_engine
        implementation: workflow_engine으로 IBL 파이프라인 단계별 실행 (SQLite 상태 관리)
        keywords:
        - 워크플로우
        - 실행
      list_workflows:
        description: 저장된 모든 워크플로우 목록 조회. ID·이름·생성 시점.
        target_description: '(파라미터 없음 — 전체 목록)'
        group: workflow
        router: workflow_engine
        implementation: workflow_engine으로 IBL 파이프라인 단계별 실행 (SQLite 상태 관리)
        keywords:
        - 워크플로우
        - 목록
      get_workflow:
        description: 저장된 워크플로우의 상세 정보 조회 (steps·메타·실행 이력).
        target_description: 조회할 워크플로우 ID.
        group: workflow
        target_key: workflow_id
        router: workflow_engine
        implementation: workflow_engine으로 IBL 파이프라인 단계별 실행 (SQLite 상태 관리)
        keywords:
        - 워크플로우
        - 상세
      save_workflow:
        description: 워크플로우 저장 (재사용 가능한 IBL 파이프라인). 실행은 run.
        target_description: 워크플로우 이름과 steps 배열 (각 step은 IBL 코드).
        group: workflow
        target_key: workflow_id
        router: workflow_engine
        implementation: workflow_engine으로 IBL 파이프라인 단계별 실행 (SQLite 상태 관리)
        keywords:
        - 워크플로우
        - 저장
      delete_workflow:
        description: 저장된 워크플로우 영구 삭제. ID로 지정. 복구 불가능.
        target_description: 삭제할 워크플로우 ID (list_workflows로 확인).
        group: workflow
        target_key: workflow_id
        router: workflow_engine
        implementation: workflow_engine으로 IBL 파이프라인 단계별 실행 (SQLite 상태 관리)
        keywords:
        - 워크플로우
        - 삭제
      run_pipeline:
        description: IBL 파이프라인 즉시 실행 (steps를 params로 직접 전달, 저장 안 됨).
        target_description: steps 배열 (각 step은 IBL 코드). 저장하려면 save_workflow.
        group: workflow
        router: workflow_engine
        implementation: workflow_engine으로 IBL 파이프라인 단계별 실행 (SQLite 상태 관리)
        keywords:
        - 파이프라인
