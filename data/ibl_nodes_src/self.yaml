        target_key: op
        router: handler
        tool: photo_op
        implementation: handler.py가 op로 분기 — scan/list_scans/gallery/stats/timeline/duplicates는 photo_db 함수, search/detail은 photo_db.search_media/get_media_detail.
        keywords:
        - 사진
        - 동영상
        - 미디어
        - 사진 검색
        - 사진 스캔
        - 갤러리
        - 사진 통계
        - 타임라인
        - 중복 사진
        - 사진 상세
      blog_search:
        description: 블로그 검색·조회 통합 (mode 분기). 하이브리드(기본)/시맨틱/전문조회.
        group: blog
        target_description: 'mode: hybrid (기본, 시맨틱 70% + BM25 30%) | semantic (의미만, 키워드 무관) | content (전문 조회). hybrid/semantic — query 필수 + limit 옵션(기본 10). content — post_id 또는 title(부분 일치) 중 하나 필수. 워크플로 — query로 찾고 결과 id로 mode=content 호출.'
        router: handler
        tool: blog_search_op
        implementation: handler.py가 mode로 분기 — hybrid는 search_blog_rag, semantic은 search_blog_semantic, content는 get_post_content_rag.
        target_key: query
        keywords:
        - 블로그 검색
        - 블로그
        - 시맨틱
        - 의미검색
        - 글 전문
        - 글 조회
      blog_stats:
        description: 블로그 통계 — 전체 글 수, 카테고리별·기간별 분포, 활동 트렌드.
        group: blog
        target_description: '(파라미터 없음 — 전체 통계 반환)'
        router: handler
        tool: blog_stats
