          layout 키는 거부 (필요 필드 달라져 spec 깨질 위험). None은 필드 삭제.
        target_key: lecture_id
        scope: workspace
      slide_rerender:
        description: 슬라이드 spec 변경 없이 PNG만 재렌더. design_system 바꾼 뒤 같은 내용을 새 톤으로 다시
