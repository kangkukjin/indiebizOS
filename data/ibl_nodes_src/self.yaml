        - 대화이력
        - 이전
      agents:
        description: 등록된 에이전트 목록 조회 (사용자·AI 구분). conversations.db 기반.
        target_description: '(파라미터 없음 — 전체 에이전트 목록)'
        group: conversation
        router: driver
        driver: sqlite
        driver_node: memory
        implementation: SQLite conversations.db에서 대화/에이전트 데이터 쿼리
        keywords:
        - 에이전트
        - 목록
        - 팀
      memory:
        description: 심층 메모리 관리 (op 분기). save/search/read/delete. 장기 기억 — 최근 대화 로그는 recent/agents 별도.
        group: memory
        target_description: 'op: save | search | read | delete. save — content 필수(+category/keywords 옵션, 둘 다 생략 시 자동 추출·분류). search — query 필수(키워드·자연어, FTS+시맨틱 통합)+ category 필터 옵션. read/delete — memory_id (search 결과의 id). 워크플로 — save로 누적 → search 키워드/자연어 → preview 잘렸으면 read로 전문, 잘못 저장은 delete.'
        target_key: op
        router: handler
        tool: memory_op
        implementation: handler.py가 op로 분기 — save/search/read/delete 옛 함수에 위임.
        keywords:
