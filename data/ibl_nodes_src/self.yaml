        target_key: pattern
      grep:
        description: 파일 내용에서 패턴 검색 (grep/ripgrep). 정규식 지원. 파일명 검색은 find.
        group: file
        target_description: 검색 패턴 (정규식). path 옵션으로 검색 루트, include로 확장자 필터.
        keywords:
        - 검색
        - 내용검색
        - grep
        - 코드검색
        router: handler
        tool: grep_files
        implementation: subprocess로 grep/ripgrep 실행하여 파일 내용 검색
        target_key: pattern
      edit:
        description: 파일 부분 편집 (old_string → new_string 교체). 전체 덮어쓰기는 write.
        group: file
        target_description: 편집할 파일 경로. old_string/new_string 파라미터로 교체할 텍스트 지정.
        router: handler
        tool: edit_file
        implementation: Python 문자열 치환으로 파일 부분 편집
        target_key: path
      copy:
        description: 파일 또는 폴더를 다른 위치로 복사 (원본 유지). 폴더는 재귀 복사.
        group: file
        target_description: source(원본 경로)와 dest(복사 위치) 두 파라미터.
        router: handler
        tool: copy_path
        implementation: shutil.copy/copytree로 파일/폴더 복사
        target_key: source
      move:
        description: 파일 또는 폴더 이동·이름 변경. 같은 폴더면 이름 변경, 다른 폴더면 이동.
        group: file
        target_description: source(원본)와 dest(이동/새 이름) 두 파라미터.
        router: handler
        tool: move_path
        implementation: shutil.move로 파일/폴더 이동/이름변경
        target_key: source
      delete:
        description: 파일 또는 폴더 영구 삭제. 휴지통 거치지 않음 — 신중히 사용.
        group: file
        target_description: 삭제할 파일 또는 폴더 경로. 폴더는 재귀 삭제 (rmtree).
        router: handler
        tool: delete_path
        implementation: os.remove/shutil.rmtree로 파일/폴더 삭제
        target_key: path
      storage_scan:
        description: 디스크·볼륨 전체 스캔 후 SQLite 인덱스 구축. fs_query의 전제 단계.
        group: file
        target_description: 스캔할 디렉토리 경로 (생략 시 홈 폴더).
        router: handler
        tool: scan_storage
        implementation: os.walk으로 디렉토리 재귀 탐색 후 SQLite 인덱싱
        target_key: path
      fs_query:
        description: 파일 메타 검색 (이름·확장자·크기, SQLite 인덱스). 내용 검색은 grep, 패턴은 find.
        group: file
        target_description: 검색 조건 (name/ext/size). path로 검색 루트 지정.
        router: handler
        tool: query_storage
        implementation: SQLite DB에서 파일명/확장자/크기 기반 검색
        target_key: search_term
      volumes:
        description: 현재 마운트된 디스크 볼륨 목록 (이름·경로·용량). storage_scan 전 확인용.
        group: file
        target_description: '(파라미터 없음)'
        router: handler
        tool: list_volumes
        implementation: psutil/diskutil로 마운트된 볼륨 목록 조회
      blog_posts:
        description: 블로그 글 목록 조회. category·기간으로 필터링.
        group: blog
        target_description: '(파라미터 없음 — 전체 목록). category/limit 옵션 가능.'
        router: handler
        tool: blog_get_posts
        implementation: 블로그 SQLite DB에서 카테고리별 글 목록 조회
        target_key: category
      blog_check_new:
        description: 마지막 조회 이후 새로 추가된 블로그 글 확인. 정기 모니터링용.
        group: blog
        target_description: '(파라미터 없음 — 신규 글 목록 반환). since 옵션으로 기준 시점 지정.'
        router: handler
        tool: blog_check_new_posts
        implementation: 블로그 DB와 소스 디렉토리 비교로 새 글 감지
      blog_rebuild_index:
        description: 블로그 검색 인덱스 재구축 (벡터 임베딩 재생성). 글 다량 추가 후 실행.
        group: blog
        target_description: '(파라미터 없음 — 전체 재인덱싱). force 옵션으로 강제 재생성.'
        router: handler
        tool: rebuild_search_index
        implementation: 블로그 전체 포스트 재인덱싱 (벡터 임베딩 재생성)
      cctv_refresh:
        description: CCTV 목록 캐시 갱신. UTIC API에서 전국 16,000+대 최신 CCTV 데이터를 가져와 로컬 캐시
          업데이트.
        group: cctv
        target_description: '(파라미터 없음 — 전국 CCTV 데이터 일괄 갱신). force 옵션으로 강제 재수집.'
        router: handler
        tool: cctv_refresh
        implementation: UTIC 실시간 API 호출 → 로컬 캐시 파일 갱신 (유지보수용)
      cctv_stats:
        description: CCTV 데이터 현황 통계 (전체 수, 센터별 분포, 데이터 소스 상태).
        group: cctv
        target_description: '(파라미터 없음)'
        router: handler
        tool: cctv_stats
        implementation: 로컬 캐시 기반 CCTV 통계 집계 (전체 수, 센터별 분포)
      storage_summary:
        description: 디스크·볼륨 저장소 사용량 요약. 전체 + 디렉토리별 통계.
        group: file
        target_description: '(파라미터 없음 — 전체 요약). path 옵션으로 특정 폴더만.'
        router: handler
        tool: get_storage_summary
        implementation: SQLite DB에서 저장소 사용량 집계
      folder_annotate:
        description: 특정 폴더에 메모·주석 추가. 폴더 의미를 기록해두는 용도.
        group: file
        target_description: 대상 폴더 경로. text 옵션으로 주석 내용.
        router: handler
        tool: annotate_folder
        implementation: SQLite DB에 폴더 메모/주석 저장
        target_key: folder_path
      folder_annotations:
        description: 폴더에 저장된 주석 조회. annotate로 추가한 메모 확인.
        group: file
        target_description: 대상 폴더 경로 (생략 시 전체 주석 목록).
        router: handler
        tool: get_folder_annotations
        implementation: SQLite DB에서 폴더 주석 조회
      lecture:
        description: 강의 워크스페이스 관리 (op 분기). 생성/조회/로드/삭제/창 열기.
        group: lecture
        target_description: 'op: list | create | load | delete | open. create는 title 필수(+audience/thesis/duration_minutes/design_system 옵션). load/delete/open은 lecture_id 필수(open은 미지정시 목록 화면). delete는 confirm=true 추가. list는 파라미터 없음.'
        target_key: op
        router: handler
        tool: lecture_op
        implementation: handler.py가 op로 분기 — list/create/load/delete/open 내부 함수 호출.
        keywords:
        - 강의 만들기
        - 강의 생성
        - 강의 목록
        - 강의 삭제
        - 강의 열기
        - 강의 워크스페이스
        scope: workspace
      slide:
        description: 슬라이드 한 장 관리 (op 분기). 생성/편집/삭제/필드 패치/재렌더.
        group: lecture
        target_description: 'op: create | edit | delete | patch | rerender. 공통 lecture_id 필수. create는 instruction(+insert_at 옵션), edit는 slide_id+instruction, delete는 slide_id, patch는 slide_id+patch(객체), rerender는 slide_id. create/edit만 AI 호출.'
        target_key: op
        router: handler
        tool: slide_op
        implementation: handler.py가 op로 분기. create/edit는 AI 호출, delete/patch/rerender는 AI 우회 (PowerPoint식 직접 편집).
        keywords:
        - 슬라이드 만들기
        - 슬라이드 편집
        - 슬라이드 재렌더
        - 슬라이드 삭제
        - 슬라이드 일부 수정
        - 다음 슬라이드
        scope: workspace
      material:
        description: 강의 재료 관리 (op 분기). 추가/삭제.
        group: lecture
        target_description: 'op: add | remove. 공통 lecture_id 필수. add는 file_path(파일 복사) 또는 text+filename(텍스트 저장), remove는 filename.'
        target_key: op
        router: handler
        tool: material_op
        implementation: handler.py가 op로 분기. add는 file_path 모드/text 모드 자동 감지.
        keywords:
        - 재료 추가
        - 재료 삭제
        - 원고 추가
        - 자료 추가
        scope: workspace
      deck:
        description: 강의 데크 조작 (op 분기). 슬라이드 순서 변경 / 파일 내보내기.
        group: lecture
        target_description: 'op: reorder | export. 공통 lecture_id 필수. reorder는 order(slide_id 배열), export는 format(pdf|pptx).'
        target_key: op
        router: handler
        tool: deck_op
        implementation: handler.py가 op로 분기. reorder는 deck.json만 갱신, export는 PIL/python-pptx로 합본.
        keywords:
        - 슬라이드 순서 변경
        - 강의 내보내기
        - PDF 내보내기
        - PPTX 내보내기
        scope: workspace
    description: '내부: 개인 정보 및 시스템 관리 — 파일, 메모리, 건강, 사진, 설정, 워크플로우, 이벤트, 시스템 유틸리티'
    tags:
