  self:
    actions:
      photo:
        runs_on: mac_only
        description: 사진·동영상 라이브러리 관리 (op 분기). 스캔(인덱싱)/조회/검색/통계/타임라인/중복/상세 통합. scan이 모든 조회의 전제.
        target_description: 'scan/gallery/stats/timeline/duplicates는 path(폴더 경로) 필요(생략 시 가장 큰 스캔 자동). search는 query + 옵션(media_type, start_date, end_date, limit). detail은 media_id. list_scans는 파라미터 없음. timeline에 year 옵션.'
        group: photo
        target_key: op
        router: handler
        tool: photo_op
        ops:
          values:
            scan: 폴더 인덱싱 (path 필수, 모든 조회의 전제)
            list_scans: 인덱싱된 스캔 목록 조회
            gallery: 갤러리 보기 (path)
            search: 키워드/필터 검색 (query + media_type/날짜/limit)
            detail: 단일 미디어 상세 (media_id)
            stats: 통계 (path)
            timeline: 시간순 보기 (path + year 옵션)
            duplicates: 중복 미디어 검출 (path)
        implementation: handler.py가 op로 분기 — scan/list_scans/gallery/stats/timeline/duplicates는 photo_db 함수, search/detail은 photo_db.search_media/get_media_detail.
        keywords:
        - 사진
        - 동영상
        - 미디어
        - 사진 검색
        - 사진 스캔
        - 갤러리
        - 사진 통계
        - 타임라인
        - 중복 사진
        - 사진 상세
      blog:
        runs_on: mac_only
        description: 내 블로그 조회·검색·관리 (op 분기). RAG 검색 + 글 목록·통계·인덱스.
        target_description: |
          op로 분기 (기본 posts).
          - posts: 글 목록. category/count 옵션.
          - search: RAG 검색. query(필수) + mode(hybrid 기본/semantic/content) + limit. content는 post_id 또는 title.
          - check_new: 마지막 조회 이후 새로 추가된 글 확인.
          - rebuild_index: 검색 인덱스(벡터 임베딩) 재구축. 글 다량 추가 후.
          - stats: 전체 글 수·카테고리/기간 분포·활동 트렌드.
        target_key: op
        group: blog
        router: handler
        tool: blog_op
        ops:
          default: posts
          values:
            posts: 글 목록 조회 (category/기간 필터)
            search: RAG 검색 (mode hybrid/semantic/content)
            check_new: 마지막 조회 이후 새 글 확인
            rebuild_index: 검색 인덱스(벡터) 재구축
            stats: 블로그 통계 (글 수·분포·트렌드)
        implementation: blog 패키지 op 분기. posts=blog_get_posts, search=blog_search_op(mode), check_new=blog_check_new_posts, rebuild_index=rebuild_search_index, stats=blog_stats.
        keywords:
        - 블로그
        - 블로그 검색
        - 시맨틱
        - 블로그 통계
        - 인덱스
      recent_chats:
        description: 최근 대화 메시지 조회 (현재 에이전트 기준 시간 역순). conversations.db 기반 — 심층 메모리(memory 액션)와 별개.
        target_description: '(파라미터 없음). limit 옵션으로 건수 제한 (기본 10).'
        group: conversation
        router: driver
        driver: sqlite
        driver_node: memory
        implementation: SQLite conversations.db에서 대화/에이전트 데이터 쿼리
        keywords:
        - 최근대화
        - 대화이력
        - 이전
      agents:
        description: 등록된 에이전트 목록 조회 (사용자·AI 구분). conversations.db 기반.
        target_description: '(파라미터 없음 — 전체 에이전트 목록)'
        group: conversation
        router: driver
        driver: sqlite
        driver_node: memory
        implementation: SQLite conversations.db에서 대화/에이전트 데이터 쿼리
        keywords:
        - 에이전트
        - 목록
        - 팀
      memory:
        description: 심층 메모리 관리 (op 분기). save/search/read/delete. 장기 기억 — 최근 대화 로그는 recent/agents 별도. 자아별 사적 기억(폰·맥 각자 로컬, 동기화 안 함). 폰선 시맨틱 모델 없어 키워드(LIKE/FTS) 검색.
        group: memory
        target_description: 'save — content 필수(+category/keywords 옵션, 둘 다 생략 시 자동 추출·분류). search — query 필수(키워드·자연어, FTS+시맨틱 통합) + category 필터 옵션. read/delete — memory_id (search 결과의 id). 워크플로 — save 누적 → search → preview 잘렸으면 read로 전문, 잘못 저장은 delete.'
        target_key: op
        router: handler
        tool: memory_op
        ops:
          values:
            save: 메모리 저장 (content 필수, category/keywords 자동 추출)
            search: 키워드·자연어 검색 (FTS+시맨틱 통합)
            read: 전문 조회 (memory_id)
            delete: 삭제 (memory_id)
        implementation: handler.py가 op로 분기 — save/search/read/delete 옛 함수에 위임.
        keywords:
        - 메모리
        - 기억
        - 장기기억
        - 메모리 저장
        - 메모리 검색
        - 메모리 삭제
        - 메모리 읽기
      health:
        description: 건강 기록 관리 (op 분기). save/query 통합 — 혈압·혈당·체중·증상·투약·검사·문서 모두 한 액션.
        group: health
        target_description: 'save — info_type(혈압/혈당/체중/증상/투약/문서 등) + data(측정값/내용). query — query_type(summary/search/측정기록/증상/투약/문서 또는 혈압/혈당/체중) + keyword 옵션.'
        target_key: op
        router: handler
        tool: health_op
        ops:
          values:
            save: 건강 정보 저장 (info_type + data)
            query: 조회 (query_type + keyword 옵션)
        implementation: handler.py가 op로 분기 — save는 save_health_info, query는 get_health_context.
        keywords:
        - 건강
        - 건강 저장
        - 건강 조회
        - 혈압
        - 혈당
        - 체중
        - 투약
      local_save:
        description: 가게 정보·커뮤니티 언급을 지역 DB에 저장 (sense:save와 같은 동작).
        target_description: 저장할 데이터 (JSON). type 옵션으로 store/mention 분류.
        group: system
        router: handler
        tool: local_db_save
        implementation: SQLite DB에 가게/지역 정보 구조화 저장
        keywords:
        - 가게
        - 지역
        - 커뮤니티
        - 저장
      discover:
        description: 키워드로 적합한 IBL 노드·액션 자동 탐색. 어떤 액션 쓸지 모를 때 첫 단계.
        target_description: 검색 키워드 (자연어). 결과 — 후보 액션 + 사용 예시.
        group: system
        target_key: query
        router: system
        func: discover
        implementation: IBL 액션 메타데이터 키워드 매칭으로 관련 액션 탐색
        keywords:
        - 탐색
        - 찾기
        - 도구검색
        - 액션
      time:
        description: 현재 시간 조회 (로컬 시스템 시계, KST). 날짜·요일·시:분:초 반환.
        group: system
        target_description: '(파라미터 없음). format 옵션으로 포맷 지정 가능.'
        router: handler
        tool: get_current_time
        implementation: Python datetime으로 현재 시간 조회 (로컬 시스템 시계)
      manage_events:
        description: 이벤트·스케줄 통합 관리 (생성/조회/삭제). 캘린더 이벤트 인터페이스.
        target_description: action (create/list/delete). 추가 파라미터는 action별로 다름.
        group: schedule
        router: system
        func: manage_events
        runs_on: mac_only   # event_engine→api_system_ai 무거운 의존(폰 미번들). 폰은 맥 라우팅으로 접근.
        implementation: event_engine으로 이벤트/스케줄 CRUD (SQLite 기반)
        keywords:
        - 일정
        - 스케줄관리
        - 예약관리
        app:
          instrument: calendar
          icon: 📅
          name: 일정
          order: 13
          auto_run: true
          action: '[self:manage_events]{action: "list"}'
          view:
          - type: calendar
            from: events
            delete_action: '[self:manage_events]{action: "delete", event_id: "{id}"}'
            add:
              action: '[self:manage_events]{action: "create", title: "$title", date: "$date"}'
      show_calendar:
        description: 캘린더를 HTML로 생성하여 브라우저에서 표시
        target_description: '(파라미터 없음 — 현재 월 캘린더). month/year 옵션으로 특정 월 지정.'
        group: schedule
        router: system
        func: show_calendar
        runs_on: mac_only   # calendar_manager.open_in_browser()=데스크탑 브라우저 — 폰 부적합. 폰은 manage_events 계기로 일정 조회.
        implementation: calendar_manager.open_in_browser() — HTML 캘린더 생성 후 브라우저 자동
          열기
        keywords:
        - 캘린더
        - 달력
        - 일정보기
        - calendar
      switch:
        description: 스위치 관리 (op 분기). 목록 조회 / 즉시 실행.
        target_description: 'list는 파라미터 없음. run은 switch_id 필요.'
        group: schedule
        target_key: op
        router: system
        func: switch_op
        ops:
          values:
            list: 등록된 스위치 목록
            run: 스위치 즉시 실행 (switch_id 필수)
        implementation: _route_system이 op로 분기 — list는 _execute_list_switches, run은 SwitchRunner.run_switch.
        keywords:
        - 스위치
        - 스위치 목록
        - 스위치 실행
      schedule:
        description: 스케줄 실행 (지연 실행, 특정 시간, 반복 등)
        target_description: 실행 시점 (delay/at/cron) + action. 한 번 실행 또는 반복 가능.
        group: schedule
        router: system
        func: schedule
        implementation: _execute_schedule — 지연(delay)/특정시간(at)/반복(repeat) 기반 작업 예약
          실행
        keywords:
        - 스케줄
        - 예약
        - 타이머
        - 지연실행
        - 반복
      goal:
        description: 목표 프로세스 관리 (op 분기). list/status/kill/log/attempts. 의식 에이전트가 평가 루프 라운드를 누적·종료하는 메타 인지 도구.
        target_description: 'list — 활성/대기 중 전체. status — goal_id 필수, 진행률·라운드 이력·누적 결과. kill — goal_id 필수, terminated 전환 + 스케줄 제거. log — task_id + approach_category + description 필수(result/lesson 옵션), 시도 1건 기록. attempts — task_id 필수 + limit 옵션, 과거 시도 이력 + 실패 카테고리 요약.'
        group: goal
        target_key: op
        router: system
        func: goal_op
        ops:
          values:
            list: 활성/대기 중 목표 전체
            status: 진행률·라운드 이력·누적 결과 (goal_id 필수)
            kill: 목표 종료 + 스케줄 제거 (goal_id 필수)
            log: 시도 1건 기록 (task_id + approach_category + description, 연속 실패 추적)
            attempts: 과거 시도 이력 + 실패 카테고리 요약 (task_id + limit)
        implementation: _route_system이 op로 분기 — list_goals/get_goal_status/kill_goal/log_attempt/get_attempts에 위임.
        keywords:
        - 목표
        - 목표 목록
        - 목표 상태
        - 목표 종료
        - 시도 기록
        - 시도 이력
        - 진행상황
      notify_user:
        description: 사용자에게 알림 전송 (프론트엔드 + 텔레그램). 중요 이벤트 통지용.
        target_description: 알림 메시지. priority 옵션 (info/warn/error).
        group: system
        target_key: message
        router: system
        func: send_notification
        implementation: notification_manager를 통해 프론트엔드/텔레그램 알림 전송
        keywords:
        - 알림
        - 통지
        - 메시지
      workflow:
        description: 저장된 워크플로우 CRUD + 실행 (op 분기). list/get/save/delete/run. 즉시 실행은 run_pipeline 별도.
        target_description: 'get/delete/run — workflow_id 필수. save — name + steps(IBL 코드 배열) 필수. run — params 옵션으로 워크플로 변수 전달.'
        group: workflow
        target_key: op
        router: workflow_engine
        ops:
          values:
            list: 저장된 워크플로우 목록
            get: 워크플로우 조회 (workflow_id)
            save: 워크플로우 저장 (name + steps IBL 코드 배열)
            delete: 워크플로우 삭제 (workflow_id)
            run: 저장된 워크플로우 실행 (workflow_id + params 옵션)
        implementation: workflow_engine.execute_workflow_action 입구에서 op→action 재매핑 후 기존 분기 활용.
        keywords:
        - 워크플로우
        - 워크플로우 저장
        - 워크플로우 목록
        - 워크플로우 실행
        - 워크플로우 삭제
        - 파이프라인 저장
      run_pipeline:
        description: IBL 파이프라인 즉시 실행 (steps를 params로 직접 전달, 저장 안 됨).
        target_description: steps 배열 (각 step은 IBL 코드). 저장하려면 save_workflow.
        group: workflow
        router: workflow_engine
        implementation: workflow_engine으로 IBL 파이프라인 단계별 실행 (SQLite 상태 관리)
        keywords:
        - 파이프라인
        - 실행
        - 단계
      trigger:
        description: 트리거 관리 (op 분기). schedule/channel/webhook/file 타입 통합 — 등록/조회/수정/삭제/활성화/이력.
        target_description: 'create는 name + pipeline(실행할 IBL) 필수, schedule이면 cron("0 9 * * *" 등 표준 cron, 내부에서 일정으로 해소) 또는 config. get/update/delete/enable/disable/history는 id 필요. list/status는 파라미터 없음.'
        group: schedule
        target_key: op
        router: trigger_engine
        ops:
          values:
            list: 등록된 트리거 목록
            get: 단일 트리거 조회 (id)
            create: 트리거 등록 (name + pipeline + schedule이면 cron|config)
            update: 트리거 수정 (id + 변경 필드, cron 가능)
            delete: 트리거 삭제 (trigger_id)
            enable: 트리거 활성화 (trigger_id)
            disable: 트리거 비활성화 (trigger_id)
            status: 전체 트리거 상태 요약
            history: 트리거 실행 이력 (trigger_id)
        implementation: trigger_engine.execute_trigger 입구에서 op→action 재매핑 후 기존 분기(list/get/create/update/delete/enable/disable/status/history) 그대로 사용.
        keywords:
        - 트리거
        - 트리거 등록
        - 트리거 목록
        - 트리거 삭제
        - 트리거 이력
        - 트리거 상태
        - 자동 실행
      output:
        description: 결과를 지정한 목적지로 내보냄 (op 분기). gui=UI 표시, file=파일 저장, clipboard=클립보드 복사. 파일 *조작*은 write/read 별도.
        target_description: 'gui — content(HTML/데이터) + format(카드/테이블/HTML). file — path(확장자로 형식 자동) + content. clipboard — content(텍스트).'
        group: output
        target_key: op
        router: system
        func: output_op
        ops:
          default: gui
          values:
            gui: UI에 HTML/카드/테이블로 표시 (WebSocket)
            file: 파일로 저장 (확장자로 형식 자동 인식)
            clipboard: OS 클립보드에 복사
        implementation: ibl_routing._route_system이 op로 분기 — output_gui/output_file/output_clipboard에 위임.
        keywords:
        - 출력
        - 표시
        - 파일저장
        - 클립보드
        - 복사
        - UI
      download:
        description: URL에서 파일 다운로드해 로컬 저장. HTML 페이지 텍스트 추출은 sense:crawl.
        target_description: 다운로드 URL. output 옵션으로 저장 경로 지정.
        group: output
        target_key: url
        router: system
        func: output_download
        implementation: requests + 파일 I/O로 URL에서 파일 다운로드
        keywords:
        - 다운로드
        - 파일받기
      read:
        description: 파일 읽기 — 텍스트/PDF/DOCX/XLSX 통합. 확장자로 자동 인식(format 명시도 가능).
        group: file
        target_description: 읽을 파일 경로. format 옵션 (text/pdf/docx/xlsx) — 생략 시 확장자 자동. text — offset/limit (라인). pdf — pages 옵션 (예 '1-5'). docx — offset/limit/max_blocks (블록 단위). xlsx — sheet(특정 시트명)/max_rows 옵션, 시트를 TSV 텍스트로. 스캔 PDF는 별도 OCR 필요.
        router: handler
        tool: read_op
        implementation: handler.py가 format 또는 확장자로 분기 — read_file/read_pdf/read_docx에 위임.
        target_key: path
      write:
        description: 텍스트 파일 새로 쓰기·덮어쓰기. write→run 패턴의 한 축, append 아님.
        group: file
        target_description: 쓸 파일 경로 (절대 또는 상대). 기존 파일은 묻지 않고 덮어쓴다.
        router: handler
        tool: write_file
        implementation: Python 파일 I/O로 로컬 파일 쓰기
        target_key: path
      list:
        description: 디렉토리 안의 파일·하위 폴더 목록 조회 (ls 동등).
        group: file
        target_description: 조회할 디렉토리 경로. recursive 옵션으로 하위 포함 가능.
        router: handler
        tool: list_directory
        implementation: os.listdir/pathlib로 디렉토리 내용 조회
        target_key: path
      file_find:
        description: 파일 검색 (glob 패턴). 프로젝트 안뿐 아니라 컴퓨터 어디든 검색 가능. path 파라미터로 검색 루트
          지정 (절대경로, ~/, 상대경로 모두 지원). 미지정 시 프로젝트 디렉토리. 패턴에 **나 /가 없으면 자동 재귀
        group: file
        target_description: 검색 패턴 (glob, 예 '*.md', '**/*.tsx'). path 옵션으로 검색 루트 지정.
        keywords:
        - 파일
        - 찾기
        - 검색
        - find
        - search
        - 파일찾기
        router: handler
        tool: glob_files
        implementation: pathlib.glob 패턴 검색. path 파라미터로 검색 루트 지정 (절대경로/~/상대경로). max_results로
          결과 상한 (기본 200). 매칭 없으면 path 옵션 안내
        target_key: pattern
      grep:
        description: 파일 내용에서 패턴 검색 (grep/ripgrep). 정규식 지원. 파일명 검색은 find.
        group: file
        target_description: 검색 패턴 (정규식). path 옵션으로 검색 루트, include로 확장자 필터.
        keywords:
        - 검색
        - 내용검색
        - grep
        - 코드검색
        router: handler
        tool: grep_files
        implementation: subprocess로 grep/ripgrep 실행하여 파일 내용 검색
        target_key: pattern
      edit:
        description: 파일 부분 편집 (old_string → new_string 교체). 전체 덮어쓰기는 write.
        group: file
        target_description: 편집할 파일 경로. old_string/new_string 파라미터로 교체할 텍스트 지정.
        router: handler
        tool: edit_file
        implementation: Python 문자열 치환으로 파일 부분 편집
        target_key: path
      copy:
        description: 파일 또는 폴더를 다른 위치로 복사 (원본 유지). 폴더는 재귀 복사.
        group: file
        target_description: src(원본 경로)와 dest(복사 위치) 두 파라미터. (source/destination 별칭도 허용)
        router: handler
        tool: copy_path
        implementation: shutil.copy/copytree로 파일/폴더 복사
        target_key: source
      move:
        description: 파일 또는 폴더 이동·이름 변경. 같은 폴더면 이름 변경, 다른 폴더면 이동.
        group: file
        target_description: src(원본)와 dest(이동/새 이름) 두 파라미터. (source/destination 별칭도 허용)
        router: handler
        tool: move_path
        implementation: shutil.move로 파일/폴더 이동/이름변경
        target_key: source
      delete:
        description: 파일 또는 폴더 영구 삭제. 휴지통 거치지 않음 — 신중히 사용.
        group: file
        target_description: 삭제할 파일 또는 폴더 경로. 폴더는 재귀 삭제 (rmtree).
        router: handler
        tool: delete_path
        implementation: os.remove/shutil.rmtree로 파일/폴더 삭제
        target_key: path
      storage:
        description: 저장소 인덱스 조작 (op 분기). scan(디스크 스캔→SQLite 인덱스)/summary(사용량 요약)/volumes(스캔된
          볼륨 목록). 파일 검색은 fs_query.
        group: file
        target_description: 'scan — path 필수(+volume_name 옵션). summary — volume_name/root_path
          생략 시 전체 볼륨 통합 요약. volumes — 파라미터 없음.'
        target_key: op
        router: handler
        tool: storage_op
        ops:
          default: volumes
          values:
            scan: 디스크·볼륨 스캔 후 SQLite 인덱스 구축 (path 필수, fs_query 전제)
            summary: 저장소 사용량 요약 (볼륨 생략 시 전체 통합)
            volumes: 스캔된 볼륨 목록 (이름·경로·용량, 파라미터 없음, 기본)
        implementation: scan_storage/get_storage_summary/list_volumes op 분기 (pc-manager)
      fs_query:
        description: 파일 메타 검색 (이름·확장자·크기, SQLite 인덱스). 내용 검색은 grep, 패턴은 find.
        group: file
        target_description: 검색 조건 (name/ext/size). path로 검색 루트 지정, 생략 시 전체 볼륨 검색.
        router: handler
        tool: query_storage
        implementation: SQLite DB에서 파일명/확장자/크기 기반 검색
        target_key: search_term
      cctv:
        description: 'CCTV 데이터 캐시 행정 (op 분기). stats(기본): 소스별 현황 / refresh: UTIC 캐시 갱신.'
        group: cctv
        target_description: '파라미터 없음. op 분기 — stats(기본): 카카오·UTIC·ITS·Windy 전체 소스 CCTV 현황·총수 / refresh: UTIC 실시간 API로 전국 캐시 일괄 갱신(유지보수).'
        target_key: op
        router: handler
        tool: cctv_admin
        ops:
          default: stats
          values:
            stats: 전체 소스 CCTV 현황 통계
            refresh: UTIC 캐시 갱신 (유지보수)
        implementation: handler.py _cctv_admin이 op 분기 — stats=cctv_sources(전체 소스 집계), refresh=utic.refresh_cache.
        keywords:
        - CCTV
        - CCTV 현황
        - CCTV 통계
        - CCTV 갱신
      folder_note:
        description: 폴더 주석 관리 (op 분기). set(메모·주석 추가)/get(저장된 주석 조회). 폴더 의미를 기록·확인.
        group: file
        target_description: 'set — root_path(스캔된 볼륨 경로) + folder_path + note 필수. get —
          root_path/volume_name 생략 시 전체 볼륨 주석 통합 조회.'
        target_key: op
        router: handler
        tool: folder_note_op
        ops:
          default: get
          values:
            set: 폴더에 메모·주석 추가 (root_path + folder_path + note)
            get: 저장된 폴더 주석 조회 (볼륨 생략 시 전체 통합, 기본)
        implementation: annotate_folder/get_folder_annotations op 분기 (pc-manager)
      lecture:
        runs_on: mac_only
        description: 강의 워크스페이스 관리 (op 분기). 생성/조회/로드/삭제/창 열기.
        group: lecture
        target_description: 'create는 title 필수(+audience/thesis/duration_minutes/design_system 옵션). load/delete/open은 lecture_id 필수(open은 미지정시 목록 화면). delete는 confirm=true 추가.'
        target_key: op
        router: handler
        tool: lecture_op
        ops:
          values:
            list: 강의 목록 조회
            create: 새 강의 생성 (title 필수)
            load: 기존 강의 로드 (lecture_id)
            delete: 강의 삭제 (lecture_id + confirm=true)
            open: 강의 창 열기 (lecture_id, 미지정시 목록)
        implementation: handler.py가 op로 분기 — list/create/load/delete/open 내부 함수 호출.
        keywords:
        - 강의 만들기
        - 강의 생성
        - 강의 목록
        - 강의 삭제
        - 강의 열기
        - 강의 워크스페이스
        scope: workspace
      slide:
        runs_on: mac_only
        description: 슬라이드 한 장 관리 (op 분기). 생성/편집/삭제/필드 패치/재렌더.
        group: lecture
        target_description: '공통 lecture_id 필수. create는 instruction(+insert_at 옵션), edit는 slide_id+instruction, delete/rerender는 slide_id, patch는 slide_id+patch(객체). create/edit만 AI 호출.'
        target_key: op
        router: handler
        tool: slide_op
        ops:
          values:
            create: 슬라이드 생성 (instruction, AI 호출)
            edit: 슬라이드 편집 (slide_id+instruction, AI 호출)
            delete: 슬라이드 삭제 (slide_id)
            patch: 필드 직접 수정 (slide_id+patch, AI 우회)
            rerender: 재렌더링 (slide_id, AI 우회)
        implementation: handler.py가 op로 분기. create/edit는 AI 호출, delete/patch/rerender는 AI 우회 (PowerPoint식 직접 편집).
        keywords:
        - 슬라이드 만들기
        - 슬라이드 편집
        - 슬라이드 재렌더
        - 슬라이드 삭제
        - 슬라이드 일부 수정
        - 다음 슬라이드
        scope: workspace
      material:
        runs_on: mac_only
        description: 강의 재료 관리 (op 분기). 추가/삭제.
        group: lecture
        target_description: '공통 lecture_id 필수. add는 file_path(파일 복사) 또는 text+filename(텍스트 저장), remove는 filename.'
        target_key: op
        router: handler
        tool: material_op
        ops:
          values:
            add: 재료 추가 (file_path 또는 text+filename)
            remove: 재료 삭제 (filename)
        implementation: handler.py가 op로 분기. add는 file_path 모드/text 모드 자동 감지.
        keywords:
        - 재료 추가
        - 재료 삭제
        - 원고 추가
        - 자료 추가
        scope: workspace
      deck:
        runs_on: mac_only
        description: 강의 데크 조작 (op 분기). 슬라이드 순서 변경 / 파일 내보내기.
        group: lecture
        target_description: '공통 lecture_id 필수. reorder는 order(slide_id 배열), export는 format(pdf|pptx).'
        target_key: op
        router: handler
        tool: deck_op
        ops:
          values:
            reorder: 슬라이드 순서 변경 (order=slide_id 배열, deck.json만 갱신)
            export: 파일 내보내기 (format=pdf|pptx, PIL/python-pptx 합본)
        implementation: handler.py가 op로 분기. reorder는 deck.json만 갱신, export는 PIL/python-pptx로 합본.
        keywords:
        - 슬라이드 순서 변경
        - 강의 내보내기
        - PDF 내보내기
        - PPTX 내보내기
        scope: workspace
      business:
        description: 나의 비즈니스(사업) CRUD — op:list(기본)/detail/save/delete.
        group: business
        target_description: 'op:list(level 0-4·search 필터) / detail(id 필수, +소속 아이템) / save(id 없으면 생성·name 필수, 있으면 수정 — name/level(0-4 공개수준)/description) / delete(id 필수, 아이템도 함께).'
        target_key: op
        router: handler
        tool: business_op
        ops:
          default: list
          values:
            list: 비즈니스 목록 (level/search 필터)
            detail: 비즈니스 상세 + 소속 아이템 (id 필수)
            save: 생성(id 없음·name 필수)/수정(id 있음)
            delete: 비즈니스 삭제 (id 필수)
        implementation: business 패키지 business_op — business_manager.get_businesses/get_business/create_business/update_business/delete_business.
        keywords:
        - 비즈니스
        - 사업
        - 비즈니스 목록
        - 비즈니스 추가
        - 사업 등록
        app:
          instrument: business
          icon: 🏢
          name: 비즈니스
          order: 11
          modes:
          - name: 비즈니스
            auto_run: true
            inputs:
            - {key: q, type: text, placeholder: 이름 검색 · ＋추가}
            filter:
              key: level
              items:
              - {label: 전체, value: '', default: true}
              - {label: L0, value: 0}
              - {label: L1, value: 1}
              - {label: L2, value: 2}
              - {label: L3, value: 3}
              - {label: L4, value: 4}
              - {label: 폐쇄, value: -1}
            buttons:
            - {label: ＋ 비즈니스 추가, action: '[self:business]{op: "save", name: "$q"}', refresh: true}
            action: '[self:business]{op: "list", level: "$level", search: "$q"}'
            view:
            - type: card_list
              from: businesses
              master_detail: true
              item_click:
                action: '[self:business]{op: "detail", id: "{id}"}'
                tabs:
                - name: 정보
                  view:
                  - type: form
                    title: 비즈니스 정보
                    fields:
                    - {key: name, label: 이름, type: text, value: '{business.name}'}
                    - key: level
                      label: 공개 수준
                      type: select
                      value: '{business.level}'
                      options:
                      - {value: -1, label: 폐쇄}
                      - {value: 0, label: 'L0 · 최소'}
                      - {value: 1, label: L1}
                      - {value: 2, label: L2}
                      - {value: 3, label: L3}
                      - {value: 4, label: 'L4 · 전체'}
                    - {key: description, label: 설명, type: textarea, value: '{business.description}'}
                    action: '[self:business]{op: "save", id: "{business.id}", name: "$name", level: "$level", description: "$description"}'
                    button: 저장
                    actions:
                    - label: 비즈니스 삭제
                      action: '[self:business]{op: "delete", id: "{business.id}"}'
                      style: danger
                      confirm: 이 비즈니스를 삭제할까요? 소속 아이템도 함께 사라집니다.
                      back: true
                - name: 아이템
                  view:
                  - type: editable_list
                    from: items
                    title: 아이템 (상품·항목)
                    display: '{title}{details|opt:  —  ,}'
                    empty: 등록된 아이템 없음
                    delete_action: '[self:business_item]{op: "delete", item_id: "{id}"}'
                    add:
                      fields:
                      - {key: title, type: text, placeholder: 제목}
                      - {key: details, type: text, placeholder: 설명}
                      action: '[self:business_item]{op: "save", business_id: "{business.id}", title: "$title", details: "$details"}'
                      button: 추가
              card:
                title: '{name}'
                lines:
                - '레벨 {level} · {description|trunc:44}'
          - name: 아이템
            auto_run: true
            note: 비즈니스를 고르면 그 아이템(상품·항목)을 사진까지 편집할 수 있습니다. 사진 추가는 데스크탑(파일 선택)에서만.
            inputs:
            - key: biz
              type: select
              placeholder: 비즈니스 선택
              options_action: '[self:business]{op: "list"}'
              options_from: businesses
              option_value: id
              option_label: name
            buttons:
            - {label: ＋ 아이템 추가, action: '[self:business_item]{op: "save", business_id: "$biz", title: "새 아이템"}', refresh: true}
            action: '[self:business_item]{op: "list", business_id: "$biz"}'
            view:
            - type: card_list
              from: items
              master_detail: true
              empty_from: message
              item_click:
                action: '[self:business_item]{op: "detail", item_id: "{id}"}'
                view:
                - type: form
                  title: 아이템
                  fields:
                  - {key: title, label: 제목, type: text, value: '{item.title}'}
                  - {key: details, label: 설명, type: textarea, value: '{item.details}'}
                  - key: images
                    label: 사진
                    type: images
                    value: '{item.attachment_path}'
                    add_action: '[self:business_item]{op: "add_image", item_id: "{item.id}", path: "$path"}'
                    remove_action: '[self:business_item]{op: "remove_image", item_id: "{item.id}", path: "$path"}'
                  action: '[self:business_item]{op: "save", id: "{item.id}", title: "$title", details: "$details"}'
                  button: 저장
                  actions:
                  - label: 아이템 삭제
                    action: '[self:business_item]{op: "delete", item_id: "{item.id}"}'
                    style: danger
                    confirm: 이 아이템을 삭제할까요?
                    back: true
              card:
                title: '{title}'
                lines:
                - '{details|trunc:50}'
          - name: 공개문서
            auto_run: true
            buttons:
            - {label: ↻ 비즈니스 기반 재생성, action: '[self:business_document]{op: "regenerate"}', refresh: true}
            action: '[self:business_document]{op: "list"}'
            view:
            - type: card_list
              from: documents
              item_click:
                action: '[self:business_document]{op: "detail", level: "{level}"}'
                view:
                - type: form
                  title: 공개 비즈니스 문서
                  fields:
                  - {key: title, label: 제목, type: text, value: '{document.title}'}
                  - {key: content, label: 내용, type: textarea, value: '{document.content}'}
                  action: '[self:business_document]{op: "update", level: "{document.level}", title: "$title", content: "$content"}'
                  button: 저장
              card:
                title: '레벨 {level} · {title}'
                lines:
                - '{content|trunc:60}'
          - name: 근무지침
            auto_run: true
            action: '[self:work_guideline]{op: "list"}'
            view:
            - type: card_list
              from: guidelines
              item_click:
                action: '[self:work_guideline]{op: "detail", level: "{level}"}'
                view:
                - type: form
                  title: 근무 지침
                  fields:
                  - {key: title, label: 제목, type: text, value: '{guideline.title}'}
                  - {key: content, label: 내용, type: textarea, value: '{guideline.content}'}
                  action: '[self:work_guideline]{op: "update", level: "{guideline.level}", title: "$title", content: "$content"}'
                  button: 저장
              card:
                title: '레벨 {level} · {title}'
                lines:
                - '{content|trunc:60}'
          - name: 자동응답
            auto_run: true
            note: 외부 메시지(Gmail/Nostr) 자동응답을 켜면, 이웃의 정보공개수준별 근무지침·공개문서를 맥락으로 AI가 답합니다.
            buttons:
            - {label: 켜기, action: '[others:auto_response]{op: "start"}', refresh: true}
            - {label: 끄기, action: '[others:auto_response]{op: "stop"}', refresh: true}
            action: '[others:auto_response]{op: "status"}'
            view:
            - type: kv
              rows:
              - {k: 상태, v: '{state_label}'}
              - {k: 안내, v: '{summary}'}
              - {k: 점검, v: '{interval_label}'}
      business_item:
