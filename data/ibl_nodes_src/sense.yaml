        router: handler
        tool: earnings_calendar
        implementation: Finnhub API로 EPS/매출 실적 일정 조회
        target_key: symbol
      crypto:
        description: '암호화폐 시세 (CoinGecko: BTC, ETH, XRP 등 USD/KRW)'
        group: finance
        target_description: 코인 심볼 (BTC, ETH, SOL 등)
        router: handler
        tool: crypto_price
        implementation: CoinGecko 무료 API로 암호화폐 시세 조회 (requests HTTP)
        target_key: coin_id
      kr_price:
        description: 한국 주가 기간별 이력 (KRX). start_date/end_date로 기간 지정 가능. 현재 시세만 필요하면
          price 사용.
        group: finance
        target_description: 종목 코드 또는 기업명
        router: handler
        tool: kr_stock_price
        implementation: KRX(한국거래소) API + FinanceDataReader로 한국 주가 시계열 이력 조회. 기간 지정
          가능.
        target_key: symbol
      us_price:
        description: 미국 주가 기간별 이력 (FMP). start_date/end_date로 기간 지정 가능. 현재 시세만 필요하면
          price 사용.
        group: finance
        target_description: 티커
        router: handler
        tool: us_stock_price
        implementation: FMP API로 미국 주가 시계열 이력 조회. 기간 지정 가능.
        target_key: symbol
      kr_investor:
        description: 한국 시장 투자자별 매매동향 (외국인/기관/개인 순매수, 코스피/코스닥)
        group: finance
        target_description: 시장 구분 — market 파라미터에 KOSPI/KOSDAQ/ALL (별칭 STK/KSQ도 허용).
        router: handler
        tool: kr_market_investor_trading
        implementation: KRX API로 투자자별 매매동향 XML 파싱
        target_key: market
      kr_stock_investor:
        description: 개별종목 투자자별 매매동향 (외국인/기관/개인 순매수)
        group: finance
        target_description: 종목 코드 또는 기업명
        router: handler
        tool: kr_stock_investor_trading
        implementation: KRX API로 개별종목 투자자별 매매동향 조회
        target_key: symbol
      performance:
        description: 공연 검색 (KOPIS - 연극, 뮤지컬, 음악회 등)
