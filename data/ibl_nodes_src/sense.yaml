            hotel: 도시 호텔 목록 (city→도시코드 자동)
            poi: 관광지 검색 (city→좌표 자동, 또는 lat/lng 직접)
        implementation: Amadeus API(OAuth2). op→endpoint 매핑 + 도시명/날짜 내부 해소 (endpoint+params 직접 지정도 가능)
