  sense:
    actions:
      world:
        returns: scalar
        fixture: '[sense:world]{op: "snapshot"}'
        description: 세계 상태 감각 (op 분기). 경제·뉴스·기술·날씨 스냅샷 조회/추이/재수집.
        target_description: |
          op로 분기 (기본 snapshot).
          - snapshot: 오늘의 세계 상태(경제 지표·주요 뉴스·기술 동향·날씨). 파라미터 없음.
          - trend: 최근 N일 추이 (경제 변화·뉴스 흐름). days 옵션(기본 7).
          - refresh: 강제 재수집(오늘 데이터 덮어씀). 외부 API 부하라 빈번 호출 금지. 파라미터 없음.
        group: world
        target_key: op
        router: system
        func: world_op
        ops:
          default: snapshot
          values:
            snapshot: 오늘의 세계 상태 스냅샷 (경제·주요뉴스·기술동향·날씨)
            trend: 최근 N일 추이 (days 옵션, 기본 7)
            refresh: 강제 재수집 (외부 API 부하, 빈번 호출 금지)
        implementation: _route_system이 op로 분기 — snapshot=world_pulse / trend=world_trend / refresh=world_refresh, execute_world_pulse에 위임.
        keywords:
        - 세계
        - 오늘뉴스
        - 경제
        - 동향
        - 주요뉴스
        - 뉴스
        - 추이
        - 트렌드
        - 변화
        - 뉴스흐름
        - 재수집
        - 갱신
      self_check:
        returns: effect
        description: 전수 자가점검 실행 — 부작용 없는 모든 IBL 액션을 테스트하여 시스템 건강 상태 확인
        target_description: '(파라미터 없음 — 전수 자가점검 실행). 결과는 world_pulse.db에 기록.'
        group: world
        router: system
        func: self_check
        implementation: 전체 IBL 액션 중 안전한 액션을 전수 실행, 결과를 world_pulse.db에 기록, 패턴 분석
        keywords:
        - 자가점검
        - 전수점검
        - 면역
        - 건강체크
        - 셀프체크
        - self-check
    description: '감각: 외부 정보 수집 및 질의 — 주가, 날씨, 뉴스, 학술, 부동산, 미디어, 법률, 세계 상태 등 외부 API 및 데이터
      소스 접근'
    tags:
