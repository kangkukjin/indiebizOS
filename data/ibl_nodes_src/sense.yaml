        target_description: 검색 쿼리
        router: handler
        tool: search_openalex
        implementation: OpenAlex 무료 API로 학술 논문 메타데이터 검색 (제목/초록/인용수/OA 필터). 통합검색보다
          결과가 많고 필터 옵션 풍부.
        target_key: query
      search_arxiv:
        description: AI/CS/물리/수학 프리프린트 검색 (arXiv). 최신 미출판 연구, PDF 다운로드 가능. 정식 출판 논문은
          search_openalex 사용.
        group: research
        target_description: 검색 쿼리
        router: handler
        tool: search_arxiv
        implementation: arxiv-py 라이브러리로 프리프린트 논문 검색. download_arxiv로 PDF 다운로드 가능.
        target_key: query
      download_arxiv:
        description: arXiv 논문 PDF 다운로드. 검색은 search_arxiv.
