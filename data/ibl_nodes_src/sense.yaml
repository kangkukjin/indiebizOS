          op로 분기 (기본 search).
          - search: query(필수) + source(기본 openalex) + max_results.
            · openalex=범용 학술(분야무관, 기본), arxiv=AI/CS/물리/수학 프리프린트, pubmed=생의학/의학, semantic=AI/ML 심층(인용그래프·관련논문).
