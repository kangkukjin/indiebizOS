          type: compress
      weather:
        description: '날씨 조회 (Open-Meteo 무료). [sense:weather]{city: "수원"} 또는 {lat:
          37.26, lon: 127.03}. 도시명(한/영) 직접 사용 가능'
        group: places
        target_description: 도시명 또는 좌표
        router: handler
        tool: get_weather
        implementation: Open-Meteo 무료 API로 날씨 조회 (API키 불필요)
        app:
          icon: 🌤️
          name: 날씨
          order: 0
          auto_run: true
          inputs:
          - key: city
            type: text
            default: 서울
            placeholder: 도시명 (한/영)
            chips: [서울, 부산, 제주, 수원, 인천, 대구]
          action: '[sense:weather]{city: "$city", days: 7}'
          view:
          - type: metric
            label: '{city}'
            big: '{current.temp|round}'
            unit: °
            sub: '{current.condition} · 체감 {current.feels_like|round}°'
          - type: kv
            rows:
            - k: 💧 습도
              v: '{current.humidity}%'
            - k: 🌬 바람
              v: '{current.wind_speed}m/s'
          - type: kv_list
            title: 7일 예보
            from: forecast
            k: '{date}'
            v: '{condition} {min_temp|round}° / {max_temp|round}°{precipitation_mm|opt: ☔,mm}'
      restaurant:
