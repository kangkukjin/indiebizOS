  sense:
    actions:
      phone:
        description: 폰 컴패니언이 보낸 최근 알림 조회. "지금 폰에 연락/알림 오나"의 정답 소스. USB 불필요.
        group: device
        target_description: '최근 폰 알림 — latest_ago/ago("방금"·"N분 전")로 지금 오는 연락인지 판별,
          pkg로 앱 필터(예 com.kakao.talk). limit=개수.'
        target_key: op
        router: handler
        tool: phone_op
        scope: system
        ops:
          default: notifications
          values:
            notifications: 최근 폰 알림 (카톡·문자·앱 푸시 — "지금 연락 오나")
        implementation: phone_notifications.py(폰 NotificationListener 가 보낸 알림 → 로컬/폴링 저장)의
          recent 조회. android 패키지 phone_op 핸들러(scope:system). raw ADB 우회 대체.
          (2026-06-12 location/steps 상시 수집 폐기 — 위치는 sense:here 온디맨드.)
        keywords:
        - 폰알림
        - 연락
        - 카톡
      host:
        description: 이 기계(나의 몸) 자신의 운영 상태를 구조화 데이터로 직접 내성 (op 분기). 화면을 보는 게 아니라
          기계를 직접 느끼는 자기수용감각. status(상태 한눈에)/apps(자원 점유 프로세스)/resources(상세 지표).
        group: device
        target_description: 'op=status(기본): 전면 앱·CPU·메모리·디스크·배터리·가동시간·로드평균·프로세스 수 한 눈에.
          apps: 메모리 점유 상위 프로세스(limit 옵션, 기본 12). resources: per-core CPU·스왑·디스크 파티션별·네트워크 상세.'
        target_key: op
        router: handler
        tool: host_op
        runs_on: mac_only
        ops:
          default: status
          values:
            status: 이 기계 상태 한 눈에 (전면앱·CPU·메모리·디스크·배터리·가동시간)
            apps: 자원(메모리)을 많이 쓰는 프로세스 상위 N (limit 옵션)
            resources: 상세 지표 (per-core CPU·스왑·디스크 파티션·네트워크·배터리)
        implementation: pc-manager 패키지 host_op 핸들러 — psutil로 CPU/메모리/스왑/디스크/네트워크/배터리,
          lsappinfo로 전면 앱(권한 프롬프트 無), runtime_utils.detect_body로 몸 이름. 폰은 자기 센서 별도라 mac_only.
        keywords:
        - 내컴퓨터
        - 시스템상태
        - cpu
        - 메모리
        - 디스크
        - 배터리
        - 내몸
        - 프로세스
      here:
        description: 지금 현재 위치를 즉석에서 한 번 조회 (폰 GPS). 상시 추적/저장 없이 물을 때만. 좌표+주소.
        group: device
        target_description: 파라미터 없음 — 호출 즉시 폰의 현재 위치(위경도+역지오코딩 주소)를 한 번 가져온다.
          "지금 어디", "내 위치", 날씨/맛집/길찾기의 출발점.
        router: handler
        tool: phone_locate
        scope: system
        runs_on: phone_only
        implementation: 폰 네이티브 fused location 1회 조회(Chaquopy→Kotlin PhoneActions.getCurrentLocationNow)
          + Android Geocoder 역지오코딩. PC/원격에선 분산 IBL(ibl_engine)이 INDIEBIZ_PHONE_URL 로 폰에 포워드.
        keywords:
        - 현재위치
        - 지금위치
        - 내위치
        - 어디
        - gps
        - location
      listen:
        description: 폰 마이크로 음성 입력 (op 분기). 상시 청취 아닌 호출 시 1회. transcribe=받아쓰기(STT→텍스트), record=녹음(→파일).
        group: device
        target_description: 'op=transcribe(기본): 지금 발화를 텍스트로 받아쓴다(ko-KR, timeout_sec 대기).
          record: duration_sec 초 동안 녹음해 오디오 파일로 저장(경로 반환).'
        target_key: op
        router: handler
        tool: phone_listen
        scope: system
        runs_on: phone_only
        implementation: 폰 네이티브 — transcribe=Android SpeechRecognizer(온디바이스/Google, ko-KR),
          record=MediaRecorder(AAC/m4a→filesDir). Chaquopy→Kotlin PhoneActions. PC/원격은 분산 IBL 로 폰 포워드
          (transcribe 텍스트는 무손실, record 파일은 폰 잔류).
        ops:
          default: transcribe
          values:
            transcribe: 마이크 음성 받아쓰기 (STT → 텍스트)
            record: 마이크 녹음 (→ 오디오 파일 경로)
        keywords:
        - 받아쓰기
        - 음성인식
        - 녹음
        - 마이크
        - stt
        - voice
      see:
        description: 폰 카메라로 사진 1장 촬영 (호출 시 1회). facing=back(기본)/front. 폰에 jpg 저장 후 경로 반환.
        group: device
        target_description: 'facing=back(후면, 기본)/front(전면). 미리보기 없이 정지 캡처 → 폰 파일 경로 반환.
          "사진 찍어", "촬영해", "카메라로 찍어줘".'
        router: handler
        tool: phone_capture
        scope: system
        runs_on: phone_only
        implementation: 폰 네이티브 Camera2 + ImageReader(JPEG) 정지 캡처(미리보기 없음, 백그라운드 HandlerThread).
          Chaquopy→Kotlin PhoneActions.capturePhoto. PC/원격은 분산 IBL 로 폰 포워드(파일은 폰 잔류).
        keywords:
        - 촬영
        - 사진
        - 카메라
        - 찍어
        - photo
        - camera
      stock:
        description: 주식 시세·거래 데이터 조회 (op 분기). 기업 펀더멘털은 company, 암호화폐는 crypto.
        group: finance
        target_description: 'ticker=종목코드/티커 또는 회사명·ETF명(예 "삼성전자"·"TIGER 200", 내부에서 코드로 자동 해소).
          search는 query=회사명. investors는 ticker 있으면 개별종목·없으면 전체시장(market=STK/KSQ/ALL).
          market="kr"/"us"로 시장 강제 지정 가능. "현재가/얼마/시세"=price(기본), "차트/추이/이력"=history.
          history/news/earnings는 기간 지정 — period(상대기간 1mo/3mo/6mo/1y/ytd, 미지정 시 자동계산) 또는 start_date·end_date(명시 우선).
          history는 표준 table 통화(table={columns:[날짜,종가],rows:[...]})도 반환 — 그대로 engines:chart/spreadsheet로 흘리거나 >> 파이프.'
        target_key: op
        router: handler
        tool: stock_op
        ops:
          default: price
          values:
            price: 현재가·현재 시세 (기본, "얼마"·"주가" — Yahoo)
            history: 기간별 주가 이력·차트용 (period 또는 날짜, 시장 자동판별)
            info: 종목 메타 — 시총·52주·PER·배당
            search: 회사명으로 심볼 검색 (query)
            investors: 투자자별 매매동향 (한국 전용)
            news: 종목 관련 뉴스 (Finnhub→Yahoo)
            earnings: 실적발표 일정 (예상 vs 실적)
        implementation: market 자동판별(6자리/한글=kr, 그외=us) 후 op 분기. price(현재가)/info/search=yfinance,
          history(이력)=krx|fmp, investors=krx, news=finnhub→yfinance, earnings=finnhub. (2026-06-04 개명 quote→price, price→history)
        keywords:
        - 주가
        - 주식
        - 시세
        - 종목
        - 매매동향
        app:
          instrument: invest
          icon: 📈
          name: 투자
          order: 4
          modes:
          - name: 주식
            auto_run: true
            inputs:
            - key: q
              type: text
              default: 삼성전자
              placeholder: '회사명(한글)·티커 (예: 삼성전자, AAPL)'
              chips: [삼성전자, SK하이닉스, AAPL, NVDA, TSLA]
            filter:
              key: period
              items:
              - {label: 5일, value: 5d, default: true}
              - {label: 1달, value: 1mo}
              - {label: 3달, value: 3mo}
              - {label: 1년, value: 1y}
            action: '[sense:stock]{op: "price", ticker: "$q", period: "$period", max_points: 60}'
            view:
            - type: metric
              label: '{data.symbol}'
              big: '{data.current_price|num}'
              unit: '{data.currency}'
              sub: '{data.change|arrow} {data.change|abs|num} ({data.change_percent}%)'
              trend: data.change
            - type: sparkline
              from: data.prices
              y: close
              trend: data.change
            - type: kv
              rows:
              - k: 전일
                v: '{data.previous_close|num}'
              - k: 시가/고가/저가
                v: '{data.open|num} / {data.high|num} / {data.low|num}'
              - k: 거래량
                v: '{data.volume|num}'
          - name: 코인
            auto_run: true
            inputs:
            - key: coin
              type: text
              default: BTC
              placeholder: 코인 심볼 (BTC, ETH, SOL …)
              chips: [BTC, ETH, SOL, XRP, DOGE]
            filter:
              key: days
              items:
              - {label: 7일, value: 7, default: true}
              - {label: 1달, value: 30}
              - {label: 3달, value: 90}
            action: '[sense:crypto]{coin_id: "$coin", days: $days}'
            view:
            - type: metric
              label: '{data.name} ({data.symbol})'
              big: '{data.current_price_krw|num}'
              unit: 원
              sub: '{data.change_24h_percent|arrow} {data.change_24h_percent|abs}% (24h)'
              trend: data.change_24h_percent
            - type: sparkline
              from: data.prices
              y: close
              trend: data.change_24h_percent
            - type: kv
              rows:
              - k: USD
                v: '${data.current_price_usd|num}'
              - k: 24h 고가/저가
                v: '${data.high_24h_usd|num} / ${data.low_24h_usd|num}'
              - k: 시가총액
                v: '{data.market_cap_formatted} · 랭크 #{data.rank}'
          - name: 자원
            auto_run: true
            inputs:
            - key: sym
              type: select
              label: 자원
              default: 'GC=F'
              options:
              - {value: 'GC=F', label: 금}
              - {value: 'SI=F', label: 은}
              - {value: 'CL=F', label: WTI 유가}
              - {value: 'BZ=F', label: 브렌트유}
              - {value: 'NG=F', label: 천연가스}
              - {value: 'HG=F', label: 구리}
            filter:
              key: period
              items:
              - {label: 5일, value: 5d, default: true}
              - {label: 1달, value: 1mo}
              - {label: 3달, value: 3mo}
              - {label: 1년, value: 1y}
            action: '[sense:stock]{op: "price", ticker: "$sym", period: "$period", max_points: 60}'
            view:
            - type: metric
              label: '{data.symbol}'
              big: '{data.current_price|num}'
              unit: '{data.currency}'
              sub: '{data.change|arrow} {data.change|abs|num} ({data.change_percent}%)'
              trend: data.change
            - type: sparkline
              from: data.prices
              y: close
              trend: data.change
            - type: kv
              rows:
              - k: 고가/저가
                v: '{data.high|num} / {data.low|num}'
              - k: 거래량
                v: '{data.volume|num}'
      company:
        description: 기업 펀더멘털 조회 (op 분기) — 기업정보·재무·공시. 주가·시세는 stock.
        group: finance
        target_description: 'ticker=기업명 또는 코드 (삼성전자/005930=한국 DART, AAPL=미국 FMP·SEC 자동판별).
          market="kr"/"us"로 강제 지정 가능. financials는 year(한국)·statement_type·period 옵션, disclosures는
          count·기간·유형 옵션.'
        target_key: op
        router: handler
        tool: company_op
        ops:
          default: profile
          values:
            profile: 기업 기본정보 (대표·업종·시총·섹터)
            financials: 재무제표 (손익·재무상태·현금흐름)
            disclosures: 공시 검색 (한국 DART / 미국 SEC)
        implementation: market 자동판별 후 분기. profile=kr_company_info|us_company_profile,
          financials=kr_financial_statements|us_financial_statements, disclosures=kr_disclosures|us_sec_filings.
        keywords:
        - 기업정보
        - 재무제표
        - 공시
        - DART
        - SEC
      crypto:
        description: '암호화폐 시세 (CoinGecko: BTC, ETH, XRP 등 USD/KRW)'
        group: finance
        target_description: 코인 심볼 (BTC, ETH, SOL 등)
        router: handler
        tool: crypto_price
        implementation: CoinGecko 무료 API로 암호화폐 시세 조회 (requests HTTP)
        target_key: coin_id
      performance:
        description: 공연·공연장 조회 (op 분기, KOPIS). 전시는 exhibit, 도서는 book.
        group: culture
        target_description: 'search — query(공연명/키워드)·genre·region·status·days 옵션. venue — query(공연장명, 예 ''예술의전당'')·region. genres/regions — 파라미터 없음(필터 코드 목록).'
        target_key: op
        router: handler
        tool: performance_op
        ops:
          default: search
          values:
            search: 공연 검색 (연극·뮤지컬·음악회, 기본)
            venue: 공연장·문화시설 검색
            genres: 장르 코드 목록 (검색 필터용)
            regions: 지역 코드 목록 (검색 필터용)
        implementation: KOPIS(한국공연예술센터) API op 분기. search=search_by_keyword, venue=get_facilities, genres=get_genre_list, regions=get_region_list.
        keywords:
        - 공연
        - 연극
        - 뮤지컬
        - 공연장
        app:
          instrument: culture
          icon: 🎭
          name: 문화공연
          order: 3
          mode: 공연
          mode_order: 0
          inputs:
          - key: genre
            type: select
            label: 전체 장르
            options_action: '[sense:performance]{op: "genres"}'
            options_from: genres
            option_value: code
            option_label: name
          - key: kw
            type: text
            placeholder: 공연명 키워드(선택)
          action: '[sense:performance]{genre: "$genre", keyword: "$kw"}'
          view:
          - type: image_grid
            from: data
            empty_from: message
            image: '{poster}'
            title: '{prfnm}'
            lines:
            - '{fcltynm}'
            - '{prfpdfrom}~{prfpdto}'
            - '{area} · {prfstate}'
      book:
        description: 한국 도서 조회 (op 분기, 도서관정보나루). 고전 원문은 classic, 글로벌 도서는 search_books.
        group: culture
        target_description: 'search(기본) — title=제목전용/author=저자전용/publisher=출판사전용/keyword=광역/isbn=ISBN조회(+detail=true면 대출통계). "제목이 X인 책"은 title:"X". recommended — isbn13(기준도서)·rec_type(mania 기본/reader). codes — code_type=kdc(주제분류) 또는 region(도서관 지역).'
        target_key: op
        router: handler
        tool: book_op
        ops:
          default: search
          values:
            search: 도서 검색·조회 (필드분기·ISBN·대출통계, 기본)
            recommended: 추천도서 (마니아·다독자 패턴)
            codes: 분류 코드 목록 (kdc/지역)
        implementation: 도서관정보나루 API op 분기. search=library_book 필드분기(search_books/quick_search/get_book_by_isbn/get_book_detail), recommended=get_recommended_books, codes=get_kdc_list|get_region_list(code_type).
        keywords:
        - 도서
        - 책
        - ISBN
        - 도서관
        app:
          icon: 📚
          name: 도서
          order: 1
          modes:
          - name: 정보나루
            inputs:
            - key: q
              type: text
              placeholder: 제목·저자·키워드
              required: true
            action: '[sense:book]{keyword: "$q"}'
            view:
            - type: card_list
              from: data
              empty_from: message
              item_click:
                action: '[sense:book]{isbn: "{isbn13}", detail: true}'
                view:
                - type: metric
                  label: 전국 누적 대출
                  big: '{book.loan_stats.total|num}'
                  unit: 회
                - type: kv_list
                  title: 연령별 대출
                  from: book.loan_stats.by_age
                  k: '{name}'
                  v: '{loanCnt|num}'
                - type: kv_list
                  title: 성별 대출
                  from: book.loan_stats.by_gender
                  k: '{name}'
                  v: '{loanCnt|num}'
              card:
                image: '{bookImageURL}'
                title: '{bookname}'
                lines:
                - '{authors}'
                - '{publisher} · {publication_year}{loan_count|opt: · 대출 ,회}'
                link:
                  href: '{bookDtlUrl}'
                  label: 상세 →
          - name: 네이버
            inputs:
            - key: q
              type: text
              placeholder: 책 제목·저자  예) 한강
              required: true
            action: '[sense:search_naver]{query: "$q", type: "book", display: 20, _raw: true}'
            view:
            - type: card_list
              from: items
              card:
                image: '{image}'
                title: '{title}'
                lines:
                - '{author}'
                - '{publisher}'
                link:
                  href: '{link}'
                  label: 네이버 책 →
          - name: 글로벌
            inputs:
            - key: q
              type: text
              placeholder: 원서·해외도서  예) sapiens
              required: true
            action: '[sense:search_books]{query: "$q"}'
            view:
            - type: card_list
              from: data
              empty_from: message
              card:
                image: '{bookImageURL}'
                title: '{bookname}'
                lines:
                - '{authors}'
                - '{categories|opt:,}{page_count|opt: · ,쪽}'
                link:
                  href: '{infoLink}'
                  label: Google Books →
          - name: 고전
            inputs:
            - key: q
              type: text
              placeholder: 서양 고전  예) sherlock, austen
              required: true
            action: '[sense:classic]{op: "western", query: "$q"}'
            view:
            - type: card_list
              from: results
              card:
                image: '{cover_url}'
                title: '{title}'
                lines:
                - '{authors}'
                - '내려받기 {download_count|num}회'
                link:
                  href: '{html_url}'
                  label: 원문 읽기 →
      classic:
