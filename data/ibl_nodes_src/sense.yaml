        target_key: op
        group: research
        router: handler
        tool: paper_op
        ops:
          default: search
          values:
            search: '논문 검색 (source openalex/arxiv/pubmed/semantic)'
            download: '논문 PDF 다운로드 (source arxiv/pubmed)'
        implementation: study 패키지 op/source 분기. search=openalex/arxiv/pubmed/semantic_scholar, download=arxiv/pubmed_pdf.
        keywords:
