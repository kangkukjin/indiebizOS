  table:
    actions:
      filter:
        returns: transform
        runs_on: anywhere
        scope: workspace
        description: '통화 변환자 — items에서 조건(where)에 맞는 것만 남긴다(부분집합·비파괴).'
        target_description: 'where(필터 조건): 문자열(전 필드 부분일치, 예 "전세") · {field, op, value}(op=eq/ne/lt/le/gt/ge/contains/in) · {열:값} 단축형 · 조건 배열(AND). >> 파이프로 앞 통화를 자동 수용. 도메인 무관 — 모든 검색·목록 생산자에 적용.'
        group: transform
        router: handler
        tool: data_filter
        implementation: data-ops handler.py — records|table 통화에서 where 미니 DSL로 부분집합. 비파괴(같은 통화 반환).
        target_key: where
        keywords:
        - 필터
        - 거르기
        - 조건
        - 만
        - filter
      sort:
        returns: transform
        runs_on: anywhere
        scope: workspace
        description: '통화 변환자 — items를 기준 필드(by)로 정렬(수치 인식, desc 옵션).'
        target_description: 'by(정렬 기준 필드/열명, 필수) · desc(내림차순 bool, 기본 false). 숫자는 수치로, 아니면 문자열로 비교. 예: [...] >> [table:sort]{by: price, desc: true}.'
        group: transform
        router: handler
        tool: data_sort
        implementation: data-ops handler.py — records|table을 by 키로 정렬(_sort_key 수치 우선). 비파괴.
        target_key: by
        keywords:
