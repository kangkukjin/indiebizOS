# 메모 — ai_dock 어피던스(요청→제안→반영/첨부/닫기)의 참조 소비자.
# BinNote(Path B, 커스텀 React)의 656 UX 를 선언형 form.textarea 로 표현한 경량 대안.
# 폴더 트리·다른이름저장 같은 무거운 부분은 없고, 한 파일(memo.md) 편집 + AI 다듬기만.
# 지우려면 이 파일만 삭제하면 된다(어휘·렌더러는 그대로).
instrument: notepad
icon: 📝
name: 메모
modes:
  - name: 메모
    # 폴더 보장(mkdir, 멱등) 후 기존 메모 읽기 — 첫 실행이면 read 는 빈 결과(무해).
    action: '[self:mkdir]{path: "outputs/notepad"} >> [self:read]{path: "outputs/notepad/memo.md"}'
    view:
      - type: form
        button: 저장
        action: '[self:write]{path: "outputs/notepad/memo.md", content: "$body"}'
        fields:
          - key: body
            type: textarea
            label: 메모
            value: '{result}'
            placeholder: 여기에 메모를 쓰고, 아래 AI에게 다듬어 달라고 하세요…
            ai_dock:
              action: '[self:ask]{prompt: "다음 지시대로 이 글을 고쳐라. 설명 없이 개선된 전체 본문만 답하라. 지시: $dock", context: "$body"}'
              modes: [replace, append]
              placeholder: 'AI에게 시키기 — 예: 더 간결하게 / 개요를 만들어줘'
