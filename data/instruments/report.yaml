# 정기보고 앱 — 어휘 없는 순수 매니페스트 (상부구조).
#
# 옛 report-viewer 패키지의 self:report 전용 액션을 은퇴하고, 이 앱을 전부 일반
# 어휘의 조합으로 재구성했다. 여기엔 새 IBL 액션이 하나도 없다 — 모든 모드의
# action: 은 일반 부품(self:file_find / self:read / others:delegate)만 부른다.
#
#   보기(목록·최신) = [self:file_find] → [self:read]{blocks}
#   생성(작성)     = [others:delegate]{scope: system}  (자율주행에 위임)
#   레시피         = data/guides/ai_trend_report.md · ai_startup_report.md (어휘 아님)
#   정기 실행      = [self:trigger]{op: create, cron} 로 별도 등록(앱 밖)
#
# %BASE% 는 서버측(_derive_instruments)에서 레포 루트로 치환된다(폰/타 머신 이식성).
# 새 보고서 타입 추가 = 아래 두 select 의 options 에 {value: 폴더, label: 이름}
# 한 줄 + 작성 버튼 하나. 코드 변경 0.

instrument: report
icon: 📑
name: 정기보고
order: 16
phone_render: false   # 보고서는 맥 outputs/ 에 산다 — 폰은 맥 리모컨(원격)만, 폰 네이티브 숨김

modes:
  # ── 최신: 선택 타입의 가장 최근 보고서 본문 ──
  - name: 최신
    auto_run: true
    inputs:
      - key: folder
        type: select
        placeholder: 보고서 종류
        default: "%BASE%/outputs/ai_trend_reports"   # auto_run 시 기본 선택(옛 handler DEFAULT_TYPE 대체)
        options:
          - {value: "%BASE%/outputs/ai_trend_reports",   label: AI 동향 보고서}
          - {value: "%BASE%/outputs/ai_startup_reports", label: AI 창업·응모 정보 보고서}
    action: '[self:file_find]{pattern: "*.md", path: "$folder"} | sort: title desc | take: 1 >> [self:read]{scope: "workspace", blocks: true}'
    view:
      - type: thread
        from: items
        text: '{text}'
        empty: 아직 작성된 보고서가 없습니다 — "작성" 탭에서 새 보고서를 만들어 보세요.

  # ── 목록: 선택 타입의 전체 보고서(최신순), 클릭하면 본문 ──
  - name: 목록
    auto_run: true
    inputs:
      - key: folder
        type: select
        placeholder: 보고서 종류
        default: "%BASE%/outputs/ai_trend_reports"   # auto_run 시 기본 선택(옛 handler DEFAULT_TYPE 대체)
        options:
          - {value: "%BASE%/outputs/ai_trend_reports",   label: AI 동향 보고서}
          - {value: "%BASE%/outputs/ai_startup_reports", label: AI 창업·응모 정보 보고서}
    action: '[self:file_find]{pattern: "*.md", path: "$folder"} | sort: title desc'
    view:
      - type: card_list
        from: items
        empty: 보고서가 없습니다 — "작성" 탭에서 새 보고서를 만들어 보세요.
        card:
          title: '{title}'
          lines:
            - '{meta}'
        item_click:
          action: '[self:read]{path: "{url}", scope: "workspace", blocks: true}'
          view:
            - type: thread
              from: items
              text: '{text}'

  # ── 작성: 자율주행(시스템 AI)에 보고서 작성 위임 ──
  - name: 작성
    buttons:
      - label: ✍ 새 AI 동향 보고서 작성
        action: '[others:delegate]{scope: "system", message: "AI 동향 보고서 써줘", from_agent: "정기보고앱"}'
      - label: ✍ 새 AI 창업·응모 정보 보고서 작성
        action: '[others:delegate]{scope: "system", message: "AI 창업·응모 정보 보고서 써줘", from_agent: "정기보고앱"}'
