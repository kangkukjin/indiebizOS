nodes:
  sense:
    actions:
      phone:
        returns: items
        fixture: '[sense:phone]{}'
        description: 폰 컴패니언이 보낸 최근 알림 조회. "지금 폰에 연락/알림 오나"의 정답 소스. USB 불필요.
        group: device
        target_description: 최근 폰 알림 — latest_ago/ago("방금"·"N분 전")로 지금 오는 연락인지 판별, pkg로 앱 필터(예 com.kakao.talk). limit=개수.
        target_key: op
        router: handler
        tool: phone_op
        scope: system
        ops:
          default: notifications
          values:
            notifications: 최근 폰 알림 (카톡·문자·앱 푸시 — "지금 연락 오나")
        implementation: phone_notifications.py(폰 NotificationListener 가 보낸 알림 → 로컬/폴링 저장)의 recent 조회. android 패키지 phone_op 핸들러(scope:system). raw ADB 우회 대체. (2026-06-12 location/steps 상시 수집 폐기 — 위치는 sense:here 온디맨드.)
        keywords:
        - 폰알림
        - 연락
        - 카톡
      here:
        returns: scalar
        # 통화 모양(scalar)과 부작용이 어긋나는 자리 — 폰에선 GPS 를 실제로 켠다.
        # dry-run 이 "부작용 없음"으로 표시하면 안 되고, 자동 점검이 함부로 실행해서도 안 된다.
        side_effect: true
        exempt: '위치 측정(폰=GPS 센서) — 자동 점검 실행 금지'
        description: 지금 이 몸이 있는 곳 (지표어 — 몸마다 자기 방식으로 측정. 폰=GPS ±수십 m, 데스크탑=IP 도시 수준+움직임증거 캐시=재측정 0원). 반환에 source/accuracy_m/measured_at — 정밀도 보고 판단. 상시 추적 없이 물을 때만.
        group: device
        target_description: '파라미터 없음(선택 refresh: true = 강제 재측정, 이사·이동 후). "지금 어디"는 이 몸의 여기 — 도시 수준이면 날씨·지역뉴스에 충분. 사용자의 정밀 위치(길찾기 출발점)가 필요하면 폰 몸에 부탁: [others:ask]{message: "지금 위치 알려줘"}.'
        router: handler
        tool: phone_locate
        scope: system
        implementation: 지표어 몸별 프로브 — 폰=fused location 1회(Chaquopy→Kotlin PhoneActions.getCurrentLocationNow, 캐시 없음=움직이는 몸) / 데스크탑=IP 지오(ipapi.co→ip-api 폴백) + 네트워크 지문(로컬 IP) 캐시(data/here_cache.json — 지문 불변=캐시 반환). 능력 감지=jclass import.
        keywords:
        - 현재위치
        - 지금위치
        - 내위치
        - 어디
        - 여기
        - gps
        - location
      listen:
        returns: scalar
        # scalar 를 반환하지만 실제로 마이크를 켜고 녹음한다 — 부작용으로 선언.
        side_effect: true
        exempt: '마이크 하드웨어 — 자동 점검 실행 금지'
        description: 이 몸의 마이크로 음성 입력 (지표어·op 분기 — 폰=SpeechRecognizer/MediaRecorder, 데스크탑=ffmpeg 마이크+Gemini STT). 마이크 없는 몸이면 작동불능(정직 거절). 상시 청취 아닌 호출 시 1회.
        group: device
        target_description: 'op=transcribe(기본): 지금 발화를 텍스트로 받아쓴다(timeout_sec 대기). record: duration_sec 초 동안 녹음해 오디오 파일로 저장(경로 반환). 이 몸에 마이크가 없으면 no_hardware — 폰 몸에 [others:ask]로 부탁.'
        target_key: op
        router: handler
        tool: phone_listen
        scope: system
        implementation: 지표어 몸별 프로브(능력 감지=jclass) — 폰=SpeechRecognizer(ko-KR)/MediaRecorder(Chaquopy→Kotlin) / 데스크탑=desktop_av.py ffmpeg(avfoundation·dshow·alsa) 녹음 + transcribe 는 Gemini 오디오 받아쓰기(키 없으면 녹음만 정직 반환). 하드웨어 무=no_hardware.
        ops:
          default: transcribe
          values:
            transcribe: 마이크 음성 받아쓰기 (STT → 텍스트)
            record: 마이크 녹음 (→ 오디오 파일 경로)
        keywords:
        - 받아쓰기
        - 음성인식
        - 녹음
        - 마이크
        - stt
        - voice
      see:
        returns: scalar
        # scalar 를 반환하지만 실제로 셔터를 눌러 사진 파일을 남긴다 — 부작용으로 선언.
        side_effect: true
        exempt: '카메라 하드웨어 — 자동 점검 실행 금지'
        description: 이 몸의 카메라로 사진 1장 촬영 (지표어 — 폰=Camera2 back/front, 데스크탑=ffmpeg 웹캠). 카메라 없는 몸(예 맥미니)이면 작동불능(정직 거절). 호출 시 1회, jpg 경로 반환.
        group: device
        target_description: 'facing=back(후면, 기본)/front(전면) — 폰에서만 의미(데스크탑=첫 웹캠). 미리보기 없이 정지 캡처 → 파일 경로 반환. 이 몸에 카메라가 없으면 no_hardware — 폰 몸에 [others:ask]로 부탁. "사진 찍어", "촬영해".'
        router: handler
        tool: phone_capture
        scope: system
        implementation: 지표어 몸별 프로브(능력 감지=jclass) — 폰=Camera2+ImageReader JPEG(Chaquopy→Kotlin PhoneActions.capturePhoto) / 데스크탑=desktop_av.py ffmpeg 웹캠 1프레임(avfoundation·dshow·v4l2, 화면캡처 장치는 카메라 아님=제외). 하드웨어 무=no_hardware.
        keywords:
        - 촬영
        - 사진
        - 카메라
        - 찍어
        - photo
        - camera
  limbs:
    actions:
      android:
        returns: effect
        description: 안드로이드 폰 화면 조작 (op 분기) — snapshot으로 요소 읽고 ref/좌표로 탭. 집 PC=USB-ADB 연결 폰, 폰 자신=네이티브 접근성(자급). 데스크톱은 limbs:screen, 웹은 limbs:browser.
        target_description: 흐름 — snapshot(요소+라벨+좌표 읽기, 기본) → tap(query 라벨/id 일부 권장, 또는 x,y) → type(text). 입력 후 전송 등 동적 버튼은 반드시 snapshot 다시. 주요 파라미터 — query(탭할 요소 라벨), x/y(snapshot이 준 좌표), text(입력), key(back/home/recent), package_name(앱 실행, 예 com.kakao.talk), direction(swipe up/down/left/right). device_id 생략 시 첫 기기(PC 경로). 가이드 android.md 참조.
        group: device
        target_key: op
        router: handler
        tool: android_op
        scope: system
        runs_on: anywhere
        ops:
          default: snapshot
          values:
            snapshot: 화면 독해 — 누를 수 있는 요소를 라벨+좌표로 반환 (탭 전 필수)
            tap: 요소 탭 (query 라벨/id 일부 권장, 또는 x,y)
            type: 포커스된 입력창에 텍스트 입력 (폰 네이티브는 ACTION_SET_TEXT라 한글 IME 불필요)
            swipe: 스와이프·스크롤 (direction up/down/left/right 또는 x1,y1,x2,y2)
            key: 시스템 키 (back/home/recent 등. 폰 네이티브는 enter 미지원)
            long_press: 길게 누르기 (x,y)
            open_app: 앱 실행 (package_name)
        implementation: 집 PC=ADB(uiautomator dump+input, ui_control.py), 폰 자신=네이티브 AccessibilityService (PhoneAccessibilityService — getRootInActiveWindow 독해 + dispatchGesture 터치 + ACTION_SET_TEXT 입력). 핸들러가 INDIEBIZ_PROFILE=phone 이면 네이티브로 분기. 폰은 1회 접근성 권한 활성 필요.
        keywords:
        - 안드로이드
        - 폰
        - 스마트폰
        - 카카오톡
        - 카톡
        - 앱조작
        - 화면조작
        - 터치
        - 탭
      phone:
        returns: effect
        description: 폰 네이티브 동작 (op 분기) — 알림/진동/토스트/복사/음성/앱실행/파일저장·공유. 동작 요청은 sense:phone 진단 없이 바로 실행 — 도달성은 sense:phone(푸시 피드) 신선도와 무관, 미도달이면 phone_unreachable 명시됨.
        group: device
        target_description: 'op=notify(기본): 알림 표시 — title/body. vibrate: 진동 — duration_ms(기본 400). toast: 화면 토스트 — text. clipboard: 클립보드 복사 — text. speak: TTS 음성 — text. open_app: 앱 실행 — package_name(예 com.kakao.talk). sms: 문자 작성창을 받는사람(to)·본문(text) 채워 열기 — 전송은 사용자 탭. call: 다이얼러를 번호(to) 채워 열기 — 통화는 사용자 탭. save: 파일을 공유 가능한 위치(다운로드 폴더)에 저장 — content(텍스트) 또는 b64(바이너리) + filename/mime. share: 저장 후 공유 시트를 열어 카카오톡 등으로 보내기(공유는 사용자 탭) — content/b64 + filename/mime.'
        target_key: op
        router: handler
        tool: phone_act
        scope: system
        runs_on: phone_only
        ops:
          default: notify
          values:
            notify: 알림 표시 (title/body — "폰에 알림 띄워줘")
            vibrate: 진동 (duration_ms)
            toast: 화면에 토스트 메시지 (text)
            clipboard: 클립보드에 복사 (text)
            speak: TTS 음성 출력 (text)
            open_app: 앱 실행 (package_name)
            sms: 문자 작성창 열기 (to·text 채움, 전송은 사용자 탭 — 자율 발송 아님)
            call: 다이얼러 열기 (to 채움, 통화는 사용자 탭 — 즉시 발신 아님)
            save: 파일을 공유 가능한 위치(다운로드)에 저장 (content 또는 b64 + filename)
            share: 저장 후 공유 시트 열기 (카카오톡 등으로 공유 — 공유는 사용자 탭)
        implementation: Chaquopy Java 브리지로 Kotlin PhoneActions(@JvmStatic) 호출. android 패키지 phone_act 핸들러(scope:system).
        keywords:
        - 폰알림
        - 진동
        - 음성
        - 토스트
        - 클립보드복사
        - 앱실행

# tool.json 파생 원본 (2026-07-03 이관) — 빌드가 이 블록과 위 actions 의 ops 로 tool.json 을 생성한다.
# op-bearing 도구의 op enum/default 는 여기 저장하지 않는다 (actions 의 ops 가 단일 소스).
tool_json:
  header:
    id: android
    name: Android Phone Control
    description: ADB(uiautomator)로 안드로이드 폰 화면을 독해·터치·입력하는 얇은 센터피스. snapshot으로 요소를 읽고 ref/좌표로 조작.
    version: 2.0.0
  tools:
  - name: android_op
    description: '안드로이드 폰 화면 조작 단일 디스패처. op으로 snapshot/tap/type/swipe/key/long_press/open_app 분기 (기본 snapshot). 흐름: snapshot
      → tap/type → (입력 후 동적 버튼은) snapshot 재실행.'
    input_schema:
      type: object
      properties:
        op:
          type: string
          description: 수행할 동작
        query:
          type: string
          description: tap 대상 요소의 라벨/content-desc/resource-id 일부 (op=tap, 가장 견고)
        index:
          type: integer
          description: query 결과가 여럿일 때 몇 번째 (op=tap, 기본 0)
        x:
          type: integer
          description: 탭/롱프레스 X 좌표 (snapshot이 준 좌표; op=tap/long_press)
        y:
          type: integer
          description: 탭/롱프레스 Y 좌표 (op=tap/long_press)
        text:
          type: string
          description: 입력할 텍스트 (op=type; 한글은 IndieBiz IME 필요)
        direction:
          type: string
          enum:
          - up
          - down
          - left
          - right
          description: 스와이프/스크롤 방향 (op=swipe)
        x1:
          type: integer
          description: 스와이프 시작 X (op=swipe, 좌표 방식)
        y1:
          type: integer
          description: 스와이프 시작 Y (op=swipe, 좌표 방식)
        x2:
          type: integer
          description: 스와이프 끝 X (op=swipe, 좌표 방식)
        y2:
          type: integer
          description: 스와이프 끝 Y (op=swipe, 좌표 방식)
        duration_ms:
          type: integer
          description: 스와이프/롱프레스 지속 시간 ms
        key:
          type: string
          description: '시스템 키 (op=key): back/home/enter/recent/delete/menu 등'
        package_name:
          type: string
          description: '실행할 앱 패키지명 (op=open_app), 예: com.kakao.talk'
        device_id:
          type: string
          description: 기기 ID (생략 시 첫 번째 연결 기기)
  - name: phone_op
    description: 폰 컴패니언 알림 피드 조회. 폰 에이전트가 보낸 최근 알림을 읽음(USB-ADB 불필요) — '지금 폰에 연락/알림 오나'의 정답 소스. (위치는 sense:here 온디맨드로 분리, 상시
      수집 폐기.)
    input_schema:
      type: object
      properties:
        op:
          type: string
          description: 조회 종류
        limit:
          type: integer
          description: 가져올 개수 (기본 20)
        pkg:
          type: string
          description: '특정 앱 패키지만 필터, 예: com.kakao.talk'
  - name: phone_locate
    description: 폰의 현재 위치를 즉석에서 한 번 조회 (fused GPS). 상시 추적/저장 없이 물을 때만. 위경도+주소(역지오코딩) 반환. '지금 어디', '내 위치', 날씨/맛집/길찾기의 출발점.
      폰 네이티브 전용(맥/원격은 분산 IBL 로 폰에 포워드).
    input_schema:
      type: object
      properties: {}
      additionalProperties: true
  - name: phone_listen
    description: '폰 마이크 온디맨드 입력. op=transcribe(기본): 지금 발화를 받아써 텍스트로(STT, ko-KR, timeout_sec 대기). record: duration_sec 초 녹음해
      파일로(경로 반환). 상시 청취 아닌 호출 시 1회. 폰 네이티브 전용(맥/원격은 분산 IBL 포워드 — transcribe 텍스트는 무손실, record 파일은 폰 잔류).'
    input_schema:
      type: object
      properties:
        op:
          type: string
          description: transcribe=받아쓰기(STT→텍스트), record=녹음(→오디오 파일)
        timeout_sec:
          type: integer
          description: 받아쓰기 발화 대기 한도 초 (op=transcribe, 기본 15, 5~60)
        duration_sec:
          type: integer
          description: 녹음 길이 초 (op=record, 기본 5, 1~300)
  - name: phone_capture
    description: 폰 카메라로 사진 1장 촬영 (미리보기 없이 정지 캡처). 상시 촬영 아닌 호출 시 1회. facing=back(기본)/front. 폰에 jpg 저장 후 경로 반환. 폰 네이티브 전용(맥/원격은
      분산 IBL 포워드 — 파일은 폰 잔류). 앱 포그라운드일 때 가장 안정적.
    input_schema:
      type: object
      properties:
        facing:
          type: string
          enum:
          - back
          - front
          default: back
          description: 후면(back, 기본) 또는 전면(front) 카메라
      additionalProperties: true
  - name: phone_act
    description: 폰 네이티브 동작(송신측) — 폰의 뇌가 폰 하드웨어를 직접 만진다. sense:phone(입력)의 출력 짝. op=notify(알림 표시·기본)/vibrate(진동)/toast(화면 토스트)/clipboard(클립보드
      복사)/speak(TTS 음성)/open_app(앱 실행)/sms(문자 작성창을 받는사람·본문 채워 열기 — 전송은 사용자 탭)/call(다이얼러를 번호 채워 열기 — 통화는 사용자 탭). 폰 네이티브 앱 전용(USB-ADB
      불필요).
    input_schema:
      type: object
      properties:
        op:
          type: string
          description: 수행할 동작
        to:
          type: string
          description: '받는사람 전화번호 (op=sms/call). 예: 01012345678'
        title:
          type: string
          description: 알림 제목 (op=notify, 기본 'IndieBiz')
        body:
          type: string
          description: 알림 본문 (op=notify)
        text:
          type: string
          description: 표시·복사·발화할 텍스트 (op=toast/clipboard/speak)
        duration_ms:
          type: integer
          description: 진동 지속 시간 ms (op=vibrate, 기본 400)
        package_name:
          type: string
          description: '실행할 앱 패키지명 (op=open_app), 예: com.kakao.talk'
