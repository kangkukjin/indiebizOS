node: limbs
actions:
  android_devices:
    description: 연결된 기기 목록 조회
    router: handler
    tool: android_list_devices
    implementation: ADB(Android Debug Bridge) CLI로 연결된 기기 목록 조회
  android_info:
    description: 기기 상세 정보 (모델, OS, 배터리, 저장소)
    target_description: device_id (선택)
    router: handler
    tool: android_device_info
    implementation: ADB shell getprop으로 기기 상세 정보 조회
    target_key: device_id
  android_status:
    description: 기기 시스템 상태 (배터리, 온도, 저장소)
    target_description: device_id (선택)
    router: handler
    tool: android_system_status
    implementation: ADB shell dumpsys battery/diskstats로 시스템 상태 조회
    target_key: device_id
  android_sms_list:
    description: SMS 목록 조회 (inbox/sent/all)
    router: handler
    tool: android_get_sms
    implementation: ADB content query로 SMS 목록 조회
  android_sms_send:
    description: SMS 발송
    target_description: 수신 전화번호
    router: handler
    tool: android_send_sms
    implementation: ADB shell am로 SMS 발송 인텐트 실행
    target_key: phone_number
  android_sms_search:
    description: SMS/MMS/RCS 검색
    target_description: 검색어
    router: handler
    tool: android_search_sms
    implementation: ADB content query + like 검색으로 메시지 검색
    target_key: query
  android_call:
    description: 전화 걸기
    target_description: 전화번호
    router: handler
    tool: android_make_call
    implementation: ADB shell am로 전화 걸기 인텐트 실행
    target_key: phone_number
  android_call_log:
    description: 통화 이력 조회
    router: handler
    tool: android_get_call_log
    implementation: ADB content query로 통화 이력 조회
  android_contact_search:
    description: 연락처 검색
    target_description: 검색어
    router: handler
    tool: android_search_contacts
    implementation: ADB content query로 연락처 검색
    target_key: query
  android_apps:
    description: 설치된 앱 목록 (크기, 사용량 포함)
    router: handler
    tool: android_apps_with_details
    implementation: ADB shell pm + dumpsys로 앱 목록 + 크기/사용량 조회
  android_notifications:
    description: 알림 목록 읽기
    router: handler
    tool: android_notifications
    implementation: ADB shell dumpsys notification으로 알림 목록 조회
  android_screenshot:
    description: 안드로이드 화면 캡처 (AI 분석용)
    router: handler
    tool: android_ui_screenshot
    implementation: ADB shell screencap + pull로 캡처 후 로컬 저장
  android_screenshot_grid:
    description: 좌표 그리드 오버레이 스크린샷 (캘리브레이션용)
    router: handler
    tool: android_ui_screenshot_grid
    implementation: ADB screencap + PIL로 좌표 그리드 오버레이 이미지 생성
  android_tap_grid:
    description: 그리드 셀 ID로 탭 (예 B3)
    target_description: 그리드 셀 ID (예 B3, A0, D7)
    router: handler
    tool: android_ui_tap_grid
    implementation: 그리드 셀 ID를 좌표로 변환 후 ADB input tap 실행
    target_key: cell
  android_push_file:
    description: PC→안드로이드 파일 전송
    target_description: 로컬 파일 경로
    router: handler
    tool: android_push_file
    implementation: ADB push로 PC→안드로이드 파일 전송
    target_key: local_path
  android_pull_file:
    description: 안드로이드→PC 파일 전송
    target_description: 원격 파일 경로
    router: handler
    tool: android_pull_file
    implementation: ADB pull로 안드로이드→PC 파일 전송
    target_key: remote_path
  android_tap:
    description: 화면 좌표 탭 (UI 자동화)
    router: handler
    tool: android_ui_tap
    implementation: ADB shell input tap으로 화면 좌표 터치
  android_type_text:
    description: 텍스트 입력 (UI 자동화)
    target_description: 입력할 텍스트
    router: handler
    tool: android_ui_type_text
    implementation: ADB shell input text로 텍스트 입력
    target_key: text
  android_find_tap:
    description: UI 요소 찾아서 탭 (텍스트 기반)
    target_description: 찾을 텍스트
    router: handler
    tool: android_ui_find_and_tap
    implementation: ADB uiautomator dump + XML 파싱으로 요소 찾아 탭
    target_key: query
  android_open_app:
    description: 앱 실행
    target_description: 패키지명
    router: handler
    tool: android_ui_open_app
    implementation: ADB shell monkey/am start로 앱 실행
    target_key: package_name
  android_swipe:
    description: 스와이프/스크롤 (UI 자동화)
    router: handler
    tool: android_ui_swipe
    implementation: ADB shell input swipe로 스와이프 제스처
  android_key:
    description: 시스템 키 입력 (HOME/BACK/RECENT 등)
    target_description: 키코드
    router: handler
    tool: android_ui_press_key
    implementation: ADB shell input keyevent로 시스템 키 입력
    target_key: keycode
  android_app_info:
    description: 앱 상세 정보 (버전, 크기, 권한)
    target_description: 패키지명
    router: handler
    tool: android_app_info
    implementation: ADB shell dumpsys package로 앱 상세 정보 조회
    target_key: package_name
  android_app_sizes:
    description: 설치된 앱 크기 정보
    router: handler
    tool: android_app_sizes
    implementation: ADB shell du로 앱 크기 조회
  android_app_usage:
    description: 앱 사용 시간 통계
    router: handler
    tool: android_app_usage
    implementation: ADB shell usagestats로 앱 사용 시간 조회
  android_permissions:
    description: 앱 권한 확인
    target_description: 패키지명
    router: handler
    tool: android_check_permissions
    implementation: ADB shell dumpsys package로 앱 권한 조회
    target_key: package_name
  android_grant_permissions:
    description: 앱 권한 부여
    target_description: 패키지명
    router: handler
    tool: android_grant_permissions
    implementation: ADB shell pm grant로 앱 권한 부여
    target_key: package_name
  android_delete_call_log:
    description: 통화 이력 삭제
    router: handler
    tool: android_delete_call_log
    implementation: ADB content delete로 통화 이력 삭제
  android_delete_contact:
    description: 연락처 삭제
    router: handler
    tool: android_delete_contact
    implementation: ADB content delete로 연락처 삭제
    target_key: contact_id
  android_delete_messages:
    description: 메시지 삭제
    router: handler
    tool: android_delete_messages
    implementation: ADB content delete로 메시지 삭제
  android_delete_mms:
    description: MMS 삭제
    router: handler
    tool: android_delete_mms_by_content
    implementation: ADB content delete로 MMS 삭제
  android_delete_sms:
    description: SMS 삭제
    router: handler
    tool: android_delete_sms
    implementation: ADB content delete로 SMS 삭제
    target_key: message_id
  android_end_call:
    description: 통화 종료
    router: handler
    tool: android_end_call
    implementation: ADB shell input keyevent ENDCALL로 통화 종료
  android_all_messages:
    description: 전체 메시지 조회 (SMS+MMS+RCS)
    router: handler
    tool: android_get_all_messages
    implementation: ADB content query로 SMS+MMS+RCS 통합 조회
  android_contact_list:
    description: 전체 연락처 목록
    router: handler
    tool: android_get_contacts
    implementation: ADB content query로 전체 연락처 조회
  android_mms:
    description: MMS 메시지 조회
    router: handler
    tool: android_get_mms
    implementation: ADB content query로 MMS 메시지 조회
  android_find_element:
    description: UI 요소 찾기 (텍스트/속성)
    target_description: 검색어
    router: handler
    tool: android_ui_find_element
    implementation: ADB uiautomator dump + XML 파싱으로 UI 요소 검색
    target_key: query
  android_hierarchy:
    description: UI 트리 구조 덤프
    router: handler
    tool: android_ui_hierarchy
    implementation: ADB uiautomator dump로 UI 트리 XML 추출
  android_long_press:
    description: 길게 누르기 (UI 자동화)
    router: handler
    tool: android_ui_long_press
    implementation: ADB shell input swipe(동일좌표)로 길게 누르기
  android_screen_info:
    description: 안드로이드 화면 정보 (해상도, 밀도)
    router: handler
    tool: android_ui_screen_info
    implementation: ADB shell wm size/density로 화면 해상도/밀도 조회
  android_uninstall:
    description: 앱 삭제
    target_description: 패키지명
    router: handler
    tool: android_uninstall_app
    implementation: ADB shell pm uninstall로 앱 삭제
    target_key: package_name
  android_manager:
    description: Android Manager GUI 실행
    router: handler
    tool: open_android_manager
    implementation: Electron 기반 Android Manager GUI 실행
guides:
- android.md
