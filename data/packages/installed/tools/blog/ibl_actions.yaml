node: self
actions:
  blog:
    returns: items
    fixture: '[self:blog]{op: "list"}'
    runs_on: mac_only
    description: 내 블로그 조회·검색·관리 (op 분기). RAG 검색 + 글 목록·통계·인덱스 + vault 운영.
    target_description: 'op로 분기 (기본 posts).

      - posts: 글 목록. category/count 옵션.

      - search: RAG 검색. query(필수) + mode(hybrid 기본/semantic/content) + limit. content는 post_id 또는 title.

      - check_new: 마지막 조회 이후 새로 추가된 글 확인.

      - rebuild_index: 검색 인덱스(벡터 임베딩) 재구축. 글 다량 추가 후.

      - stats: 전체 글 수·카테고리/기간 분포·활동 트렌드.

      - vault: Obsidian vault(진실소스) 운영. mode stats(기본)/export/rebuild/link — rebuild=vault→검색DB 재구축(복구 경로), link=글 간 시맨틱 연결 생성.

      - latest: 가장 최근 글 1개를 고른다. 본문이 아니라 vault .md **경로**(path)를 준다 — 발행은 기존 동사로 잇는다: >> [self:read]{} >> [table:document]{format:"html"} >> [self:copy]{destination:...}

      '
    target_key: op
    group: blog
    router: handler
    tool: blog_op
    ops:
      default: posts
      values:
        posts: 글 목록 조회 (category/기간 필터)
        search: RAG 검색 (mode hybrid/semantic/content)
        check_new: 마지막 조회 이후 새 글 확인
        rebuild_index: 검색 인덱스(벡터) 재구축
        stats: 블로그 통계 (글 수·분포·트렌드)
        vault: Obsidian vault(진실소스) 운영 (mode stats/export/rebuild/link)
        latest: 최근 글 1개 선택 — vault .md 경로 반환(발행 파이프의 머리)
    implementation: blog 패키지 op 분기. posts=blog_get_posts, search=blog_search_op(mode), check_new=blog_check_new_posts, rebuild_index=rebuild_search_index, stats=blog_stats, vault=blog_vault_*(mode — 2026-07-03 고아 기능 op 승격), latest=blog_latest_post(2026-07-18 — 선택만, 발행은 read/document/copy 재사용).
    keywords:
    - 블로그
    - 블로그 검색
    - 시맨틱
    - 블로그 통계
    - 인덱스
    - vault

# tool.json 파생 원본 (2026-07-03 이관) — 빌드가 이 블록과 위 actions 의 ops 로 tool.json 을 생성한다.
# op-bearing 도구의 op enum/default 는 여기 저장하지 않는다 (actions 의 ops 가 단일 소스).
tool_json:
  header:
    id: blog
    name: Blog Tools
    description: 개인 블로그(K의 생각) RAG 검색 및 분석 도구. 티스토리 블로그 글 검색, 전문 조회, 카테고리별 필터링, 글 기반 인사이트 생성 기능을 제공합니다. 과거 글 검색, 블로그 트렌드 분석에 활용.
    version: 3.0.0
  tools:
  # 2026-07-03 미소유 도구 감사: 죽은 tool.json 항목 13개 제거. [self:blog]{op} 내부 디스패치는
  # handler.py의 tool_name 재할당(문자열)이라 tool.json 불필요. program_scheduler(extensions/scheduler)는
  # tool_blog_insight.py 함수를 직접 import — tool.json 무관.
  - name: blog_op
    description: '내 블로그 조회·검색·관리 (op 분기) — [self:blog].

      - op=posts(기본): 글 목록. category/count.

      - op=search: RAG 검색. query + mode(hybrid 기본/semantic/content) + limit. content는 post_id 또는 title.

      - op=check_new: 마지막 조회 이후 새 글.

      - op=rebuild_index: 검색 인덱스(벡터) 재구축.

      - op=stats: 글 수·분포·트렌드.

      - op=vault: Obsidian vault(진실소스) 운영. mode stats(기본)/export/rebuild/link.'
    input_schema:
      type: object
      properties:
        op:
          type: string
          description: posts(기본)/search/check_new/rebuild_index/stats/vault
        query:
          type: string
          description: '[search] 검색어'
        mode:
          type: string
          enum:
          - hybrid
          - semantic
          - content
          - stats
          - export
          - rebuild
          - link
          description: '[search] hybrid(기본)/semantic/content · [vault] stats(기본)/export/rebuild/link'
        reindex:
          type: boolean
          description: '[vault rebuild] 재구축 후 검색 인덱스 재빌드 (기본 true)'
        k:
          type: integer
          description: '[vault link] 글당 연결 수 (기본 6)'
        min_sim:
          type: number
          description: '[vault link] 최소 유사도 (기본 0.55)'
        limit:
          type: integer
          description: '[search] 결과 수(기본 5)'
        post_id:
          type: string
          description: '[search content] 글 ID'
        title:
          type: string
          description: '[search content] 제목(부분일치)'
        category:
          type: string
          description: '[posts] 카테고리 필터'
        count:
          type: integer
          description: '[posts] 개수(기본 20)'
      required: []
