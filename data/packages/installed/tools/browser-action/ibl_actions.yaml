node: limbs
actions:
  browser:
    aliases:
      source_ref: [from_ref]
      target_ref: [to_ref]
    returns: effect
    runs_on: mac_only
    description: 브라우저(웹) 조작 — DOM ref 기반 (op 분기). Playwright/Chrome MCP. 화면 좌표 조작은 limbs:screen, 파일은 self.
    target_description: op로 동작 선택. 흐름 — navigate(이동)→snapshot(요소 ref 획득)→click/type. 복합 동작은 mode 2차 선택 — click(single|double|right), navigate(goto|back|forward), content(text|html), tab(list|new|switch|close), logs(console|network), cookies(save|load), iframe(list|switch|reset), chrome(connect|disconnect|status). 주요 파라미터 — ref(요소), text(입력), url(이동), expression(JS), query(자연어검색), path(저장).
    group: browser
    target_key: op
    router: handler
    tool: browser_op
    ops:
      default: snapshot
      values:
        snapshot: 접근성 트리 스냅샷 — 요소에 ref 부여 (클릭/입력 전 필수)
        navigate: 페이지 이동 (mode goto|back|forward; goto는 url)
        click: 요소 클릭 (ref; mode single|double|right)
        type: 입력 필드에 텍스트 입력 (ref, text)
        press_key: 키보드 키 입력 (Enter/Tab/Escape 등)
        hover: 요소에 마우스 호버 (ref)
        drag: 드래그 앤 드롭 (source_ref→target_ref)
        select: select 박스 옵션 선택 (ref, value/label)
        check: 체크박스·라디오 토글 (ref)
        upload_file: 파일 input에 업로드 (ref, path)
        scroll: 페이지 스크롤 (up/down)
        wait: 조건 대기 (selector/url/text/networkidle)
        content: 페이지 콘텐츠 추출 (mode text|html)
        screenshot: 페이지 스크린샷 PNG 저장 (path, full_page)
        vision: 스크린샷 base64 반환 (AI 시각 인식용)
        evaluate: JavaScript 표현식 실행 (expression)
        pdf: 페이지를 PDF로 저장 (path)
        find: 자연어로 요소 검색 (query; Chrome MCP 전용)
        logs: 브라우저 로그 (mode console|network)
        dialog_info: Alert/Confirm/Prompt 팝업 정보
        resize: 뷰포트 크기 변경 (width/height)
        close: 브라우저 세션 종료
        tab: 탭 관리 (mode list|new|switch|close)
        iframe: iframe 관리 (mode list|switch|reset)
        cookies: 쿠키 저장·복원 (mode save|load)
        chrome: Chrome MCP 원격 제어 (mode connect|disconnect|status)
    keywords:
    - 브라우저
    - 웹 자동화
    - 클릭
    - 입력
    - 페이지

# tool.json 파생 원본 (2026-07-03 이관) — 빌드가 이 블록과 위 actions 의 ops 로 tool.json 을 생성한다.
# op-bearing 도구의 op enum/default 는 여기 저장하지 않는다 (actions 의 ops 가 단일 소스).
tool_json:
  header:
    id: browser-action
    name: Browser Action
    description: 'Playwright + Chrome MCP 듀얼 드라이버 브라우저 자동화.


      [드라이버]

      - auto (기본): Chrome MCP 연결 시 Chrome 사용, 미연결 시 Playwright 폴백

      - chrome: 실제 Chrome 브라우저 제어 (로그인 상태/쿠키 유지)

      - playwright: 별도 Chromium 인스턴스 (헤드리스, stealth)


      [Chrome 드라이버 사용법]

      1. browser_chrome_connect로 Chrome MCP 서버 연결

      2. 이후 모든 도구가 자동으로 Chrome 드라이버 사용

      3. 실제 Chrome의 로그인 세션, 쿠키, 확장 프로그램 그대로 활용


      [Playwright 워크플로우]

      1. navigate → snapshot → ref 확인 → click/type (이 순서 필수)

      2. 페이지 이동/클릭 후 반드시 snapshot 재호출 (ref가 무효화됨)

      3. 복잡한 페이지(500+요소)에서는 evaluate로 JS 직접 실행

      4. 로그인 유지: cookies_save → 다음 세션에서 cookies_load'
    version: 6.0.0
  tools:
  # 2026-07-03 미소유 도구 감사: 죽은 tool.json 항목 37개 제거. [limbs:browser]{op} 26개 동작은
  # handler.py _OP_DISPATCHERS의 내부 tool_name 재할당이라 tool.json 불필요. 아래 3개만 외부(backend) 호출자 있음.
  - name: browser_op
    description: 브라우저(웹) 조작 단일 디스패처. op으로 26개 동작 분기 (기본 snapshot). 복합 동작(click/navigate/content/tab/logs/cookies/iframe/chrome)은 mode로 2차 분기.
    input_schema:
      type: object
      properties:
        op:
          type: string
          description: 브라우저 동작
        mode:
          type: string
          description: 복합 동작의 2차 선택 — click(single|double|right) navigate(goto|back|forward) content(text|html) tab(list|new|switch|close) logs(console|network) cookies(save|load) iframe(list|switch|reset) chrome(connect|disconnect|status)
        ref:
          type: string
          description: browser_snapshot에서 얻은 요소 ref
        selector:
          type: string
          description: CSS selector (ref 대안)
        element:
          type: string
          description: 요소 설명
        text:
          type: string
          description: 입력할 텍스트 (type)
        url:
          type: string
          description: 이동할 URL (navigate goto)
        expression:
          type: string
          description: 실행할 JavaScript 표현식 (evaluate)
        query:
          type: string
          description: 자연어 요소 검색어 (find)
        path:
          type: string
          description: 저장 경로 (screenshot/pdf/upload_file)
        full_page:
          type: boolean
          description: 전체 페이지 스크린샷 여부
        value:
          type: string
          description: select 옵션 value
        label:
          type: string
          description: select 옵션 label
        key:
          type: string
          description: 키 입력 (press_key, 예 Enter)
        source_ref:
          type: string
          description: 드래그 출발 요소 (drag)
        target_ref:
          type: string
          description: 드래그 도착 요소 (drag)
        width:
          type: integer
          description: 뷰포트 너비 (resize)
        height:
          type: integer
          description: 뷰포트 높이 (resize)
        driver:
          type: string
          enum:
          - auto
          - chrome
          - playwright
          default: auto
  # 산 배관(2026-07-03 감사): backend/web_collector.py:325가 load_tool_handler("browser_navigate")로 직접 디스패치 — tool.json 항목 필수
  - name: browser_navigate
    description: 브라우저를 열고 URL로 이동합니다. HTTP 상태코드와 리다이렉트 체인을 반환합니다. 이동 후 browser_snapshot으로 페이지 구조를 파악하세요.
    input_schema:
      type: object
      properties:
        url:
          type: string
          description: 이동할 URL (https:// 생략 가능)
        headless:
          type: boolean
          default: true
          description: 헤드리스 모드 (Playwright 전용)
        wait_for:
          type: string
          enum:
          - domcontentloaded
          - load
          - networkidle
          default: domcontentloaded
          description: 페이지 로드 대기 조건 (Playwright 전용)
        driver:
          type: string
          enum:
          - auto
          - chrome
          - playwright
          default: auto
          description: 드라이버 선택
      required:
      - url
  # 산 배관(2026-07-03 감사): backend/web_collector.py _run()이 context.tool_name="browser_get_content"로 핸들러 직접 호출
  - name: browser_get_content
    description: 현재 페이지의 텍스트 내용을 추출합니다.
    input_schema:
      type: object
      properties:
        selector:
          type: string
          description: 특정 영역만 추출할 CSS 선택자
        max_length:
          type: integer
          default: 10000
          description: 최대 텍스트 길이
        driver:
          type: string
          enum:
          - auto
          - chrome
          - playwright
          default: auto
          description: 드라이버 선택
  # 산 배관(2026-07-03 감사): backend/web_collector.py _run()이 context.tool_name="browser_evaluate"로 핸들러 직접 호출
  - name: browser_evaluate
    description: 현재 페이지에서 JavaScript를 실행합니다.
    input_schema:
      type: object
      properties:
        expression:
          type: string
          description: 실행할 JavaScript 표현식
        timeout:
          type: integer
          default: 10000
          description: 실행 타임아웃 (ms)
        driver:
          type: string
          enum:
          - auto
          - chrome
          - playwright
          default: auto
          description: 드라이버 선택
      required:
      - expression
