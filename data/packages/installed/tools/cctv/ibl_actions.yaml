nodes:
  sense:
    actions:
      cctv:
        returns: items
        fixture: '[sense:cctv]{op: "search", query: "해운대"}'
        description: CCTV/웹캠 조회 (op 분기). search(키워드 통합검색)/nearby(좌표 근처, lat·lng 필수). 출력은 항상 lat/lng·playable 포함, stream_tags 동봉 시 채팅창 재생. 자세히 read_guide(query="cctv").
        group: media
        keywords:
        - cctv
        - 교통
        - 실시간
        - 카메라
        - 보여줘
        - 봐줘
        - traffic
        - camera
        - 영상
        - 근처
        - 주변
        target_description: search — query 키워드(전주·해운대·경부 등). nearby/webcam — lat·lng 필수, radius_km(km) 옵션. webcam은 해외 경치 웹캠(Windy).
        target_key: op
        router: handler
        tool: cctv_query
        ops:
          default: search
          values:
            search: 키워드로 전국 CCTV+해외 웹캠 통합 검색 (기본)
            nearby: 좌표 근처 CCTV (lat·lng 필수, radius_km km)
            webcam: 좌표 근처 해외 경치 웹캠 (Windy 직행, 교통 CCTV 건너뜀)
        implementation: cctv_search/nearby/webcam op 분기 (카카오 우선 → TOPIS/UTIC/ITS → Windy 폴백; webcam은 Windy 직행).
        app:
          instrument: cctv
          icon: 📹
          name: CCTV
          order: 12
          inputs:
          - key: q
            type: text
            label: 검색
            placeholder: '지역·도로 (예: 해운대, 경부)'
            default: 해운대
          auto_run: true
          action: '[sense:cctv]{op: "search", query: "$q"}'
          view:
          - type: map
            markers: items
            max: 100
            'on':
              marker_click:
                stream: true
              # "이 지역에서 검색" 버튼 — 지도로 영역을 잡고 누르면 그 중심·반경의 CCTV를 nearby 로 찾는다.
              # 키워드(이름) 검색과 별개로 지도에서 직접 영역 기반 탐색. viewport 보존(결과가 그 영역에 뜸).
              search_here: '[sense:cctv]{op: "nearby", lat: $lat, lng: $lng, radius_km: $radius_km}'
          - type: metric
            label: 검색 결과
            big: '{count}개'
          - type: list_action
            from: items
            icon: 📹
            empty: CCTV를 찾지 못했습니다
            title: '{name}'
            sub: '{region}{road_name|opt: · ,}'
            button:
              label: ▶ 보기
              stream: true
  self:
    actions:
      cctv:
        returns: scalar
        exempt: '기기 의존(카메라 연결)'
        description: 'CCTV 데이터 캐시 행정 (op 분기). stats(기본): 소스별 현황 / refresh: UTIC 캐시 갱신.'
        group: cctv
        target_description: '파라미터 없음. op 분기 — stats(기본): 카카오·UTIC·ITS·Windy 전체 소스 CCTV 현황·총수 / refresh: UTIC 실시간 API로 전국 캐시 일괄 갱신(유지보수).'
        target_key: op
        router: handler
        tool: cctv_admin
        ops:
          default: stats
          values:
            stats: 전체 소스 CCTV 현황 통계
            refresh: UTIC 캐시 갱신 (유지보수)
        implementation: handler.py _cctv_admin이 op 분기 — stats=cctv_sources(전체 소스 집계), refresh=utic.refresh_cache.
        keywords:
        - CCTV
        - CCTV 현황
        - CCTV 통계
        - CCTV 갱신
  limbs:
    actions:
      cctv:
        returns: effect
        description: CCTV 실시간 영상 열기·캡처 (op 분기). open(브라우저 재생) / capture(이미지 저장).
        group: open
        target_description: name 또는 url 중 하나. open — 브라우저에서 HLS/RTSP 재생. capture — ffmpeg로 단일 프레임 PNG 캡처 (save_path 옵션, AI 분석용).
        target_key: op
        router: handler
        tool: cctv_op
        ops:
          default: open
          values:
            open: 브라우저에서 HLS/RTSP 영상 재생 (기본)
            capture: ffmpeg 단일 프레임 PNG 캡처 (AI 분석용)
        implementation: cctv_open/cctv_capture op 분기 (HLS 브라우저 재생 + ffmpeg 프레임 캡처)
        keywords:
        - cctv
        - 열기
        - 캡처
        - 스크린샷
        - 찍어

# tool.json 파생 원본 (2026-07-03 이관) — 빌드가 이 블록과 위 actions 의 ops 로 tool.json 을 생성한다.
# op-bearing 도구의 op enum/default 는 여기 저장하지 않는다 (actions 의 ops 가 단일 소스).
tool_json:
  header:
    id: cctv
    name: CCTV 실시간 영상
    description: 'CCTV 및 실시간 웹캠 통합 도구


      ## 소스

      - UTIC 도시교통정보센터 (한국 시내도로 CCTV, 16,000+대 실시간 API)

      - ITS 국가교통정보센터 (한국 고속도로/국도 CCTV)

      - Windy Webcams (전세계 웹캠)


      ## 주요 기능

      - 위치/키워드 기반 CCTV 검색 (UTIC+ITS+Windy 통합)

      - 가장 가까운 CCTV 찾기

      - 실시간 영상 URL 제공

      - 화면 캡처 (ffmpeg/이미지)

      - UTIC 실시간 API 연동 (캐시 자동 갱신)


      ## 필요 환경변수

      - UTIC_API_KEY: 도시교통정보센터 API 키

      - ITS_API_KEY: 국가교통정보센터 API 키

      - WINDY_API_KEY: Windy Webcams API 키 (선택)'
    version: 3.0.0
  tools:
  - name: cctv_query
    description: 'CCTV/웹캠 조회 (op 분기) — [sense:cctv].

      - op=search (기본): 키워드로 전국 CCTV+해외 웹캠 통합 검색. 한국+해외 지명 자동 좌표 매핑.

      - op=nearby: 좌표(lat·lng 필수) 근처 CCTV. radius_km(km, 기본 5) 옵션.

      - op=webcam: 좌표(lat·lng 필수) 근처 해외 경치 웹캠 (Windy 직행, 교통 CCTV 건너뜀).

      출력 cctvs[]/webcams[]는 항상 lat/lng(float)·playable 포함. stream_tags 동봉 시 채팅창 재생.


      ## 예시

      - cctv_query(query=''광화문'')          # 기본 search

      - cctv_query(op=''nearby'', lat=37.5665, lng=126.9780, radius_km=3)

      - cctv_query(op=''webcam'', lat=48.8566, lng=2.3522)  # 파리 근처 경치 웹캠'
    input_schema:
      type: object
      properties:
        op:
          type: string
          description: search=키워드 검색(기본), nearby=좌표 근처 CCTV, webcam=좌표 근처 해외 경치 웹캠
        query:
          type: string
          description: '[search] 검색 키워드 (광화문, 경부, 해운대 등)'
        lat:
          type: number
          description: '[nearby] 위도 (필수)'
        lng:
          type: number
          description: '[nearby] 경도 (필수)'
        radius_km:
          type: number
          description: '[nearby] 검색 반경 km (기본 5)'
        count:
          type: integer
          description: '[nearby] 반환할 CCTV 수 (기본 5)'
        category:
          type: string
          description: '[search] Windy 카테고리 (mountain, beach, city 등)'
        limit:
          type: integer
          description: '[search] 최대 결과 수 (기본 10)'
  - name: cctv_admin
    description: 'CCTV 데이터 캐시 행정. op으로 stats/refresh 분기 (기본 stats).

      stats=전체 소스(카카오·UTIC·ITS·Windy) 현황 통계, refresh=UTIC 실시간 API로 전국 캐시 갱신(유지보수).'
    input_schema:
      type: object
      properties:
        op:
          type: string
          description: stats=전체 소스 현황 통계 / refresh=UTIC 캐시 갱신(유지보수)
  - name: cctv_op
    description: CCTV 열기/캡처 단일 디스패처. op으로 open/capture 분기 (기본 open).
    input_schema:
      type: object
      properties:
        op:
          type: string
          description: CCTV 동작
        url:
          type: string
          description: CCTV 스트림 URL
        name:
          type: string
          description: CCTV 이름 (url 대안, 자동 검색)
        save_path:
          type: string
          description: 캡처 저장 경로 (op=capture 시)
