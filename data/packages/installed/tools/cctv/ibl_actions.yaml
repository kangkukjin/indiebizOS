nodes:
  sense:
    actions:
      cctv_search:
        description: 국내 CCTV + 해외 웹캠 통합 검색 (ITS+Windy). 한국 교통/도시 CCTV와 해외 웹캠을 동시 검색. 결과의 stream_tags를 응답에 포함하면 채팅창에서 스트리밍 재생. 해외만 보려면 webcam 사용.
        keywords: [cctv, 교통, 실시간, 카메라, 보여줘, 봐줘, traffic, camera, 영상]
        target_description: 검색 키워드 (전주, 해운대, 제주, 경부 등)
        router: handler
        tool: search_cctv
        implementation: 국토부 ITS API(한국 CCTV) + Windy API(해외 웹캠) 통합 검색. 해외 전용은 webcam 액션 사용.
        target_key: query
      cctv_nearby:
        description: 좌표 근처 CCTV 찾기 (lat/lng 필수, 모르면 cctv_search 사용)
        keywords: [cctv, 근처, 주변, 가까운, nearby, 부근]
        router: handler
        tool: get_nearby_cctv
        implementation: 국토부 ITS CCTV 공개 API로 좌표 근처 CCTV 검색
      cctv_capture:
        description: CCTV/웹캠 현재 화면 캡처 (이미지 저장, AI 분석용)
        keywords: [cctv, 캡처, 스크린샷, capture, 찍어]
        target_description: 영상/이미지 URL
        router: handler
        tool: capture_cctv
        implementation: ffmpeg로 CCTV/웹캠 스트림에서 단일 프레임 캡처 후 PNG 저장
        target_key: url
      webcam:
        description: 해외 웹캠 전용 검색 (Windy). 해외 도시/관광지 실시간 모습. 한국 CCTV 포함 통합 검색은 cctv_search 사용.
        keywords: [webcam, 웹캠, 해외, windy]
        router: handler
        tool: search_webcam
        implementation: Windy Webcams API로 전세계 웹캠 검색. 한국 교통 CCTV는 포함 안 됨 → cctv_search 사용.
      webcam_nearby:
        description: 가까운 웹캠 찾기
        keywords: [webcam, 웹캠, 근처]
        router: handler
        tool: get_nearby_webcam
        implementation: Windy Webcams API로 좌표 근처 웹캠 검색
  self:
    actions:
      cctv_refresh:
        description: CCTV 목록 캐시 갱신. UTIC API에서 전국 16,000+대 최신 CCTV 데이터를 가져와 로컬 캐시 업데이트.
        router: handler
        tool: cctv_refresh
        implementation: UTIC 실시간 API 호출 → 로컬 캐시 파일 갱신 (유지보수용)
      cctv_sources:
        description: CCTV/웹캠 데이터 소스 목록 및 API 키 설정 상태 확인.
        router: handler
        tool: list_cctv_sources
        implementation: 등록된 CCTV/웹캠 소스 목록 + API 키 설정 여부 조회 (로컬 설정 파일)
      cctv_stats:
        description: CCTV 데이터 현황 통계 (전체 수, 센터별 분포, 데이터 소스 상태).
        router: handler
        tool: cctv_stats
        implementation: 로컬 캐시 기반 CCTV 통계 집계 (전체 수, 센터별 분포)
  limbs:
    actions:
      cctv_open:
        description: CCTV 실시간 영상을 브라우저에서 열기. 검색(cctv_search)으로 찾은 CCTV를 실제로 재생.
        keywords: [cctv, 열기, open, 브라우저]
        target_description: 이름 또는 URL
        router: handler
        tool: open_cctv
        implementation: CCTV HLS/RTSP 스트림 URL을 브라우저에서 재생
        target_key: name
