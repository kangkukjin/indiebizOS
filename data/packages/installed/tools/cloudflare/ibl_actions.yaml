node: limbs
actions:
  cloudflare_api:
    returns: effect
    description: Cloudflare API 호출 (Pages/Workers/R2/D1/Tunnel 모든 서비스 통합).
    target_description: API endpoint 경로 (예 'zones/abc/dns_records'). method/data 옵션으로 요청 구성.
    group: cloudflare
    router: handler
    tool: cf_api
    implementation: Cloudflare REST API (Pages/Workers/R2/D1/Tunnel) 통합 HTTP 클라이언트
    target_key: endpoint
    keywords:
    - 클라우드플레어
    - CDN
    - Workers
    - R2
    - Pages

# tool.json 파생 원본 (2026-07-03 이관) — 빌드가 이 블록과 위 actions 의 ops 로 tool.json 을 생성한다.
# op-bearing 도구의 op enum/default 는 여기 저장하지 않는다 (actions 의 ops 가 단일 소스).
tool_json:
  header:
    id: cloudflare
    name: Cloudflare
    description: Cloudflare API 통합 도구. Pages, Workers, R2, D1, Tunnel 등을 관리합니다.
    version: 2.0.0
  tools:
  - name: cf_api
    description: Cloudflare API를 인증된 상태로 호출합니다. 첫 호출 시 상세 가이드가 제공됩니다.
    input_schema:
      type: object
      properties:
        method:
          type: string
          enum:
          - GET
          - POST
          - PUT
          - DELETE
          - PATCH
          default: GET
          description: HTTP 메서드
        endpoint:
          type: string
          description: 'API 엔드포인트 (예: /zones, /accounts/{account_id}/tunnels)'
        body:
          type: object
          description: 요청 본문 (POST, PUT, PATCH에 사용)
        params:
          type: object
          description: 쿼리 파라미터
      required:
      - endpoint
