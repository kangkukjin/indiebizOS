nodes:
  others:
    actions:
      portal:
        returns: items
        fixture: '[others:portal]{op: "status"}'
        runs_on: mac_only
        description: '개인 포털(커뮤니티 홈) — 대상별 공개 주소(/h/<5자 코드>/)를 여러 개 만들어(가족용·친구용…) 이웃을 모으고, 각 주소마다 첫페이지에 진열할 콘텐츠(가족신문·공개파일)와 계기(아이콘 생성 등)를 따로 고르는 커뮤니티 노드의 얼굴. 가입=아이디+비밀번호(네이버식, 자동 로그인)로 레벨 0 자동 등록 — 승급이 곧 승인. 레벨(0 손님/1 이웃/2 가족)에 따라 계기를 원격 브라우저로 빌려 쓴다. 사적/몸/발신 계기(사진·메신저·파일·시스템 등)는 진열 자체가 불가. 개인 링크=운영자 발급 즉시 로그인 열쇠(비밀번호 분실 복구 경로).'
        target_description: '대부분 op 는 portal 파라미터(슬러그/이름)로 대상 포털 지정 — 비우면 첫 포털. op:status(기본 — 포털 주소·회원 수·오늘 사용량) / portals(포털 목록) / create(새 포털: title) / remove(포털 삭제: portal, 회원 있으면 force:true) / members(이웃 목록·개인 링크) / join(이웃 직접 등록: name 필수 — 링크 전용 회원, 개인 링크 반환) / promote(member_id 레벨 승급 — level 지정 또는 +1, down:true 면 -1) / issue(member_id 개인 링크 재발급 — 옛 링크·세션 무효) / revoke(member_id 회수 — 링크·로그인 차단) / display(진열 다이얼 — key 없으면 목록. key+level_down:true=한 칸 열기[꺼짐→가족만→이웃→손님]·level_up:true=한 칸 잠그기[끝은 꺼짐]·toggle/min_level 직접 지정도 가능. 손님/회원/전체 사용 횟수 캡은 계기별이 아니라 포털 단위라 config 로 정한다) / audit(사용 기록) / config(title 이름·intro 소개·portal 일일 한도 guest_daily·member_daily·global_daily — 그 포털 전 계기에 적용).'
        target_key: op
        group: portal
        router: handler
        tool: portal_op
        ops:
          default: status
          values:
            status: 포털 현황 — 공개 주소(/h/…)·회원 수·오늘 사용량·진열 수 (portal 로 지정)
            portals: 포털 목록 — 대상별 주소 전부 (가족용·친구용…)
            create: 새 포털 만들기 (title — 새 5자 주소 발급)
            remove: 포털 삭제 (portal 필수, 회원 있으면 force:true)
            members: 이웃 목록 (레벨·아이디·개인 링크·오늘 사용량)
            join: 이웃 직접 등록 — 링크 전용 회원 (name 필수, contact·level 옵션)
            promote: 레벨 승급/강등 (member_id + level 지정 또는 +1, down:true 면 -1)
            issue: 개인 링크 재발급 (옛 링크·세션 즉시 무효, 회수 해제 — 비밀번호 분실 복구)
            revoke: 회수 — 그 사람의 링크·쿠키·아이디 로그인 차단 (재발급으로 복구)
            display: 진열 다이얼(포털별) — 노출 사다리(level_down 열기/level_up 잠그기, min_level). 사용 횟수 캡은 config(포털 단위)
            audit: 사용 기록 (누가·언제·어느 포털에서·무엇을)
            config: 포털 설정 — title 이름 / intro 소개글 / 일일 한도(guest_daily·member_daily·global_daily, 그 포털 전 계기 공통) (portal 로 지정)
        implementation: 'community-portal 패키지 portal_op — 상태·게이트 로직은 portal_core.py(운영자 어휘와 공개 서빙이 공유, flock 직렬화). 공개 서빙(홈 렌더·가입·개인 링크 쿠키·회원 실행 게이트)은 backend/api_portal.py, 공개 Worker 는 public-files 와 공유(/h/ 네임스페이스). 회원 실행 게이트=계기 app: 블록 선언 템플릿의 인스턴스만 실행(리터럴 파라미터 강제) + 회원/손님/전역 3중 일일 한도 + 감사로그(data/portal_audit.jsonl).'
        keywords:
        - 포털
        - 커뮤니티 홈
        - 마을 포털
        - 이웃 가입
        - 개인 링크
        - 회원 레벨
        - portal
        - community
        app:
          instrument: portal
          icon: 🏘️
          name: 포털
          order: 18
          modes:
          - name: 포털
            auto_run: true
            note: 대상별로 주소를 따로 만드세요 — 가족용·친구용 주소가 각자 자기 첫페이지(진열)와 회원 명부를 가집니다. 주소는 완전 공개해도 됩니다(가입=아이디·비밀번호, 레벨 0 자동 등록 — 승급이 곧 승인).
            action: '[others:portal]{op: "portals"}'
            view:
            - type: card_list
              from: items
              empty_from: message
              card:
                title: '🏘️ {title}'
                lines:
                - '{meta}'
                link:
                  href: '{url}'
                  label: 공개 홈 열기 →
            - type: form
              title: 새 포털 만들기
              fields:
              - key: title
                label: 포털 이름 (예 우리 가족, 동창 모임)
                type: text
              action: '[others:portal]{op: "create", title: "$title"}'
              button: ➕ 새 주소 만들기
          - name: 이웃
            auto_run: true
            note: 홈에서 아이디·비밀번호로 가입하면 레벨 0(손님)으로 들어옵니다 — 승급해야 회원 계기가 열립니다. 개인 링크는 즉시 로그인 열쇠(비밀번호 분실 복구용) — 본인에게만 전달하세요.
            inputs:
            - key: portal
              type: select
              label: 포털
              options_action: '[others:portal]{op: "portals"}'
              options_from: items
              option_value: slug
              option_label: label
            action: '[others:portal]{op: "members", portal: "$portal"}'
            view:
            - type: kv
              title: '{portal.title}'
              rows:
              - k: 🔗 공개 홈
                v: '{portal.url}'
              - k: 이웃
                v: '{portal.member_count}명 · 오늘 사용 {portal.usage_today}회 · 진열 {portal.display_on}개'
            - type: form
              title: 이웃 직접 등록 (링크 전용 회원)
              fields:
              - key: name
                label: 이름
                type: text
              - key: contact
                label: 연락처 (선택)
                type: text
              action: '[others:portal]{op: "join", portal: "$portal", name: "$name", contact: "$contact"}'
              button: ➕ 등록
            - type: list_action
              from: items
              icon: 👤
              title: '{name} — {level_label}'
              sub: '{meta}'
              button:
                label: ▲ 승급
                action: '[others:portal]{op: "promote", portal: "{portal}", member_id: "{id}"}'
                refresh: true
              button2:
                label: ▼ 내림
                action: '[others:portal]{op: "promote", portal: "{portal}", member_id: "{id}", down: true}'
                refresh: true
            - type: list_action
              from: items
              icon: 🔑
              title: '{name}'
              sub: '{key_hint}'
              button:
                label: 🔗 재발급
                action: '[others:portal]{op: "issue", portal: "{portal}", member_id: "{id}"}'
                refresh: true
              button2:
                label: ⛔ 회수
                action: '[others:portal]{op: "revoke", portal: "{portal}", member_id: "{id}"}'
                refresh: true
            - type: kv_list
              from: items
              title: 개인 링크 (즉시 로그인 — 본인에게만)
              k: '{name}'
              v: '{key_link}'
          - name: 진열
            auto_run: true
            note: 이 포털 첫페이지에 보여줄 것을 고르세요. 항목마다 노출 사다리 하나 — 꺼짐 ↔ 레벨 2(가족만) ↔ 1(이웃부터) ↔ 0(손님도). ▼ 열기=꺼진 것은 가족만으로 켜지고 계속 누르면 손님까지, ▲ 잠그기=끝까지 올리면 꺼짐. 사적/몸/발신 계기는 목록에 아예 없습니다. 크롤형 계기는 집 IP 평판을 지키려 손님에게 열지 마세요.
            inputs:
            - key: portal
              type: select
              label: 포털
              options_action: '[others:portal]{op: "portals"}'
              options_from: items
              option_value: slug
              option_label: label
            action: '[others:portal]{op: "display", portal: "$portal"}'
            view:
            - type: list_action
              from: items
              icon: 🎛️
              title: '{icon} {name} — {state}'
              sub: '{meta}'
              button:
                label: ▼ 열기
                action: '[others:portal]{op: "display", portal: "{portal}", key: "{key}", level_down: true}'
                refresh: true
              button2:
                label: ▲ 잠그기
                action: '[others:portal]{op: "display", portal: "{portal}", key: "{key}", level_up: true}'
                refresh: true
            - type: form
              title: 한도 직접 설정
              fields:
              - key: key
                label: 항목 key (위 목록의 회색 글씨)
                type: text
              - key: min_level
                label: 최소 레벨
                type: select
                options:
                - value: ''
                  label: (유지)
                - value: '0'
                  label: 0 — 손님도 사용
                - value: '1'
                  label: 1 — 이웃부터
                - value: '2'
                  label: 2 — 가족만
              - key: guest_daily
                label: 손님 한도 (회/일·IP당)
                type: text
              - key: member_daily
                label: 회원 한도 (회/일·1인당)
                type: text
              action: '[others:portal]{op: "display", portal: "$portal", key: "$key", min_level: "$min_level", guest_daily: "$guest_daily", member_daily: "$member_daily"}'
              button: 적용
          - name: 기록
            auto_run: true
            note: 회원 실행 게이트를 지나간 사용 기록입니다 (누가 · 언제 · 어느 포털에서 · 무엇을).
            action: '[others:portal]{op: "audit"}'
            view:
            - type: card_list
              from: items
              empty_from: message
              card:
                title: '{title}'
                lines:
                - '{meta}'
                - '{summary}'
          - name: 설정
            auto_run: true
            note: 이름과 소개는 그 포털 공개 홈 맨 위에 실립니다. 아래에서 손님·회원 하루 사용 한도도 이 포털 전체에 정할 수 있어요.
            inputs:
            - key: portal
              type: select
              label: 포털
              options_action: '[others:portal]{op: "portals"}'
              options_from: items
              option_value: slug
              option_label: label
            action: '[others:portal]{op: "status", portal: "$portal"}'
            view:
            - type: kv
              title: 공개 주소
              rows:
              - k: 🔗 홈
                v: '{portal.url}'
            - type: form
              title: 포털 설정
              fields:
              - key: title
                label: 포털 이름
                type: text
                value: '{settings.title}'
              - key: intro
                label: 소개글
                type: textarea
                value: '{settings.intro}'
              action: '[others:portal]{op: "config", portal: "$portal", title: "$title", intro: "$intro"}'
              button: 저장
            - type: kv
              title: 일일 사용 한도
              rows:
              - k: 💡 안내
                v: 이 포털의 모든 계기(앱)에 적용됩니다. 누가 보느냐(레벨)는 '진열' 탭의 계기별 사다리로, 하루 몇 번 쓰느냐는 여기서 한 번에 정합니다.
            - type: form
              title: 손님·회원 하루 사용 한도
              fields:
              - key: guest_daily
                label: 손님(로그인 없음) 하루 사용 횟수 — 0이면 손님 금지
                type: text
                value: '{settings.guest_daily}'
              - key: member_daily
                label: 회원 1인당 하루 사용 횟수 — 0이면 무제한
                type: text
                value: '{settings.member_daily}'
              - key: global_daily
                label: 계기별 전체 하루 상한 — 0이면 무제한
                type: text
                value: '{settings.global_daily}'
              action: '[others:portal]{op: "config", portal: "$portal", guest_daily: "$guest_daily", member_daily: "$member_daily", global_daily: "$global_daily"}'
              button: 한도 저장

# tool.json 파생 원본 — 빌드가 이 블록과 위 actions 의 ops 로 tool.json 을 생성한다.
tool_json:
  header:
    id: community-portal
    name: Community Portal
    description: '개인 포털(커뮤니티 홈) — 가입을 받는 공개 홈(/h/<슬러그>/)으로 이웃을 수집하고, 레벨에 따라 콘텐츠와 계기를 원격으로 빌려 쓰게 하는 도구.


      ## 이음매

      진열·승급·한도 판단은 전부 맥(운영자). 공개 Worker(substrate, public-files 와 공유)는 /h/ 게이트 + 무캐시 프록시만. 회원 실행은 범용 /ibl/execute 가 아니라 계기 app: 블록 선언의 인스턴스만 통과하는 화이트리스트 게이트를 지난다.


      ## 신원

      가입/로그인=아이디+비밀번호(네이버식, 자동 로그인 쿠키 1년). 가입=레벨 0 자동 등록(공개층뿐이라 무위험) — 승급 행위가 곧 승인. 개인 링크=운영자 발급 즉시 로그인 열쇠(비밀번호 분실 복구 경로). 유출·이탈=그 사람 것만 회수(revoke).'
    version: 0.1.0
    guide_file: guide.md
  tools:
  - name: portal_op
    description: '개인 포털(커뮤니티 홈) 운영 제어.


      ## op 분기

      포털은 여러 개(대상별 주소 — 가족용·친구용). 대부분 op 는 portal 파라미터(슬러그/이름)로 대상을 고른다 — 비우면 첫 포털.

      - status (기본): 그 포털의 공개 주소(/h/…)·회원 수·오늘 사용량·진열 수.

      - portals: 포털 목록 (label·slug·url·회원/진열 수).

      - create: 새 포털 만들기 — title 필수, 새 5자 주소 발급. 진열은 전부 꺼진 채 시작(안전 기본).

      - remove: 포털 삭제 — portal 필수, 회원이 있으면 force:true.

      - members: 이웃 목록 — 레벨·아이디(셀프 가입)·가입일·오늘 사용량·개인 링크(key_link).

      - join: 이웃 직접 등록(링크 전용 회원 — 아이디 없음). name 필수, contact·level(기본 0) 옵션. 개인 링크(즉시 로그인)를 반환 — 본인에게만 전달.

      - promote: member_id 의 레벨 변경. level 을 주면 그 값으로, 없으면 +1 (down:true 면 -1). 레벨 0 손님/1 이웃/2 가족.

      - issue: member_id 개인 링크 재발급 — 옛 링크·로그인 세션 즉시 무효(비밀번호는 유지), 회수 해제. 비밀번호 분실 복구 경로.

      - revoke: member_id 회수 — 링크·쿠키·아이디 로그인 전부 차단(재발급으로 복구).

      - display: 진열 다이얼(포털별). key 없으면 진열 가능 목록(사적/몸/발신 계기는 목록 밖). key 와 함께 level_down:true(한 칸 열기 — 꺼짐→가족만(2)→이웃(1)→손님(0)), level_up:true(한 칸 잠그기 — 2에서 또 올리면 꺼짐), toggle:true(켬/끔), min_level(직접 값), enabled 로 설정. 손님/회원/전체 사용 횟수 캡은 계기별이 아니라 포털 단위라 config 로 정한다(display 로 넣어도 계기엔 포털 config 가 우선).

      - audit: 회원 실행 게이트 사용 기록 — 포털 표시 (limit 기본 100).

      - config: 그 포털의 title(이름)/intro(소개글), 공용 public_base, 그리고 일일 사용 한도(guest_daily 손님·member_daily 회원·global_daily 전체 — 그 포털 전 계기에 공통 적용) 설정.'
    input_schema:
      type: object
      properties:
        op:
          type: string
          description: status(기본)/portals/create/remove/members/join/promote/issue/revoke/display/audit/config
        portal:
          type: string
          description: 대상 포털 (슬러그 또는 이름) — 비우면 첫 포털
        force:
          type: boolean
          description: remove — 회원이 있는 포털을 지울 때 true 필요
        member_id:
          type: string
          description: promote/issue/revoke — 대상 회원 id (members 로 조회)
        name:
          type: string
          description: join — 이웃 이름 (필수)
        contact:
          type: string
          description: join — 연락처 메모 (선택)
        level:
          type: integer
          description: join/promote — 레벨 (0 손님/1 이웃/2 가족)
        down:
          type: boolean
          description: promote — true 면 레벨 -1
        key:
