node: limbs
actions:
  screen:
    returns: effect
    runs_on: mac_only
    description: macOS 데스크톱 자동화 (op 분기). 화면독해(snapshot)/마우스/키보드/스크린샷. 브라우저는 limbs:browser.
    target_description: 'op별 파라미터 — snapshot: 없음(화면 독해 → 요소+ref+글자+좌표) / click: ref(요소, 좌표 없이 누름·권장) 또는 x,y / type: ref+text(입력칸 직접) 또는 text(현재 포커스) / mouse_move: x,y / key: key / drag: start_x,start_y,end_x,end_y / scroll: direction,amount / screenshot: x,y,width,height(옵션). 좌표는 1280x800 가상 기준. 흐름 — snapshot으로 읽고 → ref로 클릭(강건). OCR 글자는 ref 없어 x,y.'
    group: desktop
    target_key: op
    router: handler
    tool: computer_op
    ops:
      values:
        snapshot: 화면 독해 — UI 요소(역할/이름)+글자(OCR)+클릭좌표. 클릭 전 화면 파악 (브라우저 snapshot의 데스크톱 판)
        screenshot: 화면 캡처 이미지 (x,y,width,height 옵션)
        click: 마우스 클릭 (x,y)
        type: 텍스트 입력 (text)
        key: 키 입력 (key)
        mouse_move: 마우스 이동 (x,y)
        drag: 드래그 (start_x,start_y,end_x,end_y)
        scroll: 스크롤 (direction,amount)
        cursor_position: 현재 커서 좌표 반환
        screen_info: 화면 해상도 정보 반환
    implementation: pyautogui로 op 분기 (1280x800 가상 좌표 → 실제 해상도 자동 변환, Retina 대응)
    keywords:
    - 데스크톱
    - macOS
    - 클릭
    - 키보드
    - 스크린샷
    - 마우스
    - 드래그
    - 스크롤
    - 자동화
    - 화면독해
    - 화면읽기
    - 접근성
    - OCR
    - 화면분석
    - 버튼찾기

# tool.json 파생 원본 (2026-07-03 이관) — 빌드가 이 블록과 위 actions 의 ops 로 tool.json 을 생성한다.
# op-bearing 도구의 op enum/default 는 여기 저장하지 않는다 (actions 의 ops 가 단일 소스).
tool_json:
  header:
    id: computer-use
    name: Computer Use
    description: macOS 데스크톱 자동화. AI가 화면을 직접 보고 마우스/키보드를 조작합니다. 모든 좌표는 1280x800 가상 해상도 기준이며, 실제 해상도로 자동 변환됩니다.
    version: 1.0.0
  tools:
  # 2026-07-03 미소유 도구 감사: 죽은 tool.json 항목 9개 제거. computer_op의 op 분기는
  # handler.py _TOOLS 함수 레지스트리 내부 디스패치라 tool.json 불필요.
  - name: computer_op
    description: macOS 데스크톱 자동화 단일 디스패처. op 파라미터로 9개 동작 분기 (screenshot/click/type/key/mouse_move/drag/scroll/cursor_position/screen_info). 좌표는 1280x800 가상 해상도 기준.
    input_schema:
      type: object
      properties:
        op:
          type: string
          description: '수행할 동작 (snapshot=화면 독해: AX 요소+OCR 글자+클릭좌표)'
        ref:
          type: string
          description: snapshot이 부여한 요소 ref(예 e3). click/type에서 좌표 없이 요소 직접 조작(AXPress/AXValue). 권장 1순위, OCR 글자는 ref 없어 x,y 사용.
      required:
      - op
