node: sense
actions:
  contest:
    returns: items
    fixture: '[sense:contest]{}'
    description: Kaggle 국제 AI/데이터 경진대회 검색. 상금·마감일·주최로 출품 기회 탐색.
    group: research
    target_description: 'query(검색 키워드, 예: AI·LLM·vision·NLP). sort 옵션 — recentlyCreated(기본, 최근 개설)/latestDeadline(마감 늦은 순=진행 중 위주)/prize(상금 큰 순)/numberOfTeams(참가팀 많은 순). category(featured/research/playground 등, 선택). count(기본 10, 최대 50). 반환=records 통화(상금·마감일 meta) → 앱 card_list 직결.'
    router: handler
    tool: contest_search
    scope: workspace
    implementation: Kaggle Competitions API(/competitions/list, Bearer 토큰 auth_manager 'kaggle'). search/sortBy/category 서버 쿼리, 응답 대회 리스트를 records로 매핑. 폰 네이티브 가능(HTTP+stdlib, KAGGLE_API_TOKEN 폰 프로비저닝).
    target_key: query
    keywords:
    - 공모전
    - 대회
    - 경진대회
    - 해커톤
    - kaggle
    - 캐글
    app:
      icon: 🏆
      name: AI 공모전
      order: 12
      modes:
      - name: Kaggle
        inputs:
        - key: q
          type: text
          placeholder: 키워드  예) AI·LLM·vision (비우면 전체)
        - key: sort
          type: select
          label: 정렬
          default: recentlyCreated
          options:
          - value: recentlyCreated
            label: 최근 개설
          - value: latestDeadline
            label: 진행 중
          - value: prize
            label: 상금순
          - value: numberOfTeams
            label: 인기순
        action: '[sense:contest]{query: "$q", sort: "$sort"}'
        view:
        - type: card_list
          from: items
          card:
            image: '{image}'
            title: '{title}'
            lines:
            - '{meta}'
            - '{summary}'
            link:
              href: '{url}'
              label: 대회 페이지 →

# tool.json 파생 원본 (2026-07-03 이관) — 빌드가 이 블록과 위 actions 의 ops 로 tool.json 을 생성한다.
# op-bearing 도구의 op enum/default 는 여기 저장하지 않는다 (actions 의 ops 가 단일 소스).
tool_json:
  header:
    id: contest
    name: AI Contest Search
    description: Kaggle 국제 AI/데이터 경진대회 검색 도구. 키워드·정렬·카테고리로 상금·마감일이 걸린 출품 기회를 찾는다. indiebizOS 홍보·실력 검증용 대회 탐색에 활용.
    version: 1.0.0
  tools:
  - name: contest_search
    description: 'Kaggle 경진대회 검색. query(키워드)·sort(정렬)·category(분류)·count(건수)로 진행 중/예정 대회를 찾는다.


      ## 사용 시점

      - AI/머신러닝 경진대회·공모전 찾기

      - 상금 걸린 대회, 마감 임박 대회 확인

      - indiebizOS로 출품할 대회 탐색


      ## 정렬(sort)

      - recentlyCreated(기본): 최근 개설

      - latestDeadline: 마감 늦은 순(진행 중 위주)

      - prize: 상금 큰 순

      - numberOfTeams: 참가팀 많은 순


      ## 반환

      - records[{title,meta(상금·주최·마감일),summary,url,image}]'
    input_schema:
      type: object
      properties:
        query:
          type: string
          description: '검색 키워드 (예: AI, LLM, vision, NLP)'
        sort:
          type: string
          description: 정렬 — recentlyCreated(기본)/latestDeadline/prize/numberOfTeams
        category:
          type: string
          description: 분류 — featured/research/playground/gettingStarted 등 (선택)
        count:
          type: integer
          default: 10
          minimum: 1
          maximum: 50
          description: 조회 건수 (기본 10)
      additionalProperties: true
