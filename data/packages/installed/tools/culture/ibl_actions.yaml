node: sense
actions:
  performance:
    returns: items
    fixture: '[sense:performance]{}'
    description: 공연·공연장 조회 (op 분기, KOPIS). 전시는 exhibit, 도서는 book.
    group: culture
    target_description: search — query(공연명/키워드)·genre·region·status·days 옵션. venue — query(공연장명, 예 '예술의전당')·region. genres/regions — 파라미터 없음(필터 코드 목록).
    target_key: op
    router: handler
    tool: performance_op
    ops:
      default: search
      values:
        search: 공연 검색 (연극·뮤지컬·음악회, 기본)
        venue: 공연장·문화시설 검색
        genres: 장르 코드 목록 (검색 필터용)
        regions: 지역 코드 목록 (검색 필터용)
    implementation: KOPIS(한국공연예술센터) API op 분기. search=search_by_keyword, venue=get_facilities, genres=get_genre_list, regions=get_region_list.
    keywords:
    - 공연
    - 연극
    - 뮤지컬
    - 공연장
    app:
      instrument: culture
      icon: 🎭
      name: 문화공연
      order: 3
      mode: 공연
      mode_order: 0
      inputs:
      - key: region
        type: select
        label: 전체 지역
        options_action: '[sense:performance]{op: "regions"}'
        options_from: regions
        option_value: code
        option_label: name
      - key: genre
        type: select
        label: 전체 장르
        options_action: '[sense:performance]{op: "genres"}'
        options_from: genres
        option_value: code
        option_label: name
      - key: kw
        type: text
        placeholder: 공연명 키워드(선택)
      action: '[sense:performance]{genre: "$genre", region: "$region", keyword: "$kw"}'
      view:
      - type: image_grid
        from: items
        empty_from: message
        image: '{poster}'
        title: '{prfnm}'
        lines:
        - '{fcltynm}'
        - '{prfpdfrom}~{prfpdto}'
        - '{area} · {prfstate}'
  book:
    returns: items
    fixture: '[sense:book]{query: "역사"}'
    description: 한국 도서 조회 (op 분기, 도서관정보나루). 고전 원문은 classic, 글로벌 도서는 search_books.
    group: culture
    target_description: search(기본) — title=제목전용/author=저자전용/publisher=출판사전용/keyword=광역/isbn=ISBN조회(+detail=true면 대출통계). "제목이 X인 책"은 title:"X". recommended — isbn13(기준도서)·rec_type(mania 기본/reader). codes — code_type=kdc(주제분류) 또는 region(도서관 지역).
    target_key: op
    router: handler
    tool: book_op
    ops:
      default: search
      values:
        search: 도서 검색·조회 (필드분기·ISBN·대출통계, 기본)
        recommended: 추천도서 (마니아·다독자 패턴)
        codes: 분류 코드 목록 (kdc/지역)
    implementation: 도서관정보나루 API op 분기. search=library_book 필드분기(search_books/quick_search/get_book_by_isbn/get_book_detail), recommended=get_recommended_books, codes=get_kdc_list|get_region_list(code_type).
    keywords:
    - 도서
    - 책
    - ISBN
    - 도서관
    app:
      icon: 📚
      name: 도서
      order: 1
      modes:
      - name: 정보나루
        inputs:
        - key: q
          type: text
          placeholder: 제목·저자·키워드
          required: true
        action: '[sense:book]{keyword: "$q"}'
        view:
        - type: card_list
          from: items
          empty_from: message
          item_click:
            action: '[sense:book]{isbn: "{isbn13}", detail: true}'
            view:
            - type: metric
              label: 전국 누적 대출
              big: '{book.loan_stats.total|num}'
              unit: 회
            - type: kv_list
              title: 연령별 대출
              from: book.loan_stats.by_age
              k: '{name}'
              v: '{loanCnt|num}'
            - type: kv_list
              title: 성별 대출
              from: book.loan_stats.by_gender
              k: '{name}'
              v: '{loanCnt|num}'
          card:
            image: '{bookImageURL}'
            title: '{bookname}'
            lines:
            - '{authors}'
            - '{publisher} · {publication_year}{loan_count|opt: · 대출 ,회}'
            link:
              href: '{bookDtlUrl}'
              label: 상세 →
      - name: 네이버
        inputs:
        - key: q
          type: text
          placeholder: 책 제목·저자  예) 한강
          required: true
        action: '[sense:search_naver]{query: "$q", type: "book", display: 20, _raw: true}'
        view:
        - type: card_list
          from: items
          card:
            image: '{image}'
            title: '{title}'
            lines:
            - '{author}'
            - '{publisher}'
            link:
              href: '{link}'
              label: 네이버 책 →
      - name: 글로벌
        inputs:
        - key: q
          type: text
          placeholder: 원서·해외도서  예) sapiens
          required: true
        action: '[sense:search_books]{query: "$q"}'
        view:
        - type: card_list
          from: items
          empty_from: message
          card:
            image: '{bookImageURL}'
            title: '{bookname}'
            lines:
            - '{authors}'
            - '{categories|opt:,}{page_count|opt: · ,쪽}'
            link:
              href: '{infoLink}'
              label: Google Books →
      - name: 고전
        inputs:
        - key: q
          type: text
          placeholder: 서양 고전  예) sherlock, austen
          required: true
        action: '[sense:classic]{op: "western", query: "$q"}'
        view:
        - type: card_list
          from: items
          card:
            image: '{cover_url}'
            title: '{title}'
            lines:
            - '{authors}'
            - 내려받기 {download_count|num}회
            link:
              href: '{html_url}'
              label: 원문 읽기 →
  classic:
    returns: items
    fixture: '[sense:classic]{op: "western", query: "plato"}'
    description: 고전 원문 검색 (op 분기). western=서양 고전(Gutenberg), korean=한국 고전(한국고전종합DB).
    group: culture
    target_description: query=검색어. western — Gutenberg(저작권 만료 7만+권), languages·topic·author_year 옵션. korean — 한국고전종합DB(이황·이이 등 원문·번역).
    target_key: op
    router: handler
    tool: classic_op
    ops:
      default: western
      values:
        western: 서양 고전 원문 (Project Gutenberg)
        korean: 한국 고전 (한국고전종합DB)
    implementation: op 분기. western=tool_gutenberg.search_gutenberg, korean=tool_korean_classics.search_korean_classics.
    keywords:
    - 고전
    - 원문
    - Gutenberg
    - 한국고전
  exhibit:
    returns: items
    fixture: '[sense:exhibit]{query: "미술"}'
    description: 전시·문화행사 검색 (KCISA). 박물관·미술관 행사 위주, 공연은 performance.
    group: culture
    target_description: 검색어 또는 키워드 (예 '국립중앙박물관', '미디어아트').
    router: handler
    tool: kcisa_quick_search
    implementation: 한국문화정보원(KCISA) API로 전시/문화행사 검색
    target_key: keyword
    app:
      instrument: culture
      mode: 전시
      mode_order: 1
      inputs:
      - key: kw
        type: text
        default: 전시
        placeholder: '전시 키워드 (예: 사진, 현대미술)'
        required: true
      action: '[sense:exhibit]{keyword: "$kw"}'
      view:
      - type: image_grid
        from: items
        image: '{thumbnail}'
        title: '{title}'
        lines:
        - '{place}'
        - '{startDate}~{endDate}'
        - '{area} · {realmName}'

# tool.json 파생 원본 (2026-07-03 이관) — 빌드가 이 블록과 위 actions 의 ops 로 tool.json 을 생성한다.
# op-bearing 도구의 op enum/default 는 여기 저장하지 않는다 (actions 의 ops 가 단일 소스).
tool_json:
  header:
    id: culture
    name: Culture & Arts
    description: 공연, 도서, 전시 등 문화 예술 정보 조회 도구. KOPIS API로 공연/박스오피스/공연장 정보를, 도서관 정보나루 API로 도서 검색/인기대출/추천도서 정보를 제공합니다.
    version: 2.0.0
  tools:
  - name: kopis_search_performances
    description: '기간을 지정하여 공연 목록을 상세 검색합니다.


      ## 검색 파라미터

      - 날짜: YYYYMMDD 또는 YYYY-MM-DD 형식

      - 장르: 한글(연극, 뮤지컬) 또는 영문(theater, musical)

      - 지역: 한글(서울, 부산) 또는 영문(seoul, busan)

      - 상태: 공연중, 공연예정, 공연완료'
    input_schema:
      type: object
      properties:
        stdate:
          type: string
          description: 조회 시작일 (YYYYMMDD 또는 YYYY-MM-DD)
        eddate:
          type: string
          description: 조회 종료일
        genre:
          type: string
          description: 장르 (연극, 뮤지컬, 클래식 등)
        region:
          type: string
          description: 지역 (서울, 부산 등)
        status:
          type: string
          description: 공연 상태 (공연중, 공연예정, 공연완료)
          default: 공연중
        keyword:
          type: string
          description: 공연명 검색어
        rows:
          type: integer
          description: 페이지당 결과 수 (최대 100)
          default: 20
        page:
          type: integer
          description: 페이지 번호
          default: 1
      required:
      - stdate
      - eddate
  - name: kopis_get_performance
    description: '특정 공연의 상세 정보를 조회합니다.


      ## 반환 정보

      - 공연명, 장르, 공연 기간

      - 공연시간, 관람연령

      - 출연진, 제작진

      - 가격 정보

      - 줄거리, 포스터 이미지 URL'
    input_schema:
      type: object
      properties:
        performance_id:
          type: string
          description: '공연 ID (mt20id, 예: PF123456)'
      required:
      - performance_id
  - name: kopis_box_office
    description: '현재 인기 있는 공연 순위(박스오피스)를 조회합니다.


      ## 사용 예시

      - 오늘의 전체 박스오피스: period=''day''

      - 이번 주 뮤지컬 순위: period=''week'', genre=''뮤지컬''

      - 서울 지역 월간 순위: period=''month'', region=''서울'''
    input_schema:
      type: object
      properties:
        period:
          type: string
          description: '조회 주기 (day: 일간, week: 주간, month: 월간)'
          default: day
        date:
          type: string
          description: 기준일 (YYYYMMDD), 생략시 어제
        genre:
          type: string
          description: 장르 필터
        region:
          type: string
          description: 지역 필터
  - name: kopis_search_festivals
    description: '축제/페스티벌 목록을 검색합니다.


      ## 사용 예시

      - 다가오는 음악 축제: genre=''대중음악''

      - 서울 지역 축제: region=''서울'''
    input_schema:
      type: object
      properties:
        stdate:
          type: string
          description: '시작일 (기본: 오늘)'
        eddate:
          type: string
          description: '종료일 (기본: 6개월 후)'
        genre:
          type: string
          description: 장르
        region:
          type: string
          description: 지역
        rows:
          type: integer
          description: 결과 수
          default: 20
        page:
          type: integer
          description: 페이지 번호
          default: 1
  - name: library_search_books
    description: '도서관 정보나루 API로 도서를 검색합니다. 전국 공공도서관의 도서 정보를 키워드로 검색합니다.


      ## 사용 예시

      - ''인공지능'' 도서 검색: keyword=''인공지능''

      - ''파이썬'' 책 검색: keyword=''파이썬''

      - ''무라카미 하루키'' 검색: keyword=''무라카미 하루키'''
    input_schema:
      type: object
      properties:
        keyword:
          type: string
          description: 검색 키워드 (제목, 저자, 출판사 등)
        page:
          type: integer
          description: 페이지 번호
          default: 1
        rows:
          type: integer
          description: 결과 수 (최대 100)
          default: 10
      required:
      - keyword
  - name: library_get_book_detail
    description: 'ISBN13으로 도서 상세 정보를 조회합니다. 책소개, 지역별/연령별 대출 통계 등을 제공합니다.


      ## 반환 정보

      - 도서명, 저자, 출판사

      - 책소개

      - 지역별 대출 통계

      - 연령별 대출 통계'
    input_schema:
      type: object
      properties:
        isbn13:
          type: string
          description: ISBN 13자리 (하이픈 포함 가능)
        loan_info:
          type: boolean
          description: 대출 통계 포함 여부
          default: true
      required:
      - isbn13
  - name: library_get_popular_books
    description: '인기대출도서를 조회합니다. 기간, 성별, 연령대, 지역, 주제분류별로 필터링 가능합니다.


      ## 사용 예시

      - 최근 7일 인기도서: (기본값)

      - 20대 여성 인기도서: gender=1, from_age=20, to_age=29

      - 서울 지역 문학 분야: region=''11'', kdc=''8''


      ## 지역코드

      서울=11, 부산=26, 대구=27, 인천=28, 광주=29, 대전=30, 울산=31, 세종=36, 경기=41, 강원=42, 충북=43, 충남=44, 전북=45, 전남=46, 경북=47, 경남=48, 제주=50


      ## KDC 분류

      0=총류, 1=철학, 2=종교, 3=사회과학, 4=자연과학, 5=기술과학, 6=예술, 7=언어, 8=문학, 9=역사'
    input_schema:
      type: object
      properties:
        start_date:
          type: string
          description: '시작일 (YYYY-MM-DD, 기본: 7일 전)'
        end_date:
          type: string
          description: '종료일 (YYYY-MM-DD, 기본: 어제)'
        gender:
          type: integer
          description: '성별 (0: 남성, 1: 여성)'
        from_age:
          type: integer
          description: '시작 연령 (예: 20)'
        to_age:
          type: integer
          description: '종료 연령 (예: 29)'
        region:
          type: string
          description: '지역코드 (예: 11=서울)'
        kdc:
          type: string
          description: 'KDC 분류코드 (예: 8=문학)'
        page:
          type: integer
          description: 페이지 번호
          default: 1
        rows:
          type: integer
          description: 결과 수
          default: 10
  - name: library_get_trending_books
    description: '대출 급상승 도서를 조회합니다. 최근 대출이 급증한 주목할 만한 도서 목록입니다.


      ## 사용 예시

      - 오늘 급상승 도서: (기본값)

      - 특정 날짜 급상승: base_date=''2024-01-15'''
    input_schema:
      type: object
      properties:
        base_date:
          type: string
          description: '기준일 (YYYY-MM-DD, 기본: 어제)'
  - name: library_search_libraries
    description: '전국 공공도서관 정보를 검색합니다.


      ## 사용 예시

      - 도서관명으로 검색: name=''국립중앙''

      - 서울 지역 도서관: region=''11''


      ## 반환 정보

      - 도서관명, 주소

      - 전화번호, 홈페이지

      - 운영시간, 휴관일'
    input_schema:
      type: object
      properties:
        name:
          type: string
          description: 도서관명 (부분 일치)
        region:
          type: string
          description: '지역코드 (예: 11=서울)'
        page:
          type: integer
          description: 페이지 번호
          default: 1
        rows:
          type: integer
          description: 결과 수
          default: 10
  - name: library_search_by_book
    description: '특정 도서를 소장하고 있는 도서관을 검색합니다. 원하는 책을 빌릴 수 있는 가까운 도서관을 찾을 때 유용합니다.


      ## 사용 예시

      - 전국에서 찾기: isbn13=''9788937460494''

      - 서울에서 찾기: isbn13=''9788937460494'', region=''11'''
    input_schema:
      type: object
      properties:
        isbn13:
          type: string
          description: 도서의 ISBN13
        region:
          type: string
          description: 지역코드 (선택)
        page:
          type: integer
          description: 페이지 번호
          default: 1
        rows:
          type: integer
          description: 결과 수
          default: 10
      required:
      - isbn13
  - name: library_quick_search
    description: '키워드로 도서를 빠르게 검색합니다. 간단한 검색에 적합한 편의 도구입니다.


      ## 사용 예시

      - keyword=''삼체'' → 삼체 관련 도서 검색'
    input_schema:
      type: object
      properties:
        keyword:
          type: string
          description: 검색 키워드
        rows:
          type: integer
          description: 결과 수
          default: 10
      required:
      - keyword
  - name: library_get_book_by_isbn
    description: ISBN으로 도서 상세 정보를 조회합니다. 10자리 또는 13자리 ISBN 모두 지원합니다.
    input_schema:
      type: object
      properties:
        isbn:
          type: string
          description: ISBN (10자리 또는 13자리, 하이픈 포함 가능)
      required:
      - isbn
  - name: kcisa_search_culture
    description: '한국문화정보원(KCISA)에서 전국 박물관, 미술관 전시 및 문화 행사 정보를 검색합니다.


      ## 사용 예시

      - ''피카소'' 전시회 검색: keyword=''피카소''

      - 이번 달 서울 지역 행사: area=''서울''

      - 특정 기간 전시 검색: start_date=''20240101'', end_date=''20240131'''
    input_schema:
      type: object
      properties:
        keyword:
          type: string
          description: 행사명 또는 키워드
        start_date:
          type: string
          description: 조회 시작일 (YYYYMMDD)
        end_date:
          type: string
          description: 조회 종료일 (YYYYMMDD)
        area:
          type: string
          description: 지역 (서울, 부산 등)
        rows:
          type: integer
          description: 결과 수
          default: 10
        page:
          type: integer
          description: 페이지 번호
          default: 1
  - name: kcisa_get_event_detail
    description: '문화 행사의 상세 정보를 조회합니다.


      ## 반환 정보

      - 행사 상세 설명

      - 이용 시간 및 요금

      - 장소 정보 및 지도 좌표

      - 주최/주관 정보'
    input_schema:
      type: object
      properties:
        seq:
          type: string
          description: 행사 일련번호 (UCI 또는 ID)
      required:
      - seq
  - name: kcisa_quick_search
    description: 키워드로 문화 정보를 빠르게 검색합니다.
    input_schema:
      type: object
      properties:
        keyword:
          type: string
          description: 검색어
        rows:
          type: integer
          description: 결과 수
          default: 10
      required:
      - keyword
  - name: performance_op
    description: '공연·공연장 조회 (op 분기) — [sense:performance], KOPIS.

      - op=search (기본): 공연 검색 (연극·뮤지컬·음악회). keyword·genre·region·status·days 옵션.

      - op=venue: 공연장·문화시설 검색. keyword(시설명)·region.

      - op=genres: 장르 코드 목록 (검색 필터용, 파라미터 없음).

      - op=regions: 지역 코드 목록 (검색 필터용, 파라미터 없음).'
    input_schema:
      type: object
      properties:
        op:
          type: string
          description: search=공연검색(기본), venue=공연장, genres=장르코드, regions=지역코드
        keyword:
          type: string
          description: '[search] 공연명 / [venue] 공연장명'
        genre:
          type: string
          description: '[search] 장르 코드 (genres로 조회)'
        region:
          type: string
          description: '[search/venue] 지역 코드 (regions로 조회)'
        status:
          type: string
          description: '[search] 공연상태 (기본 공연중)'
        days:
          type: integer
          description: '[search] 검색 기간(일, 기본 90)'
        facility_id:
          type: string
          description: '[venue] 시설 ID'
        rows:
          type: integer
          description: 결과 수
        page:
          type: integer
          description: 페이지
      required: []
  - name: book_op
    description: '한국 도서 조회 (op 분기) — [sense:book], 도서관정보나루. 고전 원문은 classic_op, 글로벌 도서는 study:search_books.

      - op=search (기본): 도서 검색·조회. title/author/publisher(필드 전용)·keyword(광역)·isbn(+detail=true면 대출통계).

      - op=recommended: 추천도서 (마니아·다독자 패턴). isbn13·rec_type.

      - op=codes: 분류 코드 목록. code_type=kdc(주제분류) 또는 region(도서관 지역).'
    input_schema:
      type: object
      properties:
        op:
          type: string
          description: search=도서검색(기본), recommended=추천도서, codes=분류코드목록
        title:
          type: string
          description: '[search] 제목 전용 검색'
        author:
          type: string
          description: '[search] 저자 전용 검색'
        publisher:
          type: string
          description: '[search] 출판사 전용 검색'
        keyword:
          type: string
          description: '[search] 광역 검색 (제목+저자+출판사)'
        isbn:
          type: string
          description: '[search] ISBN 조회'
        detail:
          type: boolean
          description: '[search] isbn과 함께 true면 상세·대출통계'
        isbn13:
          type: string
          description: '[recommended] 기준 도서 ISBN13'
        rec_type:
          type: string
          enum:
          - mania
          - reader
          description: '[recommended] mania(기본)/reader'
        code_type:
          type: string
          enum:
          - kdc
          - region
          description: '[codes] kdc 또는 region'
        rows:
          type: integer
          description: 결과 수
      required: []
  - name: classic_op
    description: '고전 원문 검색 (op 분기) — [sense:classic].

      - op=western (기본): 서양 고전 원문 (Project Gutenberg, 저작권 만료 7만+권). query·languages·topic·author_year_start/end.

      - op=korean: 한국 고전 (한국고전종합DB, 이황·이이 등 원문·번역). query·rows.'
    input_schema:
      type: object
      properties:
        op:
          type: string
          description: western=Gutenberg 서양고전(기본), korean=한국고전종합DB
        query:
          type: string
          description: 검색어 (제목·저자·주제)
        languages:
          type: string
          description: '[western] 언어 (기본 en)'
        topic:
          type: string
          description: '[western] 주제'
        author_year_start:
          type: integer
          description: '[western] 저자 생존연도 시작'
        author_year_end:
          type: integer
          description: '[western] 저자 생존연도 끝'
        rows:
          type: integer
          description: '[korean] 결과 수 (기본 10)'
      required: []
