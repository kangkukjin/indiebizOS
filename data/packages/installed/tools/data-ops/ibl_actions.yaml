node: table
actions:
  filter:
    returns: transform
    runs_on: anywhere
    scope: workspace
    description: 통화 변환자 — items에서 조건(where)에 맞는 것만 남긴다(부분집합·비파괴).
    target_description: 'where(필터 조건): 문자열(전 필드 부분일치, 예 "전세") · {field, op, value}(op=eq/ne/lt/le/gt/ge/contains/in) · {열:값} 단축형 · 조건 배열(AND). >> 파이프로 앞 통화를 자동 수용. 도메인 무관 — 모든 검색·목록 생산자에 적용.'
    group: transform
    router: handler
    tool: data_filter
    implementation: data-ops handler.py — items(또는 표형 table 입력)에서 where 미니 DSL로 부분집합. 비파괴(같은 형태 반환).
    target_key: where
    keywords:
    - 필터
    - 거르기
    - 조건
    - 만
    - filter
  sort:
    returns: transform
    runs_on: anywhere
    scope: workspace
    description: 통화 변환자 — items를 기준 필드(by)로 정렬(수치 인식, desc 옵션).
    target_description: 'by(정렬 기준 필드/열명, 필수) · desc(내림차순 bool, 기본 false). 숫자는 수치로, 아니면 문자열로 비교. 예: [...] >> [table:sort]{by: price, desc: true}.'
    group: transform
    router: handler
    tool: data_sort
    implementation: data-ops handler.py — records|table을 by 키로 정렬(_sort_key 수치 우선). 비파괴.
    target_key: by
    keywords:
    - 정렬
    - 순
    - 정렬하기
    - sort
    - 순서
  take:
    returns: transform
    runs_on: anywhere
    scope: workspace
    description: 통화 변환자 — items에서 상위 n개만(음수면 뒤에서 n). 보통 sort 뒤.
    target_description: 'n(취할 개수, 기본 10; 음수=뒤에서 n개). 보통 sort 뒤에 써 상위 N 추출: [...] >> [table:sort]{by:..} >> [table:take]{n:5}.'
    group: transform
    router: handler
    tool: data_take
    implementation: data-ops handler.py — records|table을 n으로 슬라이스. 비파괴.
    target_key: n
    keywords:
    - 상위
    - 개만
    - 처음
    - take
    - top
  select:
    returns: transform
    runs_on: anywhere
    scope: workspace
    description: 통화 변환자 — items에서 지정한 열/필드만 남긴다(투영). 차트·문서 전 좁히기.
    target_description: 'columns(남길 열/필드 이름 배열, 필수). 예: [sense:...] >> [table:select]{columns: ["연도","GDP"]}. 표가 넓을 때 차트/문서 전에 좁히기.'
    group: transform
    router: handler
    tool: data_select
    implementation: data-ops handler.py — table 열 투영(인덱스 매핑), records 필드 추림. 비파괴.
    target_key: columns
    keywords:
    - 열
    - 컬럼
    - 투영
    - select
    - 골라
  dedup:
    returns: transform
    runs_on: anywhere
    scope: workspace
    description: 통화 변환자 — items에서 중복 제거(첫 항목 유지, 정규화 비교).
    target_description: by(중복 판정 키 필드/열; 미지정 시 items=title, 표형 table 입력=첫 열). 공백·대소문자 정규화 후 동등 비교. 여러 검색 합친 뒤 중복 제거에. (옛 newspaper 내부 dedup을 전 생산자 공용으로 끌어올림.)
    group: transform
    router: handler
    tool: data_dedup
    implementation: data-ops handler.py — by 키 정규화 후 첫 항목만 유지. 비파괴.
    target_key: by
    keywords:
    - 중복제거
    - 중복
    - 유니크
    - dedup
    - 고유
  groupby:
    returns: transform
    runs_on: anywhere
    scope: workspace
    description: 통화 변환자 — items를 키 필드로 그룹지어 집계(count/sum/avg/min/max).
    target_description: 'by(그룹 키 열, 필수) · agg({새열:[op,원본열]} 또는 {원본열:op}, op=count/sum/avg/min/max; 미지정 시 그룹별 count). 반환 table=[by열, 집계열들]. 예: [...] >> [table:groupby]{by: 지역, agg: {평균가: [avg, 가격]}}.'
    group: transform
    router: handler
    tool: data_groupby
    implementation: data-ops handler.py — table을 by로 그룹핑 후 agg 명세대로 집계(입력 순서 보존). 표형 전용.
    target_key: by
    keywords:
    - 그룹
    - 집계
    - 묶어
    - groupby
    - 통계
  join:
    returns: transform
    runs_on: anywhere
    scope: workspace
    description: 통화 변환자(이항) — 두 입력을 공통 키(on)로 inner join. 서로 다른 소스를 한 키로 묶어 분석. & 병렬로 공급.
    target_description: 'on(조인 키 이름, 양쪽에 존재, 필수). 표형 table 입력=열 기준, items=필드 기준. 결과=좌측 전체+우측(키 제외, 동명은 _2). 예: [sense:stock]{op: history} & [sense:world_bank]{...} >> [table:join]{on: "연도"}. 두 입력은 & 병렬로 공급.'
    group: transform
    router: handler
    tool: data_join
    implementation: data-ops handler.py — & 병렬 두 입력을 on 키로 inner join(우측 인덱싱, 키 정규화 비교). items·표형 table 입력 모두 지원(같은 형태끼리).
    target_key: true
    keywords:
    - 조인
    - 결합
    - 합쳐
    - join
    - 연결
  union:
    returns: transform
    runs_on: anywhere
    scope: workspace
    description: 통화 변환자(이항) — 두 입력을 행 결합(이어붙이기). & 병렬로 공급. 중복 제거는 뒤에 >> dedup.
    target_description: '파라미터 없음. 표형 table 입력은 열 이름으로 통합(순서 보존, 한쪽에만 있는 열은 None), items는 단순 concat. 예: [A] & [B] >> [table:union]. items 합치며 중복까지 지우려면 table:merge.'
    group: transform
    router: handler
    tool: data_union
    implementation: data-ops handler.py — & 병렬 두 입력 행 결합(표형 table 입력=열 통합/items=concat). 같은 형태끼리만.
    target_key: ''
    keywords:
    - 행결합
    - 이어붙여
    - union
    - 합집합
    - 세로결합
  merge:
    returns: transform
    runs_on: anywhere
    scope: workspace
    description: 통화 변환자(이항) — 두 입력을 합치되 by 키로 중복 제거. & 병렬로 공급. (단순 이어붙이기는 union.)
    target_description: 'by(선택, 중복 제거 키 필드; 미지정 시 단순 concat). 여러 검색 결과를 한 목록으로 모을 때. 표형 결합은 table:union. 예: [sense:search_gnews]{...} & [sense:search_ddg]{...} >> [table:merge]{by: title}.'
    group: transform
    router: handler
    tool: data_merge
    implementation: data-ops handler.py — & 병렬 두 records concat(+ by 지정 시 정규화 중복 제거). 목록형 전용.
    target_key: by
    keywords:
    - 합치기
    - 모아
    - merge
    - 통합
    - 목록합치기
  structure:
    returns: effect
    runs_on: anywhere
    scope: workspace
    description: 원본 콘텐츠를 blocks(문서 구조 배열)로 정리하는 편집자 원자 — 획득→구조화→렌더 파이프라인의 중간. >> [table:document]로 이어 렌더.
    target_description: content(필수, 구조화할 원본 텍스트 — >> 파이프 시 이전 결과를 content로 받아 생략 가능). instruction(선택, 정리 방향 예 "3섹션 요약 보고서로"·"비교는 표로"). 반환에 title·blocks(문서 IR) 포함 — 그대로 table:document로 >> 파이프하면 렌더.
    group: media_produce
    router: handler
    tool: structure_document
    implementation: 경량 LLM 편집자가 콘텐츠를 문서 IR(heading/paragraph/list/table/quote/code/divider) JSON으로 정리. 지어내기 금지·주어진 내용에서만. document emitter의 입력 생산.
    target_key: content
    keywords:
    - 구조화
    - 정리
    - 요약정리
    - 문서화
    - structure
  document:
    returns: effect
    runs_on: anywhere
    description: blocks(문서 구조 배열)를 산출물로 렌더 — 같은 blocks를 html/pdf/png/docx/pptx/typst emitter로. 보고서·문서·페이지 산출의 단일 진실 소스.
    target_description: 'blocks(필수): 문서 IR 블록 배열. 각 블록은 {type, ...}:

      - heading{level(1~6), text} · paragraph{text} · list{ordered?, items[]}

      - image{src(경로/URL), caption?} · table{columns, rows}(표형 데이터 그대로 재사용)

      - cards{columns(기본2), items:[{title, meta?, summary?, url?, link_label?}]}(링크 카드 그리드 — 뉴스·검색결과·북마크·상품목록)

      - quote{text, cite?} · code{text, lang?} · divider

      title(선택, 최상단 제목) · meta(선택, 제목 아래 부제/발행정보 한 줄) · theme(default 기본/newspaper 제호+카드그리드)

      · filename(선택) · format(html 기본/pdf/png/docx/pptx/typst — 같은 IR을 여러 emitter로).

      결과 산출물 경로(path·file) 반환. 단일 IR → 다중 emitter. typst=책 품질 조판 PDF(산문·보고서에 최적, HTML theme/cards 그리드는 무시). pptx는 문서 구조를 슬라이드로 투영(heading=새 슬라이드) — 시각 레이아웃 슬라이드가 필요하면 engines:slide를 쓸 것.

      '
    group: media_produce
    router: handler
    tool: render_document
    implementation: 포맷 중립 문서 IR을 emitter로 렌더 — html(_doc_blocks_to_html)·pdf/png(Playwright 동일 HTML)·docx(_doc_blocks_to_docx, python-docx)·pptx(_doc_blocks_to_pptx, python-pptx 슬라이드 투영). table 블록은 표형 {columns,rows} 재사용. 단일 IR → 다중 emitter.
    target_key: blocks
    keywords:
    - 문서
    - 보고서
    - document
    - 리포트
    - 페이지

# tool.json 파생 원본 (2026-07-03 이관) — 빌드가 이 블록과 위 actions 의 ops 로 tool.json 을 생성한다.
# op-bearing 도구의 op enum/default 는 여기 저장하지 않는다 (actions 의 ops 가 단일 소스).
tool_json:
  header:
    id: data-ops
    name: Data Ops (통화 변환자)
    description: 통화→통화 변환 동사(currency algebra). 생산자가 내는 공유 통화(records 목록형 / table 표형)를 받아 같은 통화로 변환 — filter/sort/take/select/dedup/groupby.
      >> 파이프로 임의 깊이 조합. 도메인 무관(한 번 짜서 모든 검색·목록 생산자에 곱해짐). + 표준 코어 문서 emitter(table:structure 구조화·table:document 렌더,
      2026-07-03 media_producer에서 이관).
    version: 1.0.0
  tools:
  - name: data_filter
    description: 'records|table → 조건 부분집합. where: 문자열(전 필드 부분일치) 또는 {field,op,value}(op=eq/ne/lt/le/gt/ge/contains/in) 또는
      {열:값} 단축형 또는 조건 배열(AND). >> 앞 통화를 받음.'
    input_schema:
      type: object
      properties:
        where:
          description: 필터 조건. 문자열·{field,op,value}·{열:값}·배열(AND).
  - name: data_sort
    description: records|table → 정렬. by(필드/열명, 필수), desc(bool, 기본 false). 수치 인식 정렬. >> 앞 통화를 받음.
    input_schema:
      type: object
      properties:
        by:
          type: string
          description: 정렬 기준 필드/열 이름.
        desc:
          type: boolean
          description: 내림차순 여부(기본 false).
      required:
      - by
  - name: data_take
    description: records|table → 상위 n개. n(기본 10). 음수면 뒤에서 n개. >> 앞 통화를 받음.
    input_schema:
      type: object
      properties:
        n:
          type: integer
          description: 취할 개수(기본 10). 음수=뒤에서 n개.
  - name: data_select
    description: table → 열 투영(남길 columns만). records면 해당 필드만 추림. columns(필수). >> 앞 통화를 받음.
    input_schema:
      type: object
      properties:
        columns:
          type: array
          items:
            type: string
          description: 남길 열/필드 이름 배열.
      required:
      - columns
  - name: data_dedup
    description: records|table → 중복 제거(첫 항목 유지). by(키 필드/열, records 기본 title·table 기본 첫 열). 정규화 후 비교. >> 앞 통화를 받음.
    input_schema:
      type: object
      properties:
        by:
          type: string
          description: 중복 판정 키 필드/열(미지정 시 records=title, table=첫 열).
  - name: data_groupby
    description: table → 그룹 집계. by(그룹 키 열, 필수), agg({새열:[op,원본열]} 또는 {원본열:op}, op=count/sum/avg/min/max; 미지정 시 그룹별 count).
      >> 앞 table 통화를 받음.
    input_schema:
      type: object
      properties:
        by:
          type: string
          description: 그룹 키 열 이름.
        agg:
          type: object
          description: 집계 명세. {새열:[op,원본열]} 또는 {원본열:op}.
      required:
      - by
  - name: data_join
    description: 'table×table → 키 열로 inner join. on(양쪽 공통 키 열, 필수). 결과 열=좌측 전체+우측(키 제외). & 병렬 두 입력. 예: [A] & [B] >> [table:join]{on:"연도"}.'
    input_schema:
      type: object
      properties:
        'on':
          type: string
          description: 조인 키 열 이름(양쪽 table에 모두 존재).
      required:
      - 'on'
  - name: data_union
    description: 두 table(또는 두 records)을 행 결합. 같은 통화끼리. table은 열 이름으로 통합(순서 보존), records는 concat. & 병렬 두 입력. 중복 제거는 뒤에 >> dedup.
    input_schema:
      type: object
      properties: {}
  - name: data_merge
    description: 두 records를 합침(concat). by 지정 시 그 키로 중복 제거. 여러 검색 결과를 한 목록으로. & 병렬 두 입력. (표형 결합은 union.)
    input_schema:
      type: object
      properties:
        by:
          type: string
          description: 중복 제거 키 필드(미지정 시 단순 concat).
  - name: render_document
    description: '문서 IR(공유 문서 모델)을 산출물로 렌더 — [table:document]. 포맷 중립 IR을 여러 emitter로(html/pdf/png/docx/pptx/typst).

      blocks(필수): 블록 배열. 타입 — heading{level,text}/paragraph{text}/list{ordered?,items[]}/image{src,caption?}/table{columns,rows}(데이터
      통화 재사용)/cards{columns?,items[]}/quote{text,cite?}/code{text,lang?}/divider.

      title(선택), meta(선택), theme(선택), filename(선택), format(기본 html).

      ## 예시

      - render_document(title="보고서", blocks=[{"type":"heading","level":2,"text":"요약"},{"type":"paragraph","text":"..."},{"type":"table","columns":["항목","값"],"rows":[["매출",100]]}])'
    input_schema:
      type: object
      properties:
        blocks:
          type: array
          description: 문서 IR 블록 배열 (각 블록 {type, ...}). 필수.
          items:
            type: object
        title:
          type: string
          description: 문서 제목 (선택, 최상단 h1)
        filename:
          type: string
          description: 출력 파일명 (선택, 기본 document)
        meta:
          type: string
          description: 제목 아래 부제/발행정보 한 줄 (선택)
        theme:
          type: string
          description: HTML 테마 (선택, default/newspaper)
        format:
          type: string
          enum:
          - html
          - pdf
          - png
          - docx
          - pptx
          - typst
          default: html
          description: '출력 포맷: html(기본)/pdf/png(동일 HTML을 Playwright 렌더)/docx/pptx(문서 IR을 사무 포맷으로 투영)/typst(책 품질 조판 PDF).'
      required:
      - blocks
  - name: structure_document
    description: '원본 콘텐츠를 문서 IR(blocks)로 구조화 — [table:structure]. LLM 편집자가 내용을 heading/paragraph/list/table/quote/code/divider
      블록으로 정리. render_document로 이어 렌더(>> 파이프 지원: 이전 텍스트 결과를 content로 받음).

      content(필수): 원본 텍스트. instruction(선택): 정리 방향(예 "3섹션 요약 보고서로").

      ## 예시

      - structure_document(content="...긴 글...", instruction="핵심만 요약 보고서로")'
    input_schema:
      type: object
      properties:
        content:
          type: string
          description: 구조화할 원본 텍스트 (필수, >> 파이프 시 생략 가능)
        instruction:
          type: string
          description: 정리 방향 (선택, 예 "3섹션으로"·"표 위주로")
