node: table
actions:
  filter:
    returns: transform
    runs_on: anywhere
    scope: workspace
    description: 통화 변환자 — items에서 조건(where)에 맞는 것만 남긴다(부분집합·비파괴).
    target_description: 'where(필터 조건): 문자열(전 필드 부분일치, 예 "전세") · {field, op, value}(op=eq/ne/lt/le/gt/ge/contains/in) · {열:값} 단축형 · 조건 배열(AND). >> 파이프로 앞 통화를 자동 수용. 도메인 무관 — 모든 검색·목록 생산자에 적용.'
    group: transform
    router: handler
    tool: data_filter
    implementation: data-ops handler.py — items(또는 표형 table 입력)에서 where 미니 DSL로 부분집합. 비파괴(같은 형태 반환).
    target_key: where
    keywords:
    - 필터
    - 거르기
    - 조건
    - 만
    - filter
  sort:
    returns: transform
    runs_on: anywhere
    scope: workspace
    description: 통화 변환자 — items를 기준 필드(by)로 정렬(수치 인식, desc 옵션).
    target_description: 'by(정렬 기준 필드/열명, 필수) · desc(내림차순 bool, 기본 false). 숫자는 수치로, 아니면 문자열로 비교. 예: [...] >> [table:sort]{by: price, desc: true}.'
    group: transform
    router: handler
    tool: data_sort
    implementation: data-ops handler.py — records|table을 by 키로 정렬(_sort_key 수치 우선). 비파괴.
    target_key: by
    keywords:
    - 정렬
    - 순
    - 정렬하기
    - sort
    - 순서
  take:
    returns: transform
    runs_on: anywhere
    scope: workspace
    description: 통화 변환자 — items에서 상위 n개만(음수면 뒤에서 n). 보통 sort 뒤.
    target_description: 'n(취할 개수, 기본 10; 음수=뒤에서 n개). 보통 sort 뒤에 써 상위 N 추출: [...] >> [table:sort]{by:..} >> [table:take]{n:5}.'
    group: transform
    router: handler
    tool: data_take
    implementation: data-ops handler.py — records|table을 n으로 슬라이스. 비파괴.
    target_key: n
    keywords:
    - 상위
    - 개만
    - 처음
    - take
    - top
  select:
    returns: transform
    runs_on: anywhere
    scope: workspace
    description: 통화 변환자 — items에서 지정한 열/필드만 남긴다(투영). 차트·문서 전 좁히기.
    target_description: 'columns(남길 열/필드 이름 배열, 필수). 예: [sense:...] >> [table:select]{columns: ["연도","GDP"]}. 표가 넓을 때 차트/문서 전에 좁히기.'
    group: transform
    router: handler
    tool: data_select
    implementation: data-ops handler.py — table 열 투영(인덱스 매핑), records 필드 추림. 비파괴.
    target_key: columns
    keywords:
    - 열
    - 컬럼
    - 투영
    - select
    - 골라
  dedup:
    returns: transform
    runs_on: anywhere
    scope: workspace
    description: 통화 변환자 — items에서 중복 제거(첫 항목 유지, 정규화 비교).
    target_description: by(중복 판정 키 필드/열; 미지정 시 items=title, 표형 table 입력=첫 열). 공백·대소문자 정규화 후 동등 비교. 여러 검색 합친 뒤 중복 제거에. (옛 newspaper 내부 dedup을 전 생산자 공용으로 끌어올림.)
    group: transform
    router: handler
    tool: data_dedup
    implementation: data-ops handler.py — by 키 정규화 후 첫 항목만 유지. 비파괴.
    target_key: by
    keywords:
    - 중복제거
    - 중복
    - 유니크
    - dedup
    - 고유
  groupby:
    returns: transform
    runs_on: anywhere
    scope: workspace
    description: 통화 변환자 — items를 키 필드로 그룹지어 집계(count/sum/avg/min/max).
    target_description: 'by(그룹 키 열, 필수) · agg({새열:[op,원본열]} 또는 {원본열:op}, op=count/sum/avg/min/max; 미지정 시 그룹별 count). 반환 table=[by열, 집계열들]. 예: [...] >> [table:groupby]{by: 지역, agg: {평균가: [avg, 가격]}}.'
    group: transform
    router: handler
    tool: data_groupby
    implementation: data-ops handler.py — table을 by로 그룹핑 후 agg 명세대로 집계(입력 순서 보존). 표형 전용.
    target_key: by
    keywords:
    - 그룹
    - 집계
    - 묶어
    - groupby
    - 통계
  join:
    returns: transform
    runs_on: anywhere
    scope: workspace
    description: 통화 변환자(이항) — 두 입력을 공통 키(on)로 inner join. 서로 다른 소스를 한 키로 묶어 분석. & 병렬로 공급.
    target_description: 'on(조인 키 이름, 양쪽에 존재, 필수). 표형 table 입력=열 기준, items=필드 기준. 결과=좌측 전체+우측(키 제외, 동명은 _2). 예: [sense:stock]{op: history} & [sense:world_bank]{...} >> [table:join]{on: "연도"}. 두 입력은 & 병렬로 공급.'
    group: transform
    router: handler
    tool: data_join
    implementation: data-ops handler.py — & 병렬 두 입력을 on 키로 inner join(우측 인덱싱, 키 정규화 비교). items·표형 table 입력 모두 지원(같은 형태끼리).
    target_key: true
    keywords:
    - 조인
    - 결합
    - 합쳐
    - join
    - 연결
  union:
    returns: transform
    runs_on: anywhere
    scope: workspace
    description: 통화 변환자(이항) — 두 입력을 행 결합(이어붙이기). & 병렬로 공급. 중복 제거는 뒤에 >> dedup.
    target_description: '파라미터 없음. 표형 table 입력은 열 이름으로 통합(순서 보존, 한쪽에만 있는 열은 None), items는 단순 concat. 예: [A] & [B] >> [table:union]. items 합치며 중복까지 지우려면 table:merge.'
    group: transform
    router: handler
    tool: data_union
    implementation: data-ops handler.py — & 병렬 두 입력 행 결합(표형 table 입력=열 통합/items=concat). 같은 형태끼리만.
    target_key: ''
    keywords:
    - 행결합
    - 이어붙여
    - union
    - 합집합
    - 세로결합
  merge:
    returns: transform
    runs_on: anywhere
    scope: workspace
    description: 통화 변환자(이항) — 두 입력을 합치되 by 키로 중복 제거. & 병렬로 공급. (단순 이어붙이기는 union.)
    target_description: 'by(선택, 중복 제거 키 필드; 미지정 시 단순 concat). 여러 검색 결과를 한 목록으로 모을 때. 표형 결합은 table:union. 예: [sense:search_gnews]{...} & [sense:search_ddg]{...} >> [table:merge]{by: title}.'
    group: transform
    router: handler
    tool: data_merge
    implementation: data-ops handler.py — & 병렬 두 records concat(+ by 지정 시 정규화 중복 제거). 목록형 전용.
    target_key: by
    keywords:
    - 합치기
    - 모아
    - merge
    - 통합
    - 목록합치기

# tool.json 파생 원본 (2026-07-03 이관) — 빌드가 이 블록과 위 actions 의 ops 로 tool.json 을 생성한다.
# op-bearing 도구의 op enum/default 는 여기 저장하지 않는다 (actions 의 ops 가 단일 소스).
tool_json:
  header:
    id: data-ops
    name: Data Ops (통화 변환자)
    description: 통화→통화 변환 동사(currency algebra). 생산자가 내는 공유 통화(records 목록형 / table 표형)를 받아 같은 통화로 변환 — filter/sort/take/select/dedup/groupby.
      >> 파이프로 임의 깊이 조합. 도메인 무관(한 번 짜서 모든 검색·목록 생산자에 곱해짐).
    version: 1.0.0
  tools:
  - name: data_filter
    description: 'records|table → 조건 부분집합. where: 문자열(전 필드 부분일치) 또는 {field,op,value}(op=eq/ne/lt/le/gt/ge/contains/in) 또는
      {열:값} 단축형 또는 조건 배열(AND). >> 앞 통화를 받음.'
    input_schema:
      type: object
      properties:
        where:
          description: 필터 조건. 문자열·{field,op,value}·{열:값}·배열(AND).
  - name: data_sort
    description: records|table → 정렬. by(필드/열명, 필수), desc(bool, 기본 false). 수치 인식 정렬. >> 앞 통화를 받음.
    input_schema:
      type: object
      properties:
        by:
          type: string
          description: 정렬 기준 필드/열 이름.
        desc:
          type: boolean
          description: 내림차순 여부(기본 false).
      required:
      - by
  - name: data_take
    description: records|table → 상위 n개. n(기본 10). 음수면 뒤에서 n개. >> 앞 통화를 받음.
    input_schema:
      type: object
      properties:
        n:
          type: integer
          description: 취할 개수(기본 10). 음수=뒤에서 n개.
  - name: data_select
    description: table → 열 투영(남길 columns만). records면 해당 필드만 추림. columns(필수). >> 앞 통화를 받음.
    input_schema:
      type: object
      properties:
        columns:
          type: array
          items:
            type: string
          description: 남길 열/필드 이름 배열.
      required:
      - columns
  - name: data_dedup
    description: records|table → 중복 제거(첫 항목 유지). by(키 필드/열, records 기본 title·table 기본 첫 열). 정규화 후 비교. >> 앞 통화를 받음.
    input_schema:
      type: object
      properties:
        by:
          type: string
          description: 중복 판정 키 필드/열(미지정 시 records=title, table=첫 열).
  - name: data_groupby
    description: table → 그룹 집계. by(그룹 키 열, 필수), agg({새열:[op,원본열]} 또는 {원본열:op}, op=count/sum/avg/min/max; 미지정 시 그룹별 count).
      >> 앞 table 통화를 받음.
    input_schema:
      type: object
      properties:
        by:
          type: string
          description: 그룹 키 열 이름.
        agg:
          type: object
          description: 집계 명세. {새열:[op,원본열]} 또는 {원본열:op}.
      required:
      - by
  - name: data_join
    description: 'table×table → 키 열로 inner join. on(양쪽 공통 키 열, 필수). 결과 열=좌측 전체+우측(키 제외). & 병렬 두 입력. 예: [A] & [B] >> [table:join]{on:"연도"}.'
    input_schema:
      type: object
      properties:
        'on':
          type: string
          description: 조인 키 열 이름(양쪽 table에 모두 존재).
      required:
      - 'on'
  - name: data_union
    description: 두 table(또는 두 records)을 행 결합. 같은 통화끼리. table은 열 이름으로 통합(순서 보존), records는 concat. & 병렬 두 입력. 중복 제거는 뒤에 >> dedup.
    input_schema:
      type: object
      properties: {}
  - name: data_merge
    description: 두 records를 합침(concat). by 지정 시 그 키로 중복 제거. 여러 검색 결과를 한 목록으로. & 병렬 두 입력. (표형 결합은 union.)
    input_schema:
      type: object
      properties:
        by:
          type: string
          description: 중복 제거 키 필드(미지정 시 단순 concat).
