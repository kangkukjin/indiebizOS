node: sense
actions:
  kosis:
    returns: items
    fixture: '[sense:kosis]{query: "인구"}'
    description: 통계청 KOSIS. query 검색, indicator(주요지표), org_id+tbl_id(특정 통계표) 분기. items 통화. 자세히 read_guide(query="통계").
    group: research
    target_description: query(검색어) 또는 indicator(주요지표 ID, 빈 문자열이면 전체 목록) 또는 org_id+tbl_id(특정 통계표 데이터). 통계표는 query로 먼저 검색해 org_id/tbl_id 확인 후 조회. 데이터 조회 시 items를 기간 축으로 피벗해 반환(행=period, 필드=지표·분류 조합) → >> [table:chart/spreadsheet] / [table:document](table 블록). ⚠️다차원 통계표는 items 필드가 넓어짐(전 분류×항목) — 차트로 쓰려면 itm_id/obj_l1로 좁힐 것.
    router: handler
    tool: kosis_lookup
    implementation: KOSIS API 통합 — org_id+tbl_id면 get_data(또는 info=true시 get_statistics_info), indicator면 get_indicators, query면 integrated_search.
    target_key: query
    keywords:
    - 통계
    - kosis
    - 통계청
    - 인구
    - GDP
    - 물가
    - 실업률

# tool.json 파생 원본 (2026-07-03 이관) — 빌드가 이 블록과 위 actions 의 ops 로 tool.json 을 생성한다.
# op-bearing 도구의 op enum/default 는 여기 저장하지 않는다 (actions 의 ops 가 단일 소스).
tool_json:
  header:
    id: kosis
    name: KOSIS Statistics
    description: 통계청 KOSIS API를 통한 국가통계 조회 도구. 인구, GDP, 물가, 고용 등 공식 통계 데이터를 검색하고 조회합니다. 경제 분석, 시장 조사, 정책 연구에 필요한 신뢰할 수 있는
      국가 통계 제공.
    version: 1.1.0
  tools:
  - name: kosis_lookup
    description: '통계청 KOSIS 국가통계 검색·조회. query는 통합 검색, indicator는 주요지표(GDP·물가·인구·고용 등), org_id+tbl_id는 특정 통계표 데이터(info=true면
      메타).


      파라미터: query(검색어) 또는 indicator(주요지표 ID, 빈 문자열이면 전체 목록) 또는 org_id+tbl_id(특정 통계표 데이터). 통계표는 query로 먼저 검색해 org_id/tbl_id
      확인 후 조회.'
    input_schema:
      type: object
      properties:
        op:
          type: string
          description: 동작 분기 — target_description 참조
      additionalProperties: true
