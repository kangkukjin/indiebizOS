node: self
actions:
  lecture:
    returns: items
    fixture: '[self:lecture]{op: "list"}'
    runs_on: mac_only
    description: 강의 워크스페이스 관리 (op 분기). 생성/조회/로드/삭제/창 열기.
    group: lecture
    target_description: create는 title 필수(+audience/thesis/duration_minutes/design_system 옵션). load/delete/open은 lecture_id 필수(open은 미지정시 목록 화면). delete는 confirm=true 추가.
    target_key: op
    router: handler
    tool: lecture_op
    ops:
      values:
        list: 강의 목록 조회
        create: 새 강의 생성 (title 필수)
        load: 기존 강의 로드 (lecture_id)
        delete: 강의 삭제 (lecture_id + confirm=true)
        open: 강의 창 열기 (lecture_id, 미지정시 목록)
    implementation: handler.py가 op로 분기 — list/create/load/delete/open 내부 함수 호출.
    keywords:
    - 강의 만들기
    - 강의 생성
    - 강의 목록
    - 강의 삭제
    - 강의 열기
    - 강의 워크스페이스
    scope: workspace
  slide:
    returns: effect
    runs_on: mac_only
    description: 슬라이드 한 장 관리 (op 분기). 생성/편집/삭제/필드 패치/재렌더/이미지 부분수정.
    group: lecture
    target_description: 공통 lecture_id 필수. create는 instruction(+insert_at 옵션), edit는 slide_id+instruction, delete/rerender는 slide_id, patch는 slide_id+patch(객체), image_edit는 slide_id+instruction(통짜 이미지/이미지 슬라이드만). create/edit/image_edit만 AI 호출.
    target_key: op
    router: handler
    tool: slide_op
    ops:
      values:
        create: 슬라이드 생성 (instruction, AI 호출)
        edit: 슬라이드 편집 (slide_id+instruction, AI 호출)
        delete: 슬라이드 삭제 (slide_id)
        patch: 필드 직접 수정 (slide_id+patch, AI 우회)
        rerender: 재렌더링 (slide_id, AI 우회)
        image_edit: 이미지 부분수정 (slide_id+instruction, 통짜 이미지/이미지 슬라이드만 — 다시 그리지 않고 현재 PNG 편집)
    implementation: handler.py가 op로 분기. create/edit/image_edit는 AI 호출, delete/patch/rerender는 AI 우회 (PowerPoint식 직접 편집).
    keywords:
    - 슬라이드 만들기
    - 슬라이드 편집
    - 슬라이드 재렌더
    - 슬라이드 삭제
    - 슬라이드 일부 수정
    - 다음 슬라이드
    scope: workspace
  material:
    returns: effect
    runs_on: mac_only
    description: 강의 재료 관리 (op 분기). 추가/삭제.
    group: lecture
    target_description: 공통 lecture_id 필수. add는 file_path(파일 복사) 또는 text+filename(텍스트 저장), remove는 filename.
    target_key: op
    router: handler
    tool: material_op
    ops:
      values:
        add: 재료 추가 (file_path 또는 text+filename)
        remove: 재료 삭제 (filename)
    implementation: handler.py가 op로 분기. add는 file_path 모드/text 모드 자동 감지.
    keywords:
    - 재료 추가
    - 재료 삭제
    - 원고 추가
    - 자료 추가
    scope: workspace
  deck:
    returns: effect
    runs_on: mac_only
    description: 강의 데크 조작 (op 분기). 슬라이드 순서 변경 / 파일 내보내기.
    group: lecture
    target_description: 공통 lecture_id 필수. reorder는 order(slide_id 배열), export는 format(pdf|pptx).
    target_key: op
    router: handler
    tool: deck_op
    ops:
      values:
        reorder: 슬라이드 순서 변경 (order=slide_id 배열, deck.json만 갱신)
        export: 파일 내보내기 (format=pdf|pptx, PIL/python-pptx 합본)
    implementation: handler.py가 op로 분기. reorder는 deck.json만 갱신, export는 PIL/python-pptx로 합본.
    keywords:
    - 슬라이드 순서 변경
    - 강의 내보내기
    - PDF 내보내기
    - PPTX 내보내기
    scope: workspace

# tool.json 파생 원본 (2026-07-03 이관) — 빌드가 이 블록과 위 actions 의 ops 로 tool.json 을 생성한다.
# op-bearing 도구의 op enum/default 는 여기 저장하지 않는다 (actions 의 ops 가 단일 소스).
tool_json:
  header:
    id: lecture_workspace
    name: 강의 만들기 워크스페이스
    description: '강의 슬라이드를 한 장씩 협업으로 만드는 도구. indiebizOS/outputs/lectures/ 밑에 강의별 폴더(deck.json + materials/ + slides/)를 두고,
      별도 Electron 창에서 재료/슬라이드 데크/AI 명령을 한 화면에 보며 작업한다.


      ## IBL 통합 도구 (4개, op 분기)

      - lecture_op {op: list|create|load|delete|open}

      - slide_op {op: create|edit|delete|patch|rerender}

      - material_op {op: add|remove}

      - deck_op {op: reorder|export}


      옛 14개 단일 도구(lecture_create, slide_create 등)도 직접 호출 호환용으로 유지.'
    version: 0.2.0
    author: IndieBiz OS
  tools:
  - name: lecture_op
    description: '강의 워크스페이스 관리 통합 도구. op 파라미터로 분기:

      - list: 강의 목록 조회 (파라미터 없음)

      - create: 새 강의 생성 (title 필수, +audience/thesis/duration_minutes/design_system)

      - load: 강의 데이터 로드 (lecture_id)

      - delete: 강의 폴더 전체 삭제 (lecture_id, confirm=true)

      - open: 강의 만들기 창 열기 (lecture_id 옵션)'
    input_schema:
      type: object
      properties:
        op:
          type: string
          description: 수행할 작업
        lecture_id:
          type: string
          description: 강의 ID (load/delete/open에 필요, open은 옵션)
        title:
          type: string
          description: create — 강의 제목 (한글 가능)
        audience:
          type: string
          description: create 옵션 — 청중
        thesis:
          type: string
          description: create 옵션 — 한 줄 요지
        duration_minutes:
          type: integer
          description: create 옵션 — 분량
        design_system:
          type: string
          description: create 옵션 — vintage_book/academic_paper/tech_minimal/magazine_modern
        confirm:
          type: boolean
          description: delete 필수 — true가 아니면 거부
      required:
      - op
  - name: slide_op
    description: '슬라이드 한 장 관리 통합 도구. op 파라미터로 분기:

      - create: AI로 슬라이드 한 장 생성 (lecture_id, instruction, +insert_at)

      - edit: 슬라이드 AI 재생성 — 현재 spec을 컨텍스트로 (lecture_id, slide_id, instruction)

      - delete: 슬라이드 파일+deck 항목 제거 (lecture_id, slide_id)

      - patch: spec 일부 필드만 직접 patch (AI 호출 없음) (lecture_id, slide_id, patch)

      - rerender: spec 변경 없이 PNG만 재렌더 (AI 호출 없음) (lecture_id, slide_id)'
    input_schema:
      type: object
      properties:
        op:
          type: string
          description: 수행할 작업
        lecture_id:
          type: string
          description: 강의 ID (모든 op 필수)
        slide_id:
          type: string
          description: edit/delete/patch/rerender에 필요
        instruction:
          type: string
          description: create/edit 필수 — 강의자 자연어 요청
        insert_at:
          type: integer
          description: create 옵션 — 삽입 위치 (0-based)
        patch:
          type: object
          description: patch 필수 — 변경할 필드 객체. None 값은 필드 삭제. layout 키는 거부.
      required:
      - op
      - lecture_id
  - name: material_op
    description: '강의 재료 관리 통합 도구. op 파라미터로 분기:

      - add: 재료 추가 (lecture_id + file_path 또는 text+filename)

      - remove: 재료 삭제 (lecture_id, filename)'
    input_schema:
      type: object
      properties:
        op:
          type: string
          description: 수행할 작업
        lecture_id:
          type: string
          description: 강의 ID (필수)
        file_path:
          type: string
          description: add 모드 1 — 복사할 원본 파일 절대경로
        text:
          type: string
          description: add 모드 2 — 저장할 텍스트 내용 (filename과 함께)
        filename:
          type: string
          description: add 모드 2 또는 remove — 파일명
      required:
      - op
      - lecture_id
  - name: deck_op
    description: '강의 데크 조작 통합 도구. op 파라미터로 분기:

      - reorder: 슬라이드 순서 변경 (lecture_id, order=slide_id 배열). 파일은 안 건드림.

      - export: PDF/PPTX 파일로 내보내기 (lecture_id, format). outputs/lectures/{id}/exports/ 저장.'
    input_schema:
      type: object
      properties:
        op:
          type: string
          description: 수행할 작업
        lecture_id:
          type: string
          description: 강의 ID (필수)
        order:
          type: array
          items:
            type: string
          description: reorder 필수 — 새 순서의 slide_id 배열 (기존 슬라이드 전체 포함)
        format:
          type: string
          enum:
          - pdf
          - pptx
          description: export 필수 — 출력 형식
      required:
      - op
      - lecture_id
