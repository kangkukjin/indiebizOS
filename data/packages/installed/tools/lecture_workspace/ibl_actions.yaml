node: self
# 이 패키지의 모든 액션은 workspace 스코프 — indiebizOS 인스턴스 전체에 걸친 데이터
# (outputs/lectures/)로 작동하며 특정 프로젝트에 속하지 않는다.
# 라우팅 계층은 이 선언을 보고 project_path 강요를 건너뛰고 get_base_path()를 주입.
scope: workspace
actions:
  lecture_list:
    description: 저장된 강의 목록 조회. indiebizOS/outputs/lectures/ 하위 스캔.
    keywords:
      - 강의목록
      - 강의 목록
      - 강의 리스트
    router: handler
    tool: lecture_list
    implementation: outputs/lectures/ 디렉토리 스캔, 각 deck.json 메타 요약 반환

  lecture_create:
    description: 새 강의 생성. 한글 제목 슬러그화 → lecture_id, 폴더 + 빈 deck.json 생성.
    keywords:
      - 강의 만들기
      - 강의 생성
      - 새 강의
      - 강의 시작
    router: handler
    tool: lecture_create
    implementation: 한글 제목 unidecode 슬러그화(중복시 -2/-3 자동), outputs/lectures/{lecture_id}/{deck.json, materials/, slides/} 생성

  lecture_load:
    description: 강의 데이터 로드. deck.json + 슬라이드/재료 파일 목록 반환.
    router: handler
    tool: lecture_load
    implementation: deck.json 읽고, slides_dir/materials_dir 절대경로 함께 반환
    target_key: lecture_id

  lecture_delete:
    description: 강의 폴더 전체 삭제 (confirm=true 필수).
    keywords:
      - 강의 삭제
      - 강의 지우기
    router: handler
    tool: lecture_delete
    implementation: confirm=true 검증 후 shutil.rmtree로 강의 폴더 전체 삭제
    target_key: lecture_id

  lecture_open:
    description: 강의 만들기 창(별도 Electron BrowserWindow) 열기. lecture_id 옵션이면 그 강의 로드 상태로 열고, 미지정이면 강의 목록 화면.
    keywords:
      - 강의 만들기 창
      - 강의만들기창
      - 강의 창
      - 강의 워크스페이스
      - 강의 작업
    router: handler
    tool: lecture_open
    implementation: WebSocket으로 프론트엔드에 open-lecture-workspace 이벤트 전송 (Step 2에서 IPC 핸들러 추가). 현재는 데이터만 반환.

  deck_reorder:
    description: 슬라이드 순서만 변경 (slide_order 배열 갱신, 파일은 안 건드림).
    router: handler
    tool: deck_reorder
    implementation: deck.json의 slide_order 배열을 받은 순서로 교체. 검증 후 저장.
    target_key: lecture_id

  slide_delete:
    description: 특정 슬라이드 삭제. 파일(json+png) 지우고 deck에서 제거.
    router: handler
    tool: slide_delete
    implementation: slides/{slide_id}.{json,png} 삭제 + deck.json의 slide_order/slides 갱신
    target_key: lecture_id

  material_add:
    description: 재료 추가. 파일 경로(file_path) 또는 텍스트(text+filename)로 호출.
    keywords:
      - 재료 추가
      - 자료 추가
      - 원고 추가
    router: handler
    tool: material_add
    implementation: file_path 모드는 shutil.copy로 materials/에 복사. text 모드는 materials/{filename}에 직접 쓰기. deck.materials 갱신.
    target_key: lecture_id

  material_remove:
    description: 재료 삭제. materials/{filename} 지우고 deck에서 제거.
    router: handler
    tool: material_remove
    implementation: materials/{filename} unlink + deck.materials 갱신
    target_key: lecture_id

  slide_create:
    description: 강의자의 자연어 요청을 받아 슬라이드 한 장을 생성. 시스템 AI 키·모델 빌린 가벼운 AI가 spec(JSON) 생성 → slide_shadcn 렌더 → deck 등록.
    keywords:
      - 슬라이드 만들기
      - 슬라이드 생성
      - 다음 슬라이드
      - 첫 슬라이드
      - 표지 슬라이드
    router: handler
    tool: slide_create
    implementation: 시스템 AI 설정 빌린 가벼운 provider 호출(채팅 히스토리 없이 self-contained 프롬프트). 컨텍스트=강의 메타+재료 색인+데크 개요+누적 메모. 응답 JSON 파싱→[engines:slide_shadcn] 렌더→slides/{sid}.{json,png} 저장→deck.slides[sid]+slide_order 갱신→memo_signals를 cumulative_memo에 자동 패치.
    target_key: lecture_id

  slide_edit:
    description: 특정 슬라이드 재생성(편집). focus 슬라이드의 현재 spec을 AI에 컨텍스트로 줘서 강의자 코멘트만 반영. 다른 부분 보존.
    keywords:
      - 슬라이드 편집
      - 톤 바꿔
      - 이 장 다시
    router: handler
    tool: slide_edit
    implementation: focus_slide_spec 로드 → build_prompt에 포함 → AI 호출 → 동일 slide_id로 PNG 재렌더 (덮어쓰기). slide_order는 변동 없음.
    target_key: lecture_id

  slide_patch_spec:
    description: 슬라이드 spec의 일부 필드만 직접 patch + PNG 재렌더 (AI 호출 없음, PowerPoint식 편집).
    keywords:
      - 슬라이드 필드 편집
      - 단어만 바꾸기
      - 일부 수정
      - spec patch
    router: handler
    tool: slide_patch_spec
    implementation: 현재 spec 로드 → patch 키-값 shallow update → slide_shadcn 재렌더. layout 키는 거부 (필요 필드 달라져 spec 깨질 위험). None은 필드 삭제.
    target_key: lecture_id

  slide_rerender:
    description: 슬라이드 spec 변경 없이 PNG만 재렌더. design_system 바꾼 뒤 같은 내용을 새 톤으로 다시 그릴 때. AI 호출 없음.
    keywords:
      - 슬라이드 재렌더
      - 같은 내용 다시 그려
      - 디자인만 적용
      - 톤만 바꿔
    router: handler
    tool: slide_rerender
    implementation: spec_file 로드 → 현재 design_system으로 slide_shadcn 호출 → deck.slides[sid].updated_at 갱신. AI 호출 없음.
    target_key: lecture_id

  deck_export:
    description: 강의 데크를 PDF 또는 PPTX 파일로 내보내기. slide_order 순서대로 PNG를 합본.
    keywords:
      - 강의 내보내기
      - PDF 내보내기
      - PPTX 내보내기
      - 슬라이드 합본
    router: handler
    tool: deck_export
    implementation: PIL 다중 페이지 PDF (의존성 없음) 또는 python-pptx 16:9 슬라이드. 저장 위치 outputs/lectures/{lecture_id}/exports/.
    target_key: lecture_id
