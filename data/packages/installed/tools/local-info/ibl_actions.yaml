        target_key: query
      local_query:
        aliases:
          area: [region]
        returns: items
        fixture: '[sense:local_query]{query: "카페"}'
        description: 축적된 지역 정보 DB 조회 (정기 수집된 가게·커뮤니티 데이터). 실시간 검색은 search_local.
        group: places
