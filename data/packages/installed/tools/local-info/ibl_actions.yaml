nodes:
  sense:
    actions:
      search_local:
        returns: items
        description: 지역 커뮤니티(네이버 카페) 검색. 동네 주민들의 후기·추천·정보 수집용. 가게/음식점 공식 검색은 sense:restaurant(카카오+네이버 API) 사용.
        group: research
        target_description: 검색어
        router: handler
        tool: local_search
        implementation: Naver Cafe API로 지역 커뮤니티 글 검색 (주민 후기, 추천, 지역 정보). 공식 가게 DB 검색이 아닌 커뮤니티 의견 수집.
        target_key: query
      local_query:
        returns: items
        description: 축적된 지역 정보 DB 조회 (정기 수집된 가게·커뮤니티 데이터). 실시간 검색은 search_local.
        group: places
        target_description: 검색어 (FTS5 전문검색, 한국어 토큰화 지원).
        router: handler
        tool: local_db_query
        implementation: SQLite FTS(전문검색)로 축적된 지역 정보 DB 조회
        target_key: query
  self:
    actions:
      local_save:
        returns: effect
        description: 가게 정보·커뮤니티 언급을 지역 DB에 저장.
        target_description: 저장할 데이터 (JSON). type 옵션으로 store/mention 분류.
        group: system
        router: handler
        tool: local_db_save
        implementation: SQLite DB에 가게/지역 정보 구조화 저장
        keywords:
        - 가게
        - 지역
        - 커뮤니티
        - 저장
