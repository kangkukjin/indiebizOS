nodes:
  sense:
    actions:
      weather:
        returns: items
        fixture: '[sense:weather]{city: "서울"}'
        description: '날씨 조회 (Open-Meteo 무료). [sense:weather]{city: "수원"} 또는 {lat: 37.26, lon: 127.03}. 도시명(한/영) 직접 사용 가능'
        group: places
        target_description: 도시명 또는 좌표
        router: handler
        tool: get_weather
        implementation: Open-Meteo 무료 API로 날씨 조회 (API키 불필요)
        app:
          icon: 🌤️
          name: 날씨
          order: 0
          auto_run: true
          inputs:
          - key: city
            type: text
            default: 서울
            placeholder: 도시명 (한/영)
            chips:
            - 서울
            - 오송
            - 부산
            - 제주
            - 수원
            - 인천
            - 대구
          action: '[sense:weather]{city: "$city", days: 7}'
          view:
          - type: metric
            label: '{city}'
            big: '{current.temp|round}'
            unit: °
            sub: '{current.condition} · 체감 {current.feels_like|round}°'
          - type: kv
            rows:
            - k: 💧 습도
              v: '{current.humidity}%'
            - k: 🌬 바람
              v: '{current.wind_speed}m/s'
          - type: kv_list
            title: 7일 예보
            from: items
            k: '{date}'
            v: '{condition} {min_temp|round}° / {max_temp|round}°{precipitation_mm|opt: ☔,mm}'
      restaurant:
        returns: items
        fixture: '[sense:restaurant]{query: "강남 파스타"}'
        description: 맛집/음식점 검색 (카카오+네이버 Local API, 최대 45건). 상호명·주소·전화·카테고리·place 링크에 더해 네이버 블로그 후기로 추천 근거 부착 — blog_count(언급 수)·reason(후기 제목), 언급 많은 순 정렬. 별점 숫자는 공개 API 미제공(카카오 place_url에서 확인). 커뮤니티 후기 원문은 sense:search_local.
        group: places
        target_description: 검색어 (강남 파스타 등). x(경도)/y(위도)/radius로 좌표 주변 검색, limit(기본 30, 최대 45), enrich:false면 블로그 근거 생략(빠름).
        router: handler
        tool: search_restaurants
        implementation: Kakao(페이지네이션 15×3=45) + Naver Local 듀얼 검색, 가게명 정규화로 중복 병합. 상위 12곳은 네이버 블로그 검색(/v1/search/blog.json)으로 blog_count·reason(가게명 등장 글 제목만) 병렬 부착 후 언급순 정렬. url=카카오 place.map.kakao.com(평점/리뷰 페이지).
        target_key: query
        app:
          icon: 🍴
          name: 맛집
          order: 2
          inputs:
          - key: q
            type: text
            placeholder: '예: 강남역 맛집 / 성수동 카페'
            required: true
          action: '[sense:restaurant]{query: "$q"}'
          filter:
            from_field: cat
          view:
          - type: map
            markers: items
            'on':
              search_here: '[sense:restaurant]{query: "$q", x: "$lng", y: "$lat", radius: $radius}'
          - type: card_list
            from: items
            empty: 검색 결과가 없습니다
            card:
              title: '{name}'
              lines:
              - '{cat}{blog_count|opt:  ·  💬 블로그 ,건}{distance|opt:  ·  📏 ,m}'
              - '{reason|opt:“,”}'
              - '📍 {address}{phone|opt:  ·  ☎ ,}'
              link:
                href: '{url}'
                label: 지도/상세 →
      navigate_route:
        returns: scalar
        exempt: '출발/도착 좌표 쌍 필요'
        description: 카카오 내비 자동차 길찾기. 거리·시간·톨비 반환. 지도 표시는 map.
        target_description: 목적지 (장소명 또는 '경도,위도'). origin 옵션으로 출발지 지정.
        group: places
        router: handler
        tool: kakao_navigation
        implementation: Kakao Map API로 자동차 경로 탐색 (거리/시간/톨비)
        target_key: destination
        keywords:
        - 길찾기
        - 내비
        - 경로
        - 네비게이션
        app:
          instrument: directions
          icon: 🛣️
          name: 길찾기
          order: 10
          inputs:
          - key: origin
            type: text
            label: 출발
            placeholder: 출발지 (비우면 기본)
          - key: destination
            type: text
            label: 도착
            placeholder: 도착지 장소명
            required: true
          action: '[sense:navigate_route]{origin: "$origin", destination: "$destination"}'
          view:
          - type: map
            from: map_data
          - type: metric
            label: 경로 요약
            big: '{map_data.summary.distance_km}km'
            sub: '{map_data.summary.duration_min}분 · 통행료 {map_data.summary.toll}원'
          - type: kv_list
            from: key_guides
            title: 주요 안내
            k: '{name}'
            v: '{guidance}'
      reverse_geocode:
        returns: scalar
        fixture: '[sense:reverse_geocode]{lat: 37.5665, lon: 126.978}'
        description: GPS 좌표를 행정구역 주소로 변환 (카카오 API, 위도+경도 → 시/도/구/동)
        group: places
        target_description: 위도(lat)와 경도(lng) 두 파라미터. 결과는 시/도/구/동까지 분해.
        router: handler
        tool: reverse_geocode
        implementation: Kakao Map API로 GPS 좌표→주소 변환
      travel:
        returns: items
        fixture: '[sense:travel]{op: "flight", to: "도쿄"}'
        description: 여행 정보 검색 (Amadeus, op 분기) — 항공권·호텔. 도시명·상대날짜 내부 해소.
        group: travel
        target_description: flight — to(도착도시) 필수, from(기본 서울)·date(기본 +7일, "내일"/"다음주 금요일" 등 자연어)·adults 옵션. hotel — city 필수. 도시명은 IATA/도시코드 자동 해소.
        router: handler
        tool: amadeus_travel_search
        target_key: op
        ops:
          default: flight
          values:
            flight: 항공권 검색 (from→to·date). 도시명→IATA·상대날짜 자동 해소
            hotel: 도시 호텔 목록 (city→도시코드 자동)
        implementation: Amadeus API(OAuth2). op→endpoint 매핑 + 도시명/날짜 내부 해소 (endpoint+params 직접 지정도 가능). 두 op 모두 items[{title,meta,summary,url}] 통화 + 사람용 message 반환 — compress 없이 깨끗(weather/restaurant 형제). (poi=관광지는 Amadeus가 2026 영구 폐기(HTTP 410)해 제거.)
        app:
          instrument: travel
          icon: ✈️
          name: 여행
          order: 16
          modes:
          - name: 항공권
            inputs:
            - key: to
              type: text
              label: 도착
              placeholder: '도착 도시 (예: 도쿄)'
              required: true
            - key: from
              type: text
              label: 출발
              placeholder: 출발 (비우면 서울)
            - key: date
              type: text
              label: 날짜
              placeholder: '예: 내일·다음주 금요일·2026-07-15 (비우면 1주 후)'
            action: '[sense:travel]{op: "flight", to: "$to", from: "$from", date: "$date"}'
            view:
            - type: card_list
              from: items
              empty: 항공편을 찾지 못했습니다
              card:
                title: '{title}'
                lines:
                - '{meta}'
          - name: 호텔
            inputs:
            - key: city
              type: text
              label: 도시
              placeholder: '도시 (예: 파리)'
              required: true
            action: '[sense:travel]{op: "hotel", city: "$city"}'
            view:
            - type: card_list
              from: items
              empty: 호텔을 찾지 못했습니다
              card:
                title: '{title}'
                lines:
                - '{meta}'
      stay:
        aliases:
          region: [query, city, keyword, location]
          checkin: [check_in, start_date, startDate]
          checkout: [check_out, end_date, endDate]
        returns: items
        fixture: '[sense:stay]{region: "제주", source: "goodchoice"}'
        description: 국내 숙박·단기임대 검색 (source 분기). goodchoice=여기어때 호텔·모텔·펜션 실시간 할인가(기본) / 33m2=삼삼엠투 한 달 살기 주간임대 / tourapi=관광공사 공식 숙박 디렉토리. 통합 통화 items.
        group: travel
        target_description: |
          숙박·단기임대 검색. source로 플랫폼 선택. region=지역/키워드 필수.
          - source=goodchoice(기본): 여기어때 실시간 할인가·평점·좌표. region=지역(예 "제주", "강남"). type=hotel(기본)/motel/pension/camping/guesthouse. checkin/checkout(YYYY-MM-DD, 날짜별 요금 반영)·personal(인원, 기본2). max_price=1박 상한(원). limit(기본20, 페이지 자동추적 최대100).
          - source=33m2: 삼삼엠투 한 달 살기 — 주 단위 임대(usingFee)·관리비·평수. region=지역(예 "평택"). max_week_fee/min_week_fee=주간요금 서버필터(원). checkin/checkout=입주 기간. limit(기본20).
          - source=tourapi: 한국관광공사 공식 숙박 디렉토리 — 가격 없음, 권위 목록·연락처·좌표. region=광역명(서울/제주 등 → 지역목록) 또는 키워드(예 "경주 한옥" → 키워드검색). limit(기본20).
          해외 호텔은 [sense:travel]{op: "hotel"} (Amadeus).
        router: handler
        tool: search_stay
        implementation: tool_stay.py — goodchoice=yeogi.com __NEXT_DATA__ SSR 추출(curl_cffi 크롬위장, 레거시 goodchoice.kr은 keyword 드랍이라 yeogi 직접) / 33m2=api.33m2.co.kr/v1/rooms 공개 JSON(키불요) / tourapi=KorService2 searchKeyword2·areaBasedList2(contentTypeId=32, DATA_GO_KR_API_KEY). 세 소스 모두 items+map_data 통화.
        keywords:
        - 숙박
        - 숙소
        - 호텔
        - 모텔
        - 펜션
        - 게스트하우스
        - 한옥
        - 여기어때
        - 한달살기
        - 한달살이
        - 단기임대
        - 삼삼엠투
        - 예약
        - 리조트
        app:
          instrument: stay
          icon: 🏨
          name: 숙소
          order: 17
          modes:
          - name: 숙소검색
            inputs:
            - key: region
              type: text
              label: 지역
              placeholder: '지역 (예: 제주, 강남)'
              required: true
            - key: type
              type: select
              label: 종류
              options:
              - value: hotel
                label: 호텔·리조트
              - value: motel
                label: 모텔
              - value: pension
                label: 펜션
              - value: guesthouse
                label: 게스트하우스
            - key: checkin
              type: text
              label: 체크인
              placeholder: 'YYYY-MM-DD (비우면 오늘)'
            - key: checkout
              type: text
              label: 체크아웃
              placeholder: 'YYYY-MM-DD'
            action: '[sense:stay]{source: "goodchoice", region: "$region", type: "$type", checkin: "$checkin", checkout: "$checkout"}'
            view:
            - type: card_list
              from: items
              empty: 숙소를 찾지 못했습니다
              card:
                title: '{title}'
                image: '{image}'
                lines:
                - '{meta}'
                - '{summary}'
                link:
                  href: '{url}'
                  label: 여기어때에서 보기 →
          - name: 한달살기
            inputs:
            - key: region
              type: text
              label: 지역
              placeholder: '지역 (예: 제주, 평택)'
              required: true
            - key: max_week_fee
              type: text
              label: 주간요금 상한(원)
              placeholder: '예: 300000'
            action: '[sense:stay]{source: "33m2", region: "$region", max_week_fee: "$max_week_fee"}'
            view:
            - type: card_list
              from: items
              empty: 매물이 없습니다
              card:
                title: '{title}'
                image: '{image}'
                lines:
                - '{meta}'
                - '{summary}'
                link:
                  href: '{url}'
                  label: 삼삼엠투에서 보기 →
  limbs:
    actions:
      show_map:
        aliases:
          query: [location]
        returns: effect
        description: 지도에 위치 마커 표시 (HTML 지도 생성). 장소명 입력 시 자동 좌표 변환.
        group: open
        target_description: 장소명 또는 좌표
        router: handler
        tool: show_location_map
        implementation: Kakao Map API로 좌표 기반 지도 HTML 생성 (프론트엔드 렌더링용)
        target_key: query

# tool.json 파생 원본 (2026-07-03 이관) — 빌드가 이 블록과 위 actions 의 ops 로 tool.json 을 생성한다.
# op-bearing 도구의 op enum/default 는 여기 저장하지 않는다 (actions 의 ops 가 단일 소스).
tool_json:
  header:
    id: location-services
    name: Location Services
    description: 위치 기반 서비스 도구. 날씨/대기질 조회, 맛집 검색, 자동차 길찾기, 지도 표시, 여행 정보(항공권/호텔/관광지) 검색을 제공합니다.
    version: 1.3.0
  tools:
  - name: get_weather
    description: '날씨 조회 (Open-Meteo, 무료/키불필요). 도시명(한글/영문) 또는 좌표로 현재 날씨 + 예보 조회.


      ## 사용 예시

      - city=''수원'' 또는 city=''Seoul''

      - lat=37.26, lon=127.03

      - days=3 (예보 일수, 기본 3, 최대 7)'
    input_schema:
      type: object
      properties:
        city:
          type: string
          description: 도시명 (한글 또는 영문)
        lat:
          type: number
          description: 위도
        lon:
          type: number
          description: 경도
        days:
          type: integer
          description: 예보 일수 (기본 3, 최대 7)
  - name: amadeus_travel_search
    description: '[sense:travel]{op} — 여행 정보 검색(Amadeus). op=flight(from→to, date)/hotel(city). 도시명·상대날짜 자동 해소. endpoint+params
      직접 지정도 가능.'
    input_schema:
      type: object
      properties:
        op:
          type: string
          description: 검색 종류
        to:
          type: string
          description: '도착 도시명 (flight). 예: 도쿄'
        from:
          type: string
          description: 출발 도시명 (flight, 기본 서울)
        date:
          type: string
          description: 출발일 (flight). "내일"/"다음주 금요일"/YYYY-MM-DD. 기본 +7일
        return_date:
          type: string
          description: 귀국일 (flight, 옵션)
        adults:
          type: integer
          description: 성인 수 (flight, 기본 1)
        city:
          type: string
          description: 도시명 (hotel)
        endpoint:
          type: string
          description: (파워유저) Amadeus 원본 endpoint 직접 지정
        params:
          type: object
          description: (파워유저) endpoint별 원본 파라미터
  - name: search_restaurants
    description: '한국 맛집/음식점을 검색합니다 (카카오+네이버 통합, 블로그 후기 추천 근거 포함).


      ## 반환 정보

      - 카카오(페이지네이션, 기본 30·최대 45) + 네이버 5개, 가게명 정규화로 중복 병합

      - 가게명, 주소, 전화번호, 카테고리, 좌표, place 링크(카카오맵=평점/리뷰 페이지)

      - 상위 12곳: blog_count(네이버 블로그 언급 수) + reason(후기 제목) — 언급 많은 순 정렬


      ## 사용법

      - query에 ''지역 + 음식종류'' 조합 권장

      - 예: ''강남 파스타'', ''홍대 맛집'', ''대전 유성구 삼겹살''


      ## 주의사항

      - 한 번 호출로 충분한 결과 반환 - 중복 호출 불필요

      - 별점 숫자는 공개 API 미제공 — blog_count가 인기 신호

      - 일반 웹 검색은 ddgs_search 사용'
    input_schema:
      type: object
      properties:
        query:
          type: string
          description: '검색 키워드 (예: ''강남 파스타'')'
        x:
          type: string
          description: 중심 경도 (선택)
        y:
          type: string
          description: 중심 위도 (선택)
        radius:
          type: integer
          description: 검색 반경 미터 (기본 5000, 최대 20000)
        limit:
          type: integer
          description: 결과 수 (기본 30, 최대 45)
        enrich:
          type: boolean
          description: 블로그 후기 근거 부착 여부 (기본 true, false면 빠름)
      required:
      - query
  - name: kakao_navigation
    description: '카카오모빌리티 API로 자동차 길찾기를 수행합니다.


      ## 반환 정보

      - 거리, 예상 소요시간, 톨비

      - 경로 지도 (map_data)

      - 주요 구간 안내


      ## 출발지/목적지 형식

      - 장소명: ''오송역'', ''수원 포레파크원'' (자동 좌표 변환)

      - 좌표: ''127.0276,37.4979''


      ## 경로 옵션

      - priority: RECOMMEND(추천), TIME(최단시간), DISTANCE(최단거리)

      - avoid: toll(유료도로), motorway(고속도로) 회피'
    input_schema:
      type: object
      properties:
        origin:
          type: string
          description: 출발지 좌표 (경도,위도)
        destination:
          type: string
          description: 목적지 좌표 (경도,위도)
        waypoints:
          type: string
          description: 경유지 (|로 구분, 최대 5개)
        priority:
          type: string
          enum:
          - RECOMMEND
          - TIME
          - DISTANCE
          description: 경로 우선순위
        avoid:
          type: string
          description: 회피 옵션 (toll, motorway 등)
        alternatives:
          type: boolean
          description: 대안 경로 제공
        summary:
          type: boolean
          description: 요약만 반환 (지도 생략)
        generate_map:
          type: boolean
          description: HTML 지도 생성 (기본 true)
      required:
      - origin
      - destination
  - name: show_location_map
    description: '특정 위치의 지도를 대화창에 표시합니다.


      ## 사용 시점

      - 장소 검색 결과 시각화

      - 위치 안내

      - 여러 장소 비교 (markers 사용)


      ## 사용법

      - query로 장소명 검색

      - 또는 lat, lng로 직접 좌표 지정

      - markers로 여러 마커 추가 가능'
    input_schema:
      type: object
      properties:
        query:
          type: string
          description: '장소명 (예: ''강남역'')'
        lat:
          type: number
          description: 위도 (직접 지정시)
        lng:
          type: number
          description: 경도 (직접 지정시)
        zoom:
          type: integer
          description: 줌 레벨 (기본 15, 1-18)
        markers:
          type: array
          description: 추가 마커 [{name, lat, lng}, ...]
  - name: reverse_geocode
    description: 'GPS 좌표를 행정구역 주소로 변환합니다 (카카오 로컬 API).


      ## 반환 정보

      - address: 전체 주소 (예: ''부산광역시 기장군 기장읍'')

      - region_1depth~4depth: 시/도, 시/군/구, 읍/면/동, 리


      ## 사용 예시

      - lat=35.32, lon=129.27 → ''경상남도 울산광역시 울주군'''
    input_schema:
      type: object
      properties:
        lat:
          type: number
          description: 위도 (latitude)
        lon:
          type: number
          description: 경도 (longitude)
      required:
      - lat
      - lon
  - name: search_stay
    description: '국내 숙박·단기임대 검색 (source 분기). 통합 통화 items[{title,meta,summary,url,image,lat,lng}] 반환.


      ## source

      - goodchoice(기본): 여기어때 — 호텔·모텔·펜션·게스트하우스 실시간 할인가·평점. checkin/checkout으로 날짜별 요금.

      - 33m2: 삼삼엠투 한 달 살기 — 주 단위 임대료(usingFee)·관리비·평수.

      - tourapi: 한국관광공사 공식 숙박 디렉토리 — 가격 없음, 권위 목록.


      ## 사용 예시

      - region=''제주'', source=''goodchoice'', checkin=''2026-08-10'', checkout=''2026-08-11''

      - region=''평택'', source=''33m2'', max_week_fee=300000

      - region=''경주 한옥'', source=''tourapi'''
    input_schema:
      type: object
      properties:
        region:
          type: string
          description: 지역 또는 키워드 (예 "제주", "강남", "경주 한옥")
        source:
          type: string
          description: goodchoice(여기어때, 기본) / 33m2(삼삼엠투 한달살기) / tourapi(관광공사 디렉토리)
        type:
          type: string
          description: goodchoice 전용 — hotel(기본)/motel/pension/camping/guesthouse
        checkin:
          type: string
          description: 체크인/입주 시작 (YYYY-MM-DD)
        checkout:
          type: string
          description: 체크아웃/입주 종료 (YYYY-MM-DD)
        personal:
          type: integer
          description: goodchoice 전용 — 인원 (기본 2)
        max_price:
          type: integer
          description: goodchoice 전용 — 1박 가격 상한 (원)
        max_week_fee:
          type: integer
          description: 33m2 전용 — 주간요금 상한 (원, 서버필터)
        min_week_fee:
          type: integer
          description: 33m2 전용 — 주간요금 하한 (원, 서버필터)
        limit:
          type: integer
          description: 결과 개수 (기본 20)
      required:
      - region
