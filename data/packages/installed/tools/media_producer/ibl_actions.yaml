node: engines
actions:
  html_video:
    description: 'HTML/CSS 씬을 MP4 영상으로 합성. topic 있으면 풀 파이프라인, scene_dir 있으면 마지막 렌더링만. (가이드 html_video.md)'
    target_description: 'topic(주제) 또는 scene_dir(이미 만든 씬 디렉토리) 중 하나. scene_dir이 있으면 자동으로 렌더링 단계만 실행.'
    group: media_produce
    category: create
    router: handler
    tool: html_video
    implementation: scene_dir이 있으면 render 단계(저장된 HTML 씬 → Playwright + FFmpeg MP4)로, 아니면 풀 파이프라인(Jinja2 HTML 씬 생성 → Playwright 프레임 캡처 → FFmpeg MP4 인코딩)으로 분기.
    target_key: topic
    keywords:
    - 영상
    - 동영상
    - MP4
    - 렌더링
    - HTML영상
  tts:
    description: 텍스트를 음성 파일(MP3)로 변환 (Edge TTS). 동영상 나레이션 등에 활용.
    group: media_produce
    category: create
    router: handler
    tool: create_tts
    implementation: edge-tts(Microsoft Azure TTS)로 텍스트→MP3 변환
    target_key: text
    keywords:
    - speech
    - voice
    - 음성
    - 읽어줘
    - narration
    - text to speech
    - 목소리
    - 텍스트음성
    - TTS
    - 나레이션
  slide_shadcn:
    description: 'Shadcn UI 고품질 PNG 슬라이드. 마케팅·강의·일러스트 통합 레이아웃 + design_system. 자세한 layout/스타일은 read_guide(query="슬라이드").'
    target_description: |
      slides 배열 (각 슬라이드 {layout, title, ...}) + design_system/theme/output_dir/width/height 옵션. 인라인 배열만 (topic 미지원).
      마케팅 layout: hero/hero_image/features/stats/testimonial/pricing/cta/content_image/steps/custom
      강의 layout: lecture_body/metaphor_story/comparison_table/factbox/quote
      일러스트 통합 layout(NotebookLM 스타일): hero_illustration/illustration_anchor/split_concept/illustration_background/comparison_iconic
      design_system: default/vintage_book/academic_paper/tech_minimal/magazine_modern
      theme(색만): default/blue/green/purple/orange/dark
    group: media_produce
    category: create
    router: handler
    tool: create_shadcn_slides
    implementation: Shadcn UI React 기반 + Playwright PNG 캡처. 자세한 layout/design_system 명세는 read_guide(query="슬라이드").
    keywords:
    - 슬라이드
    - Shadcn
    - PNG
  image_gemini:
    description: 'Gemini AI 이미지 (Nano Banana 2 기본). style_preset으로 슬라이드 design_system과 일관된 일러스트. 옵션·모델은 read_guide(query="Gemini 이미지").'
    target_description: |
      prompt (필수). 옵션:
      - style_preset: vintage_book/academic_paper/tech_minimal/magazine_modern (슬라이드 design_system과 매칭, 한글 금지+스타일 토큰 자동 결합)
      - aspect_ratio: 1:1/16:9/9:16/4:3/3:4/1:4/4:1/1:8/8:1
      - image_size: 512/1K/2K/4K (기본 1K)
      - quality: fast(3.1 Flash 기본)/pro(Nano Banana Pro)/legacy
      - output_path, api_key(환경변수 GEMINI_API_KEY 기본)
    group: media_produce
    category: create
    router: handler
    tool: generate_gemini_image
    implementation: Google Gemini API. 자세한 모델/파라미터·가격은 read_guide(query="Gemini 이미지").
    target_key: prompt
    keywords:
    - image generation
    - 이미지 만들기
    - AI 이미지
    - 그림
    - picture
    - 사진생성
    - text to image
    - 이미지생성
    - AI이미지
  render_html:
    description: HTML을 이미지로 렌더링
    group: media_produce
    category: create
    router: handler
    tool: render_html_to_image
    implementation: Playwright로 HTML 페이지 렌더링 후 PNG 캡처
    target_key: html
    keywords:
    - HTML
    - 이미지
    - 렌더링
  lecture_plan:
    description: '강의 슬라이드 파이프라인 1단계: 메시지 큐레이션(명제 outline). init_skeleton:true로 스켈레톤. 가이드 read_guide(query="강의 슬라이드").'
    target_description: |
      outline 배열 또는 init_skeleton=true.
      - outline 각 항목: {idx, role, title, device, visual, concrete}
      - role: cover/intro/thesis/closure_table/closure_diagram/quote/outro/reference
      - device: contrast/chain/equation/scale/hierarchy/none
      - source, style(notebooklm 등) 옵션
      notebooklm 스타일은 closure_table+closure_diagram 슬라이드 강제.
    group: media_produce
    category: create
    router: handler
    tool: create_lecture_plan
    implementation: 단계 산출물 outline.json + outline.md 저장. 스키마 검증. 이 단계가 통과해야 lecture_write 가능.
    achievement_criteria: '모든 슬라이드 제목이 단정문(라벨 X), 5종 수사 장치(contrast/chain/equation/scale/hierarchy)에 매핑됨, 이중 회수(closure_table+closure_diagram) 존재, 핵심 명제 누락 없음, 각 슬라이드의 concrete 필드에 수치·고유명사 ≥1.'
    keywords:
    - 강의
    - 슬라이드 기획
    - outline
    - 명제
  lecture_write:
    description: '강의 슬라이드 파이프라인 2단계: 슬라이드별 layout/title/labels/image_prompt 집필. only_indices로 부분 갱신.'
    target_description: |
      lecture_dir + contents 배열 (각 항목 {idx, layout, title, labels, image_prompt, ...}).
      - design_system(sf_blueprint 등) 옵션
      - only_indices: 부분 갱신할 idx 배열
      - illustration_* 레이아웃은 image_prompt 필수, split_concept은 left/right_image_prompt 필수
    group: media_produce
    category: create
    router: handler
    tool: create_lecture_write
    implementation: contents.json 저장. 스키마 검증 + 부분 갱신.
    achievement_criteria: 'image_prompt가 다이어그램형(씬 묘사 X)으로 작성됨, 영문 라벨 명시(EYE/MASS 등), 한글 라벨 들어갈 빈 공간 명세 포함, 본문 단락을 라벨로 그대로 옮기지 않음, 각 명제를 시각화하는 라벨 배치가 outline의 device와 정합.'
    keywords:
    - 강의
    - 슬라이드 집필
    - contents
  lecture_illustrate:
    description: '강의 슬라이드 파이프라인 3단계: image_prompt들을 image_gemini로 병렬 호출. only_indices로 약한 일러스트만 재생성.'
    target_description: |
      lecture_dir 필수. 옵션:
      - style_preset(미지정시 design_system 사용)
      - quality: fast/pro
      - image_size: 1K/2K/4K
      - only_indices: 재생성할 idx 배열
      split_concept은 좌·우 1:1 두 장 생성. 실패한 슬라이드는 manifest 미기록 → 다시 호출.
    group: media_produce
    category: create
    router: handler
    tool: create_lecture_illustrate
    implementation: image_gemini를 슬라이드별로 호출, illustrations/manifest.json 매니페스트 관리.
    achievement_criteria: '생성된 일러스트가 다이어그램형이고 한글 미포함, 디자인 시스템 톤 일관, 빈 공간이 정말 비어있음(라벨 들어갈 자리), 각 일러스트가 contents.json의 image_prompt 의도와 정합. (VLM 평가는 image_critic 액션 참조)'
    keywords:
    - 강의
    - 일러스트 생성
    - illustrate
  image_critic:
    description: 'Gemini Vision으로 일러스트가 의도와 정합하는지 평가. 반환: passed/score/issues/notes. ILLUSTRATE 단계 자동 평가용.'
    target_description: image_path(절대 경로) + intent(자연어 설명) 필수. style_preset/checks(추가 체크 배열) 옵션. 기본 체크 - 다이어그램형/한글 미포함/빈 공간/객체 명확성/디자인 톤 일관성. 한글 검출 시 무조건 passed=false.
    group: media_produce
    category: evaluate
    router: handler
    tool: critique_gemini_image
    implementation: Gemini 3 Pro Vision으로 이미지 평가. 사람용 요약 + verdict_json 반환.
    achievement_criteria: '평가 자체의 신뢰성 — JSON 파싱 성공, issues가 구체적 이유를 담음, 한글 검출 시 무조건 passed=false.'
    keywords:
    - 일러스트 평가
    - VLM
    - vision
    - critic
    - image evaluation
  lecture_compose:
    description: '강의 슬라이드 파이프라인 4단계: contents+illustrations → slide_shadcn → 최종 데크. only_indices로 부분 재합성.'
    target_description: lecture_dir 필수. only_indices(부분 재합성할 idx 배열) 옵션. 최종 데크는 lecture_dir/deck/에 HTML+PNG로 저장.
    group: media_produce
    category: create
    router: handler
    tool: create_lecture_compose
    implementation: contents.json과 illustrations/manifest.json을 병합하여 slide_shadcn에 전달.
    achievement_criteria: '라벨이 일러스트의 핵심 객체를 가리지 않음, 1280×720 뷰포트 안에 모든 요소가 들어옴, 한국어 폰트가 깨지지 않음, 라벨 좌표가 일러스트 빈 공간과 정합.'
    keywords:
    - 강의
    - 슬라이드 데크
    - compose
