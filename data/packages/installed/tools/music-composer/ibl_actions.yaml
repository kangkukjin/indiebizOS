node: engines
actions:
  music:
    description: ABC 악보 작곡 및 오디오 변환
    group: music
    category: create
    router: handler
    tool: compose_and_export
    implementation: ABC notation 생성 → abc2midi MIDI 변환 → fluidsynth 오디오 렌더링
    target_key: title
    keywords:
    - 작곡
    - 악보
    - ABC
    - MIDI
  abc_to_midi:
    description: ABC 악보를 MIDI 파일로 변환
    group: music
    router: handler
    tool: abc_to_midi
    implementation: abc2midi CLI로 ABC 악보→MIDI 파일 변환
    target_key: abc_notation
    keywords:
    - 악보
    - MIDI
    - ABC변환
  midi_to_audio:
    description: MIDI를 오디오(WAV/MP3)로 변환
    group: music
    router: handler
    tool: midi_to_audio
    implementation: fluidsynth + GeneralUser GS.sf2 사운드폰트로 MIDI→WAV→MP3 변환
    target_key: midi_path
    keywords:
    - MIDI
    - 오디오
    - WAV
    - MP3
  abc_search:
    description: ABC 악보 검색
    group: music
    router: handler
    tool: search_abc_tunes
    implementation: abcnotation.com에서 ABC 악보 검색 (HTTP 크롤링)
    target_key: query
    keywords:
    - 악보검색
    - ABC
  abc_get:
    description: ABC 악보 상세 조회
    group: music
    router: handler
    tool: get_abc_tune
    implementation: abcnotation.com에서 악보 상세 조회 (HTTP 크롤링)
    target_key: tune_id
    keywords:
    - 악보조회
    - ABC
