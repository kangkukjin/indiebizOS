nodes:
  sense:
    actions:
      abc_search:
        description: abcnotation.com에서 ABC 표기법 악보 검색. 곡명·작곡가·키워드로. 상세 조회는 abc_get.
        target_description: 검색어 (곡명, 작곡가, 장르 등). 결과는 tune_id로 abc_get에 사용.
        group: music
        router: handler
        tool: search_abc_tunes
        implementation: abcnotation.com에서 ABC 악보 검색 (HTTP 크롤링)
        target_key: query
        keywords:
        - 악보검색
        - ABC
      abc_get:
        description: abcnotation.com 악보의 상세 내용 조회. 검색은 abc_search.
        target_description: 악보 ID (abc_search 결과의 tune_id).
        group: music
        router: handler
        tool: get_abc_tune
        implementation: abcnotation.com에서 악보 상세 조회 (HTTP 크롤링)
        target_key: tune_id
        keywords:
        - 악보조회
        - ABC
  engines:
    actions:
      music:
        description: 'ABC 작곡 + MIDI + 오디오 통합. stage: full(기본, 작곡→MIDI→오디오) / midi_only(ABC→MIDI) / audio_only(MIDI→오디오).'
        target_description: |
          stage로 분기 (기본 full).
          - full: title(필수) + abc(직접 ABC 전달) 또는 description(AI 작곡 요청). 작곡→MIDI→오디오 전 단계.
          - midi_only: abc_notation(필수, X:/T:/M:/K: 헤더 포함). ABC→MIDI만.
          - audio_only: midi_path(필수, MIDI 파일 경로). MIDI→WAV/MP3만. format 옵션(wav/mp3, 기본 mp3).
        group: music
        category: create
        router: handler
        tool: music
        implementation: stage=full은 compose_and_export(ABC notation 생성→abc2midi→fluidsynth). stage=midi_only는 abc2midi CLI. stage=audio_only는 fluidsynth + GeneralUser GS.sf2.
        target_key: title
        keywords:
        - 작곡
        - 악보
        - ABC
        - MIDI
        - 오디오
        - WAV
        - MP3
        - ABC변환
