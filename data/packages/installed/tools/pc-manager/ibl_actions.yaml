nodes:
  sense:
    actions:
      host:
        returns: scalar
        fixture: '[sense:host]{op: "status"}'
        description: 이 기계(나의 몸) 자신의 운영 상태를 구조화 데이터로 직접 내성 (op 분기). 화면을 보는 게 아니라 기계를 직접 느끼는 자기수용감각. status(상태 한눈에)/apps(자원 점유 프로세스)/resources(상세 지표).
        group: device
        target_description: 'op=status(기본): 전면 앱·CPU·메모리·디스크·배터리·가동시간·로드평균·프로세스 수 한 눈에. apps: 메모리 점유 상위 프로세스(limit 옵션, 기본 12). resources: per-core CPU·스왑·디스크 파티션별·네트워크 상세.'
        target_key: op
        router: handler
        tool: host_op
        runs_on: mac_only
        ops:
          default: status
          values:
            status: 이 기계 상태 한 눈에 (전면앱·CPU·메모리·디스크·배터리·가동시간)
            apps: 자원(메모리)을 많이 쓰는 프로세스 상위 N (limit 옵션)
            resources: 상세 지표 (per-core CPU·스왑·디스크 파티션·네트워크·배터리)
        implementation: pc-manager 패키지 host_op 핸들러 — psutil로 CPU/메모리/스왑/디스크/네트워크/배터리, lsappinfo로 전면 앱(권한 프롬프트 無), runtime_utils.detect_body로 몸 이름. 폰은 자기 센서 별도라 mac_only.
        keywords:
        - 내컴퓨터
        - 시스템상태
        - cpu
        - 메모리
        - 디스크
        - 배터리
        - 내몸
        - 프로세스
        app:
          instrument: host
          icon: 🖥️
          name: 시스템
          order: 15
          phone_render: false
          modes:
          - name: 상태
            auto_run: true
            action: '[sense:host]{op: "status"}'
            view:
            - type: metric
              label: CPU
              big: '{cpu_percent}'
              unit: '%'
              sub: '{body}{frontmost_app|opt:  ·  ,}'
            - type: kv
              title: 메모리 · 디스크 · 전원
              rows:
              - k: 메모리
                v: '{memory.used_gb} / {memory.total_gb} GB ({memory.percent}%)'
              - k: 디스크 (/)
                v: '{disk_root.free_gb} GB 여유 / {disk_root.total_gb} GB ({disk_root.percent}%)'
              - k: 배터리
                v: '{battery.percent|opt:,%}'
              - k: 가동시간
                v: '{uptime_hours} 시간'
              - k: 프로세스 수
                v: '{process_count}'
          - name: 프로세스
            auto_run: true
            action: '[sense:host]{op: "apps", limit: 15}'
            view:
            - type: kv_list
              title: 메모리 점유 상위
              from: top
              k: '{name}'
              v: '{mem_percent}% · CPU {cpu_percent}%'
          - name: 자원
            auto_run: true
            action: '[sense:host]{op: "resources"}'
            view:
            - type: kv
              title: CPU · 메모리 · 스왑 · 네트워크
              rows:
              - k: CPU
                v: '{cpu.percent_overall}% · {cpu.logical_cores} 코어'
              - k: 메모리
                v: '{memory.used_gb} / {memory.total_gb} GB ({memory.percent}%)'
              - k: 스왑
                v: '{swap.used_gb} / {swap.total_gb} GB ({swap.percent}%)'
              - k: 네트워크
                v: ↑ {network.sent_gb} · ↓ {network.recv_gb} GB
              - k: 가동시간
                v: '{uptime_hours} 시간'
            - type: kv_list
              title: 디스크 파티션
              from: disks
              k: '{mount}'
              v: '{free_gb} GB 여유 / {total_gb} GB ({percent}%)'
  self:
    actions:
      storage:
        returns: scalar
        fixture: '[self:storage]{op: "volumes"}'
        description: 디스크 용량 분석 (op 분기) — 폴더·확장자별 용량 집계. scan(분석 인덱스 구축)/summary(용량 집계)/volumes(볼륨 목록). ★파일 검색은 fs_query·디스크 여유공간은 sense:host (둘 다 스캔 불요).
        group: file
        target_description: 용량 분석은 OS 색인이 못 하는 디렉토리 크기 롤업이라 인덱스가 필요 — scan(구축) 선행 → summary 가 폴더·확장자별 용량 집계. summary — volume_name/root_path 생략 시 전체 통합. volumes — 파라미터 없음.
        target_key: op
        router: handler
        tool: storage_op
        ops:
          default: volumes
          values:
            scan: 용량 분석 인덱스 구축 (treemap·확장자별 집계의 선행 단계)
            summary: 폴더·확장자별 용량 집계 (scan 선행, 볼륨 생략 시 전체 통합)
            volumes: 용량 분석된 볼륨 목록 (이름·경로·용량, 기본)
        implementation: scan_storage/get_storage_summary/list_volumes op 분기 (pc-manager)
      fs_query:
        returns: items
        fixture: '[self:fs_query]{kind: "pdf"}'
        description: 파일 메타 검색 (이름·확장자·크기·종류) — OS 색인(맥 Spotlight) 직접. 선스캔 불필요·항상 최신. 내용 검색은 grep, 패턴은 find. self:photo 와 같은 file_index 보편 질의 위의 종류-무관 preset.
        group: file
        target_description: search_term(이름 부분일치) · extension(확장자) · kind(image/video/audio/pdf/any) · min_size_mb · path(검색 루트, 생략 시 홈) · limit(기본 100). 결과 records(보편 파일 필드) + table 통화.
        router: handler
        tool: query_storage
        implementation: pc-manager _query_storage — backend/file_index.query 위임(mdfind 무상태). 비색인 경로는 라이브 walk 폴백.
        target_key: search_term
        app:
          instrument: files
          icon: 🗂️
          name: 파일
          order: 16
          modes:
          - name: 검색
            auto_run: true
            inputs:
            - key: q
              type: text
              placeholder: 파일명·확장자 검색 (예 report, pdf)
            action: '[self:fs_query]{search_term: "$q", limit: 50}'
            view:
            - type: card_list
              from: items
              card:
                title: '{title}'
                lines:
                - '{meta}'
                - '{path}'
          - name: 문서
            auto_run: true
            phone_render: false
            note: 최근 PDF·문서 (OS 색인 직접 — 스캔 불필요·항상 최신). 폰은 MediaStore=미디어 전용이라 문서 미색인 → mac/원격만.
            action: '[self:fs_query]{kind: "pdf", sort: "mtime", limit: 50}'
            view:
            - type: card_list
              from: items
              card:
                title: '{title}'
                lines:
                - '{meta}'
                - '{path}'
          - name: 큰 파일
            auto_run: true
            note: 100MB 이상 — 용량 정리 대상 (큰 순).
            action: '[self:fs_query]{min_size_mb: 100, sort: "size", limit: 50}'
            view:
            - type: card_list
              from: items
              card:
                title: '{title}'
                lines:
                - '{meta}'
                - '{path}'
      folder_note:
        returns: scalar
        fixture: '[self:folder_note]{op: "get"}'
        description: 폴더 주석 관리 (op 분기). set(메모·주석 추가)/get(저장된 주석 조회). 폴더 의미를 기록·확인.
        group: file
        target_description: set — root_path(스캔된 볼륨 경로) + folder_path + note 필수. get — root_path/volume_name 생략 시 전체 볼륨 주석 통합 조회.
        target_key: op
        router: handler
        tool: folder_note_op
        ops:
          default: get
          values:
            set: 폴더에 메모·주석 추가 (root_path + folder_path + note)
            get: 저장된 폴더 주석 조회 (볼륨 생략 시 전체 통합, 기본)
        implementation: annotate_folder/get_folder_annotations op 분기 (pc-manager)
      forage:
        returns: scalar
        fixture: '[self:forage]{op: "recall", query: "test"}'
        description: 포식 기억(냄새지도) — 과거 디스크·코드·웹 포식에서 배운 폴더/모듈 정체·관습·죽은가지·주인모델을 누적·회상. op 분기.
        group: file
        target_description: 'recall(기본) — query(주제)·body(포식 공간: "mac"=홈디스크/"code:<repo>"=코드레포/"web"=웹/"book:<제목>"/"disk:<라벨>" 등 AI가 명명, 생략 시 전 공간 회상)로 회상. note — layer(map|owner) + map은 locus/kind(identity|convention|dead_branch|substrate)/claim, owner는 facet/value. confidence·prior_class(structural|semantic)·prune_reason·generalizes 옵션. forget — id + table(forage_map|owner_model).'
        target_key: op
        router: handler
        tool: forage_op
        scope: workspace
        ops:
          default: recall
          values:
            recall: 누적된 냄새지도 회상 (query·body 필터, 기본)
            note: 지도/주인모델에 단언 누적 (layer=map/owner)
            forget: 잘못된·낡은 항목 폐기 (id + table)
        keywords:
        - 포식기억
        - 냄새지도
        - 주인모델
        implementation: forage_memory.recall/note_map/note_owner/forget op 분기 (pc-manager → backend/forage_memory)
      residual:
        returns: scalar
        exempt: '모집단 표본 인자 필요(sample/estimate)'
        description: 탐색 잔여 측정 — "거기 없음 vs 덜 봤음"을 표본조사로 가른다(음성-단언). op 분기.
        group: file
        target_description: sample(기본) — 질의 모집단에서 이미 본 것(seen 경로 배열) 제외한 미관측 더미의 균일 무작위 표본 n개. 디스크 공간=kind/q/path/extension 으로 모집단, 코드 공간=space:"code:<repo>"+repo(레포 루트)+exts 로 소스파일 모집단. 그 표본을 열어 관련성 판단 후 → estimate(relevant=관련 수, sampled=표본 n, unseen=미관측 M)로 누락 추정+Wilson 신뢰구간. "전부 찾았나"·"정말 없나" 단언의 측정 근거. ★열거 가능 공간(디스크·코드) 전용 — 웹은 모집단 무한·비열거라 미지원(웹 "충분함"은 AI의 berrypicking 포화 판단).
        target_key: op
        router: handler
        tool: residual_op
        scope: workspace
        ops:
          default: sample
          values:
            sample: 미관측 더미의 균일 무작위 표본 (모집단−seen, n개)
            estimate: 표본 결과로 누락 추정 (relevant/sampled/unseen → Wilson CI)
        keywords:
        - 잔여
        - 누락
        - 전부 찾았나
        - 정말 없나
        implementation: file_index.candidate_paths(디스크)·code_candidate_paths(코드) + 균일표본 / Wilson 이항추정 (pc-manager _residual_op)
  limbs:
    actions:
      explorer:
        returns: effect
        runs_on: mac_only
        description: 파일 탐색기로 폴더 열기 (macOS Finder, Windows 탐색기). 파일 자체 열기는 os_open.
        group: open
        target_description: 폴더 경로 (절대 또는 상대). 파일이면 파일 위치 폴더가 열림.
        router: handler
        tool: open_file_explorer
        implementation: subprocess로 macOS Finder/Windows Explorer 실행
        target_key: path

# tool.json 파생 원본 (2026-07-03 이관) — 빌드가 이 블록과 위 actions 의 ops 로 tool.json 을 생성한다.
# op-bearing 도구의 op enum/default 는 여기 저장하지 않는다 (actions 의 ops 가 단일 소스).
tool_json:
  header:
    id: pc-manager
    name: PC Manager
    description: PC 파일 탐색, 외장하드 관리, 저장소 스캔 도구. 파일 탐색기 GUI, 대용량 저장소 인덱싱, 파일 검색, 폴더 구조 분석 기능을 제공합니다. 파일 정리, 중복 파일 찾기, 저장소 관리에
      활용.
    version: 1.1.0
  tools:
  - name: open_file_explorer
    description: 'PC Manager 파일 탐색기 GUI를 엽니다.


      ## 사용 시점

      - 시각적으로 파일 탐색/관리

      - 폴더 구조 확인

      - 파일 정리 작업


      ## 다른 도구와의 관계

      - CLI로 탐색: list_directory (system_essentials)

      - 파일 검색: glob_files, query_storage'
    input_schema:
      type: object
      properties:
        path:
          type: string
          description: 초기 경로 (생략시 홈 디렉토리)
  - name: query_storage
    description: '스캔된 파일 메타데이터를 검색합니다.


      ## 전제조건

      - scan_storage로 먼저 스캔되어 있어야 함


      ## 검색 옵션

      - search_term: 파일명 검색

      - extension: 확장자 필터 (pdf, jpg 등)

      - min_size_mb: 최소 크기 필터


      ## 사용 예시

      - 대용량 파일 찾기: min_size_mb=100

      - PDF 파일 검색: extension=''pdf''

      - 특정 이름 검색: search_term=''프로젝트'''
    input_schema:
      type: object
      properties:
        volume_name:
          type: string
          description: 볼륨 이름 (생략시 전체)
        search_term:
          type: string
          description: 파일명 검색어
        extension:
          type: string
          description: 확장자 필터
        min_size_mb:
          type: number
          description: 최소 크기 (MB)
        limit:
          type: integer
          description: 결과 개수 (기본 100)
  - name: storage_op
    description: '저장소 인덱스 조작 (op 분기) — [self:storage].

      - op=volumes (기본): 스캔된 볼륨 목록 (파라미터 없음).

      - op=scan: 디스크·볼륨 스캔 후 SQLite 인덱스 구축 (path 필수). 이후 query_storage로 검색.

      - op=summary: 저장소 사용량 요약 (volume_name 필수, 총 파일 수/용량/확장자별 통계).


      ## 예시

      - storage_op()                                  # 기본 volumes

      - storage_op(op=''scan'', path=''/Volumes/MyDrive'')

      - storage_op(op=''summary'', volume_name=''MyDrive'')'
    input_schema:
      type: object
      properties:
        op:
          type: string
          description: volumes=볼륨 목록(기본), scan=스캔/인덱싱, summary=사용량 요약
        path:
          type: string
          description: '[scan] 스캔할 경로 (예: /Volumes/MyDrive)'
        volume_name:
          type: string
          description: '[scan] 볼륨 식별 이름(생략시 자동) / [summary] 대상 볼륨(필수)'
  - name: folder_note_op
    description: '폴더 주석 관리 (op 분기) — [self:folder_note].

      - op=get (기본): 저장된 폴더 주석 조회 (root_path 필수).

      - op=set: 폴더에 메모·주석 추가 (root_path + folder_path + note 필수).

      root_path는 storage_op(op=''scan'')으로 스캔한 볼륨 경로.


      ## 예시

      - folder_note_op(op=''set'', root_path=''/Volumes/MyDrive'', folder_path=''/Volumes/MyDrive/backup'', note=''2023 백업'')

      - folder_note_op(op=''get'', root_path=''/Volumes/MyDrive'')'
    input_schema:
      type: object
      properties:
        op:
          type: string
          description: get=주석 조회(기본), set=주석 추가
        root_path:
          type: string
          description: 스캔된 볼륨 경로 (set/get 모두 필수). volume_name으로도 받음
        folder_path:
          type: string
          description: '[set] 주석 달 폴더 경로'
        note:
          type: string
          description: '[set] 폴더 설명/주석'
        volume_name:
          type: string
          description: root_path 별칭 (스캔된 볼륨 경로)
  - name: forage_op
    description: '포식 기억(냄새지도) — [self:forage]. 과거 디스크·웹 포식에서 배운 폴더 정체·관습·죽은가지·주인모델을 세션 너머로 누적·회상. 루프(forager)는 AI 자신이고 이 도구는
      그 *지속 기억*이다.

      - op=recall (기본): 누적된 냄새지도 회상. query(주제)·body(몸, 생략 시 현재 몸).

      - op=note: 단언 누적. layer=map(locus+kind+claim) 또는 layer=owner(facet+value). prior_class=structural만 committal prune 허용(semantic은
      위험).

      - op=forget: 잘못된·낡은 항목 폐기 (id + table).


      ## 예시

      - forage_op(op=''recall'', query=''여행'')

      - forage_op(op=''note'', layer=''map'', locus=''/Volumes/SSD/total/journal'', kind=''dead_branch'', claim=''출판논문 — 여행자료
      없음'', prune_reason=''논문폴더'', prior_class=''structural'')

      - forage_op(op=''note'', layer=''owner'', facet=''domain'', value=''계산신경과학'')

      - forage_op(op=''forget'', id=3, table=''forage_map'')'
    input_schema:
      type: object
      properties:
        op:
          type: string
          description: recall=회상(기본), note=누적, forget=폐기
        query:
          type: string
          description: '[recall] 주제 필터(부분일치)'
        body:
          type: string
          description: 몸 신원 (mac/disk:uuid 등, 생략 시 현재 몸)
        limit:
          type: integer
          description: '[recall] 결과 상한 (기본 20)'
        layer:
          type: string
          enum:
          - map
          - owner
          description: '[note] map=몸별 지도, owner=몸독립 주인모델'
        locus:
          type: string
          description: '[note map] 곳(절대경로) 또는 __substrate__'
        kind:
          type: string
          enum:
          - identity
          - convention
          - dead_branch
          - substrate
          description: '[note map] 항목 종류'
        claim:
          type: string
          description: '[note] 단언(자연어)'
        facet:
          type: string
          enum:
          - identity
          - domain
          - affiliation
          - signal
          - lexicon
          - habit
          description: '[note owner] 주인모델 facet'
        value:
          type: string
          description: '[note owner] facet 값'
        prior_class:
          type: string
          enum:
          - structural
          - semantic
          description: '[note] 구조적(싸게 재검증·committal 허용) vs 의미적(이질억압 위험)'
        confidence:
          type: number
          description: '[note] 확신 0~1'
        prune_reason:
          type: string
