  - name: residual_op
    description: '탐색 잔여 측정 — [self:residual]. "거기 없음"인지 "덜 봤음"인지를 *측정*으로 가른다(음성-단언). 포식 후 ''없다''·''전부 찾았다''를 단언하기 전에 안 본 더미를
      표본조사해 확신을 정량화.

      - op=sample (기본): 질의 모집단(kind/q/path/extension) 중 이미 본 것(seen 경로 배열) 제외한 미관측 더미에서 균일 무작위 n개. 그 표본을 열어 관련성을 판단한다.

      - op=estimate: 표본 판단 결과(relevant=관련 수, sampled=표본 크기, unseen=미관측 모수)로 누락 추정 + Wilson 95% 신뢰구간. 표본 0건이면 ''없음'' 단언이 강해진다.


      ## 예시

      - residual_op(op=''sample'', kind=''image'', path=''/Volumes/SSD/photos'', seen=[''/a.jpg'',''/b.jpg''], n=30)

      - residual_op(op=''estimate'', relevant=0, sampled=30, unseen=1265)'
    input_schema:
      type: object
      properties:
        op:
          type: string
          description: sample=미관측 표본(기본), estimate=누락 추정
        kind:
          type: string
          description: '[sample] 모집단 종류 (image/video/audio/pdf/any)'
        q:
          type: string
          description: '[sample] 이름/메타 부분일치 필터'
        path:
          type: string
          description: '[sample] 검색 루트'
        extension:
          type: string
          description: '[sample] 확장자 필터'
        min_size_mb:
          type: number
          description: '[sample] 최소 크기'
        seen:
          type: array
          items:
            type: string
          description: '[sample] 이미 본(판단한) 경로들 — 모집단에서 제외'
        n:
          type: integer
          description: '[sample] 표본 크기 (기본 20)'
        relevant:
          type: integer
          description: '[estimate] 표본 중 관련 항목 수'
        sampled:
          type: integer
          description: '[estimate] 표본 크기'
        unseen:
          type: integer
          description: '[estimate] 미관측 모수(sample이 돌려준 unseen)'
  - name: host_op
    description: '이 기계(호스트) 자신의 운영 상태를 구조화 데이터로 조회 (op 분기) — [sense:host]. 화면을 보는 게 아니라 기계를 직접 내성하는 자기수용감각.

      - op=status (기본): 몸 상태 한 눈에 — 전면 앱·CPU·메모리·디스크·배터리·가동시간·로드평균·프로세스 수. 파라미터 없음.

      - op=apps: 자원(메모리)을 많이 쓰는 프로세스 상위 N (limit 옵션, 기본 12).

      - op=resources: 상세 지표 — per-core CPU·메모리·스왑·디스크 파티션별·네트워크 누계·배터리.


      ## 예시

      - host_op()                 # 기본 status

      - host_op(op=''apps'', limit=8)

      - host_op(op=''resources'')'
    input_schema:
      type: object
      properties:
        op:
          type: string
          description: status=상태 한눈에(기본), apps=자원 상위 프로세스, resources=상세 지표
        limit:
          type: integer
          description: '[apps] 상위 프로세스 개수 (기본 12)'
