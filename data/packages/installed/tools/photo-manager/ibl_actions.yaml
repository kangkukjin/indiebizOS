nodes:
  self:
    actions:
      photo:
        aliases:
          media_type: [filter]
        returns: items
        fixture: '[self:photo]{op: "stats"}'
        runs_on: anywhere
        description: 사진·동영상 라이브 질의 — OS 미디어 색인(맥 Spotlight/폰 MediaStore) 직접, 선스캔 불필요. 날짜·위치·기종·키워드로 걸러 items 반환. 실행되는 몸의 미디어(맥·폰 각자). 타임라인/통계/중복은 >> table 변환자(groupby/filter).
        target_description: 'q(파일명·기종 키워드, 선택). 필터: kind(photo/video/all 기본 all), start·end(촬영일 범위, YYYY-MM 또는 YYYY-MM-DD), has_gps(true면 위치 보유만), path(검색 루트, 생략 시 홈 전체), file(단일 파일 절대경로 상세), limit(기본 50). 결과 items에 lat/lng/taken_at/month/kind/camera/size 구조 필드 포함 → groupby·지도와 직결.'
        group: photo
        target_key: q
        router: handler
        tool: photo_op
        implementation: handler.py _query_photos — mdfind(필터)로 경로, mdls(색인 메타)로 보강. 비색인 경로는 라이브 walk 폴백. photo_db 자체 인덱스 미사용(데스크탑 풍부창 REST만 사용).
        keywords:
        - 사진
        - 동영상
        - 미디어
        - 사진 검색
        - 사진 스캔
        - 갤러리
        - 사진 통계
        - 타임라인
        - 중복 사진
        - 사진 상세
        app:
          instrument: photo
          icon: 📷
          name: 사진
          order: 14
          phone_render: true
          modes:
          - name: 갤러리
            auto_run: true
            note: 최근 사진·동영상 (OS 색인 직접, 스캔 불필요).
            action: '[self:photo]{kind: "all", limit: 40}'
            view:
            - type: image_grid
              from: items
              image: '{image}'
              title: '{title}'
              lines:
              - '{meta}'
          - name: 검색
            auto_run: true
            inputs:
            - key: q
              type: text
              placeholder: 파일명·기종 검색
            action: '[self:photo]{q: "$q", limit: 40}'
            view:
            - type: image_grid
              from: items
              image: '{image}'
              title: '{title}'
              lines:
              - '{meta}'
          - name: 위치
            auto_run: true
            note: 위치(GPS) 정보가 있는 사진.
            action: '[self:photo]{has_gps: true, limit: 40}'
            view:
            - type: image_grid
              from: items
              image: '{image}'
              title: '{title}'
              lines:
              - '{meta}'
  limbs:
    actions:
      photo_manager:
        returns: effect
        runs_on: mac_only
        description: indiebizOS 내장 Photo Manager GUI 실행 (Electron). 사진 분류·검색·인덱싱.
        group: open
        target_description: 폴더 경로 (선택, 미지정 시 기본 라이브러리 폴더).
        router: handler
        tool: open_photo_manager
        implementation: Electron 기반 Photo Manager GUI 실행
        target_key: path

# tool.json 파생 원본 (2026-07-03 이관) — 빌드가 이 블록과 위 actions 의 ops 로 tool.json 을 생성한다.
# op-bearing 도구의 op enum/default 는 여기 저장하지 않는다 (actions 의 ops 가 단일 소스).
tool_json:
  header:
    id: photo-manager
    name: Photo Manager
    description: '사진/동영상 메타데이터 수집, 갤러리, 중복 탐지 도구.


      ## 스캔 DB 직접 활용

      제공된 도구만으로 부족할 때 python-exec로 DB에 직접 SQL 쿼리가 가능합니다.

      - list_scans 결과의 DB 경로로 sqlite3.connect() 하여 사용

      - 테이블: media_files

      - 주요 컬럼: path(파일경로), filename, taken_date(촬영일 ISO8601), gps_lat(위도), gps_lon(경도), media_type(''photo''/''video''), size,
      camera_model

      - 예: 특정 기간 사진 조회, GPS 좌표 범위로 장소별 필터링, 조건에 맞는 파일 경로 추출 후 copy_path로 복사 등'
    version: 1.2.0
    guide_file: guide.md
  tools:
  - name: open_photo_manager
    description: 'Photo Manager GUI를 엽니다.


      ## 사용 시점

      - 시각적으로 사진 관리

      - 갤러리 브라우징'
    input_schema:
      type: object
      properties:
        path:
          type: string
          description: 초기 경로 (선택)
  - name: photo_op
    description: '사진·동영상 라이브 질의 — OS 미디어 색인(맥 Spotlight/폰 MediaStore) 직접. 선스캔 불필요·항상 최신.


      파라미터: q(파일명·기종 키워드, 선택), kind(photo/video/all 기본 all), start·end(촬영일 범위, YYYY-MM 또는 YYYY-MM-DD), has_gps(true면 위치 보유
      사진만), path(검색 루트, 생략 시 홈 전체), file(단일 파일 절대경로 상세), limit(기본 50).


      반환 records[]에 표시 필드(title/meta/image/url)와 구조 필드(path/taken_at/month/kind/size/camera/lat/lng)가 함께 실림 → 타임라인=records→[table:groupby]{by:month},
      통계=[table:groupby]{by:kind}, 지도=lat/lng 직결 조합으로 유도.'
    input_schema:
      type: object
      properties:
        q:
          type: string
          description: 파일명·기종 키워드 부분일치 (선택)
        kind:
          type: string
          enum:
          - photo
          - video
          - all
          description: 미디어 종류 (기본 all)
        start:
          type: string
          description: 촬영일 시작 (YYYY-MM 또는 YYYY-MM-DD)
        end:
          type: string
          description: 촬영일 끝 (YYYY-MM 또는 YYYY-MM-DD)
        has_gps:
          type: boolean
          description: true면 위치(GPS) 보유 사진만
        path:
          type: string
          description: 검색 루트 (생략 시 홈 전체)
        file:
          type: string
          description: 단일 파일 절대경로 상세 조회
        limit:
          type: integer
          description: 반환 개수 (기본 50)
      additionalProperties: true
