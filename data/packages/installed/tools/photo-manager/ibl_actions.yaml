nodes:
  self:
    actions:
      # 2026-05-27: 8개 액션을 photo {op} 단일 액션으로 통합.
      # [[architecture_ibl_single_action_pattern]] 적용 — handler.py의 _dispatch_photo_op이
      # 옛 함수(scan_photos, list_scans, get_gallery, get_stats, get_timeline,
      # find_duplicates, photo_db.search_media, photo_db.get_media_detail)로 라우팅.
      # 옛 도구 이름은 tool.json/handler.py에 직접 호출 호환용으로 보존되어 있지만
      # IBL 어휘에는 노출되지 않는다.
      photo:
        description: 사진·동영상 라이브러리 관리 (op 분기). 스캔(인덱싱)/조회/검색/통계/타임라인/중복/상세 통합. scan이 모든 조회의 전제.
        target_description: 'op: scan | list_scans | gallery | search | detail | stats | timeline | duplicates. scan/gallery/stats/timeline/duplicates는 path(폴더 경로) 필요(생략 시 가장 큰 스캔 자동). search는 query + 옵션(media_type, start_date, end_date, limit). detail은 media_id. list_scans는 파라미터 없음. timeline에 year 옵션.'
        group: photo
        target_key: op
        router: handler
        tool: photo_op
        implementation: handler.py가 op로 분기 — scan/list_scans/gallery/stats/timeline/duplicates는 photo_db 함수, search/detail은 photo_db.search_media/get_media_detail.
        keywords:
          - 사진
          - 동영상
          - 미디어
          - 사진 검색
          - 사진 스캔
          - 갤러리
          - 사진 통계
          - 타임라인
          - 중복 사진
          - 사진 상세
  limbs:
    actions:
      photo_manager:
        description: Photo Manager GUI 실행
        target_description: 폴더 경로 (선택)
        router: handler
        tool: open_photo_manager
        implementation: Electron 기반 Photo Manager GUI 실행
        target_key: path
