nodes:
  self:
    actions:
      timeline:
        description: 월별 사진/동영상 촬영 통계
        group: photo
        category: get
        router: handler
        tool: get_timeline
        implementation: SQLite DB에서 월별 미디어 파일 집계 쿼리
        target_key: path
        keywords:
        - 사진
        - 타임라인
        - 월별
        - 통계
      photo_stats:
        description: 스캔된 폴더의 통계 (사진/동영상 수, 용량, 카메라별)
        target_description: 폴더 경로
        router: handler
        tool: get_stats
        implementation: SQLite DB에서 전체 미디어 통계 집계
        target_key: path
      list_scans:
        description: 스캔된 폴더 목록 조회
        group: photo
        category: list
        router: handler
        tool: list_scans
        implementation: 스캔 이력 SQLite DB 조회
        keywords:
        - 사진
        - 스캔
        - 폴더
      photo_scan:
        description: 폴더의 사진/동영상 메타데이터 수집 (인덱싱)
        target_description: 스캔할 폴더 경로
        router: handler
        tool: scan_photos
        implementation: PIL(Pillow)로 이미지 EXIF 메타데이터 추출 후 SQLite 인덱싱
        target_key: path
      gallery:
        description: 스캔된 사진/동영상 갤러리 조회 (페이지네이션, 필터)
        group: photo
        category: get
        router: handler
        tool: get_gallery
        implementation: SQLite DB에서 페이지네이션/필터 기반 미디어 목록 조회
        target_key: path
        keywords:
        - 갤러리
        - 사진
        - 동영상
        - 앨범
      photo_manager:
        description: Photo Manager GUI 실행
        group: photo
        router: handler
        tool: open_photo_manager
        implementation: Electron 기반 Photo Manager GUI 실행
        target_key: path
        keywords:
        - 사진관리
        - GUI
      photo_list_scans:
        description: 스캔된 폴더 목록 및 DB 경로 조회
        router: handler
        tool: list_scans
        implementation: 스캔 이력 SQLite DB 조회
      photo_gallery:
        description: 스캔된 사진/동영상 갤러리 조회 (페이지네이션, 필터)
        target_description: 폴더 경로
        router: handler
        tool: get_gallery
        implementation: SQLite DB에서 페이지네이션/필터 기반 미디어 목록 조회
        target_key: path
      photo_timeline:
        description: 월별 촬영 현황 타임라인
        target_description: 폴더 경로
        router: handler
        tool: get_timeline
        implementation: SQLite DB에서 월별 미디어 파일 집계 쿼리
        target_key: path
      photo_duplicates:
        description: 중복 사진/동영상 탐지 (MD5 기반)
        target_description: 폴더 경로
        router: handler
        tool: find_duplicates
        implementation: MD5 해시 기반 중복 파일 탐지 (파일시스템 스캔)
        target_key: path
  limbs:
    actions:
      photo_manager:
        description: Photo Manager GUI 실행
        target_description: 폴더 경로 (선택)
        router: handler
        tool: open_photo_manager
        implementation: Electron 기반 Photo Manager GUI 실행
        target_key: path
