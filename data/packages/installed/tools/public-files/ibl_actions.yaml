nodes:
  others:
    actions:
      showcase:
        returns: items
        fixture: '[others:showcase]{op: "status"}'
        runs_on: pc_only
        description: '선택한 폴더를 외부 공개 사이트(Cloudflare)로 비추는 노출 층 — op:status(기본)/add/remove/config + 바스켓(basket_*). 라이브 서빙(인덱싱 없음) — 맥이 요청 시 그 디렉토리를 즉석에서 훑고 썸네일을 그 자리에서 생성, 파일을 옮기거나 지우면 즉시 반영. bare 루트는 잠금, 모든 갤러리는 바스켓(=주소 하나, /s/<5자 코드>). publish(Nostr 이벤트 발행)와 구별되는 파일 공개 진열.'
        target_description: 'op:status(추가한 폴더 목록·각 폴더가 담긴 주소 + 전역 설정 반환) / add(path 폴더를 추가, title 표시명·mode media|files — 추가만으론 비공개, 바스켓에 담아야 공개) / remove(path 폴더 제거, 모든 주소에서 빠짐) / config(path 있으면 폴더 표시명, 없으면 전역 strip_exif·transcode_video·public_base). 바스켓(공개 주소): basket_list / basket_save(title, all_folders=true면 전체공개 갤러리, basket_id 있으면 개명) / basket_detail(basket_id) / basket_toggle(basket_id+folder_id 담기·빼기) / basket_delete(basket_id). 폴더가 어느 주소에 담기느냐가 곧 보안 경계.'
        target_key: op
        group: showcase
        router: handler
        tool: showcase_op
        ops:
          default: status
          values:
            status: 추가한 폴더 목록(각 폴더가 담긴 주소) + 전역 설정 조회
            add: 폴더를 목록에 추가 (바스켓에 담아야 공개; 인덱싱 없음)
            remove: 폴더 제거 (모든 주소에서 빠짐)
            config: 설정 갱신 — path 있으면 폴더 표시명, 없으면 전역(EXIF·동영상 변환·public_base)
            detail: 폴더 하나 상세 (앱 드릴용)
            basket_list: 바스켓(공개 주소) 목록 — 각 주소의 title·URL·담긴 폴더 수
            basket_save: 바스켓 생성(basket_id 없으면 5자 코드 slug 발급, all_folders=전체공개) 또는 이름 변경
            basket_detail: 바스켓 하나 상세 (앱 드릴용) — 전 폴더에 소속여부·담기/빼기 액션 부착
            basket_toggle: 바스켓에 폴더 하나 담기/빼기 (basket_id + folder_id)
            basket_delete: 바스켓(주소) 삭제 — 폴더 자체는 보존
        implementation: 'public-files 패키지 showcase_op — 상태(폴더·바스켓)만 data/showcase_state.json 에 관리. 목록·썸네일·원본은 맥이 요청 시 라이브 서빙(backend/api_showcase.py: /showcase/list·thumb·media). 공개 Worker(substrate)는 slug 게이트 + 지연 캐시만. R2 는 SPA 호스팅 + 썸네일/원본 캐시.'
        keywords:
        - 공개 파일
        - 공개 폴더
        - 파일 공개
        - 공개 갤러리
        - 열린 nas
        - 사진 공개
        - 외부 공유 사이트
        - showcase
        app:
          instrument: showcase
          icon: 🌐
          name: 공개파일
          order: 16
          phone_render: false
          modes:
          - name: 폴더
            auto_run: true
            note: 여기 폴더는 '바스켓' 탭에서 주소에 담아야 공개됩니다. 담는 즉시 라이브로 보이고, 파일을 옮기거나 지우면 자동 반영돼요(동기화 불필요).
            action: '[others:showcase]{op: "status"}'
            view:
            - type: kv
              title: 안내
              rows:
              - k: 🔒 공개 방식
                v: bare 주소(…/)는 잠겨 있습니다. 공유는 '바스켓' 탭에서 주소(…/s/코드)를 만들어 그 주소로만.
              - k: ⚡ 라이브
                v: 인덱싱이 없습니다. 폴더를 주소에 담으면 파일시스템 그대로 실시간 공개 — 옮기고 지우면 즉시 반영.
            - type: card_list
              from: items
              empty_from: message
              card:
                title: '{title}'
                lines:
                - '{meta}'
              item_click:
                action: '[others:showcase]{op: "detail", path: "{path}"}'
                view:
                - type: form
                  title: 폴더 설정
                  fields:
                  - key: title
                    label: 표시명
                    type: text
                    value: '{folder.title}'
                  action: '[others:showcase]{op: "config", path: "{folder.path}", title: "$title"}'
                  button: 저장
                  actions:
                  - label: 폴더 제거 (모든 주소에서)
                    action: '[others:showcase]{op: "remove", path: "{folder.path}"}'
                    style: danger
                    confirm: 이 폴더를 목록·모든 주소에서 뺄까요? (원본 파일은 안 지웁니다)
                    back: true
          - name: 폴더 추가
            auto_run: true
            note: 찾아보기로 폴더를 고르세요. 추가 후 '바스켓' 탭에서 주소에 담아 공개합니다.
            action: '[others:showcase]{op: "status"}'
            view:
            - type: form
              title: 공개할 폴더
              fields:
              - key: path
                label: 공개할 폴더
                type: folder
                placeholder: 찾아보기로 폴더를 선택하세요
              - key: title
                label: 표시명 (선택)
                type: text
              - key: mode
                label: 종류
                type: select
                value: media
                options:
                - value: media
                  label: 사진·동영상
                - value: files
                  label: 파일 전체
              action: '[others:showcase]{op: "add", path: "$path", title: "$title", mode: "$mode"}'
              button: 공개 추가
          - name: 바스켓
            auto_run: true
            note: 각 바스켓 = 하나의 공개 주소(…/s/코드). 주소마다 다른 폴더만 담아 공개합니다. bare 주소는 잠겨 있어 코드를 알아야 봅니다.
            action: '[others:showcase]{op: "basket_list"}'
            view:
            - type: kv
              title: 바스켓이란
              rows:
              - k: 💡 안내
                v: 바스켓 하나가 공개 주소 하나입니다. 폴더를 담으면 그 주소에서만 보여요. 널리 공유하면 공개 갤러리, 아는 사람만 주면 비밀 갤러리 — 구조는 같아 주소 코드를 지워도 아무것도 안 새어 나갑니다.
            - type: card_list
              from: items
              empty_from: message
              card:
                title: '{title}'
                lines:
                - '{meta}'
                link:
                  href: '{url}'
                  label: 이 주소 열기 →
              item_click:
                action: '[others:showcase]{op: "basket_detail", basket_id: "{id}"}'
                view:
                - type: kv
                  title: 이 주소
                  rows:
                  - k: 🔗 주소
                    v: '{basket.url}'
                  - k: 안내
                    v: '{note}'
                - type: form
                  title: 바스켓 이름
                  fields:
                  - key: title
                    label: 이름
                    type: text
                    value: '{basket.title}'
                  action: '[others:showcase]{op: "basket_save", basket_id: "{basket.id}", title: "$title"}'
                  button: 이름 저장
                  actions:
                  - label: 이 주소 삭제
                    action: '[others:showcase]{op: "basket_delete", basket_id: "{basket.id}"}'
                    style: danger
                    confirm: 이 바스켓과 주소를 삭제할까요? (폴더 자체는 안 지워집니다)
                    back: true
                - type: list_action
                  from: folders
                  title: '{title}'
                  sub: '{meta}'
                  button:
                    label: '{member_action}'
                    action: '[others:showcase]{op: "basket_toggle", basket_id: "{basket_id}", folder_id: "{id}"}'
                    refresh: true
            - type: form
              title: 새 주소(바스켓) 만들기
              fields:
              - key: title
                label: 이름
                type: text
                placeholder: 예) 가족에게, 고객 A, 전체 공개
              - key: all_folders
                label: 전체 폴더 자동 포함 (전체 공개 갤러리)
                type: toggle
              action: '[others:showcase]{op: "basket_save", title: "$title", all_folders: "$all_folders"}'
              button: 주소 만들기
          - name: 설정
            auto_run: true
            note: 원본 서빙 방식 설정. 개인 사진이면 위치·EXIF 제거를 켜두세요.
            action: '[others:showcase]{op: "status"}'
            view:
            - type: form
              title: 공개 설정
              fields:
              - key: strip_exif
                label: 위치·EXIF 제거 (사진 원본에서)
                type: toggle
                value: '{settings.strip_exif}'
              - key: transcode_video
                label: 동영상 H.264 변환 (브라우저 재생용)
                type: toggle
                value: '{settings.transcode_video}'
              action: '[others:showcase]{op: "config", strip_exif: "$strip_exif", transcode_video: "$transcode_video"}'
              button: 저장

# tool.json 파생 원본 — 빌드가 이 블록과 위 actions 의 ops 로 tool.json 을 생성한다.
# op-bearing 도구의 op enum/default 는 여기 저장하지 않는다 (actions 의 ops 가 단일 소스).
tool_json:
  header:
    id: public-files
    name: Public Files
    description: '선택한 폴더를 외부 공개 사이트(Cloudflare)로 라이브 서빙하는 노출 도구. 개인용 NAS 와 달리 "보여줄 것만 고른 창".


      ## 이음매

      맥이 요청 시 디렉토리를 즉석에서 훑고 썸네일을 그 자리에서 생성(인덱싱 없음). 공개 Worker(substrate)는 slug 게이트 + 지연 캐시만. R2 는 SPA 호스팅 + 캐시.


      ## 보안

      bare 루트는 잠금 — 모든 갤러리는 바스켓(/s/<5자 코드>). 폴더가 어느 주소에 담기느냐가 곧 보안 경계. EXIF/GPS 는 기본 제거.'
    version: 0.2.0
    guide_file: guide.md
  tools:
  - name: showcase_op
    description: '선택 폴더를 외부 공개 사이트로 라이브 서빙하는 노출 제어.


      ## op 분기

      - status (기본): 추가한 폴더 목록(각 폴더가 담긴 주소) + 전역 설정 반환. items[] 각 폴더에 title/meta/path, 최상위 settings{strip_exif,transcode_video,public_base}.

      - add: path 폴더를 목록에 추가(title 표시명, mode media|files). 추가만으론 비공개 — 바스켓에 담아야 공개.

      - remove: path 폴더 제거(모든 주소에서 빠짐). 원본 파일은 안 지움.

      - config: path 있으면 폴더 표시명, 없으면 전역 설정(strip_exif, transcode_video, public_base).


      ## 바스켓 (공개 주소)

      - basket_list: 바스켓 목록(title·URL·담긴 폴더 수).

      - basket_save: basket_id 없으면 새 바스켓 생성(5자 코드 slug, all_folders=true면 전체공개 갤러리), 있으면 이름 변경.

      - basket_detail: 바스켓 하나 상세 — 전 폴더에 소속여부·담기/빼기 액션 부착(앱 드릴).

      - basket_toggle: basket_id 바스켓에 folder_id 폴더 담기/빼기(토글). 담는 즉시 라이브 공개.

      - basket_delete: basket_id 바스켓(주소) 삭제. 폴더 자체는 보존.'
    input_schema:
      type: object
      properties:
        op:
          type: string
          description: status(기본)/add/remove/config/detail/basket_list/basket_save/basket_detail/basket_toggle/basket_delete
        path:
          type: string
          description: 폴더 절대경로 (add/remove/detail/config 폴더별)
        basket_id:
          type: string
          description: 바스켓 id (basket_save 개명·basket_detail·basket_toggle·basket_delete)
        folder_id:
          type: string
          description: 폴더 id (basket_toggle 담기/빼기 대상)
        all_folders:
          type: boolean
          description: basket_save 생성 시 true면 모든 폴더 자동 포함(전체 공개 갤러리)
        title:
          type: string
          description: 표시명 (add·config 폴더별·basket_save 바스켓 이름)
        mode:
          type: string
          enum:
          - media
          - files
          description: 'media=사진·동영상 그리드, files=파일 전체 (add, 기본 media)'
        strip_exif:
          type: boolean
          description: config 전역 — 원본 사진에서 위치·EXIF 제거
        transcode_video:
          type: boolean
          description: config 전역 — 동영상 H.264 변환
        public_base:
          type: string
          description: config 전역 — 공개 사이트 base URL
      additionalProperties: true
