<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<base href="/">
<title>공개파일</title>
<style>
  :root {
    --bg: #0d0f12; --card: #171a1f; --text: #e8eaed; --muted: #9aa0a6;
    --line: #2a2e35; --accent: #4f9cf9;
  }
  @media (prefers-color-scheme: light) {
    :root { --bg:#f5f6f8; --card:#fff; --text:#1a1c1e; --muted:#5f6368; --line:#e2e4e8; --accent:#1a73e8; }
  }
  * { box-sizing: border-box; }
  body { margin:0; background:var(--bg); color:var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans KR", sans-serif; }
  header { position:sticky; top:0; z-index:5; background:color-mix(in srgb, var(--bg) 88%, transparent);
    backdrop-filter: blur(12px); border-bottom:1px solid var(--line); padding:14px 18px;
    display:flex; align-items:center; gap:12px; }
  header .crumb { font-size:15px; font-weight:600; }
  header .crumb span { cursor:pointer; }
  header .crumb .sep { color:var(--muted); margin:0 6px; font-weight:400; cursor:default; }
  header .count { color:var(--muted); font-size:13px; margin-left:auto; }
  main { max-width:1400px; margin:0 auto; padding:18px; }
  .folders { display:grid; grid-template-columns:repeat(auto-fill,minmax(240px,1fr)); gap:14px; }
  .folder { background:var(--card); border:1px solid var(--line); border-radius:14px; padding:18px;
    cursor:pointer; transition:transform .12s, border-color .12s; }
  .folder:hover { transform:translateY(-2px); border-color:var(--accent); }
  .folder .fname { font-size:16px; font-weight:600; word-break:break-all; }
  /* 메이슨리(세로 컬럼) — 사진의 실제 비율을 보존해 상하 잘림 없이 전체를 보여준다 */
  .grid { column-width:180px; column-gap:8px; }
  .tile { position:relative; background:var(--card); border-radius:10px; overflow:hidden;
    cursor:pointer; border:1px solid var(--line); break-inside:avoid; margin-bottom:8px; }
  .tile img { width:100%; height:auto; display:block; transition:transform .2s; min-height:60px; }
  .tile:hover img { transform:scale(1.05); }
  .tile .play { position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
    background:rgba(0,0,0,.28); font-size:34px; color:#fff; text-shadow:0 1px 6px rgba(0,0,0,.6); }
  .tile .noimg { min-height:150px; display:flex; align-items:center; justify-content:center;
    flex-direction:column; gap:6px; color:var(--muted); font-size:12px; padding:8px; text-align:center; }
  .empty { color:var(--muted); text-align:center; padding:60px 20px; line-height:1.6; }
  /* 라이트박스 */
  .lb { position:fixed; inset:0; z-index:20; background:rgba(0,0,0,.92); display:none;
    align-items:center; justify-content:center; padding:24px; }
  .lb.open { display:flex; }
  .lb img, .lb video { max-width:100%; max-height:100%; border-radius:8px; }
  .lb .close { position:absolute; top:16px; right:20px; font-size:30px; color:#fff; cursor:pointer;
    line-height:1; opacity:.85; }
  .lb .nav { position:absolute; top:50%; transform:translateY(-50%); font-size:44px; color:#fff;
    cursor:pointer; user-select:none; opacity:.7; padding:0 16px; }
  .lb .nav:hover { opacity:1; }
  .lb .prev { left:6px; } .lb .next { right:6px; }
  .lb .cap { position:absolute; bottom:14px; left:0; right:0; text-align:center; color:#ddd; font-size:13px; }
</style>
</head>
<body>
<header>
  <span class="crumb" id="crumb"></span>
  <span class="count" id="count"></span>
</header>
<main id="main"><div class="empty">불러오는 중…</div></main>

<div class="lb" id="lb">
  <span class="close" onclick="closeLb()">✕</span>
  <span class="nav prev" onclick="step(-1)">‹</span>
  <span class="nav next" onclick="step(1)">›</span>
  <div id="lbBody"></div>
  <div class="cap" id="lbCap"></div>
</div>

<script>
// 공개파일 갤러리 — 라이브 서빙(인덱싱 없음). 매 디렉토리를 그때그때 맥이 훑어 주므로
// 파일을 옮기거나 지우면 즉시 반영된다. Worker(worker.js)가 slug 게이트 + 지연 캐시.
const _sm = location.pathname.match(/^\/s\/([^/]+)/);
const SLUG = _sm ? _sm[1] : "";
const SCOPE = SLUG ? "/s/" + SLUG + "/" : "/";
const api = (u) => SCOPE + u;                         // 스코프 절대경로(<base href="/"> 우회)
let TITLE = "공개파일", curItems = [], curTrail = [], lbIndex = -1;

function esc(s) { return String(s == null ? "" : s).replace(/[&<>"']/g, c =>
  ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c])); }

function thumbUrl(it) { return api(`thumb/${encodeURIComponent(it.fid)}?rel=${encodeURIComponent(it.rel)}&v=${it.mtime}`); }
function mediaUrl(it) { return api(`media/${encodeURIComponent(it.fid)}?rel=${encodeURIComponent(it.rel)}&v=${it.mtime}`); }

function boot() {
  if (!SLUG) {  // bare 루트 — 잠금.
    document.getElementById("crumb").textContent = "📁 공개파일";
    document.getElementById("main").innerHTML =
      '<div class="empty">🔒 이 주소로는 볼 수 없습니다.<br>공유받은 갤러리 주소(…/s/코드)로 접속하세요.</div>';
    return;
  }
  load("", []);
}

// path: "" = 갤러리 루트(담긴 폴더들) / "<fid>/<하위>" = 그 디렉토리. trail=브레드크럼 배열.
async function load(path, trail) {
  curTrail = trail || [];
  const main = document.getElementById("main");
  main.innerHTML = '<div class="empty">불러오는 중…</div>';
  let data;
  try {
    const r = await fetch(api("list?path=" + encodeURIComponent(path)), { cache: "no-store" });
    if (!r.ok) throw new Error(r.status);
    data = await r.json();
  } catch (e) {
    main.innerHTML = '<div class="empty">갤러리를 불러오지 못했습니다.<br>(맥이 꺼져 있거나 주소가 잘못됨)</div>';
    return;
  }
  if (data.error === "mac_offline") {
    main.innerHTML = '<div class="empty">🌙 맥이 꺼져 있어 지금은 볼 수 없습니다.<br>잠시 후 다시 시도하세요.</div>';
    return;
  }
  TITLE = data.title || "공개파일";
  document.title = TITLE;
  render(path, data);
}

function buildCrumb() {
  const crumb = document.getElementById("crumb");
  crumb.innerHTML = "";
  const seg = (label, handler) => {
    const sp = document.createElement("span");
    sp.textContent = label; sp.onclick = handler; crumb.appendChild(sp);
  };
  const sep = () => { const s = document.createElement("span"); s.className = "sep"; s.textContent = "›"; crumb.appendChild(s); };
  seg(`📁 ${TITLE}`, () => load("", []));
  curTrail.forEach((t, i) => { sep(); seg(t.label, () => load(t.path, curTrail.slice(0, i + 1))); });
}

function render(path, data) {
  buildCrumb();
  const dirs = data.dirs || [], items = data.items || [];
  curItems = items;
  document.getElementById("count").textContent =
    [dirs.length ? dirs.length + "개 폴더" : "", items.length ? items.length + "개" : ""].filter(Boolean).join(" · ");
  const main = document.getElementById("main"); main.innerHTML = "";
  if (!dirs.length && !items.length) { main.innerHTML = '<div class="empty">이 폴더는 비어 있습니다.</div>'; return; }
  if (dirs.length) {
    const fd = document.createElement("div"); fd.className = "folders";
    if (items.length) fd.style.marginBottom = "18px";
    dirs.forEach(d => {
      const el = document.createElement("div"); el.className = "folder";
      el.innerHTML = `<div class="fname">📁 ${esc(d.name)}</div>`;
      el.onclick = () => load(d.path, curTrail.concat([{ path: d.path, label: d.name }]));
      fd.appendChild(el);
    });
    main.appendChild(fd);
  }
  if (items.length) {
    const grid = document.createElement("div"); grid.className = "grid";
    items.forEach((it, idx) => {
      const tile = document.createElement("div"); tile.className = "tile";
      if (it.thumb) {
        tile.innerHTML = `<img loading="lazy" src="${thumbUrl(it)}" alt="${esc(it.title)}">`
          + (it.kind === "video" ? '<div class="play">▶</div>' : "");
      } else {
        tile.innerHTML = `<div class="noimg">📄<span>${esc(it.title)}</span></div>`;
      }
      tile.onclick = () => openLb(idx);
      grid.appendChild(tile);
    });
    main.appendChild(grid);
  }
}

function openLb(idx) {
  const it = curItems[idx]; if (!it) return;
  lbIndex = idx;
  const body = document.getElementById("lbBody");
  if (it.kind === "video") {
    body.innerHTML = `<video controls autoplay playsinline src="${mediaUrl(it)}"></video>`;
  } else if (it.kind === "photo") {
    body.innerHTML = `<img src="${mediaUrl(it)}">`;
  } else {
    body.innerHTML = `<div class="empty" style="color:#ccc">${esc(it.title)}<br>미리보기 없음</div>`;
  }
  document.getElementById("lbCap").textContent = it.title || "";
  document.getElementById("lb").classList.add("open");
}
function closeLb() {
  document.getElementById("lb").classList.remove("open");
  document.getElementById("lbBody").innerHTML = "";
  lbIndex = -1;
}
function step(d) {
  if (lbIndex < 0) return;
  let n = lbIndex + d;
  if (n < 0) n = curItems.length - 1; if (n >= curItems.length) n = 0;
  openLb(n);
}
document.addEventListener("keydown", (e) => {
  if (!document.getElementById("lb").classList.contains("open")) return;
  if (e.key === "Escape") closeLb();
  else if (e.key === "ArrowLeft") step(-1);
  else if (e.key === "ArrowRight") step(1);
});
document.getElementById("lb").addEventListener("click", (e) => { if (e.target.id === "lb") closeLb(); });

boot();
</script>
</body>
</html>
