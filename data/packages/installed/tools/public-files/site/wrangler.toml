name = "public-files"
main = "worker.js"
compatibility_date = "2026-01-01"

# R2 버킷 바인딩 — Worker 가 manifest·thumbs·media·index.html 을 여기서 읽어 서빙.
[[r2_buckets]]
binding = "BUCKET"
bucket_name = "public-files"

# 온디맨드 원본 — 맥 백엔드(터널) 주소. 클릭 시 여기서 원본을 끌어와 R2 에 캐시.
[vars]
ORIGIN_BASE = "https://finder.kukjinkang.uk"

# 시크릿(평문 아님, wrangler secret put 으로 등록):
#   SHOWCASE_SECRET   — 맥 .env SHOWCASE_ORIGIN_SECRET 와 동일(원본 끌어오기 인증)
#   SHOWCASE_TOKEN    — (선택) 링크전용 게이트
