nodes:
  sense:
    actions:
      radio:
        returns: items
        description: 라디오 방송국 검색·탐색 (op 분기). search(전세계)/korean(한국 방송사). 재생은 limbs:radio.
        target_description: 'op로 분기 (기본 search).

          - search: name(방송국 이름)·tag·country·language·limit 등. Radio Browser 전세계.

          - korean: broadcaster(KBS/MBC/SBS/TBS/CBS/EBS, 비우면 전체) 한국 방송사 채널.

          '
        target_key: op
        group: media
        router: handler
        tool: radio_search_op
        ops:
          default: search
          values:
            search: 전세계 인터넷 라디오 검색 (Radio Browser)
            korean: 한국 주요 방송사 채널 (KBS/MBC/SBS 등)
        implementation: radio 패키지 op 분기. search=search_radio, korean=get_korean_radio.
        keywords:
        - 라디오
        - 인터넷라디오
        - 한국라디오
        - KBS
        - MBC
        - SBS
        app:
          icon: 📻
          name: 라디오
          order: 5
          modes:
          - name: 한국
            auto_run: true
            buttons:
            - label: ■ 정지
              action: '[limbs:radio]{op: "stop"}'
            action: '[sense:radio]{op: "korean"}'
            view:
            - type: list_action
              from: items
              icon: 📻
              title: '{name}'
              sub: '{broadcaster} · {description}'
              button:
                label: ▶
                action: '[limbs:radio]{op: "play", station_id: "{station_id}"}'
              button2:
                label: ♡
                action: '[limbs:radio_favorite]{op: "add", station_id: "{station_id}", name: "{name}"}'
          - name: 검색
            buttons:
            - label: ■ 정지
              action: '[limbs:radio]{op: "stop"}'
            inputs:
            - key: q
              type: text
              placeholder: 방송국 이름·태그  예) jazz, BBC
              required: true
            action: '[sense:radio]{op: "search", query: "$q", limit: 30}'
            view:
            - type: list_action
              from: items
              icon: 📻
              title: '{name}'
              sub: '{country} · {tags|trunc:40}'
              button:
                label: ▶
                action: '[limbs:radio]{op: "play", stream_url: "{stream_url}"}'
              button2:
                label: ♡
                action: '[limbs:radio_favorite]{op: "add", stream_url: "{stream_url}", name: "{name}"}'
          - name: 즐겨찾기
            auto_run: true
            buttons:
            - label: ■ 정지
              action: '[limbs:radio]{op: "stop"}'
            action: '[limbs:radio_favorite]{op: "list"}'
            view:
            - type: list_action
              from: items
              empty: 즐겨찾기가 없습니다 — 한국·검색 탭에서 ♡ 를 눌러 추가하세요
              icon: ♥
              title: '{name}'
              sub: '{added_at}'
              button:
                label: ▶
                action: '[limbs:radio]{op: "play", station_id: "{station_id}", stream_url: "{stream_url}"}'
              button2:
                label: ✕
                action: '[limbs:radio_favorite]{op: "remove", name: "{name}"}'
                refresh: true
  limbs:
    actions:
      radio:
        returns: effect
        description: 인터넷 라디오 재생·중지 (op 분기). play/stop.
        target_description: play — station_id(get_korean_radio 결과) 또는 stream_url(search_radio 결과) 중 하나. volume 옵션. stop — 파라미터 없음.
        group: media
        target_key: op
        router: handler
        tool: radio_op
        ops:
          default: play
          values:
            play: 라디오 재생 (station_id 또는 stream_url, 기본)
            stop: 라디오 중지
        implementation: mpv/ffplay HLS/ICY 라디오 스트림 재생·중지 op 분기
        keywords:
        - 라디오
        - 라디오재생
        - 라디오듣기
        - 라디오중지
      player_status:
        returns: scalar
        description: 현재 음악·라디오 재생 상태 확인 (재생 중/정지/곡명 등).
        target_description: (파라미터 없음)
        group: media
        router: handler
        tool: radio_status
        implementation: mpv/ffplay 프로세스 상태 확인
        keywords:
        - 재생상태
        - 플레이어
      volume:
        returns: effect
        description: 음악·라디오 재생 볼륨 조절 (mpv IPC). 0-100 범위.
        target_description: 볼륨 값 (0=무음, 100=최대).
        group: media
        router: handler
        tool: set_radio_volume
        implementation: mpv IPC 소켓으로 볼륨 조절
        target_key: volume
        keywords:
        - 볼륨
        - 소리
        - 음량
      radio_favorite:
        returns: effect
        description: 라디오 즐겨찾기 관리 (op 분기). list 조회 / add 등록 / remove 삭제. 재생 중 채널 자동 인식.
        target_description: list — 파라미터 없음, 전체 즐겨찾기 목록. add — station_id(권장) 또는 stream_url 중 하나 + name 옵션. 둘 다 생략하면 현재 재생 중인 채널 자동 등록. remove — name 파라미터로 채널 지정. 워크플로 — radio_play로 재생 중 마음에 들면 바로 add 호출.
        group: media
        target_key: op
        router: handler
        tool: radio_favorite_op
        ops:
          values:
            list: 전체 즐겨찾기 목록 조회
            add: 즐겨찾기 등록 (station_id/stream_url 또는 현재 재생 채널 자동)
            remove: 즐겨찾기 삭제 (name 파라미터)
        implementation: 즐겨찾기 JSON 파일 조회/저장/삭제 op 분기. add는 station_id/stream_url 둘 다 없으면 현재 재생 채널 메타로부터 추출.
        keywords:
        - 즐겨찾기
        - 좋아요
        - 라디오즐겨찾기
        - 즐겨찾기 추가
        - 즐겨찾기 삭제
