nodes:
  sense:
    actions:
      search_radio:
        description: 전세계 인터넷 라디오 검색 (Radio Browser API)
        group: radio
        category: search
        router: handler
        tool: search_radio
        implementation: Radio Browser 무료 API로 전세계 인터넷 라디오 검색
        target_key: name
        keywords:
        - 라디오
        - 인터넷라디오
      korean_radio:
        description: 한국 주요 방송사 라디오 채널 목록 (KBS/MBC/SBS/TBS/CBS/EBS)
        group: radio
        category: search
        router: handler
        tool: get_korean_radio
        implementation: 한국 방송사별 HLS 스트림 URL 하드코딩 목록 반환
        target_key: broadcaster
        keywords:
        - 한국라디오
        - KBS
        - MBC
        - SBS
  limbs:
    actions:
      radio_play:
        description: 라디오 재생 (mpv)
        group: media
        category: play
        router: handler
        tool: play_radio
        implementation: mpv/ffplay로 HLS/ICY 라디오 스트림 재생
        target_key: station_id
        keywords:
        - 라디오재생
        - 라디오듣기
      radio_stop:
        description: 라디오 재생 중지
        group: media
        category: stop
        router: handler
        tool: stop_radio
        implementation: mpv/ffplay 프로세스 종료
        keywords:
        - 라디오중지
      player_status:
        description: 현재 재생 상태 확인
        group: media
        category: get
        router: handler
        tool: radio_status
        implementation: mpv/ffplay 프로세스 상태 확인
        keywords:
        - 재생상태
        - 플레이어
      volume:
        description: 볼륨 조절
        group: media
        category: control
        router: handler
        tool: set_radio_volume
        implementation: mpv IPC 소켓으로 볼륨 조절
        target_key: volume
        keywords:
        - 볼륨
        - 소리
        - 음량
      favorites:
        description: 즐겨찾기 목록 조회
        group: media
        category: get
        router: handler
        tool: get_radio_favorites
        implementation: 즐겨찾기 JSON 파일에서 목록 조회
        keywords:
        - 즐겨찾기
        - 좋아요
      save_favorite:
        description: 즐겨찾기에 추가
        group: media
        router: handler
        tool: save_radio_favorite
        implementation: 즐겨찾기 JSON 파일에 라디오 채널 저장
        keywords:
        - 즐겨찾기추가
      remove_favorite:
        description: 즐겨찾기에서 제거
        group: media
        router: handler
        tool: remove_radio_favorite
        implementation: 즐겨찾기 JSON 파일에서 라디오 채널 삭제
        target_key: name
        keywords:
        - 즐겨찾기삭제
        - 기본앱
