node: sense
actions:
  commercial:
    aliases:
      region_code: [district_code, dong_code, code]
      lat: [latitude, y]
      lng: [longitude, lon, x]
    returns: items
    fixture: '[sense:commercial]{lat: 37.5, lng: 127.0}'
    description: 상권 분석 (소상공인진흥공단). 업종별 점포 수/밀집도, 좌표 또는 행정동 기반. 창업 입지 분석용.
    group: real_estate
    target_description: 업종 코드 또는 키워드. 좌표(lat/lng) 또는 행정동 코드(district)로 영역 지정.
    router: handler
    tool: search_commercial_district
    implementation: 소상공인진흥공단 상권정보 공개 API로 업종별 점포 밀집도/분포 분석
    app:
      instrument: commercial
      icon: 🏪
      name: 상권
      order: 11
      inputs:
      - key: lat
        type: text
        label: 위도
        default: '37.4979'
      - key: lng
        type: text
        label: 경도
        default: '127.0276'
      auto_run: true
      action: '[sense:commercial]{lat: "$lat", lng: "$lng"}'
      filter:
        from_field: category
      view:
      - type: map
        markers: items
        max: 1500
        'on':
          moveend: '[sense:commercial]{lat: "$lat", lng: "$lng", radius: "$radius"}'
      - type: metric
        label: 주변 점포 수
        big: '{total_count}개'
      - type: card_list
        from: items
        empty: 점포가 없습니다
        card:
          title: '{name}'
          lines:
          - '{category} · {address}'
        item_click:
          action: '[sense:restaurant]{query: "{name}", x: {lng}, y: {lat}, radius: 300}'
          view:
          - type: card_list
            from: items
            empty: 카카오·네이버에서 일치하는 가게를 찾지 못했습니다 (소상공인 등록 정보만 있음).
            card:
              title: '{name}'
              lines:
              - '{category}{phone|opt:  ·  ☎ ,}'
              - 📍 {address}
              link:
                href: '{url}'
                label: 카카오맵·상세 보기 →
  realty:
    aliases:
      region_code: [district_code, dong_code, code]
    returns: items
    fixture: '[sense:realty]{op: "query", region: "강남구"}'
    description: 부동산 시세·매물 (op 분기). query=시세/매물(source=molit 국토부 실거래가 기본 / source=zigbang 직방 현재 매물·링크·사진), codes=법정동 코드. region 이름만 넣으면 자동 해소.
    group: real_estate
    target_description: "op로 분기 (기본 query).\n- query: source로 데이터 종류 선택.\n  · source=molit(기본): 국토부 실거래가 — 체결된 과거 거래(시세). 링크·사진 없음. region=지역 이름(예 \"강남구\", 읍·면·동 \"오송\"도 상위 시군구로 자동변환) 또는 region_code=법정동 5자리. type=apt(아파트)/house(단독다가구)/villa(연립다세대). deal=trade/rent. dong=법정동으로 좁히기. start_month/end_month 기간.\n  · source=zigbang: 직방 현재 매물 — 지금 시장에 나온 호가·사진·클릭 링크. region=동·지명·건물명(예 \"평택 죽백동\", \"배다리도서관\") 또는 lat/lng. type=villa(빌라/다세대)/oneroom(원룸)/officetel(오피스텔). deal=trade/rent + lease=전세|월세(좁힘). deposit_max/rent_max(만원). radius(m,기본3000). limit. 빌라·원룸·오피스텔 개별 호실 강함, 아파트·단독/다가구·직거래는 약함(→가이드 real_estate.md).\n- codes: city=시/도명(서울·경기 등) → 법정동 지역코드 목록. (region 자동변환이 있어 보통 불필요한 보조.)\n"
    target_key: op
    router: handler
    tool: realty_op
    ops:
      default: query
      values:
        query: 시세·매물 조회 (source=molit 실거래가 / source=zigbang 직방 매물)
        codes: 법정동 지역코드 조회 (보조)
    implementation: query source=molit=type×deal 국토부 6종 API(region 자동해소). source=zigbang=tool_zigbang(지명→geohash5→직방 리스트→거리필터→상세 병렬→records). codes=get_region_codes.
    keywords:
    - 부동산
    - 실거래가
    - 매매
    - 전세
    - 월세
    - 아파트
    - 주택
    - 매물
    - 호가
    - 직방
    - 빌라
    - 원룸
    app:
      icon: 🏢
      name: 실거래가
      order: 9
      inputs:
      - key: province
        type: select
        label: 시/도
        default: 서울
        options:
        - value: 서울
          label: 서울
        - value: 경기
          label: 경기
        - value: 인천
          label: 인천
        - value: 부산
          label: 부산
        - value: 대구
          label: 대구
        - value: 대전
          label: 대전
        - value: 광주
          label: 광주
        - value: 울산
          label: 울산
        - value: 세종
          label: 세종
        - value: 강원
          label: 강원
        - value: 충북
          label: 충북
        - value: 충남
          label: 충남
        - value: 전북
          label: 전북
        - value: 전남
          label: 전남
        - value: 경북
          label: 경북
        - value: 경남
          label: 경남
        - value: 제주
          label: 제주
      - key: region
        type: select
        label: 구/군
        required: true
        options_action: '[sense:realty]{op: "codes", city: "$province"}'
        options_from: regions
      - key: type
        type: select
        label: 유형
        default: apt
        options:
        - value: apt
          label: 아파트
        - value: house
          label: 단독·다가구
        - value: villa
          label: 연립·다세대
      - key: deal
        type: select
        label: 거래
        default: trade
        options:
        - value: trade
          label: 매매
        - value: rent
          label: 전월세
      - key: period
        type: select
        label: 기간
        default: '3'
        options:
        - value: '3'
          label: 최근 3개월
        - value: '6'
          label: 최근 6개월
        - value: '12'
          label: 최근 12개월
      action: '[sense:realty]{region_code: "$region", type: "$type", deal: "$deal", months: "$period"}'
      view:
      - type: metric
        label: 평균 거래가
        big: '{summary.평균가}'
        sub: '{summary.총거래건수}건 · {summary.조회기간}'
      - type: kv
        rows:
        - k: 최고가
          v: '{summary.최고가}'
        - k: 최저가
          v: '{summary.최저가}'
      - type: card_list
        from: items
        empty: 해당 기간 거래가 없습니다
        card:
          title: '{명칭}'
          lines:
          - '{법정동} · {면적}㎡ · {층}층 · {건축년도}년'
          - '{거래금액}만원 · {거래년도}.{거래월}.{거래일}'
        item_click:
          action: '[sense:realty]{region_code: "$region", type: "$type", deal: "$deal", months: 12, name: "{명칭}"}'
          view:
          - type: card_list
            from: items
            empty: 추이 데이터 없음
            card:
              title: '{거래년도}.{거래월}.{거래일}'
              lines:
              - '{거래금액}만원 · {면적}㎡ · {층}층'

# tool.json 파생 원본 (2026-07-03 이관) — 빌드가 이 블록과 위 actions 의 ops 로 tool.json 을 생성한다.
# op-bearing 도구의 op enum/default 는 여기 저장하지 않는다 (actions 의 ops 가 단일 소스).
tool_json:
  header:
    id: real-estate
    name: Real Estate
    description: 국토교통부 부동산 실거래가 API 도구. 아파트/주택의 매매·전월세 실거래가 조회, 지역코드 검색, 상권 분석 기능을 제공합니다. 시세 파악, 가격 추이 분석, 투자 검토에 활용.
    version: 1.1.0
  tools:
  - name: search_commercial_district
    description: '특정 위치 주변 또는 특정 행정동의 상권 정보(상가 목록)를 조회합니다.


      ## 사용 시점

      - 창업 전 주변 경쟁 업체 분석

      - 특정 지역의 업종 분포 파악

      - 부동산 매물 주변 상권 활성도 확인


      ## 주요 파라미터

      - lat, lng: 위경도 좌표

      - radius: 검색 반경 (미터 단위)

      - region_code: 행정동 코드 (10자리)

      - indsLclsCd: 업종 대분류 (I: 음식, Q: 숙박, S: 서비스 등)


      ## 반환 데이터 형식

      각 상가: {name, branch, category, subcategory, address, lat, lng}

      - name: 상호명

      - lat, lng: 위경도 (show_location_map markers와 동일한 형식)


      ## 지도 시각화 방법

      결과의 data 배열을 show_location_map의 markers 파라미터로 직접 전달 가능

      예: show_location_map(lat=중심위도, lng=중심경도, markers=결과.data)'
    input_schema:
      type: object
      properties:
        lat:
          type: number
          description: '위도 (예: 37.498)'
        lng:
          type: number
          description: '경도 (예: 127.028)'
        radius:
          type: integer
          description: 검색 반경 (m), 기본 500m
          default: 500
        region_code:
          type: string
          description: 행정동 코드 10자리
        indsLclsCd:
          type: string
          description: '업종 대분류 코드 (I: 음식, Q: 숙박, R: 학문/교육, S: 소매, T: 생활서비스, U: 의료, V: 부동산, W: 관광/여가/오락)'
  - name: realty_op
    description: "부동산 시세·매물 (op 분기) — [sense:realty].\n- op=query(기본): source로 데이터 종류 선택.\n  · source=molit(기본): 국토부 실거래가(체결된\
      \ 과거 거래, 링크·사진 없음). region(시군구명, 자동코드변환) 또는 region_code(5자리) + type(apt/house/villa) + deal(trade/rent) + dong + start_month/end_month.\n\
      \  · source=zigbang: 직방 현재 매물(지금 나온 호가·사진·클릭 링크). region(지명/동/건물명) 또는 lat/lng + type(villa/oneroom/officetel) + deal(trade/rent)\
      \ + lease(전세/월세로 좁힘) + deposit_max/rent_max(만원) + radius(m,기본3000) + limit. 빌라/원룸/오피스텔 개별 호실 강함, 아파트·단독/다가구 약함.\n- op=codes:\
      \ city(시/도명) → 법정동 지역코드 목록(보조, region 자동변환으로 보통 불필요)."
    input_schema:
      type: object
      properties:
        op:
          type: string
          description: query(기본)/codes
        source:
          type: string
          enum:
          - molit
          - zigbang
          default: molit
          description: '[query] 데이터 소스. molit=국토부 실거래가(체결·기본), zigbang=직방 현재 매물(호가·링크·사진)'
        region:
          type: string
          description: '[query] 지역명(molit=강남구 등 시군구 / zigbang=동·지명·건물명 예 ''평택 죽백동'', ''배다리도서관'')'
        region_code:
          type: string
          description: '[query molit] 법정동 5자리'
        type:
          type: string
          enum:
          - apt
          - house
          - villa
          - oneroom
          - officetel
          description: '[query] molit=apt/house/villa · zigbang=villa/oneroom/officetel'
        deal:
          type: string
          enum:
          - trade
          - rent
          description: '[query] trade(매매)/rent(전월세)'
        lease:
          type: string
          enum:
          - 전세
          - 월세
          description: '[query zigbang] deal=rent를 전세/월세로 좁힘'
        dong:
          type: string
          description: '[query molit] 법정동으로 결과 좁히기'
        lat:
          type: number
          description: '[query zigbang] 중심 위도(region 대신 좌표 직접 지정)'
        lng:
          type: number
          description: '[query zigbang] 중심 경도'
        radius:
          type: integer
          description: '[query zigbang] 검색 반경(m), 기본 3000'
        deposit_max:
          type: integer
          description: '[query zigbang] 보증금 상한(만원)'
        rent_max:
          type: integer
          description: '[query zigbang] 월세 상한(만원)'
        limit:
          type: integer
          description: '[query zigbang] 최대 매물 수(기본 30)'
        start_month:
          type: string
          description: '[query molit] YYYYMM'
        end_month:
          type: string
          description: '[query molit] YYYYMM'
        city:
          type: string
          description: '[codes] 시/도명'
      required: []
