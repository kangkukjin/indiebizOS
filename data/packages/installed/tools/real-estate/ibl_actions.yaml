node: sense
actions:
  commercial:
    description: 상권 분석 (소상공인진흥공단). 업종별 점포 수/밀집도, 좌표 또는 행정동 기반. 창업 입지 분석용.
    router: handler
    tool: search_commercial_district
    implementation: 소상공인진흥공단 상권정보 공개 API로 업종별 점포 밀집도/분포 분석
  realty:
    description: 부동산 실거래가 조회 (국토부 공개 시스템). type(apt|house) × deal(trade|rent) 조합.
    target_description: '지역코드 (5자리, 예: 11680=강남). district_codes로 조회.'
    router: handler
    tool: realty_price
    implementation: type(apt|house)와 deal(trade|rent) 조합으로 국토부 4종 실거래가 API 분기. start_month/end_month로 기간, count_per_month로 월별 건수.
    target_key: region_code
  district_codes:
    description: 법정동 지역코드 조회
    target_description: 시/도명 (서울, 경기 등)
    router: handler
    tool: get_region_codes
    implementation: 법정동 코드 매핑 테이블로 지역코드 조회 (로컬 데이터)
    target_key: city
guides:
- real-estate/real_estate_guide.md
