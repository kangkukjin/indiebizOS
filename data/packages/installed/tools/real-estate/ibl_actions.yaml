node: sense
actions:
  apt_trade:
    description: 아파트 매매 실거래가 (국토부)
    target_description: '지역코드 (5자리, 예: 11680=강남)'
    router: handler
    tool: apt_trade_price
    implementation: 국토부 아파트 실거래가 공개 API로 매매 데이터 XML 파싱
    target_key: region_code
  apt_rent:
    description: 아파트 전월세 실거래가
    target_description: 지역코드
    router: handler
    tool: apt_rent_price
    implementation: 국토부 아파트 전월세 공개 API로 임대 데이터 XML 파싱
    target_key: region_code
  house_trade:
    description: 단독/다세대 주택 매매 실거래가
    target_description: 지역코드
    router: handler
    tool: house_trade_price
    implementation: 국토부 주택 실거래가 공개 API로 매매 데이터 XML 파싱
    target_key: region_code
  house_rent:
    description: 단독/다세대 주택 전월세 실거래가
    target_description: 지역코드
    router: handler
    tool: house_rent_price
    implementation: 국토부 주택 전월세 공개 API로 임대 데이터 XML 파싱
    target_key: region_code
  district_codes:
    description: 법정동 지역코드 조회
    target_description: 시/도명 (서울, 경기 등)
    router: handler
    tool: get_region_codes
    implementation: 법정동 코드 매핑 테이블로 지역코드 조회 (로컬 데이터)
    target_key: city
  commercial:
    description: 상권 분석 (소상공인진흥공단). 업종별 점포 수/밀집도, 좌표 또는 행정동 기반. 창업 입지 분석용.
    router: handler
    tool: search_commercial_district
    implementation: 소상공인진흥공단 상권정보 공개 API로 업종별 점포 밀집도/분포 분석
guides:
- real-estate/real_estate_guide.md
