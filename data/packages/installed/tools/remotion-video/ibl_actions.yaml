node: engines
actions:
  remotion:
    description: 'Remotion(React TSX) MP4 영상. op: render_inline(composition_code) / render_file(composition_file) / status (기본 render_inline).'
    target_description: |
      op로 분기 (기본 render_inline).
      - render_inline: composition_code(인라인 TSX 문자열) 필수.
      - render_file: composition_file(TSX 파일 절대경로) 필수.
      - status: 파라미터 없음, Remotion/Node.js 설치 상태만 반환.
    group: media_produce
    category: create
    router: handler
    tool: remotion
    implementation: op로 분기. render_inline은 React TSX 컴포지션을 생성하고 Remotion CLI(npx remotion render)로 MP4 렌더링. render_file은 저장된 TSX 파일로 렌더링. status는 which/npm list로 설치 상태 확인.
    target_key: composition_code
    keywords:
    - 영상
    - React
    - Remotion
    - TSX
    - MP4
    - 렌더링
    - 상태
