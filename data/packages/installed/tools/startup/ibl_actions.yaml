node: sense
actions:
  startup:
    returns: items
    fixture: '[sense:startup]{query: "AI"}'
    description: 정부 창업/중소기업 지원사업 공고 검색 (K-Startup). 다중 키워드는 OR 합집합.
    group: research
    target_description: 'query(검색 키워드, 예: AI·예비창업패키지·정책자금. 여러 단어면 OR 합집합 — "AI 인공지능"=둘 중 하나라도). source 옵션 — kstartup(기본, K-Startup 창업진흥원), all(통합 시도), mss(중기부). ⚠️중기부(mss)는 data.go.kr API 폐기로 현재 미가용 → kstartup 권장. count(기본 10, 최대 50).'
    router: handler
    tool: startup_search
    implementation: K-Startup + 중기부 사업공고 API 통합. source=all이면 둘 다 호출, kstartup/mss면 한쪽만.
    target_key: query
    keywords:
    - 창업
    - 사업공고
    - 지원사업
    - 예비창업
    - 정책자금
    - R&D
    app:
      icon: 🚀
      name: 사업공고
      order: 11
      modes:
      - name: 창업·지원
        inputs:
        - key: q
          type: text
          placeholder: 키워드  예) AI·예비창업·R&D
          required: true
        - key: src
          type: select
          label: 소스
          default: kstartup
          options:
          - value: kstartup
            label: K-Startup
          - value: mss
            label: 중기부
          - value: all
            label: 통합
        action: '[sense:startup]{query: "$q", source: "$src"}'
        view:
        - type: card_list
          from: items
          card:
            title: '{title}'
            lines:
            - '{meta}'
            link:
              href: '{url}'
              label: 공고 상세 →

# tool.json 파생 원본 (2026-07-03 이관) — 빌드가 이 블록과 위 actions 의 ops 로 tool.json 을 생성한다.
# op-bearing 도구의 op enum/default 는 여기 저장하지 않는다 (actions 의 ops 가 단일 소스).
tool_json:
  header:
    id: startup
    name: Startup Support
    description: 정부 창업지원 사업공고 검색 도구. K-Startup(창업진흥원)과 중소벤처기업부 사업공고를 검색합니다. 예비창업패키지, 초기창업패키지, R&D 지원, 수출지원, 정책자금 등 창업/중소기업
      지원사업 찾기에 활용.
    version: 1.1.0
  tools:
  - name: startup_search
    description: '정부 창업/중소기업 지원사업 공고 검색. 기본은 K-Startup(창업진흥원) + 중기부(MSS) 통합. source로 한쪽만 가능.


      파라미터: query(검색 키워드, 예: 예비창업패키지·R&D·정책자금). source 옵션 — all(기본, 둘 다 통합), kstartup(K-Startup만, 창업 특화), mss(중기부만, R&D/수출
      포함). count(기본 10, 최대 50).'
    input_schema:
      type: object
      properties:
        op:
          type: string
          description: 동작 분기 — target_description 참조
      additionalProperties: true
