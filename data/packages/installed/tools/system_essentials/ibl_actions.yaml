nodes:
  self:
    actions:
      time:
        returns: scalar
        fixture: '[self:time]{}'
        description: 현재 시간 조회 (로컬 시스템 시계, KST). 날짜·요일·시:분:초 반환.
        group: system
        target_description: (파라미터 없음). format 옵션으로 포맷 지정 가능.
        router: handler
        tool: get_current_time
        implementation: Python datetime으로 현재 시간 조회 (로컬 시스템 시계)
      ask:
        returns: scalar
        exempt: LLM 원샷 호출 — 정기 실행 시 토큰 소모·비결정적이라 fixture 부적합
        description: 시스템 AI에게 원샷으로 물어 답을 즉시 받는다(도구 없이 가볍고 빠름). 요약·개선·설명·변환·답변에. 다단계 작업은 [others:delegate].
        group: system
        target_description: prompt(지시/질문)에 할 일을, context(선택)에 대상 텍스트/데이터를 준다.
        target_key: prompt
        router: handler
        tool: ai_ask
        implementation: consciousness_agent.lightweight_ai_call 로 경량 원샷 LLM 호출 (도구·다단계 없음)
        keywords: [질문, 물어봐, 요약, 개선, 설명, 변환, 답변, ask, ai, summarize, rewrite]
      read:
        returns: scalar
        exempt: '파일 경로 인자 필요(고정 fixture 부적합)'
        description: 파일 읽기 — 텍스트/PDF/DOCX/XLSX 통합. 확장자로 자동 인식(format 명시도 가능).
        group: file
        target_description: 읽을 파일 경로 (생략 시 직전 파이프 step 결과의 파일 경로 자동 사용 — file_find | take:1 >> read). format 옵션 (text/pdf/docx/xlsx) — 생략 시 확장자 자동. text — offset/limit (라인, start/end 별칭 허용) 또는 blocks(빈 줄 기준 문단 items 로 분할, 문서 뷰어용). pdf — pages 옵션 (예 '1-5'). docx — offset/limit/max_blocks (블록 단위). xlsx — sheet(특정 시트명)/max_rows 옵션, 시트를 TSV 텍스트로. 스캔 PDF는 별도 OCR 필요.
        router: handler
        tool: read_op
        implementation: handler.py가 format 또는 확장자로 분기 — read_file/read_pdf/read_docx에 위임.
        target_key: path
        # start/end 흡수(2026-07-18): 모델이 ~30% 확률로 start/end 를 써 조용히 무시되고
        # 통파일이 오던 것(file_size_modularization 측정). start=offset 은 1:1 별칭,
        # end 는 계산(limit = end − offset)이라 핸들러 read_op 초입이 흡수.
        aliases:
          offset:
          - start
      fill:
        returns: effect
        exempt: '템플릿 파일·데이터 인자 필요(고정 fixture 부적합)'
        description: 양식 채우기 — PDF 폼/DOCX 템플릿에 값을 넣어 완성 문서를 만든다. read 의 짝(문서→문서, 구조 보존). data 없이 부르면 채울 수 있는 필드 목록을 돌려준다(먼저 필드 파악 → 채우기).
        group: file
        target_description: 'path — 템플릿 문서(.pdf 폼 또는 {{자리표시자}} 든 .docx). data — 필드→값 매핑({이름: 값}); 생략하면 채울 수 있는 필드 목록 반환(introspection). output — 출력 경로(생략 시 원본 옆 _filled). flatten — PDF 전용, true면 폼을 정적 내용으로 구워 제출용(수정 불가, 기본 false). 스캔 이미지 PDF는 폼 필드가 없어 채울 수 없다(별도 OCR 대상).'
        router: handler
        tool: fill_op
        implementation: handler.py가 확장자로 분기 — PDF는 PyMuPDF widget 값 설정(+flatten=bake), DOCX는 {{자리표시자}} 치환. data 없으면 필드 열거.
        target_key: path
        keywords:
        - 양식
        - 폼
        - 채우기
        - 신청서
        - 서식
        - 작성
        - fill
        - form
      write:
        returns: effect
        description: 텍스트 파일 새로 쓰기·덮어쓰기. write→run 패턴의 한 축, append 아님.
        group: file
        target_description: 쓸 파일 경로 (절대 또는 상대). 기존 파일은 묻지 않고 덮어쓴다.
        router: handler
        tool: write_file
        implementation: Python 파일 I/O로 로컬 파일 쓰기
        target_key: path
      list:
        returns: items
        fixture: '[self:list]{path: "."}'
        description: 디렉토리 안의 파일·하위 폴더 목록 조회 (ls 동등).
        group: file
        target_description: 조회할 디렉토리 경로. recursive 옵션으로 하위 포함 가능.
        router: handler
        tool: list_directory
        implementation: os.listdir/pathlib로 디렉토리 내용 조회
        target_key: path
      file_find:
        returns: items
        fixture: '[self:file_find]{pattern: "*.md", path: "."}'
        description: 파일 검색 (glob 패턴). 프로젝트 안뿐 아니라 컴퓨터 어디든 검색 가능. path 파라미터로 검색 루트 지정 (절대경로, ~/, 상대경로 모두 지원). 미지정 시 프로젝트 디렉토리. 패턴에 **나 /가 없으면 자동 재귀
        group: file
        target_description: 검색 패턴 (glob, 예 '*.md', '**/*.tsx'). path 옵션으로 검색 루트 지정.
        keywords:
        - 파일
        - 찾기
        - 검색
        - find
        - search
        - 파일찾기
        router: handler
        tool: glob_files
        implementation: pathlib.glob 패턴 검색. path 파라미터로 검색 루트 지정 (절대경로/~/상대경로). max_results로 결과 상한 (기본 200). 매칭 없으면 path 옵션 안내
        target_key: pattern
      grep:
        aliases:
          root_path: [path]
          pattern: [query]
        returns: items
        fixture: '[self:grep]{pattern: "provider", path: "."}'
        description: 파일 내용에서 패턴 검색 (grep/ripgrep). items 통화(파일/줄번호/내용 필드). 패턴은 기본 정규식(alternation 'a|b' 동작), regex=false면 리터럴. 파일명 검색은 find.
        group: file
        target_description: 검색 패턴 (기본 정규식, 'a|b' OR 가능). regex=false면 리터럴. path로 검색 루트, include로 확장자 필터.
        keywords:
        - 검색
        - 내용검색
        - grep
        - 코드검색
        router: handler
        tool: grep_files
        implementation: subprocess로 grep/ripgrep 실행하여 파일 내용 검색
        target_key: pattern
      edit:
        returns: effect
        description: 파일 부분 편집 (old_string → new_string 교체). 전체 덮어쓰기는 write.
        group: file
        target_description: 편집할 파일 경로. old_string/new_string 파라미터로 교체할 텍스트 지정.
        router: handler
        tool: edit_file
        implementation: Python 문자열 치환으로 파일 부분 편집
        target_key: path
      copy:
        returns: effect
        description: 파일 또는 폴더를 다른 위치로 복사 (원본 유지). 폴더는 재귀 복사.
        group: file
        target_description: src(원본 경로)와 dest(복사 위치) 두 파라미터. (source/destination 별칭도 허용)
        router: handler
        tool: copy_path
        implementation: shutil.copy/copytree로 파일/폴더 복사
        target_key: source
      move:
        returns: effect
        description: 파일 또는 폴더 이동·이름 변경. 같은 폴더면 이름 변경, 다른 폴더면 이동.
        group: file
        target_description: src(원본)와 dest(이동/새 이름) 두 파라미터. (source/destination 별칭도 허용)
        router: handler
        tool: move_path
        implementation: shutil.move로 파일/폴더 이동/이름변경
        target_key: source
      delete:
        returns: effect
        description: 파일 또는 폴더 영구 삭제. 휴지통 거치지 않음 — 신중히 사용.
        group: file
        target_description: 삭제할 파일 또는 폴더 경로. 폴더는 재귀 삭제 (rmtree).
        router: handler
        tool: delete_path
        implementation: os.remove/shutil.rmtree로 파일/폴더 삭제
        target_key: path
      mkdir:
        returns: effect
        fixture: '[self:mkdir]{path: "outputs/새폴더"}'
        description: 빈 폴더 생성 (mkdir -p 동등, 중간 경로 자동 생성·이미 있으면 조용히 통과). 삭제는 delete, 이동·이름변경은 move.
        group: file
        target_description: 만들 폴더 경로 (절대 또는 상대). 중간 폴더가 없으면 함께 만든다. 이미 있어도 오류 아님.
        router: handler
        tool: make_directory
        implementation: os.makedirs(exist_ok=True)로 빈 디렉토리 생성
        target_key: path
      propose_patch:
        returns: effect
        exempt: 'RED 코어 파일·변경내용 인자 필요 + git worktree 부작용(고정 fixture 부적합)'
        description: 자기개조 안전장치 — RED 구역(backend/·frontend/·scripts/) 코어 코드 변경을 격리 사본(git worktree)에만 제안한다. 라이브 트리는 무변경. write/edit 이 막힌 RED 파일을 고치는 유일한 정규 통로. worktree 사본에서 py_compile+build --check 로 기계검증한 뒤 diff·검증결과를 남기고, 채택(머지)·폐기는 사람이 한다(자기가 자기 몸에 자가 적용 안 함).
        group: file
        target_description: 'path — 대상 RED 파일(backend/·frontend/·scripts/ 하위). content — 새 전체 내용(신규/전체 교체) 또는 old_string+new_string — 부분 교체(HEAD 기준 유일해야). reason — 변경 근거(필수, 사람 검토용). RED 밖 파일은 그냥 write/edit 을 쓰라고 거부한다.'
        router: handler
        tool: propose_patch
        implementation: handler.py _propose_red_patch — git worktree add --detach HEAD 로 격리 사본 생성, 그 사본에만 기록, py_compile+build --check 검증, data/system_ai_state/patch_proposals/에 제안 기록. 라이브 무변경.
        target_key: path
        keywords:
        - 자기수정
        - 자기개조
        - 코어수정
        - propose
        - patch
        - backend수정
  table:
    actions:
      spreadsheet:
        returns: effect
        runs_on: mac_only
        description: items 통화 → xlsx 스프레드시트 산출. 값만(수식·서식 제외).
        target_description: 'path(출력 경로, .xlsx 자동 보정). 단일 시트: rows(행 배열, 각 행은 셀 배열) + headers(선택, 첫 행)/sheet_name(선택). 다중 시트: sheets={시트명: rows} (rows보다 우선). 표형 table={columns,rows} 파라미터도 수용(headers/rows로 매핑 — table:chart와 같은 입력 형태). bare 파일명은 outputs/로. 읽기는 self:read{format=xlsx}.'
        group: chart
        router: handler
        tool: spreadsheet
        implementation: system_essentials handler.py가 openpyxl로 Workbook 생성 — sheets(다중) 또는 rows+headers(단일), 셀은 str/int/float로 강제.
        target_key: path
        keywords:
        - 스프레드시트
        - 엑셀
        - xlsx
        - 표
        - 시트
        - 장부

# tool.json 파생 원본 (2026-07-03 이관) — 빌드가 이 블록과 위 actions 의 ops 로 tool.json 을 생성한다.
# op-bearing 도구의 op enum/default 는 여기 저장하지 않는다 (actions 의 ops 가 단일 소스).
tool_json:
  header:
    id: system_essentials
    name: System Essentials Kit
    description: 에이전트 기본 도구 모음. 파일 읽기/쓰기/검색, 작업 목록(todo) 관리, 계획 모드, 사용자 질문, 이웃(연락처) 조회 기능을 제공합니다. 모든 에이전트에게 기본 배분되는 핵심 패키지입니다.
    version: 1.1.0
    author: System AI
  tools:
  # 2026-07-03 미소유 도구 감사: 죽은 tool.json 항목 3개 제거(read_file/read_pdf/read_docx —
  # [self:read] read_op가 handler 내부에서 tool_name 재할당으로 위임, tool.json 불필요).
  # 아래 5개(run_command 등 최상위 인지 도구)는 산 배관.
  - name: write_file
    description: '파일에 내용을 씁니다 (기존 파일 덮어쓰기).


      사용법:

      - 새 파일 생성 또는 기존 파일 완전 교체

      - 디렉토리가 없으면 자동 생성


      주의사항:

      - 기존 파일 수정 시 반드시 먼저 read_file로 읽어야 함

      - 부분 수정은 edit_file 사용 권장 (전체 재작성 불필요)

      - 꼭 필요한 경우에만 파일 생성 - 기존 파일 편집 우선'
    input_schema:
      type: object
      properties:
        file_path:
          type: string
          description: 파일 경로
        content:
          type: string
          description: 기록할 전체 내용
      required:
      - file_path
      - content
  - name: list_directory
    description: '디렉토리의 파일/폴더 목록을 조회합니다.


      사용법:

      - 지정된 디렉토리의 직속 항목만 반환 (재귀 아님)

      - 파일/폴더 구분하여 표시


      주의사항:

      - 재귀적 탐색이 필요하면 glob_files 사용 (예: ''**/*'')

      - run_command로 ''ls -R'' 사용 금지 - 대용량 출력으로 토큰 초과 위험

      - 파일 내용 검색은 grep_files 사용'
    input_schema:
      type: object
      properties:
        dir_path:
          type: string
          description: '디렉토리 경로 (기본: 현재 작업 디렉토리)'
  - name: grep_files
    description: '파일 내용에서 텍스트/패턴을 검색합니다.


      사용법:

      - 매칭되는 라인과 라인 번호 반환

      - 패턴은 기본적으로 정규표현식 (alternation ''a|b'', 메타문자 동작). 리터럴 문자열로 검색하려면 regex=false

      - 파일 패턴으로 검색 범위 제한 가능


      사용 예시:

      - 함수 정의 찾기: pattern=''def my_function'', file_pattern=''*.py''

      - 클래스 찾기: pattern=''class.*Manager'', regex=true

      - 특정 문자열 검색: pattern=''TODO'', root_path=''./src''


      주의사항:

      - run_command로 grep/rg 사용 대신 이 도구 사용

      - 결과가 많을 수 있으니 file_pattern으로 범위 제한 권장'
    input_schema:
      type: object
      properties:
        pattern:
          type: string
          description: 검색할 텍스트 또는 정규표현식
        file_pattern:
          type: string
          description: '파일 패턴 (예: ''*.py'', ''*.js'')'
        root_path:
          type: string
          description: 검색 시작 경로
        regex:
          type: boolean
          description: '정규표현식 모드 (기본: true). false로 두면 패턴을 리터럴 문자열로 검색. 잘못된 정규식은 리터럴로 자동 폴백.'
        output_mode:
          type: string
          enum:
          - content
          - files_with_matches
          - count
          description: '출력 형태: content(매칭 라인, 기본) / files_with_matches(파일 목록) / count(파일별 매칭 수)'
      required:
      - pattern
  - name: get_current_time
    description: '현재 날짜와 시간을 조회합니다.


      사용법:

      - 파라미터 없이 호출하면 기본 포맷으로 반환

      - 커스텀 포맷 지정 가능'
    input_schema:
      type: object
      properties:
        format:
          type: string
          description: '시간 포맷 (기본: %Y-%m-%d %H:%M:%S)'
  - name: ai_ask
    description: '시스템 AI에게 원샷 질문을 보내 답 텍스트를 받는다. 도구·다단계 없는 가벼운 호출 —
      요약·개선·설명·변환·답변에. 무언가를 만들거나 여러 단계가 필요하면 [others:delegate].'
    input_schema:
      type: object
      properties:
        prompt:
          type: string
          description: AI에게 줄 지시 또는 질문 (필수)
        context:
          type: string
          description: 판단 대상이 되는 텍스트/데이터 (선택)
      required:
      - prompt
  # 산 배관(2026-07-03 감사): agent_cognitive._build_ibl_tools·system_ai_tools·api_xray가 tool.json에서 스키마 로드, system_tools→load_tool_handler로 실행 (최상위 도구)
  - name: run_command
    description: "쉘 명령어를 실행합니다. execute_ibl과 함께 에이전트의 두 가지 실행 경로 중 하나.\n\n주의사항 - 반드시 읽으세요:\n1. 파일/디렉토리 작업은 IBL 액션을 우선 사용:\n   - 디렉토리 목록: execute_ibl [self:list] (ls 대신)\n   - 파일 검색: execute_ibl [self:file_find] (find 대신)\n   - 내용 검색: execute_ibl [self:grep] (grep/rg 대신)\n   - 파일 읽기: execute_ibl [self:read] (cat/head/tail 대신)\n   - 파일 쓰기: execute_ibl [self:write] (echo > 대신)\n   - 파일 수정: execute_ibl [self:edit] (sed/awk 대신)\n\n2. Python/Node.js 코드 실행 — write→run 패턴:\n   - 멀티라인: [self:write]로 /tmp/*.py 파일 생성 후 run_command 'python3 /tmp/x.py'\n   - 한 줄: run_command 'python3 -c \"...\"' 또는 'node -e \"...\"'\n   - 별도의 execute_python/execute_node 도구는 없음 (이스케이프·traceback 손실 회피)\n\n3. 금지된 명령어 (대용량 출력 위험):\n   - ls -R, ls -la -R (재귀 목록)\n   - find / (루트 검색)\n   - cat 대용량파일\n   - 출력 제한 없는 검색 명령\n\n4. 위험 명령은 approved=true 필요:\n   - rm, rmdir (삭제)\n   - sudo (권한 상승)\n   - chmod, chown (권한 변경)\n\nrun_command가 어울리는 경우:\n- git 명령어 (git status, git log --oneline -10)\n- 패키지 관리 (npm install, pip install)\n\
      - 빌드/테스트 (npm run build, pytest)\n- 프로세스 관리 (ps, kill)\n- write→run 패턴의 실행 단계 (python3/node 스크립트 실행)\n- IBL 액션에 해당하지 않는 시스템 명령"
    input_schema:
      type: object
      properties:
        command:
          type: string
          description: 실행할 쉘 명령어
        timeout:
          type: number
          description: '제한시간 초 (기본: 60, 최대: 300)'
        approved:
          type: boolean
          description: 위험 명령 승인 (rm, sudo 등)
      required:
      - command
  - name: glob_files
    description: 'glob 패턴으로 파일을 검색합니다. 프로젝트 안뿐 아니라 컴퓨터 어느 디렉토리든 검색 가능.


      ## 검색 범위 (path 파라미터)

      - 미지정: 프로젝트 디렉토리 (기본)

      - 절대경로: 그대로 사용 (예: ''/Users/me/Desktop'', ''/etc'')

      - ~ 시작: 홈 디렉토리 확장 (예: ''~/Documents'', ''~'')

      - 상대경로: 프로젝트 디렉토리 기준


      ## 패턴 동작

      - 패턴에 ''**''나 ''/''가 없으면 자동으로 모든 하위 디렉토리까지 검색 (''*.docx'' → ''**/*.docx'' 효과)

      - 명시적 재귀: ''**/*.py'' (모든 하위)

      - 디렉토리 한정: ''src/**/*.{js,ts}''


      ## 사용 예시

      - 프로젝트 안 Python 파일: pattern=''**/*.py''

      - 바탕화면의 docx: pattern=''*.docx'', path=''~/Desktop''

      - 컴퓨터 전체에서 특정 파일: pattern=''**/하네스*.docx'', path=''/Users''

      - 다운로드 폴더의 PDF: pattern=''*.pdf'', path=''~/Downloads''


      ## 결과

      - ''{총_매칭수}개 매칭 | root: {검색루트}'' 헤더 + 절대경로 목록

      - 기본 200개까지 반환 (max_results로 조정, 0이면 무제한 — 컨텍스트 폭주 주의)

      - 매칭 없으면 path 옵션 사용 힌트 안내


      ## 주의

      - run_command로 ''find'' 사용하지 말 것 — 이 도구가 컴퓨터 전체 검색 지원

      - 너무 넓은 범위(예: path=''/'')는 시간이 오래 걸리고 결과가 폭주'
    input_schema:
      type: object
      properties:
        pattern:
          type: string
          description: 'glob 패턴 (예: ''*.docx'', ''**/*.py''). ''**''나 ''/''가 없으면 자동 재귀'
        path:
          type: string
          description: 검색 루트. 절대경로(/Users/...), ~ 확장(~/Desktop), 상대경로(./src) 모두 가능. 미지정 시 프로젝트 디렉토리
        root_path:
          type: string
          description: (deprecated) path와 동일. path 사용 권장
        max_results:
          type: integer
          description: 반환할 최대 파일 수 (기본 200). 0이면 무제한 (큰 검색 시 컨텍스트 폭주 위험)
      required:
      - pattern
  - name: edit_file
    description: '파일의 특정 부분을 수정합니다 (문자열 교체).


      사용법:

      - old_string을 new_string으로 교체

      - 파일 전체를 다시 쓰지 않고 정확한 위치만 수정


      주의사항:

      - 반드시 먼저 read_file로 파일 내용을 확인해야 함

      - old_string은 파일 내에서 고유해야 함 (중복되면 실패)

      - 중복되는 경우 더 많은 컨텍스트(주변 코드)를 포함

      - 들여쓰기(탭/스페이스)를 정확히 맞춰야 함

      - write_file보다 이 도구 사용 권장 (부분 수정에 적합)'
    input_schema:
      type: object
      properties:
        file_path:
          type: string
          description: 파일 경로
        old_string:
          type: string
          description: 교체할 기존 문자열 (파일 내 고유해야 함)
        new_string:
          type: string
          description: 새 문자열
      required:
      - file_path
      - old_string
      - new_string
  # 산 배관(2026-07-03 감사): 최상위 인지 도구 — agent_cognitive·system_ai_tools·api_xray가 tool.json에서 스키마 로드
  - name: todo_write
    description: '작업 목록을 생성하고 관리합니다. 진행 상황을 추적하고 복잡한 작업을 체계적으로 관리합니다.


      ## 중요: 유일한 todo 도구

      이 도구가 todo 관련 유일한 도구입니다.

      - 항목 추가: 기존 목록 + 새 항목으로 전체 목록 작성

      - 상태 변경: 해당 항목의 status만 바꿔서 전체 목록 다시 작성

      - 항목 삭제: 해당 항목 제외하고 전체 목록 다시 작성


      ## 사용 시점

      1. 복잡한 다단계 작업 (3개 이상의 구분된 단계)

      2. 사용자가 여러 작업을 요청한 경우 (번호 목록, 쉼표로 구분)

      3. 신중한 계획이 필요한 비단순 작업


      ## 사용하지 않을 때

      1. 단일하고 직접적인 작업

      2. 추적해도 조직적 이점이 없는 사소한 작업

      3. 3단계 미만의 사소한 단계로 완료 가능한 작업

      4. 순수한 대화나 정보 요청


      참고: 사소한 단일 작업만 있다면 이 도구를 사용하지 마세요.


      ## 상태 관리

      - pending: 대기 중

      - in_progress: 진행 중 (한 번에 하나만)

      - completed: 완료


      작업 완료 시 상태를 completed로 표시하세요.'
    input_schema:
      type: object
      properties:
        todos:
          type: array
          description: 작업 목록
          items:
            type: object
            properties:
              content:
                type: string
                description: '작업 내용 (명령형: ''테스트 실행'')'
              status:
                type: string
                enum:
                - pending
                - in_progress
                - completed
                description: 상태
              activeForm:
                type: string
                description: '진행 중 표시 (현재형: ''테스트 실행 중'')'
            required:
            - content
            - status
            - activeForm
      required:
      - todos
  # 산 배관(2026-07-03 감사): 최상위 인지 도구 — agent_cognitive·system_ai_tools·api_xray가 tool.json에서 스키마 로드
  - name: ask_user_question
    description: '실행 중 사용자에게 질문이 필요할 때 사용합니다.


      ## 사용 시점

      1. 사용자 선호도나 요구사항 파악

      2. 모호한 지시 명확화

      3. 구현 방식 선택 필요

      4. 진행 방향에 대한 사용자 의견 필요


      ## 사용하지 않을 때

      1. 이미 충분한 정보가 있는 경우

      2. 합리적인 기본 선택이 명확한 경우

      3. 사용자가 이미 명시적 지시를 한 경우


      ## 사용법

      - 2-4개의 선택지 제공

      - 권장 옵션은 첫 번째에 배치하고 ''(권장)'' 표시

      - multiSelect=true로 복수 선택 허용 가능

      - 사용자는 항상 ''기타''로 직접 입력 가능


      참고: 플랜 모드에서는 요구사항 명확화에 사용하고, ''계획 진행할까요?''는 exit_plan_mode 사용'
    input_schema:
      type: object
      properties:
        questions:
          type: array
          description: 질문 목록 (1-4개)
          items:
            type: object
            properties:
              question:
                type: string
                description: 질문 내용
              header:
                type: string
                description: 짧은 라벨 (최대 12자)
              options:
                type: array
                description: 선택지 (2-4개)
                items:
                  type: object
                  properties:
                    label:
                      type: string
                      description: 선택지 텍스트
                    description:
                      type: string
                      description: 선택지 설명
                  required:
                  - label
                  - description
              multiSelect:
                type: boolean
                description: 복수 선택 허용 (기본 false)
            required:
            - question
            - header
            - options
      required:
      - questions
  # 산 배관(2026-07-03 감사): 최상위 인지 도구 — agent_cognitive·system_ai_tools·api_xray가 tool.json에서 스키마 로드
  - name: enter_plan_mode
    description: '비단순 구현 작업 전 계획 모드로 전환합니다. 코드 작성 전 사용자 동의를 구하는 용도입니다.


      ## 사용 고려 상황

      단순하지 않은 구현 작업에서 사용을 고려하세요:

      1. 새 기능 구현 - 배치 위치, 클릭 시 동작 등 결정 필요

      2. 여러 접근 방식 가능 - 캐싱 방식, 성능 개선 전략 등

      3. 기존 동작/구조 변경 - 무엇이 바뀌어야 하는지 명확화

      4. 아키텍처 결정 - WebSocket vs SSE, 상태 관리 방식 등

      5. 다중 파일 변경 (2-3개 초과)

      6. 요구사항 탐색 필요 - 먼저 파악 후 범위 이해

      7. 사용자 선호도 중요 - 여러 방향 가능


      ## 사용하지 않을 때

      단순한 작업은 바로 진행:

      - 한두 줄 수정 (오타, 명확한 버그, 작은 조정)

      - 명확한 요구사항의 단일 함수 추가

      - 사용자가 상세한 구체적 지시를 한 경우

      - 순수 조사/탐색 작업 (구현 계획이 아님)


      ## 계획 모드에서 할 일

      1. glob_files, grep_files, read_file로 코드베이스 탐색

      2. 기존 패턴과 아키텍처 이해

      3. 구현 방안 설계

      4. 접근 방식 명확화 필요시 ask_user_question 사용

      5. 구현 준비 완료시 exit_plan_mode로 승인 요청


      참고: 이 도구는 사용자 승인이 필요합니다 - 계획 모드 진입에 동의해야 합니다.'
    input_schema:
      type: object
      properties: {}
  # 산 배관(2026-07-03 감사): 최상위 인지 도구 — agent_cognitive·system_ai_tools·api_xray가 tool.json에서 스키마 로드
  - name: exit_plan_mode
    description: '계획 파일 작성 완료 후 사용자 승인을 요청합니다.


      ## 이 도구의 동작

      - 계획 파일에서 내용을 읽어 사용자에게 표시

      - 계획 내용을 파라미터로 받지 않음

      - 사용자가 계획을 검토하고 승인/수정 요청


      ## 사용 시점

      코드 구현이 필요한 계획이 완료되었을 때만 사용:

      - 계획이 완성되고 명확할 때

      - 구현할 준비가 되었을 때


      ## 사용하지 않을 때

      - 요구사항이나 접근 방식에 미해결 질문이 있으면 ask_user_question 먼저 사용

      - 조사/탐색 작업 - 구현 계획이 아니면 이 도구 불필요


      중요: ''이 계획 괜찮나요?'', ''진행할까요?''를 ask_user_question으로 묻지 마세요 - 그것이 바로 이 도구의 역할입니다.'
    input_schema:
      type: object
      properties: {}
  - name: copy_path
    description: '파일 또는 폴더를 복사합니다.


      사용법:

      - 파일 복사: 단일 파일을 다른 위치로 복사

      - 폴더 복사: 폴더 전체를 하위 내용 포함하여 복사

      - 대상 경로의 상위 디렉토리가 없으면 자동 생성


      사용 예시:

      - 사진 파일 복사: source=''/Photos/IMG_001.jpg'', destination=''~/Desktop/backup/IMG_001.jpg''

      - 폴더 통째로 복사: source=''/data/project'', destination=''/backup/project''


      주의사항:

      - 대상 경로에 이미 파일/폴더가 있으면 덮어씁니다

      - 매우 큰 폴더 복사는 시간이 걸릴 수 있습니다'
    input_schema:
      type: object
      properties:
        source:
          type: string
          description: 원본 파일 또는 폴더 경로
        destination:
          type: string
          description: 복사 대상 경로
      required:
      - source
      - destination
  - name: move_path
    description: '파일 또는 폴더를 이동합니다 (이름 변경 포함).


      사용법:

      - 파일/폴더를 다른 위치로 이동

      - 같은 디렉토리 내에서 이름 변경에도 사용 가능

      - 대상 경로의 상위 디렉토리가 없으면 자동 생성


      사용 예시:

      - 파일 이동: source=''./temp/report.pdf'', destination=''./docs/report.pdf''

      - 이름 변경: source=''./old_name.txt'', destination=''./new_name.txt''


      주의사항:

      - 원본이 삭제됩니다 (이동이므로)

      - 대상 경로에 이미 파일이 있으면 덮어씁니다'
    input_schema:
      type: object
      properties:
        source:
          type: string
          description: 원본 파일 또는 폴더 경로
        destination:
          type: string
          description: 이동 대상 경로
      required:
      - source
      - destination
  - name: delete_path
    description: '파일 또는 폴더를 삭제합니다.


      사용법:

      - 파일 삭제: 단일 파일 제거

      - 폴더 삭제: 폴더와 하위 내용 전체 제거


      주의사항:

      - 이 작업은 되돌릴 수 없습니다 (휴지통으로 이동하지 않음)

      - 사용자에게 반드시 확인 후 실행하세요'
    input_schema:
      type: object
      properties:
        path:
          type: string
          description: 삭제할 파일 또는 폴더 경로
      required:
      - path
  - name: make_directory
    description: '빈 폴더(디렉토리)를 생성합니다.


      사용법:

      - 중간 경로가 없으면 함께 생성 (mkdir -p 동등)

      - 이미 존재해도 오류 없이 통과 (멱등)


      주의사항:

      - 파일 삭제·폴더 삭제는 delete_path 사용

      - 이동·이름변경은 move_path 사용'
    input_schema:
      type: object
      properties:
        path:
          type: string
          description: 생성할 폴더 경로
      required:
      - path
  - name: propose_patch
    description: "자기개조 안전장치(Floor #2) — RED 구역(backend/·frontend/·scripts/) 코어 코드\
      \ 변경을 격리 사본(git worktree)에만 제안합니다. 라이브 트리는 절대 손대지 않습니다.\n\n## 언제\n- write/edit\
      \ 가 막힌 RED 코어 파일을 고쳐야 할 때 (직접 쓰기는 자해 위험이라 금지됨)\n- 그 외 파일(data/·프로젝트)은\
      \ 그냥 [self:write]/[self:edit] 를 쓰세요 — propose_patch 는 RED 전용\n\n## 동작\n1.\
      \ HEAD 기준 git worktree 격리 사본 생성 (라이브 무변경)\n2. 변경을 사본에만 기록 (content 전체 또는\
      \ old_string→new_string)\n3. 사본에서 py_compile + build --check 기계 검증 (자기채점 아님)\n\
      4. diff·검증결과를 patch_proposals/ 에 기록\n5. 채택(머지)·폐기는 사람이 검토 후 수행\n\n## 파라미터\n\
      - path: 대상 RED 파일 경로\n- content: 새 전체 내용 (신규 파일·전체 교체) — 또는 old_string+new_string\
      \ 부분 교체\n- reason: 변경 근거 (필수, 사람 검토용)"
    input_schema:
      type: object
      properties:
        path:
          type: string
          description: 대상 RED 파일 경로 (backend/·frontend/·scripts/ 하위). RED 밖이면 거부됨.
        content:
          type: string
          description: 새 전체 파일 내용 (신규 생성 또는 전체 교체). old_string/new_string 과 택일.
        old_string:
          type: string
          description: 부분 교체 — 교체할 기존 문자열 (HEAD 기준 파일 내 유일해야 함). new_string 과 함께.
        new_string:
          type: string
          description: 부분 교체 — 새 문자열.
        reason:
          type: string
          description: 변경 근거 (필수). 사람이 제안을 검토할 때 읽는다.
      required:
      - path
      - reason
  - name: read_op
    description: '파일 읽기 — 텍스트/PDF/DOCX/XLSX 통합. 확장자로 자동 인식(format 명시도 가능).


      파라미터: 읽을 파일 경로. format 옵션 (text/pdf/docx/xlsx) — 생략 시 확장자 자동. text — offset/limit (라인). pdf — pages 옵션 (예 ''1-5''). docx — offset/limit/max_blocks (블록 단위). xlsx — sheet(특정 시트명)/max_rows 옵션. 스캔 PDF는 별도 OCR 필요.'
    input_schema:
      type: object
      properties:
        op:
          type: string
          description: 동작 분기 — target_description 참조
      additionalProperties: true
  - name: fill_op
    description: '양식 채우기 — PDF 폼/DOCX 템플릿에 값을 넣어 완성 문서 생성. read 의 짝(문서→문서, 구조 보존).


      파라미터: path(템플릿 .pdf 폼 또는 {{자리표시자}} 든 .docx). data({필드: 값}) — 생략하면 채울 수 있는 필드 목록을 반환. output(출력 경로, 생략 시 원본 옆 _filled). flatten(PDF 전용, true면 폼을 정적 내용으로 구워 제출용).'
    input_schema:
      type: object
      properties:
        path:
          type: string
          description: 템플릿 문서 경로 (.pdf 폼 또는 {{자리표시자}} 든 .docx)
        data:
          type: object
          description: 필드→값 매핑. 생략하면 채울 수 있는 필드 목록을 반환
        output:
          type: string
          description: 출력 파일 경로 (생략 시 원본 옆 _filled)
        flatten:
          type: boolean
          description: 'PDF 전용 — true면 폼을 정적 내용으로 구워 제출용(수정 불가). 기본 false'
      required:
      - path
  - name: spreadsheet
    description: '행 데이터를 xlsx 스프레드시트로 씁니다 (값만, 수식·서식 제외).


      단일 시트: rows(행 배열, 각 행은 셀 배열) + headers(선택)/sheet_name(선택). 다중 시트: sheets={시트명: rows}. path는 .xlsx 자동 보정, bare 파일명은 outputs/로.'
    input_schema:
      type: object
      properties:
        path:
          type: string
          description: 출력 파일 경로 (.xlsx 자동 보정)
        rows:
          type: array
          items:
            type: array
          description: 행 배열 — 각 행은 셀 값 배열 (단일 시트)
        headers:
          type: array
          items:
            type: string
          description: 열 머리글 (선택, 첫 행으로 삽입)
        sheet_name:
          type: string
          description: 단일 시트 이름 (기본 Sheet1)
        sheets:
          type: object
          description: '다중 시트 {시트명: rows}. 주면 rows보다 우선.'
      required:
      - path
