node: table
actions:
  chart:
    aliases:
      chart_type: [type]
    returns: effect
    runs_on: mac_only
    description: '통합 차트. chart_type: line/bar/pie/scatter/heatmap/candlestick/multi (기본 line).'
    target_description: 'title (필수). chart_type으로 종류 분기 (기본 line).

      표형 table={columns:[x,s1,s2...], rows:[[x,v1,v2...],...]} 파라미터도 수용 — 첫 열=x축, 나머지=시리즈. 데이터 소스 출력을 손질 없이 차트로(table:spreadsheet와 같은 입력 형태). ※테이블은 table 키로(data 키에 {columns,rows}를 넣어도 인식은 하나 table 권장).

      - line: x/y 리스트, 다중 시리즈는 series 배열. 시계열에 적합.

      - 구간 강조·이벤트 표시를 IBL로 직접 그릴 수 있다(Python 불필요, line/scatter/bar 공통): bands=[{from, to, label?, color?}] 로 시기 음영(정권·국면 등), annotations=[{x, text}] 로 특정 시점 점선+라벨. line/scatter는 x가 전부 숫자(연도 등)면 숫자축 자동 변환, bar는 x 라벨 기준. (bar는 세로 막대에만 적용)

      - bar: x(범주)·y(값) 리스트. horizontal/stacked 옵션. 시간축은 line.

      - pie: labels·values 리스트. hole 옵션으로 도넛.

      - scatter: x/y 좌표 리스트. trendline 옵션으로 추세선.

      - heatmap: z(매트릭스)·x_labels·y_labels.

      - candlestick: open/high/low/close/volume 시계열 + ma 옵션(이동평균).

      - multi: charts 배열에 개별 차트 정의(각각 chart_type+데이터). subplots 자동 배치.

      - spec: 위 chart_type으로 부족한 풍부한 표현(이중축·로그축·복합 음영 등)은 Plotly figure JSON을 spec으로 그대로 넘긴다 — matplotlib 코드 작성(self:write+run) 대신. spec={data:[트레이스...], layout:{...}}. 이중축=트레이스에 yaxis:"y2" + layout.yaxis2={overlaying:"y",side:"right"}. 구간음영=layout.shapes(type:rect, yref:"paper"). 주석=layout.annotations. *코드가 아니라 데이터*라 포터블·캐시·검증가능. 예: 한국 GDP(좌축)와 KOSPI(우축) 이중축 + 정권별 shapes 음영.

      '
    group: chart
    router: handler
    tool: chart
    implementation: chart_type 파라미터로 분기하여 Plotly 기반 차트 HTML 생성. 기본값 line. matplotlib 폴백 내장.
    target_key: title
    keywords:
    - 차트
    - 그래프
    - 시각화
    - 라인차트
    - 선그래프
    - 추이
    - 바차트
    - 막대그래프
    - 캔들
    - 주식차트
    - OHLCV
    - 파이차트
    - 원그래프
    - 비율
    - 산점도
    - 분포
    - 추세선
    - 히트맵
    - 열지도
    - 대시보드
    - 복합차트

# tool.json 파생 원본 (2026-07-03 이관) — 빌드가 이 블록과 위 actions 의 ops 로 tool.json 을 생성한다.
# op-bearing 도구의 op enum/default 는 여기 저장하지 않는다 (actions 의 ops 가 단일 소스).
tool_json:
  header:
    id: visualization
    name: Visualization Tools
    description: 데이터 시각화 도구. 라인차트, 막대차트, 파이차트, 산점도, 히트맵, 캔들스틱 등 다양한 차트를 PNG/HTML로 생성합니다. 데이터 분석 결과 시각화, 주가 차트, 비교 그래프, 대시보드
      제작에 활용.
    version: 1.0.0
  tools:
  - name: chart
    description: 차트 종류 자동 분기 — chart_type으로 line/bar/pie/scatter/heatmap/candlestick/multi 선택. 종류별 데이터 형식은 해당 개별 차트 도구의 설명을
      참조.
    input_schema:
      type: object
      properties:
        chart_type:
          type: string
          enum:
          - line
          - bar
          - pie
          - scatter
          - heatmap
          - candlestick
          - multi
          description: 차트 종류. 기본값 line.
        data:
          type: array
          description: 차트 데이터. 형식은 chart_type에 따라 다름 ([{x,y}] / [{label,value}] / [{x,y,size}] / 등)
          items:
            type: object
        data_file:
          type: string
          description: 데이터 파일 경로 (JSON/CSV). data 대신 사용.
        title:
          type: string
          description: 차트 제목
        x_label:
          type: string
        y_label:
          type: string
        series_names:
          type: array
          items:
            type: string
        output_format:
          type: string
          enum:
          - png
          - html
          description: 기본값 png
        output_path:
          type: string
          description: 출력 파일 경로 (선택)
        charts:
          type: array
          description: multi 차트 전용 — 여러 서브차트 배열
          items:
            type: object
