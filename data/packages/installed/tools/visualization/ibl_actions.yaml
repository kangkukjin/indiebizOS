node: engines
actions:
  chart:
    description: '통합 차트. chart_type: line/bar/pie/scatter/heatmap/candlestick/multi (기본 line).'
    target_description: |
      title (필수). chart_type으로 종류 분기 (기본 line).
      - line: x/y 리스트, 다중 시리즈는 series 배열. 시계열에 적합.
      - bar: x(범주)·y(값) 리스트. horizontal/stacked 옵션. 시간축은 line.
      - pie: labels·values 리스트. hole 옵션으로 도넛.
      - scatter: x/y 좌표 리스트. trendline 옵션으로 추세선.
      - heatmap: z(매트릭스)·x_labels·y_labels.
      - candlestick: open/high/low/close/volume 시계열 + ma 옵션(이동평균).
      - multi: charts 배열에 개별 차트 정의(각각 chart_type+데이터). subplots 자동 배치.
    group: chart
    router: handler
    tool: chart
    implementation: chart_type 파라미터로 분기하여 Plotly 기반 차트 HTML 생성. 기본값 line. matplotlib 폴백 내장.
    target_key: title
    keywords:
    - 차트
    - 그래프
    - 시각화
    - 라인차트
    - 선그래프
    - 추이
    - 바차트
    - 막대그래프
    - 캔들
    - 주식차트
    - OHLCV
    - 파이차트
    - 원그래프
    - 비율
    - 산점도
    - 분포
    - 추세선
    - 히트맵
    - 열지도
    - 대시보드
    - 복합차트
