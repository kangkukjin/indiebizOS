nodes:
  sense:
    actions:
      search_ddg:
        description: 웹 검색 (DuckDuckGo). 영어/글로벌 쿼리에 적합. 한국어 검색은 search_naver 우선.
          뉴스는 search_news, 유튜브는 search_youtube, 논문은 search_openalex를 각각 사용.
        router: handler
        tool: ddgs_search
        implementation: DuckDuckGo ddgs 라이브러리로 웹 검색. 쿼리 언어 자동 감지(영어→글로벌, 한국어→한국).
        target_key: query
        postprocess:
          type: compress
      search_naver:
        description: 네이버 검색 API. 한국어 콘텐츠(웹문서/뉴스/블로그/카페/지식인/책/백과 등)에서
          DuckDuckGo/Google보다 압도적으로 강함. type 파라미터로 도메인 선택 (기본 webkr).
          뉴스 단독 검색은 type='news' 또는 search_news(Google News) 중 한국 출처 우선이면 이쪽.
        router: handler
        tool: naver_search
        implementation: 네이버 개발자센터 검색 API. 같은 NAVER_CLIENT_ID/SECRET 한 쌍으로
          9개 도메인(webkr/news/blog/cafe/kin/book/encyc/doc/shop) 모두 호출. 무료 일 25k 쿼리.
        target_key: query
        postprocess:
          type: compress
      crawl:
        description: 웹페이지 원문 읽기 (URL 필요). 검색 스니펫으로 부족할 때 상세 내용 확인용.
        router: handler
        tool: crawl_website
        implementation: 1차 requests+BeautifulSoup 정적 크롤링, 콘텐츠 부족 시 Chrome MCP(실제 브라우저)로
          자동 폴백. JS 렌더링 사이트도 처리 가능.
        target_key: url
        postprocess:
          type: compress
      search_news:
        description: 뉴스만 검색 (Google News). 신문 생성, 뉴스 모니터링 등 뉴스 전용 작업에 사용.
        router: handler
        tool: google_news_search
        implementation: Google News RSS 피드를 feedparser로 파싱. 쿼리 언어 자동 감지.
        target_key: query
        postprocess:
          type: compress
          prompt: 같은 사건/주제를 다룬 기사는 하나로 병합하라. 불필요한 메타데이터를 제거하라. URL은 대표 1개만 보존하라.
    guides:
    - web/web_guide.md
  self:
    actions:
      launch:
        description: 즐겨찾기 런처 대시보드 띄우기(기본) 또는 사이트 관리. '런처 띄워줘' → 대시보드 UI 표시. 전부 열기는
          명시 요청 시에만
        group: output
        category: io
        router: handler
        tool: launch_sites
        implementation: 즐겨찾기 JSON 설정 기반 URL 일괄 오픈 (webbrowser 모듈)
        target_key: action
        keywords:
        - launcher
        - 런처
        - 즐겨찾기
        - favorite
        - 좋아하는 사이트
        - bookmark
        - 좋아하는 사이트
        - 자주가는
  limbs:
    actions:
      launch:
        description: 즐겨찾기 런처 대시보드 띄우기(기본) 또는 사이트 관리. action 미지정 시 대시보드 UI 표시
        router: handler
        tool: launch_sites
        implementation: 즐겨찾기 JSON 설정 기반 URL 일괄 오픈 (webbrowser 모듈)
        target_key: action
  engines:
    actions:
      newspaper:
        description: '"신문 만들어줘"라고 요청할 때만 사용. 키워드별 뉴스 기사를 자동 수집하여 HTML 신문 레이아웃으로 생성.
          보고서/분석/요약 요청에는 사용하지 말 것.'
        group: media_produce
        category: create
        router: handler
        tool: generate_newspaper
        implementation: Google News RSS + Guardian API 수집 → Jinja2 HTML 신문 레이아웃 생성
        target_key: keywords
        keywords:
        - 신문
        - 신문만들기
        - 신문생성
        - 가디언
        - guardian
        - world news
