nodes:
  sense:
    actions:
      search_ddg:
        returns: items
        fixture: '[sense:search_ddg]{query: "climate policy"}'
        description: 웹 검색 (DuckDuckGo). 영어/글로벌 쿼리에 적합. 한국어 검색은 search_naver 우선. 뉴스는 search_gnews, 유튜브는 search_youtube, 논문은 search_openalex를 각각 사용.
        group: research
        target_description: 검색어 (영어 권장). region/safesearch 옵션 가능.
        router: handler
        tool: ddgs_search
        implementation: DuckDuckGo ddgs 라이브러리로 웹 검색. 쿼리 언어 자동 감지(영어→글로벌, 한국어→한국).
        target_key: query
      crawl:
        returns: items
        fixture: '[sense:crawl]{url: "https://example.com"}'
        description: 웹페이지 원문 읽기 (URL 필요). items=문단 단위(type+text 항목). 검색 스니펫으로 부족할 때 상세 내용 확인용.
        group: research
        target_description: 읽을 페이지 URL (http/https). 검색 결과의 link 필드 그대로 전달 가능.
        router: handler
        tool: crawl_website
        implementation: 1차 curl_cffi(TLS 크롬 위장) 정적 크롤링 → 로그인 벽·봇차단·콘텐츠 부족 감지 시 Chrome MCP/Playwright(로그인 세션 자동 복원, iframe 전 프레임 수집)로 자동 에스컬레이션. 최종 실패 시 reason(bot_blocked/login_required) 명시.
        target_key: url
      search_gnews:
        returns: items
        fixture: '[sense:search_gnews]{query: "경제"}'
        description: 뉴스만 검색 (Google News). 신문 생성, 뉴스 모니터링 등 뉴스 전용 작업에 사용.
        group: research
        target_description: 뉴스 검색어. 언어 자동 감지 — 한국어는 한국 뉴스, 영어는 글로벌 뉴스.
        router: handler
        tool: search_gnews
        implementation: Google News RSS 피드를 feedparser로 파싱. 쿼리 언어 자동 감지.
        target_key: query
        # 신문 계기는 여기서 앵커를 뺐다(정기보고식 재편, 2026-07-09). PC(데스크톱 NewspaperInstrument.tsx)가
        # '새로 발행' 시 뉴스를 긁어 판을 만들고 outputs/newspaper_current.md 로 저장 → 폰/원격은 그 파일을
        # 읽어 보여주기만(재취재 없음). 폰/원격 뷰어는 data/instruments/newspaper.yaml 스탠드얼론 매니페스트.
        # (search_gnews 자체는 데스크톱 계기·일반 뉴스검색이 계속 사용 — 액션은 그대로, app: 블록만 제거.)
      search_hn:
        returns: items
        fixture: '[sense:search_hn]{query: "AI"}'
        description: Hacker News(Algolia) 기술·스타트업 포스팅 검색. gnews 형제 소스 — HN 전용 신문 판용. curate 시 편집장·관점 필터 공유, points(▲)=hot 신호.
        group: research
        target_description: 검색어(영어 권장). headlines:true 면 HN 프론트페이지.
        router: handler
        tool: search_hn
        implementation: Hacker News Algolia API(hn.algolia.com). story 태그 검색 + front_page. 키 불요. items 통화(points/num_comments 포함).
        target_key: query
  limbs:
    actions:
      launch:
        returns: effect
        description: 즐겨찾기 런처 대시보드 띄우기(기본) 또는 사이트 관리. action 미지정 시 대시보드 UI 표시
        group: open
        target_description: (미지정 시 대시보드 표시). action으로 register/add/list/remove 등 사이트 관리.
        router: handler
        tool: launch_sites
        scope: workspace
        implementation: 즐겨찾기 JSON 설정 기반 URL 일괄 오픈 (webbrowser 모듈) — workspace 도구(프로젝트 무관)
        target_key: action
        app:
          icon: 🔖
          name: 즐겨찾기
          order: 10
          auto_run: true
          action: '[limbs:launch]{action: "list"}'
          view:
          - type: card_list
            from: items
            empty_from: message
            card:
              title: '{name}'
              lines:
              - '{url|trunc:54}'
              link:
                href: '{url}'
                label: 열기 →

# tool.json 파생 원본 (2026-07-03 이관) — 빌드가 이 블록과 위 actions 의 ops 로 tool.json 을 생성한다.
# op-bearing 도구의 op enum/default 는 여기 저장하지 않는다 (actions 의 ops 가 단일 소스).
tool_json:
  header:
    id: web
    name: Web Tools
    description: 웹 검색 및 크롤링 도구. DuckDuckGo 웹 검색, 웹페이지 텍스트 추출, Google 뉴스 검색, HTML 신문 자동 생성, 즐겨찾기 사이트 관리 기능을 제공합니다. 정보 수집, 뉴스
      모니터링, 웹 리서치에 활용. (한국어 네이버 검색은 web-kr 패키지)
    version: 1.2.0
  tools:
  - name: ddgs_search
    description: 'DuckDuckGo로 웹 검색을 수행합니다.


      ## 사용 시점

      - 최신 정보 검색 (뉴스, 이벤트, 가격 등)

      - 특정 주제에 대한 웹 자료 찾기

      - 공식 문서/사이트 URL 찾기


      ## 사용법

      - query: 구체적인 검색 키워드 (한글/영어 모두 가능)

      - count: 필요한 결과 수 (기본 5개, 최대 10개)


      ## 주의사항

      - 단순 검색만 수행 - 페이지 내용을 읽으려면 crawl_website 사용

      - 검색 결과는 제목, URL, 스니펫만 포함

      - 실시간 데이터가 필요하면 여러 번 검색보다 한 번에 구체적으로


      ## 다른 도구와의 관계

      - 음식점 검색: search_restaurants 사용 (별도 패키지)

      - 페이지 내용 확인: crawl_website 사용

      - 복잡한 웹 작업: browser_action 사용

      - 뉴스 검색: search_gnews 사용'
    input_schema:
      type: object
      properties:
        query:
          type: string
          description: 검색 키워드 (구체적으로 작성)
        count:
          type: integer
          default: 5
          minimum: 1
          maximum: 10
          description: 결과 수 (기본 5, 최대 10)
        country:
          type: string
          default: kr-kr
          description: '국가/언어 코드 (기본: kr-kr)'
      required:
      - query
  - name: crawl_website
    description: '웹페이지의 텍스트 내용을 추출합니다.


      ## 반환값

      - title: 페이지 제목

      - text: 추출된 텍스트 내용 (직접 반환)

      - length: 원본 텍스트 길이


      ## 사용 시점

      - 검색 결과에서 찾은 URL의 상세 내용 확인

      - 기사, 블로그, 문서 내용 읽기


      ## 주의사항

      - 정적 HTML만 지원 (JavaScript 렌더링 불가)

      - 로그인 필요 페이지 불가 → browser_action 사용


      ## 다른 도구와의 관계

      - URL 찾기: ddgs_search

      - 동적/로그인 페이지: browser_action'
    input_schema:
      type: object
      properties:
        url:
          type: string
          description: 크롤링할 URL
        max_length:
          type: integer
          description: 최대 텍스트 길이 (기본 10000)
          default: 10000
      required:
      - url
  - name: search_gnews
    description: 'Google News RSS로 최신 뉴스를 검색합니다.


      ## 장점

      - API 키 불필요, 무료

      - 한국어/영어 뉴스 지원


      ## 사용 시점

      - 특정 주제의 최신 뉴스 검색

      - 시사 정보 수집


      ## 반환 정보

      - 뉴스 제목, 링크, 출처

      - 발행 시간


      ## 다른 도구와의 관계

      - 일반 웹 검색: ddgs_search

      - 기사 전문 읽기: crawl_website'
    input_schema:
      type: object
      properties:
        query:
          type: string
          description: 검색 키워드
        count:
          type: integer
          description: 결과 개수 (기본 10, 최대 100 — 검색 RSS는 GET 1회에 ~100개까지 줌)
        language:
          type: string
          enum:
          - ko
          - en
          description: 언어 (기본 ko)
        curate:
          type: integer
          description: 지정 시 경량 AI '편집장'이 ~100개를 넓게 보고 이 개수만큼 편성 — 중복은 하나로 묶고, hot(널리 다뤄진 사건)·delta(독자 관점 코어 기준 새 정보)·surface(지배 프레임과 다른 이질 1건 의무)를 섞어 선별(각 기사에 role/why 부착). 안 뽑힌 나머지는 pool 필드로 반환(대체 후보). 관점 코어(vault/위키/관점 코어.md) 없으면 뉴스가치+surface 폴백. 신문 섹션용. 미지정 시 순수 검색.
        headlines:
          type: boolean
          description: true면 키워드 없이 구글뉴스 톱 헤드라인을 가져온다. curate와 함께 쓰면 오늘 가장 많이 다뤄진 사건 순으로 '오늘의 핫토픽' 섹션이 된다. query 불필요.
        sources:
          type: string
          description: 큐레이션 풀에 합류할 소스(쉼표 나열). 기본 "gnews,guardian" — curate 지정 + 영어 키워드면 가디언 기사가 풀에 합류(정본 구현=study 패키지 search_guardian, GUARDIAN_API_KEY). 한국어 키워드는 자동 생략. "gnews"만 주면 가디언 끔.
      required: []
  - name: search_hn
    description: 'Hacker News(Algolia API)로 기술·스타트업 포스팅을 검색. search_gnews 의 형제 소스 — HN 전용 신문 판(별도 판)용. 편집장(curate)·관점 필터 공유.


      ## 특징

      - API 키 불필요. points(▲)=주목도로 hot 신호. num_comments(💬)=토론 활발도.

      - front_page(headlines:true)=현재 HN 프론트페이지(핫토픽 analog).

      - url=외부 기사 우선(없으면 HN 토론), hn_url=HN 토론(댓글) 항상 보존.


      ## 사용 시점

      - 기술·AI·스타트업 동향의 원천(1차 소스·실무자 주목)을 신문으로 볼 때.'
    input_schema:
      type: object
      properties:
        query:
          type: string
          description: 검색 키워드(영어 권장). story 태그로 검색.
        queries:
          type: string
          description: 여러 키워드(쉼표/개행) 배치 팬아웃 — 섹션별로 한 목록. 신문 계기용.
        count:
          type: integer
          description: 결과 개수 (기본 15, curate 시 100까지 오버페치).
        curate:
          type: integer
          description: 지정 시 경량 AI '편집장'이 hot(▲포인트 높음)·delta(관점 코어 기준 새 정보)·surface(이질 1건) 편성. search_gnews 와 동일 규칙·pool·perspective. HN 판 신문용.
        headlines:
          type: boolean
          description: true면 검색어 없이 HN 프론트페이지(오늘 크게 주목받은 포스팅)를 가져온다. curate 와 함께 'HN 프론트페이지' 섹션.
      required: []
  - name: launch_sites
    description: '즐겨찾기 사이트 런처(대시보드) 및 관리.


      ## 기능 (action)

      - open_ui (기본값): 즐겨찾기 대시보드 페이지를 브라우저에 띄움

      - list: 저장된 사이트 목록 텍스트로 확인

      - add: 새 사이트 추가 (name, url 필요)

      - remove: 사이트 삭제 (name 필요)'
    input_schema:
      type: object
      properties:
        action:
          type: string
          enum:
          - open_ui
          - list
          - add
          - remove
          description: 실행할 작업
        name:
          type: string
          description: 사이트 이름 (add/remove용)
        url:
          type: string
          description: 사이트 URL (add용)
