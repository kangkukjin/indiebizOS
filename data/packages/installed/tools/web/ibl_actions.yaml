nodes:
  sense:
    actions:
      search_ddg:
        returns: items
        description: 웹 검색 (DuckDuckGo). 영어/글로벌 쿼리에 적합. 한국어 검색은 search_naver 우선. 뉴스는 search_gnews, 유튜브는 search_youtube, 논문은 search_openalex를 각각 사용.
        group: research
        target_description: 검색어 (영어 권장). region/safesearch 옵션 가능.
        router: handler
        tool: ddgs_search
        implementation: DuckDuckGo ddgs 라이브러리로 웹 검색. 쿼리 언어 자동 감지(영어→글로벌, 한국어→한국).
        target_key: query
      crawl:
        returns: items
        description: 웹페이지 원문 읽기 (URL 필요). items=문서 IR(type+text 항목). 검색 스니펫으로 부족할 때 상세 내용 확인용.
        group: research
        target_description: 읽을 페이지 URL (http/https). 검색 결과의 link 필드 그대로 전달 가능.
        router: handler
        tool: crawl_website
        implementation: 1차 requests+BeautifulSoup 정적 크롤링, 콘텐츠 부족 시 Chrome MCP(실제 브라우저)로 자동 폴백. JS 렌더링 사이트도 처리 가능.
        target_key: url
      search_gnews:
        returns: items
        description: 뉴스만 검색 (Google News). 신문 생성, 뉴스 모니터링 등 뉴스 전용 작업에 사용.
        group: research
        target_description: 뉴스 검색어. 언어 자동 감지 — 한국어는 한국 뉴스, 영어는 글로벌 뉴스.
        router: handler
        tool: search_gnews
        implementation: Google News RSS 피드를 feedparser로 파싱. 쿼리 언어 자동 감지.
        target_key: query
        # 신문 계기 — queries 배치 팬아웃(핸들러)이 항목을 query 로 태그 → group 뷰가 키워드별 섹션.
        # engines:newspaper 은퇴로 앵커 잃은 신문을 매니페스트로 복원(원격·폰 전 표면). group 콤비네이터 증명 앱.
        app:
          instrument: newspaper
          icon: 📰
          name: 신문
          order: 12
          auto_run: true
          inputs:
          - key: keywords
            type: text
            label: 키워드(쉼표로 구분)
            default: 청주,AI,문화,드라마,영화,만화,세종,경제,주식
          action: '[sense:search_gnews]{queries: "$keywords", count: 5}'
          view:
          - type: group
            from: items
            by: '{query}'
            view:
            - type: card_list
              from: items
              card:
                title: '{title}'
                lines:
                - '{meta}'
                - '{summary}'
                link:
                  href: '{url}'
                  label: 기사 보기 →
  limbs:
    actions:
      launch:
        returns: effect
        description: 즐겨찾기 런처 대시보드 띄우기(기본) 또는 사이트 관리. action 미지정 시 대시보드 UI 표시
        group: open
        target_description: (미지정 시 대시보드 표시). action으로 register/add/list/remove 등 사이트 관리.
        router: handler
        tool: launch_sites
        scope: workspace
        implementation: 즐겨찾기 JSON 설정 기반 URL 일괄 오픈 (webbrowser 모듈) — workspace 도구(프로젝트 무관)
        target_key: action
        app:
          icon: 🔖
          name: 즐겨찾기
          order: 10
          auto_run: true
          action: '[limbs:launch]{action: "list"}'
          view:
          - type: card_list
            from: items
            empty_from: message
            card:
              title: '{name}'
              lines:
              - '{url|trunc:54}'
              link:
                href: '{url}'
                label: 열기 →
