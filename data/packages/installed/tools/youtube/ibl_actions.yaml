nodes:
  sense:
    actions:
      video_info:
        description: 유튜브 동영상 메타데이터 조회 (제목, 조회수, 채널 등)
        keywords:
        - youtube
        - 유튜브
        - 영상정보
        - 동영상
        - video
        target_description: 유튜브 URL
        router: handler
        tool: get_youtube_info
        implementation: yt-dlp로 유튜브 메타데이터 추출 (공식 API 불필요)
        target_key: url
      video_transcript:
        description: 유튜브 ��영상 자막/스크립트 추출 (url 또는 video_id 사용 가능). 영상 요약이 목적이면 summarize_video를
          쓰면 자막 추출+AI 요약+HTML+브라우저 열기를 한 번에 수행한다.
        keywords:
        - youtube
        - 유튜브
        - 자막
        - 스크립트
        - transcript
        - subtitle
        - 대본
        target_description: 유튜브 URL 또는 video_id
        router: handler
        tool: get_youtube_transcript
        implementation: youtube-transcript-api로 자막/스크립트 추출
        target_key: url
      video_languages:
        description: 유튜브 동영상 사용 가능한 자막 언어 목록 조회 (url 또는 video_id 사용 가능)
        keywords:
        - youtube
        - 유튜브
        - 자막언어
        - subtitle
        - language
        target_description: 유튜브 URL 또는 video_id
        router: handler
        tool: list_available_transcripts
        implementation: youtube-transcript-api로 사용 가능한 자막 언어 조회
        target_key: url
      summarize_video:
        description: 유튜브 동영상 자막 추출 + AI 요약 + HTML 보고서 생성 + 브라우저 자동 열기를 한 번에 수행
        keywords:
        - youtube
        - 유튜브
        - 요약
        - 영상요약
        - 동영상요약
        - summarize
        target_description: 유튜브 URL
        router: handler
        tool: summarize_video
        implementation: 자막 추출 + 시스템 AI 모델로 요약 + HTML 보고서 생성 + 브라우저 자동 열기. summary_length 파라미터로 요약 길이 지정 가능.
        target_key: url
      search_youtube:
        description: 유튜브 검색 (재생하지 않고 결과 목록만 반환 — video_id, title, url 포함)
        keywords:
        - youtube
        - 유튜브
        - 영상검색
        - 동영상검색
        - video search
        target_description: 검색어
        router: handler
        tool: search_youtube
        implementation: yt-dlp ytsearch로 유튜브 검색 결과 목록 추출
        target_key: query
  limbs:
    actions:
      play:
        description: 유튜브 음악/영상 재생 (검색+재생 복합. 검색만 원하면 search_youtube 사용)
        keywords:
        - youtube
        - 유튜브
        - 음악
        - 노래
        - 재생
        - 틀어줘
        - play
        - music
        - 듣기
        target_description: 검색어 또는 유튜브 URL
        router: handler
        tool: play_youtube
        implementation: yt-dlp로 유튜브 URL 추출 + mpv/ffplay로 스트리밍 재생
        target_key: query
      queue_add:
        description: 재생 큐에 곡 추가
        keywords:
        - 큐
        - 대기열
        - queue
        - 추가
        target_description: 검색어
        router: handler
        tool: add_to_queue
        implementation: 재생 큐 리스트에 유튜브 URL 추가 (인메모리)
        target_key: query
      skip:
        description: 현재 곡 건너뛰고 다음 곡 재생
        keywords:
        - 스킵
        - 다음곡
        - skip
        - next
        router: handler
        tool: skip_youtube
        implementation: mpv/ffplay 프로세스 종료 후 큐 다음 곡 재생
      queue:
        description: 현재 재생 큐 상태 조회
        router: handler
        tool: get_queue
        implementation: 인메모리 재생 큐 상태 반환
      stop:
        description: 재생 중지 및 큐 초기화
        keywords:
        - 정지
        - 멈춰
        - stop
        - 중지
        router: handler
        tool: stop_youtube
        implementation: mpv/ffplay 프로세스 종료 + 큐 초기화
      youtube_download:
        description: 유튜브 동영상 오디오를 MP3로 다운로드
        keywords:
        - youtube
        - 유튜브
        - 다운로드
        - download
        - mp3
        - 음악저장
        - 노래저장
        target_description: 유튜브 URL
        router: handler
        tool: download_youtube_music
        implementation: yt-dlp로 유튜브 오디오 스트림 추출 후 MP3 변환
        target_key: url
