nodes:
  sense:
    actions:
      video:
        returns: scalar
        fixture: '[sense:video]{op: "meta", query: "jazz"}'
        runs_on: pc_only
        description: 유튜브 동영상 조회 (op 분기). 메타·자막·요약. 검색은 search_youtube, 재생은 limbs:music.
        target_description: 'op로 분기 (기본 info). url 또는 video_id 필수.

          - info: 메타데이터(제목·조회수·채널).

          - transcript: 자막/스크립트 추출. language 옵션.

          - languages: 사용 가능한 자막 언어 목록.

          - summarize: 자막 추출 + AI 요약 + HTML 보고서 + 브라우저 열기. summary_length 옵션.

          '
        target_key: op
        group: media
        router: handler
        tool: video_op
        ops:
          default: info
          values:
            info: 동영상 메타데이터 (제목·조회수·채널)
            transcript: 자막/스크립트 추출
            languages: 사용 가능한 자막 언어 목록
            summarize: 자막+AI요약+HTML 보고서 생성
        implementation: youtube 패키지 op 분기. info=get_youtube_info, transcript=get_youtube_transcript, languages=list_available_transcripts, summarize=summarize_youtube.
        keywords:
        - youtube
        - 유튜브
        - 동영상
        - 자막
        - 영상요약
      search_youtube:
        returns: items
        fixture: '[sense:search_youtube]{query: "jazz"}'
        runs_on: pc_only
        description: 유튜브 검색 (재생하지 않고 결과 목록만 반환 — video_id, title, url 포함)
        group: media
        keywords:
        - youtube
        - 유튜브
        - 영상검색
        - 동영상검색
        - video search
        target_description: 검색어
        router: handler
        tool: search_youtube
        implementation: yt-dlp ytsearch로 유튜브 검색 결과 목록 추출
        target_key: query
        app:
          instrument: ytmusic
          icon: 🎵
          name: 유튜브 뮤직
          order: 8
          mode: 검색
          mode_order: 0
          inputs:
          - key: q
            type: text
            placeholder: 곡·아티스트 검색
            required: true
          action: '[sense:search_youtube]{query: "$q", count: 15}'
          view:
          - type: list_action
            from: items
            icon: 🎵
            title: '{title|trunc:60}'
            sub: '{channel} · {duration}'
            button:
              label: ▶
              action: '[limbs:music]{op: "play", mode: "client", query: "https://www.youtube.com/watch?v={video_id}"}'
            button2:
              label: ⬇
              action: '[limbs:music]{op: "download", mode: "client", url: "https://www.youtube.com/watch?v={video_id}"}'
  limbs:
    actions:
      music:
        returns: effect
        runs_on: pc_only
        description: 유튜브 음악 재생·큐 관리·중간 점프·MP3 다운로드 (op 분기). play/add/skip/seek/queue/stop/download.
        group: media
        target_description: play/add — query 파라미터로 검색어 또는 URL. seek — position 파라미터로 이동할 위치(초). download — url 파라미터로 MP3 추출(output_path 옵션). skip/queue/stop — 파라미터 없음.
        target_key: op
        router: handler
        tool: music_op
        ops:
          default: play
          values:
            play: 즉시 재생 (query 검색어/URL, 기본)
            add: 큐에 추가 (query 검색어/URL)
            skip: 현재 곡 스킵
            seek: 현재 곡의 특정 지점으로 점프 (position 초)
            queue: 큐 목록 조회
            stop: 재생 중지
            download: MP3 다운로드 (url + output_path 옵션)
        implementation: yt-dlp + ffplay 음악 재생·큐·중간점프(-ss 재시작)·다운로드 op 분기
        keywords:
        - youtube
        - 유튜브
        - 음악
        - 노래
        - 재생
        - 틀어줘
        - 큐
        - 대기열
        - 스킵
        - 다음곡
        - 정지
        - 멈춰
        - 다운로드
        - mp3
        app:
          instrument: ytmusic
          mode: 큐
          mode_order: 1
          phone_render: false
          auto_run: true
          buttons:
          - label: ⏭ 다음 곡
            action: '[limbs:music]{op: "skip"}'
          - label: ■ 정지
            action: '[limbs:music]{op: "stop"}'
          action: '[limbs:music]{op: "queue"}'
          view:
          - type: kv
            rows:
            - k: 상태
              v: '{message}'
          - type: kv_list
            from: queue
            title: 대기열
            empty: 대기열이 비어 있습니다
            k: '{position}'
            v: '{title|trunc:40} · {channel}'

# tool.json 파생 원본 (2026-07-03 이관) — 빌드가 이 블록과 위 actions 의 ops 로 tool.json 을 생성한다.
# op-bearing 도구의 op enum/default 는 여기 저장하지 않는다 (actions 의 ops 가 단일 소스).
tool_json:
  header:
    id: youtube
    name: YouTube Tools
    description: YouTube 영상 도구. 영상 정보 조회, 자막 추출 및 요약, MP3 다운로드, PC 스피커 음악 재생 기능을 제공합니다. 영상 내용 분석, 음악 감상, 팟캐스트 청취, 영상 요약 문서화에
      활용.
    version: 1.1.0
  tools:
  - name: search_youtube
    description: 유튜브 검색 (재생하지 않고 결과 목록만 반환). 검색어로 영상을 찾고 video_id, title, channel, duration, url 정보를 포함한 결과 목록을 반환합니다. 재생/다운로드/자막추출
      전에 원하는 영상을 먼저 찾을 때 사용.
    input_schema:
      type: object
      properties:
        query:
          type: string
          description: '검색어. 예: ''김필 너무 아픈 사랑은'', ''빅뱅 판타스틱베이비'''
        count:
          type: integer
          description: 검색 결과 수 (1-10, 기본 5)
      required:
      - query
  - name: music_op
    description: 유튜브 음악 재생/대기열 단일 디스패처. op으로 play/add/skip/seek/queue/stop/download 분기 (기본 play).
    input_schema:
      type: object
      properties:
        op:
          type: string
          description: 음악 동작
        query:
          type: string
          description: 검색어 또는 URL (op=play/add 시)
        position:
          type: number
          description: 점프할 위치(초) (op=seek 시)
        url:
          type: string
          description: 유튜브 URL (op=download 시)
        mode:
          type: string
          enum:
          - audio
          - video
          description: 재생 모드 (op=play 시, 기본 audio)
        count:
          type: integer
          description: 곡 수 (op=play/add 시)
        output_path:
          type: string
          description: MP3 저장 경로 (op=download 시)
  - name: video_op
    description: '유튜브 동영상 조회 (op 분기) — [sense:video]. url 또는 video_id 필수. 검색은 search_youtube, 재생은 [limbs:music].

      - op=info(기본): 메타데이터(제목·조회수·채널).

      - op=transcript: 자막/스크립트. language 옵션.

      - op=languages: 사용 가능한 자막 언어 목록.

      - op=summarize: 자막+AI요약+HTML 보고서+브라우저 열기. summary_length 옵션.'
    input_schema:
      type: object
      properties:
        op:
          type: string
          description: info(기본)/transcript/languages/summarize
        url:
          type: string
          description: 유튜브 URL
        video_id:
          type: string
          description: 유튜브 video_id (url 대신)
        language:
          type: string
          description: '[transcript] 자막 언어 (예 ko/en)'
        summary_length:
          type: integer
          description: '[summarize] 요약 길이(기본 3000)'
      required: []
