nodes:
  sense:
    actions:
      video_info:
        description: 유튜브 동영상 메타데이터 조회 (제목, 조회수, 채널 등)
        keywords: [youtube, 유튜브, 영상정보, 동영상, video]
        target_description: 유튜브 URL
        router: handler
        tool: get_youtube_info
        target_key: url
      video_transcript:
        description: 유튜브 동영상 자막/스크립트 추출 — 영상 요약의 첫 단계
        keywords: [youtube, 유튜브, 자막, 요약, 스크립트, transcript, 영상요약, 영상내용, subtitle, 대본]
        target_description: 유튜브 URL
        router: handler
        tool: get_youtube_transcript
        target_key: url
      video_languages:
        description: 유튜브 동영상 사용 가능한 자막 언어 목록 조회
        keywords: [youtube, 유튜브, 자막언어, subtitle, language]
        target_description: 유튜브 URL
        router: handler
        tool: list_available_transcripts
        target_key: url
      search_youtube:
        description: 유튜브 검색 (재생하지 않고 결과 목록만 반환 — video_id, title, url 포함)
        keywords: [youtube, 유튜브, 영상검색, 동영상검색, video search]
        target_description: 검색어
        router: handler
        tool: search_youtube
        target_key: query
  limbs:
    actions:
      play:
        description: 유튜브 음악/영상 재생 (검색+재생 복합. 검색만 원하면 search_youtube 사용)
        keywords: [youtube, 유튜브, 음악, 노래, 재생, 틀어줘, play, music, 듣기]
        target_description: 검색어 또는 유튜브 URL
        router: handler
        tool: play_youtube
        target_key: query
      queue_add:
        description: 재생 큐에 곡 추가
        keywords: [큐, 대기열, queue, 추가]
        target_description: 검색어
        router: handler
        tool: add_to_queue
        target_key: query
      skip:
        description: 현재 곡 건너뛰고 다음 곡 재생
        keywords: [스킵, 다음곡, skip, next]
        router: handler
        tool: skip_youtube
      queue:
        description: 현재 재생 큐 상태 조회
        router: handler
        tool: get_queue
      stop:
        description: 재생 중지 및 큐 초기화
        keywords: [정지, 멈춰, stop, 중지]
        router: handler
        tool: stop_youtube
      youtube_download:
        description: 유튜브 동영상 오디오를 MP3로 다운로드
        keywords: [youtube, 유튜브, 다운로드, download, mp3, 음악저장, 노래저장]
        target_description: 유튜브 URL
        router: handler
        tool: download_youtube_music
        target_key: url
