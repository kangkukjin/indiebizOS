<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IndieBiz OS — System X-Ray</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #0a0e17;
  color: #e0e0e0;
  min-height: 100vh;
  overflow-x: hidden;
}

/* Header */
.header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 24px;
  background: linear-gradient(135deg, #0d1321 0%, #1a1a2e 100%);
  border-bottom: 1px solid #1e293b;
}
.header h1 { font-size: 20px; font-weight: 600; color: #94a3b8; letter-spacing: 2px; }
.header h1 span { color: #22d3ee; }
.header-right { display: flex; align-items: center; gap: 16px; }
.overall-badge {
  padding: 6px 16px; border-radius: 20px; font-size: 13px; font-weight: 600;
  text-transform: uppercase; letter-spacing: 1px;
}
.overall-healthy { background: #064e3b; color: #34d399; }
.overall-degraded { background: #7c2d12; color: #fb923c; }
.overall-warning { background: #78350f; color: #fbbf24; }
.overall-unknown { background: #1e293b; color: #94a3b8; }
.mental-badge {
  padding: 6px 16px; border-radius: 20px; font-size: 12px; font-weight: 600;
  letter-spacing: 0.5px;
}
.mental-optimal { background: #064e3b; color: #34d399; }
.mental-good { background: #1e3a5f; color: #60a5fa; }
.mental-poor { background: #7c2d12; color: #fb923c; }
.btn-refresh {
  background: #1e293b; border: 1px solid #334155; color: #94a3b8;
  padding: 6px 14px; border-radius: 8px; cursor: pointer; font-size: 13px;
}
.btn-refresh:hover { background: #334155; color: #e2e8f0; }

/* Main Layout */
.main { display: grid; grid-template-columns: 380px 1fr; gap: 0; min-height: calc(100vh - 60px); }

/* Body Map (Left) */
.body-map-panel {
  padding: 20px;
  border-right: 1px solid #1e293b;
  display: flex; flex-direction: column; align-items: center;
}
.body-map-panel h2 { font-size: 14px; color: #64748b; margin-bottom: 16px; letter-spacing: 1px; }

.body-svg { width: 320px; cursor: pointer; }
.body-map-container {
  position: relative; width: 320px; margin: 0 auto;
}
.body-map-container img {
  width: 100%; height: auto; display: block; opacity: 0.85;
}
.body-map-overlay {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  pointer-events: none;
}
.body-map-overlay .overlay-label {
  position: absolute; pointer-events: auto; cursor: pointer;
  padding: 3px 8px; border-radius: 6px; font-size: 11px; font-weight: 600;
  backdrop-filter: blur(4px); transition: all 0.2s;
  white-space: nowrap;
}
.body-map-overlay .overlay-label:hover {
  transform: scale(1.1); z-index: 5;
}
.overlay-value {
  font-size: 10px; font-weight: 400; opacity: 0.7; margin-left: 4px;
}
.body-svg .organ {
  transition: all 0.3s ease;
  cursor: pointer;
  stroke: rgba(255,255,255,0.1);
  stroke-width: 1;
}
.body-svg .organ:hover {
  filter: brightness(1.4);
  stroke: rgba(255,255,255,0.4);
  stroke-width: 2;
}
.body-svg .organ-label {
  font-size: 11px; fill: #94a3b8; pointer-events: none;
  font-family: -apple-system, sans-serif;
}
.body-svg .organ-value {
  font-size: 10px; fill: #64748b; pointer-events: none;
  font-family: -apple-system, sans-serif;
}

/* Color coding */
.color-healthy { fill: #22c55e; }
.color-warning { fill: #f59e0b; }
.color-danger  { fill: #ef4444; }
.color-inactive { fill: #475569; }

/* Node detail modal */
.node-modal-overlay {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.6); z-index: 1000;
  display: flex; align-items: center; justify-content: center;
}
.node-modal {
  background: #1e293b; border-radius: 12px; padding: 24px;
  max-width: 600px; width: 90%; max-height: 80vh; overflow-y: auto;
  border: 1px solid #334155;
}
.node-modal h3 { margin: 0 0 16px; color: #f1f5f9; font-size: 18px; }
.node-modal .close-btn {
  float: right; background: none; border: none; color: #94a3b8;
  font-size: 20px; cursor: pointer; padding: 0 4px;
}
.node-modal .close-btn:hover { color: #f1f5f9; }
.node-modal .action-group { margin-bottom: 16px; }
.node-modal .action-group-title {
  font-size: 12px; font-weight: 600; margin-bottom: 6px; padding: 4px 8px;
  border-radius: 4px;
}
.node-modal .action-item {
  display: flex; justify-content: space-between; align-items: center;
  padding: 4px 8px; font-size: 12px; border-bottom: 1px solid #1e293b;
}
.node-modal .action-item:hover { background: #334155; border-radius: 4px; }
.status-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; }

/* Legend */
.legend {
  display: flex; gap: 16px; margin-top: 20px; padding: 10px 16px;
  background: #111827; border-radius: 8px;
}
.legend-item { display: flex; align-items: center; gap: 6px; font-size: 11px; color: #94a3b8; }
.legend-dot { width: 8px; height: 8px; border-radius: 50%; }

/* Detail Panel (Right) */
.detail-panel { padding: 20px; overflow-y: auto; }
.detail-panel h2 {
  font-size: 16px; color: #e2e8f0; margin-bottom: 16px;
  padding-bottom: 8px; border-bottom: 1px solid #1e293b;
}

/* Cards */
.card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 12px; margin-bottom: 24px; }
.card {
  background: #111827; border: 1px solid #1e293b; border-radius: 10px;
  padding: 14px; transition: border-color 0.2s;
}
.card:hover { border-color: #334155; }
.card-title { font-size: 11px; color: #64748b; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
.card-value { font-size: 24px; font-weight: 700; }
.card-sub { font-size: 11px; color: #64748b; margin-top: 4px; }

/* Section */
.section { margin-bottom: 28px; }
.section-title {
  font-size: 13px; color: #94a3b8; text-transform: uppercase; letter-spacing: 1px;
  margin-bottom: 12px; display: flex; align-items: center; gap: 8px;
}
.section-title::after { content: ''; flex: 1; height: 1px; background: #1e293b; }

/* Node bars */
.node-bar-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
.node-bar-label { width: 70px; font-size: 12px; color: #94a3b8; text-align: right; }
.node-bar-track { flex: 1; height: 22px; background: #1e293b; border-radius: 4px; position: relative; overflow: hidden; }
.node-bar-fill { height: 100%; border-radius: 4px; transition: width 0.6s ease; display: flex; align-items: center; padding-left: 8px; font-size: 10px; color: #fff; font-weight: 600; min-width: fit-content; }
.node-bar-stats { width: 120px; font-size: 11px; color: #64748b; }

/* Table */
.xray-table { width: 100%; border-collapse: collapse; font-size: 12px; }
.xray-table th { text-align: left; padding: 8px 10px; color: #64748b; border-bottom: 1px solid #1e293b; font-weight: 500; }
.xray-table td { padding: 8px 10px; border-bottom: 1px solid #0f172a; }
.xray-table tr:hover td { background: #111827; }

/* Self-Check Timeline */
.timeline { display: flex; flex-wrap: wrap; gap: 4px; }
.timeline-dot {
  width: 14px; height: 14px; border-radius: 3px; cursor: pointer;
  transition: transform 0.15s;
}
.timeline-dot:hover { transform: scale(1.6); z-index: 2; }
.timeline-tooltip {
  position: fixed; background: #1e293b; border: 1px solid #334155;
  border-radius: 8px; padding: 10px 14px; font-size: 12px; color: #e2e8f0;
  pointer-events: none; z-index: 100; max-width: 280px;
}

/* Project bar */
.proj-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
.proj-name { width: 80px; font-size: 12px; color: #94a3b8; text-align: right; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.proj-bar { flex: 1; height: 16px; background: #1e293b; border-radius: 3px; overflow: hidden; }
.proj-bar-fill { height: 100%; background: #3b82f6; border-radius: 3px; transition: width 0.6s; display: flex; align-items: center; padding-left: 6px; font-size: 9px; color: #fff; }
.proj-count { width: 50px; font-size: 11px; color: #64748b; }

/* Loading */
.loading {
  display: flex; align-items: center; justify-content: center;
  height: 100vh; font-size: 16px; color: #64748b;
}
.loading-spinner {
  width: 24px; height: 24px; border: 2px solid #334155; border-top-color: #22d3ee;
  border-radius: 50%; animation: spin 0.8s linear infinite; margin-right: 12px;
}
@keyframes spin { to { transform: rotate(360deg); } }
@keyframes pulse-glow {
  0%, 100% { opacity: 0.6; }
  50% { opacity: 1; }
}
.pulse-indicator { animation: pulse-glow 2s ease-in-out infinite; }

/* Live Feed */
.live-feed {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 50;
  background: linear-gradient(180deg, transparent 0%, #0a0e17 20%);
  padding: 8px 24px 12px;
}
.live-feed-inner {
  background: #111827; border: 1px solid #1e293b; border-radius: 8px;
  padding: 8px 12px; max-height: 120px; overflow-y: auto;
}
.live-item {
  display: flex; align-items: center; gap: 8px; padding: 3px 0;
  font-size: 11px; color: #94a3b8; animation: fadeIn 0.3s ease;
}
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
.live-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
.live-time { color: #475569; font-family: monospace; font-size: 10px; flex-shrink: 0; }
.live-node { color: #22d3ee; font-weight: 600; }
.live-action { color: #e2e8f0; }
.live-ms { color: #64748b; }
.live-ok { color: #34d399; }
.live-err { color: #fca5a5; }
.live-task { color: #a78bfa; font-weight: 600; }

/* Tabs */
.tab-bar {
  display: flex; gap: 0; background: #0d1321; border-bottom: 1px solid #1e293b;
  padding: 0 24px;
}
.tab-btn {
  padding: 10px 20px; font-size: 13px; color: #64748b; background: none;
  border: none; border-bottom: 2px solid transparent; cursor: pointer;
  transition: all 0.2s; letter-spacing: 0.5px;
}
.tab-btn:hover { color: #94a3b8; }
.tab-btn.active { color: #22d3ee; border-bottom-color: #22d3ee; }
.tab-content { display: none; }
.tab-content.active { display: block; }

/* Goal Timeline */
.goal-filters {
  display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap;
}
.filter-chip {
  padding: 5px 12px; border-radius: 14px; font-size: 11px; cursor: pointer;
  background: #1e293b; color: #94a3b8; border: 1px solid #334155;
  transition: all 0.2s;
}
.filter-chip:hover { border-color: #22d3ee; color: #e2e8f0; }
.filter-chip.active { background: #164e63; border-color: #22d3ee; color: #22d3ee; }

.goal-timeline-container { padding: 20px; }

.goal-item {
  background: #111827; border: 1px solid #1e293b; border-radius: 10px;
  padding: 16px; margin-bottom: 12px; transition: border-color 0.2s;
}
.goal-item:hover { border-color: #334155; }
.goal-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 10px; flex-wrap: wrap; gap: 8px;
}
.goal-name { font-size: 14px; font-weight: 600; color: #e2e8f0; }
.goal-project {
  font-size: 11px; padding: 2px 8px; border-radius: 10px;
  background: #1e293b; color: #94a3b8;
}
.goal-meta {
  display: flex; gap: 16px; font-size: 11px; color: #64748b; margin-bottom: 12px;
  flex-wrap: wrap;
}
.goal-meta span { display: flex; align-items: center; gap: 4px; }

/* Status badges */
.status-badge {
  display: inline-block; padding: 2px 10px; border-radius: 10px;
  font-size: 11px; font-weight: 600;
}
.status-completed { background: #064e3b; color: #34d399; }
.status-running { background: #172554; color: #60a5fa; }
.status-failed, .status-exhausted { background: #7f1d1d; color: #fca5a5; }
.status-pending { background: #1e293b; color: #94a3b8; }

/* Round track */
.round-track {
  position: relative; display: flex; align-items: center; gap: 0;
  padding: 8px 0; margin-top: 4px;
}
.round-connector {
  flex: 1; height: 2px; background: #334155; min-width: 20px;
}
.round-connector.success { background: #22c55e; }
.round-connector.failure { background: #ef4444; }
.round-connector.partial { background: #f59e0b; }

.round-node {
  width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center;
  justify-content: center; font-size: 11px; font-weight: 700; color: #fff;
  cursor: pointer; position: relative; flex-shrink: 0;
  transition: transform 0.15s, box-shadow 0.15s;
}
.round-node:hover {
  transform: scale(1.2);
  box-shadow: 0 0 12px rgba(34, 211, 238, 0.3);
}
.round-node.success { background: #16a34a; }
.round-node.failure { background: #dc2626; }
.round-node.partial { background: #d97706; }
.round-node.pending { background: #475569; }

.round-detail {
  position: absolute; bottom: calc(100% + 8px); left: 50%; transform: translateX(-50%);
  background: #1e293b; border: 1px solid #334155; border-radius: 8px;
  padding: 10px 14px; font-size: 11px; color: #e2e8f0; white-space: nowrap;
  pointer-events: none; z-index: 10; display: none; min-width: 200px;
  max-width: 350px; white-space: normal;
}
.round-node:hover .round-detail { display: block; }
.round-detail-label { color: #64748b; font-size: 10px; margin-bottom: 2px; }
.round-detail-value { color: #e2e8f0; margin-bottom: 6px; }

/* Start/End markers */
.round-start {
  width: 12px; height: 12px; border-radius: 50%; background: #3b82f6;
  flex-shrink: 0;
}
.round-end {
  width: 16px; height: 16px; border-radius: 50%; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center; font-size: 10px;
}
.round-end.completed { background: #16a34a; color: #fff; }
.round-end.exhausted { background: #dc2626; color: #fff; }
.round-end.running { background: #3b82f6; color: #fff; animation: pulse-glow 1.5s infinite; }

/* Stats summary */
.goal-stats-bar {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
  gap: 10px; margin-bottom: 20px;
}
.goal-stat-card {
  background: #111827; border: 1px solid #1e293b; border-radius: 8px;
  padding: 12px; text-align: center;
}
.goal-stat-value { font-size: 22px; font-weight: 700; }
.goal-stat-label { font-size: 10px; color: #64748b; margin-top: 2px; text-transform: uppercase; letter-spacing: 0.5px; }

/* Tools Tab */
.tools-container { padding: 24px; }
.tools-section { margin-bottom: 32px; }
.tools-section-title {
  font-size: 14px; font-weight: 600; color: #94a3b8; margin-bottom: 16px;
  text-transform: uppercase; letter-spacing: 1px;
  display: flex; align-items: center; gap: 10px;
}
.parity-badge {
  font-size: 11px; padding: 2px 10px; border-radius: 10px; font-weight: 500;
}
.parity-ok { background: rgba(6,78,59,0.6); color: #34d399; border: 1px solid rgba(34,197,94,0.3); }
.parity-fail { background: rgba(127,29,29,0.6); color: #fca5a5; border: 1px solid rgba(239,68,68,0.3); }
.tool-columns {
  display: grid; grid-template-columns: 1fr 1fr; gap: 20px;
}
.tool-column h4 {
  font-size: 12px; color: #64748b; margin: 0 0 10px; text-transform: uppercase; letter-spacing: 0.5px;
}
.tool-list { display: flex; flex-wrap: wrap; gap: 6px; }
.tool-chip {
  font-size: 12px; padding: 4px 12px; border-radius: 6px;
  background: #1e293b; color: #e2e8f0; border: 1px solid #334155;
}
.node-matrix { width: 100%; border-collapse: collapse; font-size: 12px; }
.node-matrix th {
  text-align: center; padding: 8px 6px; color: #64748b; font-weight: 500;
  border-bottom: 1px solid #1e293b; font-size: 11px; text-transform: uppercase;
}
.node-matrix th:first-child, .node-matrix th:nth-child(2) { text-align: left; }
.node-matrix td {
  padding: 6px; text-align: center; border-bottom: 1px solid rgba(30,41,59,0.5);
}
.node-matrix td:first-child { text-align: left; color: #94a3b8; font-weight: 500; }
.node-matrix td:nth-child(2) { text-align: left; color: #e2e8f0; }
.node-dot {
  display: inline-block; width: 10px; height: 10px; border-radius: 50%;
}
.node-dot.allowed { background: #22c55e; box-shadow: 0 0 4px rgba(34,197,94,0.4); }
.node-dot.denied { background: #334155; }
.agent-status {
  font-size: 10px; padding: 2px 8px; border-radius: 8px;
}
.agent-running { background: rgba(6,78,59,0.5); color: #34d399; }
.agent-stopped { background: rgba(51,65,85,0.5); color: #64748b; }
.agent-inactive { background: rgba(127,29,29,0.4); color: #fca5a5; }

/* System Dashboard Tab */
.dash-container { padding: 24px; }
.dash-stats {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
  gap: 10px; margin-bottom: 28px;
}
.dash-stat {
  background: #111827; border: 1px solid #1e293b; border-radius: 8px;
  padding: 14px 10px; text-align: center;
}
.dash-stat-val { font-size: 26px; font-weight: 700; color: #22d3ee; }
.dash-stat-lbl { font-size: 10px; color: #64748b; margin-top: 3px; text-transform: uppercase; letter-spacing: 0.5px; }
.dash-section-title {
  font-size: 13px; font-weight: 600; color: #94a3b8; margin: 24px 0 12px;
  text-transform: uppercase; letter-spacing: 1px;
}
.body-metaphor {
  display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 28px;
}
.metaphor-card {
  background: #111827; border: 1px solid #1e293b; border-radius: 8px; padding: 12px;
  display: flex; flex-direction: column; gap: 4px;
}
.metaphor-bio { font-size: 11px; color: #64748b; }
.metaphor-impl { font-size: 13px; color: #e2e8f0; font-weight: 500; }
.metaphor-role { font-size: 11px; color: #475569; }
.action-bars { margin-bottom: 28px; }
.action-bar-row {
  display: flex; align-items: center; gap: 10px; margin-bottom: 6px;
}
.action-bar-label { width: 70px; font-size: 12px; color: #94a3b8; text-align: right; }
.action-bar-track { flex: 1; height: 20px; background: #1e293b; border-radius: 4px; overflow: hidden; position: relative; }
.action-bar-fill { height: 100%; border-radius: 4px; display: flex; align-items: center; padding-left: 8px; font-size: 11px; color: #fff; font-weight: 500; }
.action-bar-count { width: 40px; font-size: 12px; color: #64748b; }
.pkg-grid {
  display: grid; grid-template-columns: 1fr 1fr; gap: 20px;
}
.pkg-col h4 { font-size: 12px; color: #64748b; margin: 0 0 8px; text-transform: uppercase; }
.pkg-chips { display: flex; flex-wrap: wrap; gap: 4px; }
.pkg-chip {
  font-size: 11px; padding: 3px 8px; border-radius: 4px;
  background: #1e293b; color: #cbd5e1; border: 1px solid #334155;
}

/* Docs Tab */
.docs-layout { display: grid; grid-template-columns: 220px 1fr; height: calc(100vh - 140px); }
.docs-sidebar {
  border-right: 1px solid #1e293b; overflow-y: auto; padding: 12px 0;
}
.doc-item {
  padding: 8px 16px; cursor: pointer; font-size: 12px; color: #94a3b8;
  border-left: 2px solid transparent; transition: all 0.15s;
}
.doc-item:hover { background: rgba(30,41,59,0.5); color: #e2e8f0; }
.doc-item.active { border-left-color: #22d3ee; color: #22d3ee; background: rgba(34,211,238,0.05); }
.doc-item-name { font-weight: 500; }
.doc-item-meta { font-size: 10px; color: #475569; margin-top: 2px; }
.docs-body { overflow-y: auto; padding: 24px; }
.doc-section { margin-bottom: 8px; }
.doc-section-header {
  display: flex; align-items: center; gap: 6px; cursor: pointer;
  padding: 6px 10px; border-radius: 6px; transition: background 0.15s;
}
.doc-section-header:hover { background: rgba(30,41,59,0.5); }
.doc-section-header h2, .doc-section-header h3 {
  margin: 0; font-size: 14px; color: #e2e8f0;
}
.doc-section-header h3 { font-size: 13px; color: #94a3b8; }
.doc-section-arrow { font-size: 10px; color: #475569; transition: transform 0.2s; }
.doc-section-arrow.open { transform: rotate(90deg); }
.doc-section-body { padding: 8px 10px 8px 26px; }
.doc-text { font-size: 12px; color: #cbd5e1; line-height: 1.7; white-space: pre-wrap; }
.doc-table {
  width: 100%; border-collapse: collapse; font-size: 11px; margin: 8px 0;
}
.doc-table th {
  text-align: left; padding: 6px 8px; background: #111827;
  color: #94a3b8; border-bottom: 1px solid #1e293b; font-weight: 500;
}
.doc-table td {
  padding: 5px 8px; border-bottom: 1px solid rgba(30,41,59,0.5); color: #cbd5e1;
}
.doc-table tr:hover td { background: rgba(30,41,59,0.3); }
.doc-code {
  background: #0d1117; border: 1px solid #1e293b; border-radius: 6px;
  padding: 12px; margin: 8px 0; font-family: 'SF Mono', monospace;
  font-size: 11px; color: #8b949e; overflow-x: auto; white-space: pre; line-height: 1.5;
}
.doc-code-lang {
  font-size: 9px; color: #475569; text-transform: uppercase; margin-bottom: 4px;
}

/* Responsive */
@media (max-width: 768px) {
  .main { grid-template-columns: 1fr; }
  .body-map-panel { border-right: none; border-bottom: 1px solid #1e293b; }
}
</style>
</head>
<body>

<div id="app">
  <div class="loading">
    <div class="loading-spinner"></div>
    시스템 스캔 중...
  </div>
</div>

<script>
const API_BASE = window.location.origin;
let DATA = null;
let tooltip = null;

let GOALS = null;
let TOOLS = null;
let DOCS = null;
let currentTab = 'bodymap';
let goalFilter = 'all';

async function fetchData() {
  try {
    const res = await fetch(API_BASE + '/xray/data');
    DATA = await res.json();
    render();
  } catch(e) {
    document.getElementById('app').innerHTML =
      '<div class="loading" style="color:#ef4444">데이터 로드 실패: ' + e.message + '</div>';
  }
}

async function fetchGoals() {
  try {
    const res = await fetch(API_BASE + '/xray/goals');
    GOALS = await res.json();
    renderGoalTimeline();
  } catch(e) {
    document.getElementById('goal-timeline').innerHTML =
      '<div style="padding:40px;color:#ef4444;">Goal 데이터 로드 실패: ' + e.message + '</div>';
  }
}

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
  document.querySelectorAll('.tab-content').forEach(c => c.classList.toggle('active', c.id === 'tab-' + tab));
  if (tab === 'goals' && !GOALS) fetchGoals();
  if (tab === 'tools' && !TOOLS) fetchTools();
  if (tab === 'dashboard') {
    if (!TOOLS) fetchTools().then(() => renderSystemDashboard());
    else renderSystemDashboard();
  }
  if (tab === 'docs' && !DOCS) fetchDocs();
}

async function fetchDocs() {
  try {
    const res = await fetch(API_BASE + '/xray/docs');
    DOCS = await res.json();
    renderDocs(0);
  } catch(e) {
    document.getElementById('docs-panel').innerHTML =
      '<div style="padding:40px;color:#ef4444;">문서 데이터 로드 실패: ' + e.message + '</div>';
  }
}

async function fetchTools() {
  try {
    const res = await fetch(API_BASE + '/xray/tools');
    TOOLS = await res.json();
    renderTools();
  } catch(e) {
    document.getElementById('tools-panel').innerHTML =
      '<div style="padding:40px;color:#ef4444;">도구 데이터 로드 실패: ' + e.message + '</div>';
  }
}

function healthColor(rate) {
  if (rate >= 90) return '#22c55e';
  if (rate >= 70) return '#f59e0b';
  return '#ef4444';
}
function healthClass(rate) {
  if (rate >= 90) return 'color-healthy';
  if (rate >= 70) return 'color-warning';
  return 'color-danger';
}
function overallClass(s) {
  return 'overall-' + (s || 'unknown');
}

function render() {
  const d = DATA;
  const sh = d.system_health || {};
  const ibl = d.ibl || {};
  const projects = d.projects || [];
  const pkg = d.packages || {};
  const cog = d.cognitive || {};
  const checks = d.self_checks || [];
  const prop = ibl.proprioception || {};

  // IBL 노드 건강도 매핑 (3단계: verified/assumed/failed)
  const nodes = ibl.by_node || {};
  const nodeKeys = ['sense', 'self', 'limbs', 'others', 'engines'];
  const nodeLabels = { sense: '감각 (Sense)', self: '자아 (Self)', limbs: '팔다리 (Limbs)', others: '타자 (Others)', engines: '엔진 (Engines)' };
  const nodeHealth = {};
  nodeKeys.forEach(k => {
    const n = nodes[k];
    if (!n) { nodeHealth[k] = 'assumed'; return; }
    const v = n.verified || 0;
    const a = n.assumed || 0;
    const f = n.failed || 0;
    const total = v + a + f || 1;
    // 비정상 비율이 30% 이상이면 failed, verified가 과반이면 verified, 아니면 assumed
    if (f / total >= 0.3) nodeHealth[k] = 'failed';
    else if (v > 0 && v >= f) nodeHealth[k] = 'verified';
    else if (v === 0 && f === 0) nodeHealth[k] = 'assumed';
    else nodeHealth[k] = 'verified';
  });

  // 전체 성공률
  const overallRate = ibl.success_rate || 0;
  const selfCheckRate = sh.self_check_avg_success_rate || 0;

  document.getElementById('app').innerHTML = `
    <div class="header">
      <h1><span>X-RAY</span> &nbsp;IndieBiz OS</h1>
      <div class="header-right">
        <span class="overall-badge ${overallClass(sh.overall)}">${sh.overall || 'unknown'}</span>
        ${(() => {
          const mh = d.mental_health || {};
          const ms = mh.status || 'good';
          const label = ms === 'optimal' ? '최적' : ms === 'good' ? '양호' : '불량';
          return `<span class="mental-badge mental-${ms}">인지: ${label}</span>`;
        })()}
        <span id="ws-status" style="font-size:11px;color:#64748b;">&#9679; 연결 중...</span>
        <button class="btn-refresh" onclick="location.reload()">새로고침</button>
      </div>
    </div>

    <div class="tab-bar">
      <button class="tab-btn active" data-tab="bodymap" onclick="switchTab('bodymap')">Body Map</button>
      <button class="tab-btn" data-tab="goals" onclick="switchTab('goals')">Task Timeline</button>
      <button class="tab-btn" data-tab="tools" onclick="switchTab('tools')">도구 현황</button>
      <button class="tab-btn" data-tab="dashboard" onclick="switchTab('dashboard')">시스템 개요</button>
      <button class="tab-btn" data-tab="docs" onclick="switchTab('docs')">시스템 문서</button>
    </div>

    <div id="tab-bodymap" class="tab-content active">
    <div class="main">
      <!-- Body Map -->
      <div class="body-map-panel">
        <h2>BODY MAP</h2>
        ${renderBodyMap(nodeHealth, sh, cog, nodes)}
        <div class="legend">
          <div class="legend-item"><div class="legend-dot" style="background:#22c55e"></div>정상 — 7일 이내 성공 확인</div>
          <div class="legend-item"><div class="legend-dot" style="background:#94a3b8"></div>미확인 — 7일간 사용/테스트 기록 없음</div>
          <div class="legend-item"><div class="legend-dot" style="background:#ef4444"></div>비정상 — 최근 실행 실패</div>
        </div>
      </div>

      <!-- Detail Panel -->
      <div class="detail-panel">
        <!-- 요약 카드 -->
        <div class="card-grid">
          <div class="card">
            <div class="card-title">Self-Check</div>
            <div class="card-value" style="color:${healthColor(selfCheckRate)}">${selfCheckRate}%</div>
            <div class="card-sub">${ibl.total_checks || 0}회 점검 (누적)</div>
          </div>
          <div class="card">
            <div class="card-title">메모리</div>
            <div class="card-value" style="color:${(prop.memory_mb||0) > 1000 ? '#f59e0b' : '#22c55e'}">${prop.memory_mb ? prop.memory_mb + ' MB' : 'N/A'}</div>
            <div class="card-sub">스레드 ${prop.threads || '-'} · CPU ${prop.cpu_percent || 0}%</div>
          </div>
          <div class="card">
            <div class="card-title">디스크 여유</div>
            <div class="card-value" style="color:${(sh.disk_free_gb||0) < 10 ? '#ef4444' : '#22c55e'}">${sh.disk_free_gb != null ? sh.disk_free_gb + ' GB' : 'N/A'}</div>
            <div class="card-sub">시스템 스토리지</div>
          </div>
          <div class="card">
            <div class="card-title">패키지</div>
            <div class="card-value" style="color:#3b82f6">${pkg.total || 0}</div>
            <div class="card-sub">도구 패키지 ${pkg.tool_count || 0}개</div>
          </div>
        </div>

        <!-- IBL 노드별 -->
        <div class="section">
          <div class="section-title">IBL 노드 건강도</div>
          ${nodeKeys.map(k => {
            const n = nodes[k] || {};
            const cnt = n.count || 0;
            const avgMs = n.avg_ms || 0;
            const v = n.verified || 0;
            const a = n.assumed || 0;
            const f = n.failed || 0;
            const total = v + a + f || 1;
            const vPct = v / total * 100;
            const aPct = a / total * 100;
            const fPct = f / total * 100;
            return `<div class="node-bar-row">
              <div class="node-bar-label">${nodeLabels[k] || k}</div>
              <div class="node-bar-track" style="display:flex;overflow:hidden;">
                ${v > 0 ? `<div style="width:${vPct}%;background:#22c55e;height:100%;display:flex;align-items:center;justify-content:center;font-size:10px;color:#fff;">${v}</div>` : ''}
                ${a > 0 ? `<div style="width:${aPct}%;background:#94a3b8;height:100%;display:flex;align-items:center;justify-content:center;font-size:10px;color:#fff;">${a}</div>` : ''}
                ${f > 0 ? `<div style="width:${fPct}%;background:#ef4444;height:100%;display:flex;align-items:center;justify-content:center;font-size:10px;color:#fff;">${f}</div>` : ''}
              </div>
              <div class="node-bar-stats">${cnt}개 · ${avgMs}ms</div>
            </div>`;
          }).join('')}
        </div>

        <!-- 병목 / 문제 액션 -->
        ${(ibl.slow_actions && ibl.slow_actions.length > 0) || (ibl.failing_actions && ibl.failing_actions.length > 0) ? `
        <div class="section">
          <div class="section-title">병목 및 문제 액션</div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
            ${ibl.slow_actions && ibl.slow_actions.length > 0 ? `
            <div>
              <div style="font-size:11px;color:#f59e0b;margin-bottom:8px;">느린 액션 (평균 응답시간)</div>
              <table class="xray-table">
                <tr><th>노드:액션</th><th>ms</th><th>횟수</th></tr>
                ${ibl.slow_actions.map(a => `<tr><td>${a.node}:${a.action}</td><td style="color:#f59e0b">${a.avg_ms}</td><td>${a.count}</td></tr>`).join('')}
              </table>
            </div>` : ''}
            ${ibl.failing_actions && ibl.failing_actions.length > 0 ? `
            <div>
              <div style="font-size:11px;color:#ef4444;margin-bottom:8px;">실패율 높은 액션</div>
              <table class="xray-table">
                <tr><th>노드:액션</th><th>실패율</th><th>횟수</th></tr>
                ${ibl.failing_actions.map(a => `<tr><td>${a.node}:${a.action}</td><td style="color:#ef4444">${a.fail_rate}%</td><td>${a.count}</td></tr>`).join('')}
              </table>
            </div>` : ''}
          </div>
        </div>` : ''}

        <!-- 프로젝트 활동 -->
        <div class="section">
          <div class="section-title">프로젝트 활동량</div>
          ${projects.length > 0 ? (() => {
            const maxMsg = Math.max(...projects.map(p => p.message_count || 1));
            return projects.slice(0, 15).map(p => {
              const barW = p.message_count > 0 ? Math.max(p.message_count / maxMsg * 100, 4) : 0;
              return `<div class="proj-row">
                <div class="proj-name" title="${p.name}">${p.name}</div>
                <div class="proj-bar">
                  <div class="proj-bar-fill" style="width:${barW}%">${p.message_count > 10 ? p.message_count : ''}</div>
                </div>
                <div class="proj-count">${p.message_count}건</div>
              </div>`;
            }).join('');
          })() : '<div style="color:#64748b;font-size:12px;">프로젝트 데이터 없음</div>'}
        </div>

        <!-- Self-Check 타임라인 -->
        <div class="section">
          <div class="section-title">Self-Check 타임라인 (최근)</div>
          <div class="timeline" id="timeline">
            ${checks.map((c, i) => {
              const bg = c.success ? '#22c55e' : '#ef4444';
              const ts = c.timestamp || '';
              return `<div class="timeline-dot" style="background:${bg}"
                data-info="${c.node}:${c.action} — ${c.success ? '성공' : '실패'}${c.response_ms ? ' (' + c.response_ms + 'ms)' : ''} — ${ts.slice(5, 16)}"
                onmouseenter="showTip(event)" onmouseleave="hideTip()"></div>`;
            }).join('')}
          </div>
          ${checks.length === 0 ? '<div style="color:#64748b;font-size:12px;margin-top:8px;">Self-Check 데이터 없음</div>' : ''}
        </div>

        <!-- 서비스 상태 -->
        ${sh.services ? `
        <div class="section">
          <div class="section-title">서비스 상태</div>
          <div style="display:flex;flex-wrap:wrap;gap:8px;">
            ${Object.entries(sh.services).map(([name, alive]) =>
              `<div style="padding:6px 12px;border-radius:6px;font-size:12px;background:${alive ? '#064e3b' : '#7f1d1d'};color:${alive ? '#34d399' : '#fca5a5'}">${name}</div>`
            ).join('')}
          </div>
        </div>` : ''}

        <div style="text-align:center;padding:20px;color:#334155;font-size:11px;">
          스캔 시각: ${d.timestamp ? d.timestamp.slice(0, 19).replace('T', ' ') : '-'}
        </div>
      </div>
    </div>
    </div><!-- /tab-bodymap -->

    <div id="tab-goals" class="tab-content">
      <div id="goal-timeline" class="goal-timeline-container">
        <div class="loading"><div class="loading-spinner"></div>Goal 데이터 로딩 중...</div>
      </div>
    </div>

    <div id="tab-tools" class="tab-content">
      <div id="tools-panel" class="tools-container">
        <div class="loading"><div class="loading-spinner"></div>도구 데이터 로딩 중...</div>
      </div>
    </div>

    <div id="tab-dashboard" class="tab-content">
      <div id="dashboard-panel" class="dash-container">
        <div class="loading"><div class="loading-spinner"></div>시스템 데이터 로딩 중...</div>
      </div>
    </div>

    <div id="tab-docs" class="tab-content">
      <div id="docs-panel" class="docs-layout">
        <div class="loading" style="grid-column:1/-1;"><div class="loading-spinner"></div>문서 로딩 중...</div>
      </div>
    </div>
  `;
}

function renderTools() {
  if (!TOOLS) return;
  const panel = document.getElementById('tools-panel');
  const { system_ai_tools, agent_tools, tool_parity, ibl_nodes, total_ibl_actions, all_node_names, projects } = TOOLS;

  const parityClass = tool_parity ? 'parity-ok' : 'parity-fail';
  const parityText = tool_parity ? 'Parity OK' : 'Mismatch';

  const chipList = (tools) => tools.map(t =>
    `<span class="tool-chip" title="${(t.description||'').replace(/"/g,'&quot;')}">${t.name}</span>`
  ).join('');

  // 노드 매트릭스
  const nodeHeaders = all_node_names.map(n => {
    const count = ibl_nodes[n] ? ibl_nodes[n].action_count : 0;
    return `<th>${n}<br><span style="font-size:10px;color:#475569;">${count}</span></th>`;
  }).join('');

  let matrixRows = '';
  for (const proj of projects) {
    for (let i = 0; i < proj.agents.length; i++) {
      const agent = proj.agents[i];
      if (!agent.active) continue;
      const projLabel = i === 0 ? proj.id : '';
      const allowedSet = new Set(agent.allowed_nodes || []);
      const dots = all_node_names.map(n =>
        `<td><span class="node-dot ${allowedSet.has(n) ? 'allowed' : 'denied'}"></span></td>`
      ).join('');
      const statusClass = agent.running ? 'agent-running' : 'agent-stopped';
      const statusText = agent.running ? '실행중' : '대기';
      matrixRows += `<tr>
        <td>${projLabel}</td>
        <td>${agent.name}</td>
        ${dots}
        <td><span class="agent-status ${statusClass}">${statusText}</span></td>
      </tr>`;
    }
  }

  panel.innerHTML = `
    <div class="tools-section">
      <div class="tools-section-title">
        최상위 도구 (LLM Tools)
        <span class="parity-badge ${parityClass}">${parityText} — ${system_ai_tools.length}개</span>
      </div>
      <div class="tool-columns">
        <div class="tool-column">
          <h4>시스템 AI</h4>
          <div class="tool-list">${chipList(system_ai_tools)}</div>
        </div>
        <div class="tool-column">
          <h4>프로젝트 에이전트</h4>
          <div class="tool-list">${chipList(agent_tools)}</div>
        </div>
      </div>
    </div>

    <div class="tools-section">
      <div class="tools-section-title">
        프로젝트별 에이전트 노드 접근
        <span style="font-size:11px;color:#475569;">총 ${total_ibl_actions} 액션</span>
      </div>
      <table class="node-matrix">
        <thead><tr>
          <th>프로젝트</th><th>에이전트</th>
          ${nodeHeaders}
          <th>상태</th>
        </tr></thead>
        <tbody>${matrixRows || '<tr><td colspan="8" style="padding:20px;color:#475569;text-align:center;">에이전트 없음</td></tr>'}</tbody>
      </table>
    </div>
  `;
}

function renderSystemDashboard() {
  const panel = document.getElementById('dashboard-panel');
  if (!panel) return;

  // 데이터 수집
  const pkgs = DATA ? DATA.packages || {} : {};
  const toolCount = pkgs.tool_count || 0;
  const nodes = TOOLS ? TOOLS.ibl_nodes || {} : {};
  const totalActions = TOOLS ? TOOLS.total_ibl_actions || 0 : 0;
  const nodeNames = TOOLS ? TOOLS.all_node_names || [] : [];
  const projects = TOOLS ? TOOLS.projects || [] : [];
  const projCount = projects.length;
  const agentCount = projects.reduce((s, p) => s + p.agents.length, 0);

  // 신체 메타포 데이터
  const metaphors = [
    { bio: '신경계', impl: 'IBL', role: '감각/행동의 상시 연결', color: '#22d3ee' },
    { bio: '감각기관 전처리', impl: '감각 전처리 (postprocess)', role: '원시 정보를 압축하여 뇌에 전달', color: '#818cf8' },
    { bio: '선택적 주의력', impl: '의식 에이전트', role: '매 턴 메타 판단', color: '#f472b6' },
    { bio: '반사 신경', impl: '무의식 에이전트', role: 'EXECUTE/THINK 분류', color: '#34d399' },
    { bio: '자기 교정', impl: '평가 에이전트', role: '달성 기준 대비 평가', color: '#fbbf24' },
    { bio: '자의식/각성', impl: 'World Pulse', role: '매시간 상태 수집', color: '#fb923c' },
    { bio: '면역계', impl: 'Self-Check', role: '매 6시간 자가 점검', color: '#ef4444' },
    { bio: '자율신경계', impl: '스케줄러 · 이벤트', role: '의식 없이 돌아가는 리듬', color: '#a78bfa' },
    { bio: '해마', impl: '실행기억 (RAG)', role: '과거 경험 자동 인출', color: '#2dd4bf' },
  ];

  // 노드 바 색상
  const nodeColors = { sense: '#22d3ee', self: '#34d399', limbs: '#f472b6', others: '#fbbf24', engines: '#818cf8' };
  const maxActions = Math.max(...nodeNames.map(n => nodes[n] ? nodes[n].action_count : 0), 1);

  const actionBars = nodeNames.map(n => {
    const count = nodes[n] ? nodes[n].action_count : 0;
    const pct = (count / maxActions * 100).toFixed(0);
    const color = nodeColors[n] || '#64748b';
    return `<div class="action-bar-row">
      <div class="action-bar-label">${n}</div>
      <div class="action-bar-track"><div class="action-bar-fill" style="width:${pct}%;background:${color};">${count}</div></div>
    </div>`;
  }).join('');

  // 패키지 목록
  const toolPkgs = (pkgs.tools || []).map(p => `<span class="pkg-chip">${p}</span>`).join('');

  panel.innerHTML = `
    <div class="dash-stats">
      <div class="dash-stat"><div class="dash-stat-val">${projCount}</div><div class="dash-stat-lbl">프로젝트</div></div>
      <div class="dash-stat"><div class="dash-stat-val">${agentCount}</div><div class="dash-stat-lbl">에이전트</div></div>
      <div class="dash-stat"><div class="dash-stat-val">${toolCount}</div><div class="dash-stat-lbl">패키지</div></div>
      <div class="dash-stat"><div class="dash-stat-val">${nodeNames.length}</div><div class="dash-stat-lbl">IBL 노드</div></div>
      <div class="dash-stat"><div class="dash-stat-val">${totalActions}</div><div class="dash-stat-lbl">IBL 액션</div></div>
      <div class="dash-stat"><div class="dash-stat-val">4</div><div class="dash-stat-lbl">AI 프로바이더</div></div>
    </div>

    <div class="dash-section-title">신체 구조 (생명체 메타포)</div>
    <div class="body-metaphor">
      ${metaphors.map(m => `<div class="metaphor-card">
        <div class="metaphor-bio" style="color:${m.color};">▎${m.bio}</div>
        <div class="metaphor-impl">${m.impl}</div>
        <div class="metaphor-role">${m.role}</div>

function renderDocs(selectedIdx) {
  if (!DOCS || !DOCS.files) return;
  const panel = document.getElementById('docs-panel');
  const files = DOCS.files;
  if (!files.length) { panel.innerHTML = '<div style="padding:40px;color:#475569;">문서 없음</div>'; return; }

  const idx = selectedIdx || 0;
  const file = files[idx];

  // 사이드바
  const sidebar = files.map((f, i) => {
    const mod = f.modified ? new Date(f.modified).toLocaleDateString('ko-KR') : '';
    return `<div class="doc-item ${i === idx ? 'active' : ''}" onclick="renderDocs(${i})">
      <div class="doc-item-name">${f.name}</div>
      <div class="doc-item-meta">${mod} · ${f.size_lines || 0}줄</div>
    </div>`;
  }).join('');

  // 본문 렌더링
  function renderSection(sec, i) {
    const tag = sec.level <= 2 ? 'h2' : 'h3';
    let body = '';

    // 텍스트
    const text = (sec.content || '').trim();
    if (text) body += `<div class="doc-text">${escHtml(text)}</div>`;

    // 테이블
    for (const tbl of (sec.tables || [])) {
      const ths = (tbl.headers || []).map(h => `<th>${escHtml(h)}</th>`).join('');
      const trs = (tbl.rows || []).map(r =>
        '<tr>' + r.map(c => `<td>${escHtml(c)}</td>`).join('') + '</tr>'
      ).join('');
      body += `<table class="doc-table"><thead><tr>${ths}</tr></thead><tbody>${trs}</tbody></table>`;
    }

    // 코드 블록
    for (const cb of (sec.code_blocks || [])) {
      const lang = cb.lang ? `<div class="doc-code-lang">${escHtml(cb.lang)}</div>` : '';
      body += `${lang}<pre class="doc-code">${escHtml(cb.content)}</pre>`;
    }

    if (!body) return '';
    return `<div class="doc-section">
      <div class="doc-section-header" onclick="toggleDocSection(this)">
        <span class="doc-section-arrow open">▶</span>
        <${tag}>${escHtml(sec.title)}</${tag}>
      </div>
      <div class="doc-section-body">${body}</div>
    </div>`;
  }

  const sections = (file.sections || []).map((s, i) => renderSection(s, i)).join('');

  panel.innerHTML = `
    <div class="docs-sidebar">${sidebar}</div>
    <div class="docs-body">${sections || '<div style="padding:20px;color:#475569;">섹션 없음</div>'}</div>
  `;
}

function toggleDocSection(el) {
  const arrow = el.querySelector('.doc-section-arrow');
  const body = el.nextElementSibling;
  if (body.style.display === 'none') {
    body.style.display = '';
    arrow.classList.add('open');
  } else {
    body.style.display = 'none';
    arrow.classList.remove('open');
  }
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function renderBodyMap(nodeHealth, sh, cog, nodes) {
  function labelStyle(status) {
    if (status === 'verified') return 'background:rgba(6,78,59,0.8);color:#34d399;border:1px solid rgba(34,197,94,0.4);';
    if (status === 'failed') return 'background:rgba(127,29,29,0.8);color:#fca5a5;border:1px solid rgba(239,68,68,0.4);';
    return 'background:rgba(71,85,105,0.7);color:#cbd5e1;border:1px solid rgba(148,163,184,0.3);'; // assumed
  }
  function val(status, nodeKey) {
    const n = nodes[nodeKey];
    if (!n) return '—';
    const v = n.verified || 0;
    const f = n.failed || 0;
    const total = (n.verified || 0) + (n.assumed || 0) + (n.failed || 0);
    if (f > 0) return `${v}/${total} (${f} fail)`;
    if (v > 0) return `${v}/${total}`;
    return '미확인';
  }

  const cogStatus = cog.total_goals > 0 ? cog.by_status || {} : {};
  const cogTotal = cog.total_goals || 0;
  const cogCompleted = cogStatus.completed || 0;
  const cogState = cogTotal > 0 ? (cogCompleted / cogTotal >= 0.5 ? 'verified' : 'failed') : 'assumed';

  // 이미지 + 오버레이 라벨 (% 위치는 이미지 기준)
  return `
    <div class="body-map-container" id="body-map-img">
      <img src="/xray/body-image" alt="Body Map" onerror="this.parentElement.innerHTML=renderBodySVG_fallback();" />
      <div class="body-map-overlay">
        <div class="overlay-label" style="top:5%;left:32%;${labelStyle(cogState)}" onclick="scrollToSection('cognitive')">
          인지 <span class="overlay-value">${cogTotal > 0 ? cogCompleted + '/' + cogTotal : '—'}</span>
        </div>
        <div class="overlay-label" style="top:8%;left:55%;${labelStyle(nodeHealth.sense)};cursor:pointer;" onclick="showNodeDetail('sense')">
          Sense <span class="overlay-value">${val(nodeHealth.sense, 'sense')}</span>
        </div>
        <div class="overlay-label" style="top:35%;left:25%;${labelStyle(nodeHealth.self)};cursor:pointer;" onclick="showNodeDetail('self')">
          Self <span class="overlay-value">${val(nodeHealth.self, 'self')}</span>
        </div>
        <div class="overlay-label" style="top:55%;left:8%;${labelStyle(nodeHealth.limbs)};cursor:pointer;" onclick="showNodeDetail('limbs')">
          Limbs <span class="overlay-value">${val(nodeHealth.limbs, 'limbs')}</span>
        </div>
        <div class="overlay-label" style="top:22%;right:5%;${labelStyle(nodeHealth.others)};cursor:pointer;" onclick="showNodeDetail('others')">
          Others <span class="overlay-value">${val(nodeHealth.others, 'others')}</span>
        </div>
        <div class="overlay-label" style="top:55%;right:5%;${labelStyle(nodeHealth.engines)};cursor:pointer;" onclick="showNodeDetail('engines')">
          Engines <span class="overlay-value">${val(nodeHealth.engines, 'engines')}</span>
        </div>
      </div>
    </div>`;
}

function showNodeDetail(nodeKey) {
  const ibl = DATA.ibl || {};
  const allActions = ibl.all_actions || [];
  const nodeLabels = { sense: '감각 (Sense)', self: '자아 (Self)', limbs: '팔다리 (Limbs)', others: '타자 (Others)', engines: '엔진 (Engines)' };

  const actions = allActions.filter(a => a.node === nodeKey);
  const verified = actions.filter(a => a.status === 'verified').sort((a,b) => a.action.localeCompare(b.action));
  const assumed = actions.filter(a => a.status === 'assumed').sort((a,b) => a.action.localeCompare(b.action));
  const failed = actions.filter(a => a.status === 'failed').sort((a,b) => a.action.localeCompare(b.action));

  function renderGroup(title, items, color, dotColor) {
    if (items.length === 0) return '';
    return `
      <div class="action-group">
        <div class="action-group-title" style="background:${color};color:#fff;">
          ${title} (${items.length})
        </div>
        ${items.map(a => `
          <div class="action-item">
            <span><span class="status-dot" style="background:${dotColor}"></span>${a.action}</span>
            <span style="color:#94a3b8;">${a.count > 0 ? a.count + '회 · ' + (a.avg_ms ? Math.round(a.avg_ms) + 'ms' : '') : ''}</span>
          </div>
        `).join('')}
      </div>`;
  }

  const modal = document.createElement('div');
  modal.className = 'node-modal-overlay';
  modal.onclick = (e) => { if (e.target === modal) modal.remove(); };
  modal.innerHTML = `
    <div class="node-modal">
      <button class="close-btn" onclick="this.closest('.node-modal-overlay').remove()">&times;</button>
      <h3>${nodeLabels[nodeKey] || nodeKey} — 액션 상세</h3>
      <div style="font-size:12px;color:#94a3b8;margin-bottom:16px;">
        정상 ${verified.length} · 미확인 ${assumed.length} · 비정상 ${failed.length} · 총 ${actions.length}개
      </div>
      ${renderGroup('비정상 — 최근 실행 실패', failed, 'rgba(127,29,29,0.8)', '#ef4444')}
      ${renderGroup('정상 — 7일 이내 성공 확인', verified, 'rgba(6,78,59,0.6)', '#22c55e')}
      ${renderGroup('미확인 — 7일간 기록 없음', assumed, 'rgba(71,85,105,0.6)', '#94a3b8')}
    </div>
  `;
  document.body.appendChild(modal);
}

    <div class="goal-stats-bar">
      <div class="goal-stat-card">
        <div class="goal-stat-value" style="color:#34d399">${tasks.length}</div>
        <div class="goal-stat-label">완료된 Task</div>
      </div>
      <div class="goal-stat-card">
        <div class="goal-stat-value" style="color:#f59e0b">${pending}</div>
        <div class="goal-stat-label">대기 중</div>
      </div>
      <div class="goal-stat-card">
        <div class="goal-stat-value" style="color:#3b82f6">${totalTools}</div>
        <div class="goal-stat-label">도구 호출</div>
      </div>
      <div class="goal-stat-card">
        <div class="goal-stat-value" style="color:${totalTools > 0 ? healthColor(totalSuccess/totalTools*100) : '#64748b'}">${totalTools > 0 ? Math.round(totalSuccess/totalTools*100) + '%' : '-'}</div>
        <div class="goal-stat-label">도구 성공률</div>
      </div>
    </div>

    ${tasks.length === 0 ? '<div style="padding:60px 20px;text-align:center;color:#64748b;"><div style="font-size:40px;margin-bottom:16px;opacity:0.3;">&#128064;</div><div style="font-size:14px;margin-bottom:8px;">현재 세션에서 완료된 Task가 없습니다.</div><div style="font-size:12px;">시스템을 사용하면 여기에 Task 실행 이력이 표시됩니다.<br>각 Task가 어떤 도구를 사용했는지, 성공/실패 여부를 볼 수 있습니다.</div></div>' : ''}

    ${tasks.length > 0 ? `
    <!-- 프로젝트 필터 -->
    <div class="goal-filters">
      <button class="filter-chip ${goalFilter === 'all' ? 'active' : ''}" onclick="setGoalFilter('all')">전체 (${tasks.length})</button>
      ${byProject.map(p =>
        '<button class="filter-chip ' + (goalFilter === p.id ? 'active' : '') + '" onclick="setGoalFilter(\'' + p.id + '\')">' + escHtml(p.name) + ' (' + p.completed + ')</button>'
      ).join('')}
    </div>

    <!-- Task 타임라인 -->
    <div class="section">
      <div class="section-title">Task 실행 이력 (현재 세션, ${filtered.length}건)</div>
      ${filtered.map(t => renderTaskItem(t)).join('')}
    </div>` : ''}
  `;
}

function setGoalFilter(f) {
  goalFilter = f;
  renderGoalTimeline();
}

function renderTaskItem(t) {
  const tools = t.tools || [];
  const toolCount = tools.length;
  const toolSuccess = tools.filter(tc => tc.success).length;
  const createdAt = t.created_at ? t.created_at.slice(0, 16).replace('T', ' ') : '-';
  const totalMs = tools.reduce((s, tc) => s + (tc.ms || 0), 0);

  // 도구 액션 파이프라인 시각화
  let toolsHtml = '';
  if (toolCount > 0) {
    toolsHtml = '<div style="margin-top:8px;padding:8px 10px;background:#0f172a;border-radius:6px;">' +
      tools.map((tc, i) => {
        const ok = tc.success;
        const nodeAction = (tc.node && tc.action) ? tc.node + ':' + tc.action : tc.tool_name || '?';
        const ms = tc.ms || 0;
        const dotColor = ok ? '#22c55e' : '#ef4444';
        const msColor = ms > 3000 ? '#f59e0b' : '#475569';
        return '<div style="display:flex;align-items:center;gap:8px;padding:2px 0;">' +
          '<div style="width:6px;height:6px;border-radius:50%;background:' + dotColor + ';flex-shrink:0;"></div>' +
          '<span style="color:#22d3ee;font-size:11px;font-weight:600;min-width:120px;">' + escHtml(nodeAction) + '</span>' +
          '<span style="color:' + msColor + ';font-size:10px;">' + ms + 'ms</span>' +
          (ok ? '' : '<span style="color:#fca5a5;font-size:10px;">FAIL</span>') +
        '</div>';
      }).join('') +
      '</div>';
  }

  return '<div class="goal-item" style="padding:12px;">' +
    '<div class="goal-header">' +
      '<div style="flex:1;min-width:0;">' +
        '<span class="goal-name" style="font-size:13px;">' + escHtml(t.original_request || t.task_id) + '</span>' +
      '</div>' +
      '<div style="display:flex;gap:6px;align-items:center;flex-shrink:0;">' +
        '<span class="goal-project">' + escHtml(t.project_name) + '</span>' +
      '</div>' +
    '</div>' +
    '<div class="goal-meta">' +
      '<span>' + createdAt + '</span>' +
      (t.delegated_to ? '<span>&#128100; ' + escHtml(t.delegated_to) + '</span>' : '') +
      (toolCount > 0 ? '<span>' + toolSuccess + '/' + toolCount + ' actions · ' + totalMs + 'ms</span>' : '<span style="color:#64748b;">텍스트 응답</span>') +
    '</div>' +
    toolsHtml +
  '</div>';
}

function escHtml(s) {
  if (!s) return '';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function scrollToSection(id) {
  // 해당 섹션으로 스크롤
  const sections = document.querySelectorAll('.section-title');
  for (const s of sections) {
    if (id === 'ibl' && s.textContent.includes('IBL')) { s.scrollIntoView({behavior:'smooth'}); return; }
    if (id === 'projects' && s.textContent.includes('프로젝트')) { s.scrollIntoView({behavior:'smooth'}); return; }
    if (id === 'cognitive' && s.textContent.includes('IBL')) { s.scrollIntoView({behavior:'smooth'}); return; }
  }
}

function showTip(e) {
  if (!tooltip) {
    tooltip = document.createElement('div');
    tooltip.className = 'timeline-tooltip';
    document.body.appendChild(tooltip);
  }
  tooltip.textContent = e.target.dataset.info;
  tooltip.style.display = 'block';
  tooltip.style.left = e.clientX + 12 + 'px';
  tooltip.style.top = e.clientY - 40 + 'px';
}
function hideTip() {
  if (tooltip) tooltip.style.display = 'none';
}

// ============ WebSocket 실시간 ============
let ws = null;
let liveFeed = [];
const MAX_FEED = 50;

function connectWS() {
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  ws = new WebSocket(proto + '//' + location.host + '/xray/ws');

  ws.onopen = () => {
    const el = document.getElementById('ws-status');
    if (el) { el.innerHTML = '&#9679; LIVE'; el.style.color = '#34d399'; }
  };
  ws.onclose = () => {
    const el = document.getElementById('ws-status');
    if (el) { el.innerHTML = '&#9679; 연결 끊김'; el.style.color = '#ef4444'; }
    // 3초 후 재연결
    setTimeout(connectWS, 3000);
  };
  ws.onerror = () => ws.close();

  ws.onmessage = (e) => {
    try {
      const event = JSON.parse(e.data);
      handleLiveEvent(event);
    } catch(err) {}
  };
}

function handleLiveEvent(evt) {
  liveFeed.unshift(evt);
  if (liveFeed.length > MAX_FEED) liveFeed = liveFeed.slice(0, MAX_FEED);
  renderLiveFeed();
}

function renderLiveFeed() {
  let container = document.getElementById('live-feed');
  if (!container) {
    container = document.createElement('div');
    container.id = 'live-feed';
    container.className = 'live-feed';
    document.body.appendChild(container);
  }

  const items = liveFeed.slice(0, 15).map(evt => {
    if (evt.type === 'tool') {
      const dotColor = evt.success ? '#22c55e' : '#ef4444';
      const statusCls = evt.success ? 'live-ok' : 'live-err';
      const statusTxt = evt.success ? 'OK' : 'ERR';
      return '<div class="live-item">' +
        '<div class="live-dot" style="background:' + dotColor + '"></div>' +
        '<span class="live-time">' + evt.ts + '</span>' +
        (evt.agent ? '<span style="color:#64748b;">[' + escHtml(evt.agent) + ']</span>' : '') +
        '<span class="live-node">' + escHtml(evt.node) + '</span>:<span class="live-action">' + escHtml(evt.action) + '</span>' +
        (evt.hint ? '<span style="color:#475569;">(' + escHtml(evt.hint.slice(0, 30)) + ')</span>' : '') +
        '<span class="' + statusCls + '">' + statusTxt + '</span>' +
        '<span class="live-ms">' + evt.ms + 'ms</span>' +
      '</div>';
    } else if (evt.type === 'task_complete') {
      return '<div class="live-item">' +
        '<div class="live-dot" style="background:#a78bfa"></div>' +
        '<span class="live-time">' + evt.ts + '</span>' +
        '<span class="live-task">TASK</span>' +
        '<span class="live-action">' + escHtml((evt.request || '').slice(0, 50)) + '</span>' +
        '<span style="color:#64748b;">&#10132; ' + escHtml(evt.agent || '') + '</span>' +
        (evt.tool_count > 0 ? '<span style="color:#64748b;">' + evt.tool_count + ' tools</span>' : '') +
      '</div>';
    }
    return '';
  }).join('');

  container.innerHTML = '<div class="live-feed-inner">' +
    (items || '<div class="live-item" style="color:#475569;">실시간 이벤트 대기 중...</div>') +
    '</div>';
}

// 초기 로드
fetchData();
connectWS();
</script>
